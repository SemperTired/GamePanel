    - key: bLoadAutoSave
      label: Load Latest Auto Save
      category: Astroneer
      subcategory: Server
      description: >-
        If enabled, the server will load the most recent autosave on startup. Otherwise, the save specified under Active
        Save File Name will be loaded if it exists, or a new autosave will be created
