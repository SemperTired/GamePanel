        Keywords: public,ip,publicip
        FieldName: PublicIP
        InputType: enum
        ParamFieldName: /Script/Astro.AstroServerSettings.PublicIP
        DefaultValue: '{{$ExternalIP}}'
        EnumValues:
          '{{$ExternalIP}}': Automatic (default)
          '{{ManualPublicIP}}': Manual
    - key: ManualPublicIP
      label: Server Public IP
      category: Astroneer
      subcategory: Server
      description: >-
        Sets the public IP advertised for the server, if "Manual" is selected as the Public IP Selection Mode. Useful if
        the host network has multiple public IPs, or the server is behind a public proxy
      keywords: manual,public,ip,publicip
