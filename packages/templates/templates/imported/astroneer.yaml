schema: aetherpanel.template/v1
id: astroneer
name: Astroneer
category: Imported
summary: Astroneer Dedicated Server
install:
  method: steamcmd
  app_id: '728470'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: .proton/proton {PlatformArgs} Port={ApplicationPort1} ConsolePort={RemoteAdminPort} {FormattedArgs} -log
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: remoteadminport
    name: Console Port
    default: 1234
    protocol: tcp
    required: true
config_files:
  - path: Astro/Saved/Config/WindowsServer/AstroServerSettings.ini
    type: ini
    editable: true
  - path: Astro/Saved/Config/WindowsServer/GameUserSettings.ini
    type: ini
    editable: true
  - path: Astro/Saved/Config/WindowsServer/Engine.ini
    type: ini
    editable: true
