    - key: PublicIP
      label: Public IP Selection Mode
      category: Astroneer
      subcategory: Server
      description: >-
        Sets whether AMP should automatically select the public IP advertised for the server, or whether it should use
        the IP set under Server Public IP
      keywords: public,ip,publicip
      input_type: enum
      param_field_name: /Script/Astro.AstroServerSettings.PublicIP
      default: '{{$ExternalIP}}'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '{{$ExternalIP}}': Automatic (default)
        '{{ManualPublicIP}}': Manual
      raw:
        DisplayName: Public IP Selection Mode
        Category: Astroneer:stadia_controller
        Subcategory: Server:dns:1
