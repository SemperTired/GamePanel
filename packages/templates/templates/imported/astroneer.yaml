    - key: SpecificReleaseVersion
      label: Proton GE Release Version (Linux)
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        Sets the Proton GE [release version](https://github.com/GloriousEggroll/proton-ge-custom/releases) to install.
