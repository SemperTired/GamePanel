schema: aetherpanel.template/v1
id: call-of-dutymw3-plutonium
name: 'Call of Duty: Modern Warfare 3 (2011 - Plutonium Mod)'
category: Imported
summary: 'Call of Duty: Modern Warfare 3 (2011) Dedicated Server using the Plutonium mod launcher'
install:
  method: steamcmd
  app_id: '42750'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} iw5mp "{FullBaseDir}IW5" -dedicated +set key {ServerKey} +set fs_game "{fs_game}" +set
    sv_config server.cfg +net_port {ServerPort} +rcon_password "{RemoteAdminPassword}" {FormattedArgs} +start_map_rotate
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 27016
    protocol: both
    required: true
config_files:
  - path: IW5/admin/server.cfg
    type: text
    editable: true
config_schema:
  fields:
