schema: aetherpanel.template/v1
id: assetto-corsa
name: Assetto Corsa
category: Imported
summary: Assetto Corsa Dedicated Server
install:
  method: steamcmd
  app_id: '302550'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 302550/acServer {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 9600
    protocol: both
    required: true
  - key: httpport
    name: HTTP Port
    default: 9601
    protocol: tcp
    required: true
config_files:
  - path: cfg/server_cfg.ini
    type: ini
    editable: true
config_schema:
  fields:
