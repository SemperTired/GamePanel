schema: aetherpanel.template/v1
id: operation-harsh-doorstop
name: 'Operation: Harsh Doorstop'
category: Imported
summary: 'Operation: Harsh Doorstop Dedicated Server'
install:
  method: steamcmd
  app_id: '950900'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    950900/HarshDoorstop/Binaries/Linux/HarshDoorstopServer-Linux-Shipping HarshDoorstop
    {Map}?{FormattedArgs}{bDisableKitRestrictions}{bBotAutofill}{CustomOptions} -QueryPort={QueryPort}
    -RCONPort={RCONPort} -EnableRCON -MultiHome={ApplicationIPBinding} -RCONIP={ApplicationIPBinding}
    -RCONPassword={RemoteAdminPassword} -SteamServerName="{ServerName}" {CustomFlags} -stdout {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: queryport
    name: Query Port
    default: 27005
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 7779
    protocol: tcp
    required: true
config_files:
  - path: HarshDoorstop/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerName
      label: Server Name
      category: Operation Harsh Doorstop
      subcategory: Server
      description: Sets the name of the server as it appears publicly in the server browser
      keywords: server,name,servername,steamservername
      input_type: text
      param_field_name: ServerName
      default: 'AMP Powered Operation: Harsh Doorstop Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Operation Harsh Doorstop:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server as it appears publicly in the server browser
        Keywords: server,name,servername,steamservername
        FieldName: ServerName
        InputType: text
        ParamFieldName: ServerName
        DefaultValue: 'AMP Powered Operation: Harsh Doorstop Server'
        EnumValues: {}
    - key: Map
      label: Initial Map
      category: Operation Harsh Doorstop
      subcategory: Server
      description: Sets the map for the server. If "Custom" is selected, Custom Map Name must also be set
      keywords: map
      input_type: enum
      param_field_name: Map
      default: AAS-TestMap
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        AAS-TestMap: AAS Test Map (default)
        Argonne: 'WWI: Argonne'
        SaintQuentin: 'WWI: Saint Quentin (expansion)'
        Carentan: 'WWII: Carentan (expansion)'
        Montecassino: 'WWII: Monte Cassino'
        OmahaBeach: 'WWII: Omaha Beach (expansion)'
        LamDong: 'Vietnam: Lam Dong'
        Tan_Binh: 'Vietnam: Tan Binh (expansion)'
        Khafji_P: 'Gulf War: Khafji'
        Risala: 'Modern Era: Risala'
        '{{CustomMap}}': '--Custom--'
      raw:
        DisplayName: Initial Map
        Category: Operation Harsh Doorstop:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map for the server. If "Custom" is selected, Custom Map Name must also be set
        Keywords: map
        FieldName: Map
        InputType: enum
        ParamFieldName: Map
        DefaultValue: AAS-TestMap
        EnumValues:
          AAS-TestMap: AAS Test Map (default)
          Argonne: 'WWI: Argonne'
          SaintQuentin: 'WWI: Saint Quentin (expansion)'
          Carentan: 'WWII: Carentan (expansion)'
          Montecassino: 'WWII: Monte Cassino'
          OmahaBeach: 'WWII: Omaha Beach (expansion)'
          LamDong: 'Vietnam: Lam Dong'
          Tan_Binh: 'Vietnam: Tan Binh (expansion)'
          Khafji_P: 'Gulf War: Khafji'
          Risala: 'Modern Era: Risala'
          '{{CustomMap}}': '--Custom--'
    - key: CustomMap
      label: Custom Map Name
      category: Operation Harsh Doorstop
      subcategory: Server
      description: >-
        Sets a custom map for the server. "Custom" type must be selected under Map, and the map files included in
        HarshDoorstop/Mods
      keywords: custom,map
      input_type: text
      param_field_name: CustomMap
      default: ''
      placeholder: AAS_Trainyard
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
