    - key: RemoteAddress
      label: Remote Address Selection Mode
      category: Eco
      subcategory: Server
      description: >-
        Sets whether and how the public/external endpoint address (IP:port or domain:port) for the server, as used by
        the server browser, is set. If 'Address manually set' is selected, specify the desired public/external endpoint
        address under Manual Remote Address
      keywords: remote,address,public,external,ip,RemoteAddress
      input_type: enum
      param_field_name: RemoteAddress
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Address automatically set by Eco (default)
        '{{$ExternalIP}}:{{$ApplicationPort1}}': Address automatically set by AetherPanel
        '{{ManualRemoteAddress}}': Address manually set
      raw:
        DisplayName: Remote Address Selection Mode
        Category: Eco:stadia_controller
        Subcategory: Server:dns:1
