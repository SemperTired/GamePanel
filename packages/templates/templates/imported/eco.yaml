          endpoint address under Manual Remote Address
        Keywords: remote,address,public,external,ip,RemoteAddress
        FieldName: RemoteAddress
        InputType: enum
        ParamFieldName: RemoteAddress
        DefaultValue: ''
        EnumValues:
          '': Address automatically set by Eco (default)
          '{{$ExternalIP}}:{{$ApplicationPort1}}': Address automatically set by AetherPanel
          '{{ManualRemoteAddress}}': Address manually set
    - key: ManualRemoteAddress
      label: Manual Remote Address
      category: Eco
      subcategory: Server
      description: >-
        Sets the public/external endpoint address (IP:port or domain:port) for the server, if 'Address manually set' is
