schema: aetherpanel.template/v1
id: eco
name: Eco
category: Imported
summary: Eco Dedicated Server
install:
  method: steamcmd
  app_id: '739590'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 739590/EcoServer {PlatformArgs} {AuthMode}{FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Server Port
    default: 3000
    protocol: udp
    required: true
  - key: applicationport2
    name: Web Port
    default: 3001
    protocol: tcp
    required: true
  - key: remoteadminport
    name: RCON Port
    default: 3002
    protocol: tcp
    required: true
config_files:
  - path: Configs/Network.eco
    type: json
    editable: true
config_schema:
  fields:
