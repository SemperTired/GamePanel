      enum_values:
        '': None
        '-offline ': Offline mode
        '-username="{{AuthUsername}}" -password="{{AuthPassword}}" ': Username and password
        '-userToken="{{AuthUserToken}}" ': User token
        '-steamTicket="{{AuthSteamTicket}}" ': Steam ticket
