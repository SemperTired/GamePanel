        Placeholder: '0'
        EnumValues: {}
    - key: AllowMapVoting
      label: Allow Player Voting
      category: NEBULOUS Fleet Command
      subcategory: Server
      description: If enabled, players can vote on maps, scenarios and rules
      keywords: map,scenarios,rules,voting,allowmapvoting
