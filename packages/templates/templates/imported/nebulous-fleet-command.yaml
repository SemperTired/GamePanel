        Keywords: maximum,players,clients,limit,maxplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: SkirmishDedicatedServerConfig/MaxPlayers
        IncludeInCommandLine: false
        DefaultValue: '10'
        Placeholder: '10'
        Suffix: players
        EnumValues: {}
    - key: TeamSizeToStart
      label: Team Size To Start
      category: NEBULOUS Fleet Command
      subcategory: Server
      description: Sets the number of players that must be present on each team before the game can start
      keywords: team,size,minimum,teamsizetostart
      input_type: number
      param_field_name: SkirmishDedicatedServerConfig/TeamSizeToStart
      default: '2'
      placeholder: '2'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Team Size To Start
        Category: NEBULOUS Fleet Command:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the number of players that must be present on each team before the game can start
        Keywords: team,size,minimum,teamsizetostart
        FieldName: TeamSizeToStart
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: SkirmishDedicatedServerConfig/TeamSizeToStart
        IncludeInCommandLine: false
        DefaultValue: '2'
        Placeholder: '2'
        Suffix: players
        EnumValues: {}
    - key: RequireUniformTeams
      label: Enforce Uniform Team Factions
      category: NEBULOUS Fleet Command
      subcategory: Server
      description: If enabled, the server will enforce uniform factions on teams
      keywords: uniform,team,factions,requireuniformteams
      input_type: checkbox
      param_field_name: SkirmishDedicatedServerConfig/RequireUniformTeams
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enforce Uniform Team Factions
        Category: NEBULOUS Fleet Command:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will enforce uniform factions on teams
        Keywords: uniform,team,factions,requireuniformteams
        FieldName: RequireUniformTeams
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: SkirmishDedicatedServerConfig/RequireUniformTeams
        IncludeInCommandLine: false
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: TimeLimit
      label: Game Time Limit
      category: NEBULOUS Fleet Command
      subcategory: Server
      description: >-
        Sets the time limit for games. 0 = unlimited time. The value set indexes into a list of possible time settings.
        It is NOT a minutes value
      keywords: time,limit,timelimit
      input_type: number
      param_field_name: SkirmishDedicatedServerConfig/TimeLimit
      default: '0'
      placeholder: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 0
      enum_values: {}
      raw:
        DisplayName: Game Time Limit
