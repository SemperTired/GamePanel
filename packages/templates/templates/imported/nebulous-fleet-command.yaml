        Keywords: bots
        FieldName: Bots
        InputType: hidden
        IsFlagArgument: false
        ParamFieldName: ''
        IncludeInCommandLine: false
        EnumValues: {}
  files:
    - path: ./AMPServerConfig.xml
      type: xml
      subsections: []
      raw:
        ConfigFile: ./AMPServerConfig.xml
        AutoMap: true
        ConfigType: xml
