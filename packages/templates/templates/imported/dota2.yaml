schema: aetherpanel.template/v1
id: dota2
name: Dota 2
category: Imported
summary: Dota 2 Dedicated Server
install:
  method: steamcmd
  app_id: '570'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    570/game/bin/linuxsteamrt64/dota2 {PlatformArgs} -dedicated -usercon -serverlogging -nobreakpad
    -allow_no_lobby_connect -port {ServerPort} -ip {ApplicationIPBinding} -maxplayers {MaxUsers}
    {insecure}{CustomParameters} {CustomConVars} +sv_logfile 1 +rcon_password "{RemoteAdminPassword}" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
config_files:
  - path: dota2config.json
    type: json
    editable: true
  - path: dota2metaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: hostname
      label: Server Name
      category: Dota 2
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AetherNode Dota 2 Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        ParamFieldName: hostname
        IncludeInCommandLine: true
        DefaultValue: AetherNode Dota 2 Server
        EnumValues: {}
    - key: sv_tags
      label: Server Tags
      category: Dota 2
      subcategory: Server
      description: Comma-separated list of server tags that give additional information about the server in the server browser
      keywords: tags,sv_tags
      input_type: text
      param_field_name: sv_tags
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Tags
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Comma-separated list of server tags that give additional information about the server in the server browser
        Keywords: tags,sv_tags
        FieldName: sv_tags
        InputType: text
        ParamFieldName: sv_tags
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: sv_lan
      label: LAN Server
      category: Dota 2
      subcategory: Server
      description: >-
        If enabled, the server will operate as a LAN server: no heartbeat, no authentication, and no non-class C
        addresses
      keywords: lan,local,sv_lan
      input_type: checkbox
      param_field_name: sv_lan
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: LAN Server
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the server will operate as a LAN server: no heartbeat, no authentication, and no non-class C
          addresses
        Keywords: lan,local,sv_lan
        FieldName: sv_lan
        InputType: checkbox
        ParamFieldName: sv_lan
        IncludeInCommandLine: true
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: sv_setsteamaccount
      label: Game Server Login Token (GSLT)
      category: Dota 2
      subcategory: Server
      description: >-
        Sets the [Steam Game Server Login Token](https://steamcommunity.com/dev/managegameservers) for the server, to
        allow it to be listed in the server browser. Use app ID 570 when generating the token
      keywords: steam,server,login,token,gslt,sv_setsteamaccount
      input_type: password
      param_field_name: sv_setsteamaccount
      default: ''
      placeholder: 6544F7E034119F113526E96474F559AH
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Game Server Login Token (GSLT)
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the [Steam Game Server Login Token](https://steamcommunity.com/dev/managegameservers) for the server, to
          allow it to be listed in the server browser. Use app ID 570 when generating the token
        Keywords: steam,server,login,token,gslt,sv_setsteamaccount
        FieldName: sv_setsteamaccount
        InputType: password
        ParamFieldName: sv_setsteamaccount
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: 6544F7E034119F113526E96474F559AH
        EnumValues: {}
    - key: sv_password
      label: Server Password
      category: Dota 2
      subcategory: Server
      description: Sets the password required to connect to the server. Default is no password
      keywords: server,password,sv_password
      input_type: password
      param_field_name: sv_password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password required to connect to the server. Default is no password
        Keywords: server,password,sv_password
        FieldName: sv_password
        InputType: password
        ParamFieldName: sv_password
        IncludeInCommandLine: true
        DefaultValue: ''
        EnumValues: {}
    - key: $RemoteAdminPassword
      label: RCON Password
      category: Dota 2
      subcategory: Server
      description: See the Security and Privacy menu for configurable options for the server's RCON
      keywords: rcon,password,rcon_password
      input_type: hidden
      param_field_name: rcon_password
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON Password
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: See the Security and Privacy menu for configurable options for the server's RCON
        Keywords: rcon,password,rcon_password
        FieldName: $RemoteAdminPassword
        InputType: hidden
        IsFlagArgument: false
        ParamFieldName: rcon_password
        EnumValues: {}
    - key: map
      label: Initial Map
      category: Dota 2
      subcategory: Server
      description: Sets the map to start the server with. If "Custom" is selected, Custom Initial Map must also be specified
      keywords: map
      input_type: enum
      param_field_name: map
      default: dota
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        dota: Dota
        '{{CustomMap}}': '--Custom--'
      raw:
        DisplayName: Initial Map
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map to start the server with. If "Custom" is selected, Custom Initial Map must also be specified
        Keywords: map
        FieldName: map
        InputType: enum
        ParamFieldName: map
        IncludeInCommandLine: true
        DefaultValue: dota
        EnumValues:
          dota: Dota
          '{{CustomMap}}': '--Custom--'
    - key: CustomMap
      label: Custom Initial Map
      category: Dota 2
      subcategory: Server
      description: Sets a custom map to use for the Initial Map, if "Custom" is selected
      keywords: custom,map
      input_type: text
      param_field_name: CustomMap
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Initial Map
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets a custom map to use for the Initial Map, if "Custom" is selected
        Keywords: custom,map
        FieldName: CustomMap
        InputType: text
        ParamFieldName: CustomMap
        DefaultValue: ''
        EnumValues: {}
    - key: mapgroup
      label: Map Group
      category: Dota 2
      subcategory: Server
      description: >-
        Sets the map group to load to enable map rotation. Alternatively specify a Workshop Collection ID which includes
        the maps required for rotation
      keywords: map,group,mapgroup
      input_type: text
      param_field_name: mapgroup
      default: ''
      placeholder: mg_dota2
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Map Group
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the map group to load to enable map rotation. Alternatively specify a Workshop Collection ID which
          includes the maps required for rotation
        Keywords: map,group,mapgroup
        FieldName: mapgroup
        InputType: text
        ParamFieldName: mapgroup
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: mg_dota2
        EnumValues: {}
    - key: host_workshop_map
      label: Workshop Map ID
      category: Dota 2
      subcategory: Server
      description: >-
        Sets the ID of a [Steam workshop
        map](https://steamcommunity.com/workshop/browse/?appid=570&browsesort=trend&section=readytouseitems) to download
        and load on the server. This will override the Initial Map setting
      keywords: workshop,map,host_workshop_map
      input_type: number
      param_field_name: host_workshop_map
      default: ''
      placeholder: '440115357'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Workshop Map ID
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the ID of a [Steam workshop
          map](https://steamcommunity.com/workshop/browse/?appid=570&browsesort=trend&section=readytouseitems) to
          download and load on the server. This will override the Initial Map setting
        Keywords: workshop,map,host_workshop_map
        FieldName: host_workshop_map
        InputType: number
        ParamFieldName: host_workshop_map
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: '440115357'
        EnumValues: {}
    - key: host_workshop_collection
      label: Workshop Collection ID
      category: Dota 2
      subcategory: Server
      description: >-
        Sets the ID of a [Steam workshop
        collection](https://steamcommunity.com/workshop/browse/?appid=570&browsesort=trend&section=collections) to
        download and load on the server. This will override the Initial Map setting
      keywords: workshop,collection,host_workshop_collection
      input_type: number
      param_field_name: host_workshop_collection
      default: ''
      placeholder: '3312190165'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Workshop Collection ID
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the ID of a [Steam workshop
          collection](https://steamcommunity.com/workshop/browse/?appid=570&browsesort=trend&section=collections) to
          download and load on the server. This will override the Initial Map setting
        Keywords: workshop,collection,host_workshop_collection
        FieldName: host_workshop_collection
        InputType: number
        ParamFieldName: host_workshop_collection
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: '3312190165'
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Dota 2
      subcategory: Server
      description: Sets the maximum number of players allowed on the server at one time
      keywords: max,players,limit,maxplayers
      input_type: number
      param_field_name: maxplayers
      default: '32'
      placeholder: '32'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      max: 64
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players allowed on the server at one time
        Keywords: max,players,limit,maxplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        MaxValue: '64'
        ParamFieldName: maxplayers
        DefaultValue: '32'
        Placeholder: '32'
        Suffix: players
        EnumValues: {}
    - key: sv_pure
      label: Pure Server Mode
      category: Dota 2
      subcategory: Server
      description: Sets whether clients are only allowed to use certain files
      keywords: pure,server,cheat,hack,integrity,sv_pure
      input_type: enum
      param_field_name: sv_pure
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '0': Client files not restricted
        '1': All client files except those listed in pure_server_whitelist.txt must match the server
        '2': All client files must come from Steam
      raw:
        DisplayName: Pure Server Mode
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets whether clients are only allowed to use certain files
        Keywords: pure,server,cheat,hack,integrity,sv_pure
        FieldName: sv_pure
        InputType: enum
        ParamFieldName: sv_pure
        IncludeInCommandLine: true
        DefaultValue: '0'
        EnumValues:
          '0': Client files not restricted
          '1': All client files except those listed in pure_server_whitelist.txt must match the server
          '2': All client files must come from Steam
    - key: sv_cheats
      label: Enable Cheats
      category: Dota 2
      subcategory: Server
      description: If set, cheat convars will be allowed to be used on the server
      keywords: allow,cheat,hack,integrity,sv_cheats
      input_type: checkbox
      param_field_name: sv_cheats
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Cheats
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, cheat convars will be allowed to be used on the server
        Keywords: allow,cheat,hack,integrity,sv_cheats
        FieldName: sv_cheats
        InputType: checkbox
        ParamFieldName: sv_cheats
        IncludeInCommandLine: true
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: insecure
      label: Disable Valve Anti-Cheat
      category: Dota 2
      subcategory: Server
      description: If set, Valve Anti-Cheat (VAC) will be disabled
      keywords: valve,anti,cheat,vac,insecure
      input_type: checkbox
      param_field_name: insecure
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-insecure '
      raw:
        DisplayName: Disable Valve Anti-Cheat
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, Valve Anti-Cheat (VAC) will be disabled
        Keywords: valve,anti,cheat,vac,insecure
        FieldName: insecure
        InputType: checkbox
        ParamFieldName: insecure
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-insecure '
    - key: ip
      label: Server/RCON IPv4 IP Binding
      category: Dota 2
      subcategory: Server
      description: >-
        If required, you can change the binding of the server and Source RCON by changing the Application IP Binding for
        this instance. NOTE: The IP must be reachable by AetherPanel, otherwise AetherPanel's console won't work
      keywords: ip,binding
      input_type: hidden
      param_field_name: ip
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server/RCON IPv4 IP Binding
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If required, you can change the binding of the server and Source RCON by changing the Application IP Binding
          for this instance. NOTE: The IP must be reachable by AetherPanel, otherwise AetherPanel's console won't work
        Keywords: ip,binding
        FieldName: ip
        InputType: hidden
        ParamFieldName: ip
        EnumValues: {}
    - key: CustomParameters
      label: Additional Command Line Parameters
      category: Dota 2
      subcategory: Server
      description: >-
        Specifies additional command line parameters (anything that begins with a -) that are not otherwise set by AetherPanel.
        Use with care
      keywords: custom,server,arguments,variables,cvars,convars,parameters
      input_type: text
      param_field_name: CustomParameters
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Additional Command Line Parameters
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Specifies additional command line parameters (anything that begins with a -) that are not otherwise set by
          AetherPanel. Use with care
        Keywords: custom,server,arguments,variables,cvars,convars,parameters
        FieldName: CustomParameters
        InputType: text
        ParamFieldName: CustomParameters
        DefaultValue: ''
        Placeholder: ''
        EnumValues: {}
    - key: CustomConVars
      label: Additional Console Variables
      category: Dota 2
      subcategory: Server
      description: >-
        Specifies additional console variables (anything that begins with a +) that are not otherwise set by AetherPanel. Use
        with care
      keywords: custom,server,arguments,variables,cvars,convars,parameters
      input_type: text
      param_field_name: CustomConVars
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Additional Console Variables
        Category: Dota 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Specifies additional console variables (anything that begins with a +) that are not otherwise set by AetherPanel. Use
          with care
        Keywords: custom,server,arguments,variables,cvars,convars,parameters
        FieldName: CustomConVars
        InputType: text
        ParamFieldName: CustomConVars
        DefaultValue: ''
        Placeholder: ''
        EnumValues: {}
  files: []
environment: {}
startup_variables:
  - key: hostname
    label: Server Name
    default: AetherNode Dota 2 Server
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_tags
    label: Server Tags
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_lan
    label: LAN Server
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_setsteamaccount
    label: Game Server Login Token (GSLT)
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: sv_password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: map
    label: Initial Map
    default: dota
    customer_editable: true
    required: false
    sensitive: false
  - key: CustomMap
    label: Custom Initial Map
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: mapgroup
    label: Map Group
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: host_workshop_map
    label: Workshop Map ID
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: host_workshop_collection
    label: Workshop Collection ID
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_pure
    label: Pure Server Mode
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_cheats
    label: Enable Cheats
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: insecure
    label: Disable Valve Anti-Cheat
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: CustomParameters
    label: Additional Command Line Parameters
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: CustomConVars
    label: Additional Console Variables
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '570'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

