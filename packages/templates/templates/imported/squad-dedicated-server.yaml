schema: aetherpanel.template/v1
id: squad-dedicated-server
name: Squad
category: Imported
summary: Squad Dedicated Server
install:
  method: steamcmd
  app_id: '403240'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    403240/SquadGame/Binaries/Linux/SquadGameServer MULTIHOME={ApplicationIPBinding} Port={ApplicationPort1}
    QueryPort={ApplicationPort2} RCONPORT={RemoteAdminPort} RCONPASSWORD={RemoteAdminPassword} FIXEDMAXTICKRATE={MaxTPS}
    -beaconport={ApplicationPort3} -log -fullcrashdump {CustomArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: game
    name: Game Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: ./SquadGame/ServerConfig/Server.cfg
    type: text
    editable: true
  - path: ./SquadGame/ServerConfig/VoteConfig.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: RCONPassword
      label: RCON Password
      category: Squad
      subcategory: Server
      description: See the Security and Privacy menu for configurable options for the server's RCON
      keywords: rcon,password
      input_type: hidden
      param_field_name: RCONPassword
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON Password
        Category: Squad:stadia_controller
        Subcategory: Server:dns:1
        Description: See the Security and Privacy menu for configurable options for the server's RCON
        Keywords: rcon,password
        FieldName: RCONPassword
        InputType: hidden
        IsFlagArgument: false
        ParamFieldName: RCONPassword
        IncludeInCommandLine: false
        EnumValues: {}
    - key: ServerName
      label: Server Name
      category: Squad
      subcategory: Server
      description: Set the Name for the server in the Server Browser
      keywords: server name, name
      input_type: text
      param_field_name: ServerName
      default: A Squad Server Hosted by AetherNode
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Squad:stadia_controller
        Subcategory: Server:dns:1
        Description: Set the Name for the server in the Server Browser
        Keywords: server name, name
        FieldName: ServerName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: ServerName
        IncludeInCommandLine: false
        DefaultValue: A Squad Server Hosted by AetherNode
    - key: $MaxUsers
      label: Max Players
      category: Squad
      subcategory: Server
      description: Set the max players allowed on the server (minus reserved slots)
      keywords: max players, players
      input_type: number
      param_field_name: MaxPlayers
      default: '100'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Max Players
