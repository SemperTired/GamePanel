        Placeholder: '1'
        EnumValues: {}
    - key: template
      label: Server Mission
      category: DayZ
      subcategory: Server
      description: >-
        Sets the mission to load on server startup. If Custom is selected, the "Custom Mission Name" must also be
        specified
      keywords: mission,terrain,template
      input_type: enum
      param_field_name: template
      default: dayzOffline.chernarusplus
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        dayzOffline.chernarusplus: Vanilla - Chernarus Plus (default)
        dayzOffline.enoch: Livonia DLC - Enoch
        dayzOffline.sakhal: Frostline DLC - Sakhal
        '{{customTemplate}}': Custom
      raw:
        DisplayName: Server Mission
        Category: DayZ:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the mission to load on server startup. If Custom is selected, the "Custom Mission Name" must also be
          specified
        Keywords: mission,terrain,template
        FieldName: template
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: template
        IncludeInCommandLine: false
        DefaultValue: dayzOffline.chernarusplus
        EnumValues:
          dayzOffline.chernarusplus: Vanilla - Chernarus Plus (default)
          dayzOffline.enoch: Livonia DLC - Enoch
          dayzOffline.sakhal: Frostline DLC - Sakhal
          '{{customTemplate}}': Custom
    - key: customTemplate
      label: Custom Mission Name
      category: DayZ
      subcategory: Server
      description: >-
        Sets a custom mission to load on startup. Format is <MissionName>.<TerrainName>. The Custom mission type must be
        selected under "Server Mission"
      keywords: mission,terrain,template,customtemplate
      input_type: text
      param_field_name: customTemplate
      default: ''
      placeholder: Expansion.ChenarusPlus
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Mission Name
        Category: DayZ:stadia_controller
        Subcategory: Server:dns:1
