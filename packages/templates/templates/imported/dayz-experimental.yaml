    - key: instanceId
      label: Instance ID
      category: DayZ
      subcategory: Server
      description: >-
        Sets the DayZ server instance ID, to identify the number of instances per box and their storage folders with
        persistence files
      keywords: instance,id,instanceid
      input_type: number
      param_field_name: instanceId
      default: '1'
