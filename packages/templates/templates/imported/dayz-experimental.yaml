    - key: AdminPlayers
      label: Whitelisted Players
      category: DayZ
      subcategory: Server
      description: >-
        Sets a list of whitelisted Player IDs (44 characters long ID), which can be found in the admin log file (.ADM).
        Comments can be added after two forward slashes. Example: 1111111111112222222222222333333333XXXXXXAAAA //Bilbo
        Baggins
      keywords: ''
      input_type: list
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      special: listfile:./dayz/1042420/whitelist.txt
      raw:
        DisplayName: Whitelisted Players
        Category: DayZ:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a list of whitelisted Player IDs (44 characters long ID), which can be found in the admin log file
          (.ADM). Comments can be added after two forward slashes. Example: 1111111111112222222222222333333333XXXXXXAAAA
          //Bilbo Baggins
        FieldName: AdminPlayers
        InputType: list
        Special: listfile:./dayz/1042420/whitelist.txt
    - key: BanPlayers
      label: Banned Players
      category: DayZ
      subcategory: Server
      description: >-
        Sets a list of banned Player IDs, in the same format as Whitelisted Players. These bans are separate to BattlEye
