        IncludeInCommandLine: false
        DefaultValue: '500'
        Placeholder: '500'
        Suffix: players
        EnumValues: {}
    - key: loginQueueConcurrentPlayers
      label: Login Queue Concurrent Players
      category: DayZ
      subcategory: Server
      description: >-
        Sets the number of players concurrently processed during the login process, to prevent a performance drop when
        many people are connecting at the same time
      keywords: login,queue,loginqueueconcurrentplayers
      input_type: number
      param_field_name: loginQueueConcurrentPlayers
      default: '5'
      placeholder: '5'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
