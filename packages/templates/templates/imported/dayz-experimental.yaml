schema: aetherpanel.template/v1
id: dayz-experimental
name: DayZ (Experimental)
category: Imported
summary: DayZ (Experimental) Dedicated Server
install:
  method: steamcmd
  app_id: '1042420'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    1042420/DayZServer {PlatformArgs} "-profiles={FullBaseDir}DayZServerData" "-bepath={FullBaseDir}battleye"
    -port={GamePort} -config=serverDZ.cfg {doLogs}-adminLog -freezeCheck -ip={ApplicationIPBinding} {FormattedArgs}
    {filePatching}{EnableLimitFPS}{CustomServerArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 2302
    protocol: udp
    required: true
  - key: reservedport
    name: Reserved Port
    default: 2303
    protocol: udp
    required: true
  - key: battleyeport
    name: BattlEye Port
    default: 2304
    protocol: udp
    required: true
  - key: queryport
    name: Steam Query Port
    default: 27016
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 2305
    protocol: udp
    required: true
config_files:
  - path: ./serverDZ.cfg
    type: text
    editable: true
  - path: ./battleye/beserver_x64.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $QueryPort
      label: Steam Query Port
      category: DayZ
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: steamQueryPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Steam Query Port
        Category: DayZ:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $QueryPort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: steamQueryPort
        IncludeInCommandLine: false
        EnumValues: {}
    - key: hostname
      label: Server Name
      category: DayZ
      subcategory: Server
      description: Sets the server name visible in the game browser
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AMP Powered DayZ Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
