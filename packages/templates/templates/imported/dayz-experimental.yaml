        Keywords: ip,binding
        FieldName: ip
        InputType: hidden
        IsFlagArgument: false
        ParamFieldName: ip
        IncludeInCommandLine: false
        EnumValues: {}
    - key: filePatching
      label: Enable Server File Patching
      category: DayZ
      subcategory: Server
      description: If enabled, allows loading of unpacked data
      keywords: file,patching,filepatching
      input_type: checkbox
      param_field_name: filePatching
      default: '-filePatching '
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
