      param_field_name: ServerSettings.ServerName
      default: AetherNode Night of the Dead Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
