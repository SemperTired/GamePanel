schema: aetherpanel.template/v1
id: night-of-the-dead
name: Night of the Dead
category: Imported
summary: Night of the Dead Dedicated Server
install:
  method: steamcmd
  app_id: '1420710'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} ?listen -Port={GamePort} -QueryPort={QueryPort} -MultiHome={ApplicationIPBinding}
    {DisableAntiCheat}{FormattedArgs} -stdout -FullStdOutLogOutput -CRASHREPORTS
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: LF/Saved/Config/ServerSettings.ini
    type: ini
    editable: true
  - path: ServerSettings.ini
    type: ini
    editable: true
config_schema:
