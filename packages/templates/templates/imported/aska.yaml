    - key: saveId
      label: Save ID
      category: ASKA
      subcategory: Server
      description: >-
        Sets the ID of a save file in the 'server' directory to load. The ID comes after 'savegame_' in the save file
        name. Empty = new save (the save ID that is populated in 'server properties.txt' for a new save can be imported
        from that file into this setting)
      keywords: save,id,saveId
      input_type: text
      param_field_name: save id
      default: ''
      placeholder: e111d_251124125819
      required: false
      sensitive: false
      hidden: false
