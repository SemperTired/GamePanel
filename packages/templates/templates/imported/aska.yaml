schema: aetherpanel.template/v1
id: aska
name: ASKA
category: Imported
summary: ASKA Dedicated Server
install:
  method: steamcmd
  app_id: '3246670'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} -propertiesPath "server properties.txt" {FormattedArgs} {CustomArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: server properties.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Game Port
      category: ASKA
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: steam game port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: ASKA:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        Hidden: true
        ParamFieldName: steam game port
        ExcludeFromImport: true
        EnumValues: {}
    - key: $QueryPort
      label: Query Port
      category: ASKA
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: steam query port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
