        DefaultValue: ''
        EnumValues: {}
    - key: $RemoteAdminPassword
      label: RCON Password
      category: Counter-Strike 2
      subcategory: Server
      description: See the Security and Privacy menu for configurable options for the server's RCON
      keywords: rcon,password,rcon_password
      input_type: hidden
      param_field_name: rcon_password
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON Password
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: See the Security and Privacy menu for configurable options for the server's RCON
        Keywords: rcon,password,rcon_password
        FieldName: $RemoteAdminPassword
        InputType: hidden
        IsFlagArgument: false
        ParamFieldName: rcon_password
        EnumValues: {}
    - key: gamemode
      label: Initial Game Mode
      category: Counter-Strike 2
      subcategory: Server
      description: Sets the game mode (game_type, game_mode) to start the server with
      keywords: game,mode,gamemode,game_mode,game_type
      input_type: enum
      param_field_name: gamemode
      default: +game_type 0 +game_mode 0
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        +game_type 0 +game_mode 0: Casual (default)
        +game_type 0 +game_mode 1: Competitive
        +game_type 0 +game_mode 2: Wingman (Competitive 2v2)
        +game_type 1 +game_mode 0: Arms Race
        +game_type 1 +game_mode 2: Deathmatch
        +game_type 2 +game_mode 0: Training
        +game_type 3 +game_mode 0: Custom
        +game_type 4 +game_mode 0: Guardian (Co-operative)
        +game_type 4 +game_mode 1: Co-op Strike (Co-op Mission)
        +game_type 0 +game_mode 0 +sv_skirmish_id 12: Retakes
      raw:
        DisplayName: Initial Game Mode
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the game mode (game_type, game_mode) to start the server with
        Keywords: game,mode,gamemode,game_mode,game_type
        FieldName: gamemode
        InputType: enum
        ParamFieldName: gamemode
        DefaultValue: +game_type 0 +game_mode 0
        EnumValues:
          +game_type 0 +game_mode 0: Casual (default)
          +game_type 0 +game_mode 1: Competitive
          +game_type 0 +game_mode 2: Wingman (Competitive 2v2)
          +game_type 1 +game_mode 0: Arms Race
          +game_type 1 +game_mode 2: Deathmatch
          +game_type 2 +game_mode 0: Training
          +game_type 3 +game_mode 0: Custom
          +game_type 4 +game_mode 0: Guardian (Co-operative)
          +game_type 4 +game_mode 1: Co-op Strike (Co-op Mission)
          +game_type 0 +game_mode 0 +sv_skirmish_id 12: Retakes
    - key: map
      label: Initial Map
      category: Counter-Strike 2
      subcategory: Server
      description: Sets the map to start the server with. If "Custom" is selected, Custom Initial Map must also be specified
      keywords: map
      input_type: enum
      param_field_name: map
      default: de_dust2
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        de_ancient: Ancient
        de_anubis: Anubis
        de_dust2: Dust II (default)
        de_inferno: Inferno
        cs_italy: Italy
        de_mirage: Mirage
        de_nuke: Nuke
        cs_office: Office
        de_overpass: Overpass
        de_vertigo: Vertigo
        '{{CustomMap}}': '--Custom--'
      raw:
        DisplayName: Initial Map
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map to start the server with. If "Custom" is selected, Custom Initial Map must also be specified
        Keywords: map
        FieldName: map
        InputType: enum
        ParamFieldName: map
        IncludeInCommandLine: true
        DefaultValue: de_dust2
        EnumValues:
          de_ancient: Ancient
          de_anubis: Anubis
          de_dust2: Dust II (default)
          de_inferno: Inferno
          cs_italy: Italy
          de_mirage: Mirage
          de_nuke: Nuke
          cs_office: Office
          de_overpass: Overpass
          de_vertigo: Vertigo
          '{{CustomMap}}': '--Custom--'
    - key: CustomMap
      label: Custom Initial Map
      category: Counter-Strike 2
      subcategory: Server
      description: >-
        Sets a custom map to use for the Initial Map, if "Custom" is selected. The map file must be in the
        'game/csgo/maps' directory
      keywords: custom,map
      input_type: text
      param_field_name: CustomMap
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
