        EnumValues: {}
    - key: sv_password
      label: Server Password
      category: Counter-Strike 2
      subcategory: Server
      description: Sets the password required to connect to the server. Default is no password
      keywords: server,password,sv_password
      input_type: password
      param_field_name: sv_password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
