        Keywords: custom,map
        FieldName: CustomMap
        InputType: text
        ParamFieldName: CustomMap
        DefaultValue: ''
        EnumValues: {}
    - key: mapgroup
      label: Map Group
      category: Counter-Strike 2
      subcategory: Server
      description: >-
        Sets the map group to load to enable map rotation. The map group must be defined in
        'game/csgo/gamemodes_server.txt'. See
        [example](https://github.com/kus/cs2-modded-server/blob/master/game/csgo/gamemodes_server.txt). Alternatively
        specify a Workshop Collection ID which includes the maps required for rotation, and use a plugin to load them
      keywords: map,group,mapgroup
      input_type: text
      param_field_name: mapgroup
      default: ''
      placeholder: mg_cs2
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Map Group
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the map group to load to enable map rotation. The map group must be defined in
          'game/csgo/gamemodes_server.txt'. See
          [example](https://github.com/kus/cs2-modded-server/blob/master/game/csgo/gamemodes_server.txt). Alternatively
          specify a Workshop Collection ID which includes the maps required for rotation, and use a plugin to load them
        Keywords: map,group,mapgroup
        FieldName: mapgroup
        InputType: text
        ParamFieldName: mapgroup
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: mg_cs2
        EnumValues: {}
    - key: host_workshop_map
      label: Workshop Map ID
      category: Counter-Strike 2
      subcategory: Server
      description: >-
        Sets the ID of a [Steam workshop
        map](https://steamcommunity.com/workshop/browse/?appid=730&browsesort=trend&section=readytouseitems) to download
        and load on the server. This will override the Initial Map setting (however the Initial Map setting must still
        be set to a valid map for the server to start)
      keywords: workshop,map,host_workshop_map
      input_type: number
      param_field_name: host_workshop_map
      default: ''
      placeholder: '3070217773'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Workshop Map ID
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the ID of a [Steam workshop
          map](https://steamcommunity.com/workshop/browse/?appid=730&browsesort=trend&section=readytouseitems) to
          download and load on the server. This will override the Initial Map setting (however the Initial Map setting
          must still be set to a valid map for the server to start)
        Keywords: workshop,map,host_workshop_map
        FieldName: host_workshop_map
        InputType: number
        ParamFieldName: host_workshop_map
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: '3070217773'
        EnumValues: {}
    - key: host_workshop_collection
      label: Workshop Collection ID
      category: Counter-Strike 2
      subcategory: Server
      description: >-
        Sets the ID of a [Steam workshop
        collection](https://steamcommunity.com/workshop/browse/?appid=730&browsesort=trend&section=collections) to
        download and load on the server. After starting the server on a valid Initial Map, switch to a collection map
        manually by using the command 'ds_workshop_changelevel', or automatically by using a plugin. List the collection
        maps with 'ds_workshop_listmaps'
      keywords: workshop,collection,host_workshop_collection
      input_type: number
      param_field_name: host_workshop_collection
      default: ''
      placeholder: '3065925629'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Workshop Collection ID
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the ID of a [Steam workshop
          collection](https://steamcommunity.com/workshop/browse/?appid=730&browsesort=trend&section=collections) to
          download and load on the server. After starting the server on a valid Initial Map, switch to a collection map
          manually by using the command 'ds_workshop_changelevel', or automatically by using a plugin. List the
          collection maps with 'ds_workshop_listmaps'
        Keywords: workshop,collection,host_workshop_collection
        FieldName: host_workshop_collection
        InputType: number
        ParamFieldName: host_workshop_collection
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: '3065925629'
        EnumValues: {}
    - key: sv_workshop_allow_other_maps
      label: Allow Other Map By Players
      category: Counter-Strike 2
      subcategory: Server
      description: >-
        If set, and when the server is hosting a workshop collection, players will be able to play another workshop map
        on the server when it is empty and then rotate their map cycle into the server collection
      keywords: workshop,map,allow,other,sv_workshop_allow_other_maps
