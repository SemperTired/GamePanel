schema: aetherpanel.template/v1
id: counter-strike2
name: Counter-Strike 2
category: Imported
summary: Counter-Strike 2 Dedicated Server
install:
  method: steamcmd
  app_id: '730'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    730/game/bin/linuxsteamrt64/cs2 {PlatformArgs} -dedicated -usercon -serverlogging -nobreakpad -port {ServerPort} -ip
    {ApplicationIPBinding} -maxplayers {MaxUsers} {insecure}{CustomParameters} {CustomConVars} +sv_logfile 1 {gamemode}
    +rcon_password "{RemoteAdminPassword}" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
config_files:
  - path: counter-strike2config.json
    type: json
    editable: true
  - path: counter-strike2metaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: hostname
      label: Server Name
      category: Counter-Strike 2
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AetherNode Counter-Strike 2 Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        ParamFieldName: hostname
        IncludeInCommandLine: true
        DefaultValue: AetherNode Counter-Strike 2 Server
        EnumValues: {}
    - key: sv_tags
      label: Server Tags
      category: Counter-Strike 2
      subcategory: Server
      description: Comma-separated list of server tags that give additional information about the server in the server browser
      keywords: tags,sv_tags
      input_type: text
      param_field_name: sv_tags
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Tags
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Comma-separated list of server tags that give additional information about the server in the server browser
        Keywords: tags,sv_tags
        FieldName: sv_tags
        InputType: text
        ParamFieldName: sv_tags
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: sv_lan
      label: LAN Server
      category: Counter-Strike 2
      subcategory: Server
      description: >-
        If enabled, the server will operate as a LAN server: no heartbeat, no authentication, and no non-class C
        addresses
      keywords: lan,local,sv_lan
      input_type: checkbox
      param_field_name: sv_lan
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: LAN Server
        Category: Counter-Strike 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the server will operate as a LAN server: no heartbeat, no authentication, and no non-class C
          addresses
        Keywords: lan,local,sv_lan
        FieldName: sv_lan
        InputType: checkbox
        ParamFieldName: sv_lan
        IncludeInCommandLine: true
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: sv_setsteamaccount
      label: Game Server Login Token (GSLT)
      category: Counter-Strike 2
      subcategory: Server
      description: >-
        Sets the [Steam Game Server Login Token](https://steamcommunity.com/dev/managegameservers) for the server, to
        allow it to be listed in the server browser. Use app ID 730 when generating the token
      keywords: steam,server,login,token,gslt,sv_setsteamaccount
      input_type: password
      param_field_name: sv_setsteamaccount
      default: ''
      placeholder: 6544F7E034119F113526E96474F559AH
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
