  files:
    - path: ./PostScriptum/ServerConfig/Server.cfg
      type: kvp
      format: '{0}={1}'
      subsections: []
      raw:
        ConfigFile: ./PostScriptum/ServerConfig/Server.cfg
        AutoMap: true
        ConfigType: kvp
        ConfigFormat: '{0}={1}'
environment: {}
