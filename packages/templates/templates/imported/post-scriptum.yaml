        DisplayName: Allow Community Admin Access
        Category: Squad 44:stadia_controller
        Subcategory: Server:dns:1
        Description: Enable QA Admin Access
        Keywords: Admin
        FieldName: AllowCommunityAdminAccess
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: AllowCommunityAdminAccess
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: AllowDevProfiling
      label: Offworld Developers only Admin
      category: Squad 44
      subcategory: Server
      description: Allow Offworld Industries QA Dev Profiling
      keywords: Admin
      input_type: checkbox
      param_field_name: AllowDevProfiling
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Offworld Developers only Admin
        Category: Squad 44:stadia_controller
        Subcategory: Server:dns:1
        Description: Allow Offworld Industries QA Dev Profiling
        Keywords: Admin
        FieldName: AllowDevProfiling
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: AllowDevProfiling
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: AllowQA
      label: Allow QA
      category: Squad 44
      subcategory: Server
      description: Allow Offworld Industries QA
      keywords: QA
      input_type: checkbox
      param_field_name: AllowQA
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Allow QA
        Category: Squad 44:stadia_controller
        Subcategory: Server:dns:1
        Description: Allow Offworld Industries QA
        Keywords: QA
        FieldName: AllowQA
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: AllowQA
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: VehicleClaimingDisabled
      label: Vehicle Claiming Disabled
      category: Squad 44
      subcategory: Server
      description: Disable Vehicle Claiming
      keywords: Vehicle
      input_type: checkbox
      param_field_name: VehicleClaimingDisabled
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
