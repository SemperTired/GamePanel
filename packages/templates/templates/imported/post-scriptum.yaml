    - key: AllowCommunityAdminAccess
      label: Allow Community Admin Access
      category: Squad 44
      subcategory: Server
      description: Enable QA Admin Access
      keywords: Admin
      input_type: checkbox
      param_field_name: AllowCommunityAdminAccess
