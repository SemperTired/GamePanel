        Subcategory: Server:dns:1
        Description: >-
          Sets the name of the mod directory to load, allowing the use of third-party JKA mods. Don't change this from
          the default 'base' unless you know what you are doing!
        Keywords: server,mod,directory,game
        FieldName: mod
        InputType: text
        ParamFieldName: mod
        DefaultValue: base
        Placeholder: base
        EnumValues: {}
    - key: dedicated
      label: Make Server Public
      category: Jedi Knight Academy
      subcategory: Server
      description: If enabled, the server will be visible publicly. Otherwise it will only be accessible from the LAN
      keywords: public,visible,dedicated
      input_type: checkbox
      param_field_name: dedicated
      default: '2'
      required: false
      sensitive: false
      hidden: false
