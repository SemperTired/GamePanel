schema: aetherpanel.template/v1
id: jedi-academy
name: STAR WARS Jedi Knight - Jedi Academy
category: Imported
summary: STAR WARS Jedi Knight - Jedi Academy Dedicated Server with OpenJK engine
install:
  method: steamcmd
  app_id: '6020'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/openjkded.x86_64 {PlatformArgs} +set fs_homepath "." +set net_port {ServerPort} +set net_ip
    {ApplicationIPBinding} +set fs_game {mod} +{map_type} {map} {FormattedArgs} +exec base.cfg
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 29070
    protocol: udp
    required: true
config_files:
  - path: '{{mod}}/base.cfg'
    type: text
    editable: true
config_schema:
  fields:
    - key: sv_hostname
      label: Server Name
      category: Jedi Knight Academy
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,sv_hostname
      input_type: text
      param_field_name: sv_hostname
      default: AetherNode Jedi Academy Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Jedi Knight Academy:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,sv_hostname
        FieldName: sv_hostname
        InputType: text
        ParamFieldName: sv_hostname
        DefaultValue: AetherNode Jedi Academy Server
        EnumValues: {}
    - key: g_motd
      label: Message Of The Day
      category: Jedi Knight Academy
      subcategory: Server
      description: Sets the message of the day (MOTD) displayed when players join
      keywords: message,motd,g_motd
      input_type: text
      param_field_name: g_motd
      default: Welcome to STAR WARS Jedi Knight - Jedi Academy!
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Message Of The Day
        Category: Jedi Knight Academy:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the message of the day (MOTD) displayed when players join
        Keywords: message,motd,g_motd
        FieldName: g_motd
        InputType: text
        ParamFieldName: g_motd
        DefaultValue: Welcome to STAR WARS Jedi Knight - Jedi Academy!
        EnumValues: {}
    - key: mod
      label: Server Mod Name
      category: Jedi Knight Academy
      subcategory: Server
      description: >-
        Sets the name of the mod directory to load, allowing the use of third-party JKA mods. Don't change this from the
        default 'base' unless you know what you are doing!
      keywords: server,mod,directory,game
      input_type: text
      param_field_name: mod
      default: base
      placeholder: base
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Mod Name
