schema: aetherpanel.template/v1
id: renown
name: Renown
category: Imported
summary: Renown Dedicated Server
install:
  method: steamcmd
  app_id: '1512690'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    1512690/Renown_Combat/Binaries/Linux/Renown_CombatServer-Linux-Shipping Renown_Combat -Port={GamePort}
    -QueryPort={QueryPort} -BeaconPort={BeaconPort} -RCONPort={RCONPort} -RCONPassword="{RemoteAdminPassword}"
    {FormattedArgs} {PlatformArgs}
    -ini:Engine:[EpicOnlineServices]:DedicatedServerClientId=xyza78917DzEE5Ey0isciVt66QDm5IzM
    -ini:Engine:[EpicOnlineServices]:DedicatedServerClientSecret=m/mrnywFCdeA1mW3ZSvv3qcVlQlfwi1a+7Z63Q44EGU
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Main Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: beaconport
    name: Beacon Port
    default: 9999
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 25575
    protocol: tcp
    required: true
config_files:
  - path: Renown_Combat/Saved/Config/LinuxServer/Game.ini
    type: ini
    editable: true
  - path: Renown_Combat/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
