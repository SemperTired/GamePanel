schema: aetherpanel.template/v1
id: creativerse
name: Creativerse
category: Imported
summary: Creativerse Dedicated Server
install:
  method: steamcmd
  app_id: '1098260'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 1098260/CreativerseServer {PlatformArgs} {FormattedArgs} -forceIp={ApplicationIPBinding}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 26900
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 26901
    protocol: udp
    required: true
  - key: webadminport
    name: Web Admin Port
    default: 26902
    protocol: udp
    required: true
config_files:
  - path: PlayfulCorp/CreativerseServer/worlddata/worlds/{{worldId}}/config_world.json
    type: json
    editable: true
