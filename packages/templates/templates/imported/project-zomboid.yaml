schema: aetherpanel.template/v1
id: project-zomboid
name: Project Zomboid
category: Imported
summary: Project Zomboid Dedicated Server
install:
  method: steamcmd
  app_id: '380870'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    380870/jre64/bin/java {PlatformArgs} {JavaClass} -port {ApplicationPort1} -udpport {ApplicationPort2}
    {CustomServerArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Steam Port
    default: 16261
    protocol: udp
    required: true
  - key: applicationport2
    name: Direct Port
    default: 16262
    protocol: udp
    required: true
  - key: remoteadminport
    name: RCON Port
    default: 27015
    protocol: tcp
    required: true
config_files:
  - path: Zomboid/Server/{{servername}}.ini
    type: text
    editable: true
config_schema:
  fields:
    - key: $ApplicationPort1
      label: Steam Port
      category: Project Zomboid
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: DefaultPort
      default: '16261'
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Steam Port
        Category: Project Zomboid:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationPort1
        InputType: number
        IsFlagArgument: false
        Hidden: true
        ExcludeFromImport: true
        ParamFieldName: DefaultPort
        IncludeInCommandLine: false
        DefaultValue: '16261'
        EnumValues: {}
