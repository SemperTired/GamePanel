schema: aetherpanel.template/v1
id: no-one-survived
name: No One Survived
category: Imported
summary: No One Survived Dedicated Server
install:
  method: steamcmd
  app_id: '2329680'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} WRSH -server -stdout -FullStdOutLogOutput -Port={GamePort} -QueryPort={QueryPort}
    -MultiHome={ApplicationIPBinding} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: WRSH/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
  - path: WRSH/Saved/Config/WindowsServer/Engine.ini
    type: ini
    editable: true
