schema: aetherpanel.template/v1
id: ragemp
name: RAGE:MP - Grand Theft Auto V Server
category: Imported
summary: RAGE:MP Dedicated Server for GTA V
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://raw.githubusercontent.com/AetherNode/public game template/main/ragempconf.json
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: server-files/ragemp-server {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 22005
    protocol: udp
    required: true
  - key: httpport
    name: HTTP Port
    default: 22006
    protocol: tcp
    required: true
config_files:
  - path: conf.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: RAGE MP
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: RAGE MP:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        ParamFieldName: $.port
        ExcludeFromImport: true
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Bind Address
