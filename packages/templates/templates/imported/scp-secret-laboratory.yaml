schema: aetherpanel.template/v1
id: scp-secret-laboratory
name: 'SCP: Secret Laboratory'
category: Imported
summary: 'SCP: Secret Laboratory Dedicated Server'
install:
  method: steamcmd
  app_id: '996560'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    996560/LocalAdmin {PlatformArgs} {GamePort} --useDefault --skipHomeCheck --noSetCursor {CustomLocalAdminArgs} --
    -silent-crashes {CustomServerArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game and Query Port
    default: 7777
    protocol: both
    required: true
config_files:
  - path: AppData/config/{{$GamePort}}/config_gameplay.txt
    type: text
    editable: true
  - path: AppData/config/{{$GamePort}}/config_remoteadmin.txt
    type: text
    editable: true
  - path: AppData/SCP Secret Laboratory/LabAPI/configs/{{$GamePort}}/Exiled Loader/config.yml
    type: text
    editable: true
  - path: AppData/SCP Secret Laboratory/LabAPI/configs/{{$GamePort}}/Exiled Loader/properties.yml
    type: text
    editable: true
