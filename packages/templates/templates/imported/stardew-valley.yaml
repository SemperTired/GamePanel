schema: aetherpanel.template/v1
id: stardew-valley
name: Stardew Valley
category: Imported
summary: Stardew Valley Dedicated Server using SMAPI and Dedicated Server Mod
install:
  method: steamcmd
  app_id: '413150'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port (24642 only)
    default: 24642
    protocol: udp
    required: true
config_files:
  - path: Mods/DedicatedServer/config.json
    type: json
    editable: true
config_schema:
  fields:
    - key: FarmName
      label: Farm Name
      category: Stardew Valley
      subcategory: Server
      description: Sets the name of the farm. If a farm with this name exists, it will automatically be loaded
      keywords: farm,name,FarmName
      input_type: text
      param_field_name: $.FarmName
      default: Stardew
      placeholder: Stardew
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Farm Name
        Category: Stardew Valley:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the farm. If a farm with this name exists, it will automatically be loaded
        Keywords: farm,name,FarmName
        FieldName: FarmName
        InputType: text
        ParamFieldName: $.FarmName
        DefaultValue: Stardew
        Placeholder: Stardew
        EnumValues: {}
    - key: Password
      label: Server Password
      category: Stardew Valley
      subcategory: Server
      description: >-
        Sets the password used to log in on the server, which enables [password-protected
        commands](https://github.com/Chris82111/SMAPIDedicatedServerMod/tree/main#in-game-command) to be run in-game. To
        log in a player must run '/message ServerBot LogIn' followed by the password. Default is no password
      keywords: password,security
      input_type: password
      param_field_name: $.Password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Stardew Valley:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the password used to log in on the server, which enables [password-protected
          commands](https://github.com/Chris82111/SMAPIDedicatedServerMod/tree/main#in-game-command) to be run in-game.
          To log in a player must run '/message ServerBot LogIn' followed by the password. Default is no password
        Keywords: password,security
        FieldName: Password
        InputType: password
        ParamFieldName: $.Password
        DefaultValue: ''
        EnumValues: {}
    - key: PasswordProtected.Pause
      label: Require Password For Pause Command
      category: Stardew Valley
      subcategory: Server
      description: If set, the password will be required to use the Pause command
      keywords: password,protected,pause,PasswordProtected
      input_type: checkbox
      param_field_name: $.PasswordProtected.Pause
