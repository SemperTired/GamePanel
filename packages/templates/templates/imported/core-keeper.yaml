schema: aetherpanel.template/v1
id: core-keeper
name: Core Keeper
category: Imported
summary: Core Keeper Dedicated Server
install:
  method: steamcmd
  app_id: '1963720'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} -port {ConnectMode} -datapath "{FullBaseDir}DedicatedServer" -ip
    "{ApplicationIPBinding}" {FormattedArgs} {ContentBundlesActivation}-batchmode -logfile -
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 27015
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27016
    protocol: udp
    required: true
config_files:
  - path: core-keeperconfig.json
    type: json
    editable: true
  - path: core-keepermetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: gameid
      label: Game ID
      category: Core Keeper
      subcategory: Server
      description: >-
        Sets the Game ID for the server. Needs to be at least 15 (maximum 28) characters and alphanumeric, excluding
        Y,y,x,0,O. Empty or not valid means a new Game ID will be generated at server start
      keywords: game,id
      input_type: text
      param_field_name: gameid
      default: ''
      placeholder: WThaEN6779QIU2j7sczKmGfIG1bD
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game ID
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the Game ID for the server. Needs to be at least 15 (maximum 28) characters and alphanumeric, excluding
          Y,y,x,0,O. Empty or not valid means a new Game ID will be generated at server start
        Keywords: game,id
        FieldName: gameid
        InputType: text
        IsFlagArgument: false
        ParamFieldName: gameid
        IncludeInCommandLine: true
        DefaultValue: ''
        Placeholder: WThaEN6779QIU2j7sczKmGfIG1bD
        EnumValues: {}
    - key: world
      label: World
      category: Core Keeper
      subcategory: Server
      description: Sets the index of the world to be loaded from the worlds folder
      keywords: world,index
      input_type: number
      param_field_name: world
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 0
      max: 29
      enum_values: {}
      raw:
        DisplayName: World
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the index of the world to be loaded from the worlds folder
        Keywords: world,index
        FieldName: world
        InputType: number
        MinValue: '0'
        MaxValue: '29'
        IsFlagArgument: false
        ParamFieldName: world
        IncludeInCommandLine: true
        DefaultValue: '0'
        EnumValues: {}
    - key: worldname
      label: World Name
      category: Core Keeper
      subcategory: Server
      description: Sets the name to use for the server
      keywords: world
      input_type: text
      param_field_name: worldname
      default: Core Keeper Server Hosted by AetherNode
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: World Name
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name to use for the server
        Keywords: world
        FieldName: worldname
        InputType: text
        IsFlagArgument: false
        ParamFieldName: worldname
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: Core Keeper Server Hosted by AetherNode
        EnumValues: {}
    - key: worldseed
      label: World Seed
      category: Core Keeper
      subcategory: Server
      description: Sets the seed to use to generate a new world. Empty = random seed
      keywords: seed,world
      input_type: text
      param_field_name: worldseed
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: World Seed
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the seed to use to generate a new world. Empty = random seed
        Keywords: seed,world
        FieldName: worldseed
        InputType: text
        IsFlagArgument: false
        ParamFieldName: worldseed
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: hashedworldseed
      label: Hashed World Seed
      category: Core Keeper
      subcategory: Server
      description: >-
        Sets an already hashed seed to use to generate a new world. Useful if the original seed has been lost, and only
        the hashed seed of a particular world is known. Ignored if World Seed is set
      keywords: seed,world,hashed,hashedworldseed
      input_type: number
      param_field_name: hashedworldseed
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      min: 0
      max: 4294967295
      enum_values: {}
      raw:
        DisplayName: Hashed World Seed
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets an already hashed seed to use to generate a new world. Useful if the original seed has been lost, and
          only the hashed seed of a particular world is known. Ignored if World Seed is set
        Keywords: seed,world,hashed,hashedworldseed
        FieldName: hashedworldseed
        InputType: number
        MinValue: '0'
        MaxValue: '4294967295'
        IsFlagArgument: false
        ParamFieldName: hashedworldseed
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: '0'
        EnumValues: {}
    - key: worldmode
      label: World Mode
      category: Core Keeper
      subcategory: Server
      description: >-
        Sets the world mode for the world. Changing between Creative and non-Creative worlds after the world has been
        created is not supported
      keywords: world,mode
      input_type: enum
      param_field_name: worldmode
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '0': Normal
        '1': Hard
        '2': Creative
        '4': Casual
      raw:
        DisplayName: World Mode
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the world mode for the world. Changing between Creative and non-Creative worlds after the world has been
          created is not supported
        Keywords: world,mode
        FieldName: worldmode
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: worldmode
        IncludeInCommandLine: true
        DefaultValue: '0'
        EnumValues:
          '0': Normal
          '1': Hard
          '2': Creative
          '4': Casual
    - key: password
      label: Server Password
      category: Core Keeper
      subcategory: Server
      description: >-
        Sets the password to join the server, when 'Direct Port Connection' is used as the Connection Mode. Maximum 28
        characters. Empty or not valid means a new random password will be generated at server start
      keywords: server,password
      input_type: password
      param_field_name: password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the password to join the server, when 'Direct Port Connection' is used as the Connection Mode. Maximum 28
          characters. Empty or not valid means a new random password will be generated at server start
        Keywords: server,password
        FieldName: password
        InputType: password
        IsFlagArgument: false
        ParamFieldName: password
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Core Keeper
      subcategory: Server
      description: Sets the maximum number of players that will be allowed to connect to the server
      keywords: max,players,limit
      input_type: number
      param_field_name: maxplayers
      default: '8'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players that will be allowed to connect to the server
        Keywords: max,players,limit
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: maxplayers
        IncludeInCommandLine: true
        DefaultValue: '8'
        Suffix: players
        EnumValues: {}
    - key: ConnectMode
      label: Connection Mode
      category: Core Keeper
      subcategory: Server
      description: >-
        Sets the connection mode - either through the Steam relay network (no ports required), or via a direct port
        connection on the Game Port. 'Direct Port Connection' effectively enables crossplay
      keywords: steam,relay,network,port
      input_type: enum
      param_field_name: ConnectMode
      default: '{{$GamePort}}'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Steam Relay Network
        '{{$GamePort}}': Direct Port Connection
      raw:
        DisplayName: Connection Mode
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the connection mode - either through the Steam relay network (no ports required), or via a direct port
          connection on the Game Port. 'Direct Port Connection' effectively enables crossplay
        Keywords: steam,relay,network,port
        FieldName: ConnectMode
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: ConnectMode
        IncludeInCommandLine: false
        DefaultValue: '{{$GamePort}}'
        EnumValues:
          '': Steam Relay Network
          '{{$GamePort}}': Direct Port Connection
    - key: season
      label: Season Override
      category: Core Keeper
      subcategory: Server
      description: Sets the current season on the server
      keywords: season,override
      input_type: enum
      param_field_name: season
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values:
        '0': None
        '1': Easter
        '2': Halloween
        '3': Christmas
        '4': Valentine
        '5': Anniversary
        '6': Cherry Blossom
        '7': Lunar New Year
        '': System date determines (default)
      raw:
        DisplayName: Season Override
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the current season on the server
        Keywords: season,override
        FieldName: season
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: season
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues:
          '0': None
          '1': Easter
          '2': Halloween
          '3': Christmas
          '4': Valentine
          '5': Anniversary
          '6': Cherry Blossom
          '7': Lunar New Year
          '': System date determines (default)
    - key: mods
      label: Mods
      category: Core Keeper
      subcategory: Server
      description: >-
        Mods can be loaded on the server by downloading them from [mod.io](https://mod.io/g/corekeeper) to
        'CoreKeeperServer_Data/StreamingAssets/Mods'. Each mod should be unzipped in a separate subdirectory with the
        same name as on mod.io
      keywords: mods
      input_type: hidden
      param_field_name: mods
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Mods
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Mods can be loaded on the server by downloading them from [mod.io](https://mod.io/g/corekeeper) to
          'CoreKeeperServer_Data/StreamingAssets/Mods'. Each mod should be unzipped in a separate subdirectory with the
          same name as on mod.io
        Keywords: mods
        FieldName: mods
        InputType: hidden
        ParamFieldName: mods
        EnumValues: {}
    - key: ContentBundlesActivation
      label: Content Bundles Activation
      category: Core Keeper
      subcategory: Server
      description: >-
        Sets whether and how new content bundles should be activated for the current world. Activation is irreversible.
        If 'Activate specific bundles' is selected, configure Specific Content Bundles To Activate accordingly
      keywords: activate,content,bundle,bundles,activatecontent,activateallcontent
      input_type: enum
      param_field_name: ContentBundlesActivation
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Don't activate any bundles (default)
        '-activateallcontent ': Activate all available bundles
        '-activatecontent "{{activatecontent}}" ': Activate specific bundles
      raw:
        DisplayName: Content Bundles Activation
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether and how new content bundles should be activated for the current world. Activation is
          irreversible. If 'Activate specific bundles' is selected, configure Specific Content Bundles To Activate
          accordingly
        Keywords: activate,content,bundle,bundles,activatecontent,activateallcontent
        FieldName: ContentBundlesActivation
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: ContentBundlesActivation
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues:
          '': Don't activate any bundles (default)
          '-activateallcontent ': Activate all available bundles
          '-activatecontent "{{activatecontent}}" ': Activate specific bundles
    - key: activatecontent
      label: Specific Content Bundles To Activate
      category: Core Keeper
      subcategory: Server
      description: >-
        Sets a comma-separated list of new content bundles to activate for the current world, if 'Activate specific
        bundles' is selected under Content Bundles Activation. See ARGUMENTS.txt for available bundles (may not be up to
        date however)
      keywords: activate,content,bundle,bundles,activatecontent
      input_type: text
      param_field_name: activatecontent
      default: ''
      placeholder: GiantCicadaBossDungeon,GuaranteedOases
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Specific Content Bundles To Activate
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a comma-separated list of new content bundles to activate for the current world, if 'Activate specific
          bundles' is selected under Content Bundles Activation. See ARGUMENTS.txt for available bundles (may not be up
          to date however)
        Keywords: activate,content,bundle,bundles,activatecontent
        FieldName: activatecontent
        InputType: text
        IsFlagArgument: false
        ParamFieldName: activatecontent
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: GiantCicadaBossDungeon,GuaranteedOases
        EnumValues: {}
    - key: allowonlyplatform
      label: Restrict Client Platform
      category: Core Keeper
      subcategory: Server
      description: >-
        Sets whether to allow only players from a specific platform to connect to the server, effectively disabling
        crossplay. Has no effect unless 'Direct Port Connection' is used as the Connection Mode
      keywords: crossplay,restrict,allow,platform,steam,epic,microsoft,gog,allowonlyplatform
      input_type: enum
      param_field_name: allowonlyplatform
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values:
        '1': Steam only
        '2': Epic Games Store only
        '3': Microsoft Store only
        '4': GOG only
        '': No restriction (crossplay enabled) (default)
      raw:
        DisplayName: Restrict Client Platform
        Category: Core Keeper:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether to allow only players from a specific platform to connect to the server, effectively disabling
          crossplay. Has no effect unless 'Direct Port Connection' is used as the Connection Mode
        Keywords: crossplay,restrict,allow,platform,steam,epic,microsoft,gog,allowonlyplatform
        FieldName: allowonlyplatform
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: allowonlyplatform
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues:
          '1': Steam only
          '2': Epic Games Store only
          '3': Microsoft Store only
          '4': GOG only
          '': No restriction (crossplay enabled) (default)
  files: []
environment: {}
startup_variables:
  - key: gameid
    label: Game ID
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: world
    label: World
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: worldname
    label: World Name
    default: Core Keeper Server Hosted by AetherNode
    customer_editable: true
    required: false
    sensitive: false
  - key: worldseed
    label: World Seed
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: hashedworldseed
    label: Hashed World Seed
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: worldmode
    label: World Mode
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: ConnectMode
    label: Connection Mode
    default: '{{$GamePort}}'
    customer_editable: true
    required: false
    sensitive: false
  - key: season
    label: Season Override
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ContentBundlesActivation
    label: Content Bundles Activation
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: activatecontent
    label: Specific Content Bundles To Activate
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: allowonlyplatform
    label: Restrict Client Platform
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '1621690'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

