    - key: sv_requestParanoia
      label: Enable HTTP Flood Protection
      category: RedM
      subcategory: Server
      description: >-
        Sets whether to implement measures to counter proxy-based HTTP floods. If set to Level 2 or 3, all requests made
        to info.json, dynamic.json and players.json related endpoints will return "Nope"
      keywords: http,flood,protection,sv_requestParanoia
      input_type: enum
      param_field_name: sv_requestParanoia
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Off (default)
        '1': 'Level 1: Blocks IPs with ''Via'' header requests'
        '2': 'Level 2: Previous + blocks IPs with ''Upgrade-Insecure-Requests'' header requests'
        '3': 'Level 3: Previous + closes socket on which requests submitted'
      raw:
        DisplayName: Enable HTTP Flood Protection
        Category: RedM:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether to implement measures to counter proxy-based HTTP floods. If set to Level 2 or 3, all requests
          made to info.json, dynamic.json and players.json related endpoints will return "Nope"
        Keywords: http,flood,protection,sv_requestParanoia
        FieldName: sv_requestParanoia
        InputType: enum
        ParamFieldName: sv_requestParanoia
        DefaultValue: '0'
        EnumValues:
          '0': Off (default)
          '1': 'Level 1: Blocks IPs with ''Via'' header requests'
          '2': 'Level 2: Previous + blocks IPs with ''Upgrade-Insecure-Requests'' header requests'
          '3': 'Level 3: Previous + closes socket on which requests submitted'
