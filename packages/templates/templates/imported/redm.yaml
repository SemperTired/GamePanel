schema: aetherpanel.template/v1
id: redm
name: RedM - Red Dead Redemption 2 Server
category: Imported
summary: RedM Multiplayer Mod for Red Dead Redemption 2
install:
  method: fivem
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/alpine/opt/cfx-server/ld-musl-x86_64.so.1 {PlatformArgs} {CustomArgs} +set gamename rdr3 +set rcon_password
    {RemoteAdminPassword} +set serverProfile default {FormattedArgs} +exec server.cfg
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 30120
    protocol: both
    required: true
config_files:
  - path: server-data/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: RedM
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: ServerPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: RedM:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        ParamFieldName: ServerPort
        EnumValues: {}
    - key: sv_licenseKey
      label: Cfx.re Server Registration Key
      category: RedM
      subcategory: Server
      description: >-
        Sets the [Cfx.re server registration key](https://portal.cfx.re/servers/registration-keys) required to run the
        server
      keywords: licence,license,registration,key,keymaster,sv_licenseKey
      input_type: password
      param_field_name: sv_licenseKey
