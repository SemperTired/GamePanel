        Placeholder: '30.0'
        Suffix: seconds
        EnumValues: {}
    - key: RotationType
      label: Mission Rotation Mode
      category: Nuclear Option
      subcategory: Server
      description: >-
        Sets the mission rotation mode. Missions can be
        [configured](https://gist.github.com/James-Frowen/fb12f73c28ff455430dcc288b7010319#loading-missions) in
        'DedicatedServerConfig.json'
      keywords: rotation,type,mission,RotationType
      input_type: enum
      param_field_name: $.RotationType
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Sequential (default)
        '1': Random
      raw:
        DisplayName: Mission Rotation Mode
        Category: Nuclear Option:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the mission rotation mode. Missions can be
          [configured](https://gist.github.com/James-Frowen/fb12f73c28ff455430dcc288b7010319#loading-missions) in
          'DedicatedServerConfig.json'
        Keywords: rotation,type,mission,RotationType
        FieldName: RotationType
        InputType: enum
        ParamFieldName: $.RotationType
        DefaultValue: '0'
        EnumValues:
          '0': Sequential (default)
          '1': Random
    - key: limitframerate
