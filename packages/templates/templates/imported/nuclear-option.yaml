    required: false
    sensitive: false
  - key: QueryPort.IsOverride
    label: Override Query Port
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: MissionDirectory
    label: Mission Directory
    default: '{{$FullBaseDir}}Missions'
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerName
    label: Server Name
    default: AetherNode Nuclear Option Server
    customer_editable: true
    required: false
    sensitive: false
  - key: Password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: ModdedServer
    label: Modded Server
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: MaxPlayers
    label: Player Limit
    default: '16'
    customer_editable: true
    required: false
    sensitive: false
  - key: NoPlayerStopTime
    label: No Player Stop Time
    default: '30.0'
    customer_editable: true
    required: false
    sensitive: false
  - key: RotationType
    label: Mission Rotation Mode
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: limitframerate
    label: Frame Rate Limit
    default: '30'
    customer_editable: true
    required: false
    sensitive: false
  - key: InstallBepInEx
    label: Install BepInEx
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '2168680'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

