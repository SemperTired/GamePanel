    - key: InstallBepInEx
      label: Install BepInEx
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        If set, the latest [BepInEx release](https://github.com/BepInEx/BepInEx/releases) will be installed when the
        server is updated
      keywords: install,BepInEx,InstallBepInEx
      input_type: checkbox
      param_field_name: InstallBepInEx
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
