schema: aetherpanel.template/v1
id: nuclear-option
name: Nuclear Option
category: Imported
summary: Nuclear Option Dedicated Server
install:
  method: steamcmd
  app_id: '3930080'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 3930080/NuclearOptionServer.x86_64 {PlatformArgs} -logFile - {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 7778
    protocol: udp
    required: true
config_files:
  - path: DedicatedServerConfig.json
    type: json
    editable: true
config_schema:
  fields:
