      label: Server Name
      category: Nuclear Option
      subcategory: Server
      description: Sets the name of the server as it appears in the server list
      keywords: server,name,ServerName
      input_type: text
      param_field_name: $.ServerName
      default: AetherNode Nuclear Option Server
      placeholder: AetherNode Nuclear Option Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Nuclear Option:stadia_controller
        Subcategory: Server:dns:1
