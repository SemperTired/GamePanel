    - key: MaxPlayers
      label: Player Limit
      category: Nuclear Option
      subcategory: Server
      description: Sets the maximum number of players allowed on the server at one time
      keywords: max,players,player,limit,MaxPlayers
      input_type: number
      param_field_name: $.MaxPlayers
      default: '16'
      placeholder: '16'
      required: false
      sensitive: false
      hidden: false
