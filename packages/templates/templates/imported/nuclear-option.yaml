    - key: NoPlayerStopTime
      label: No Player Stop Time
      category: Nuclear Option
      subcategory: Server
      description: Sets the time before the server stops when no players are connected
      keywords: no,player,stop,time,NoPlayerStopTime
      input_type: number
      param_field_name: $.NoPlayerStopTime
      default: '30.0'
      placeholder: '30.0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
