        DefaultValue: ''
        EnumValues: {}
    - key: ModdedServer
      label: Modded Server
      category: Nuclear Option
      subcategory: Server
      description: If set, the server will be specified as a modded server
      keywords: modded,server,ModdedServer
      input_type: checkbox
      param_field_name: $.ModdedServer
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
