schema: aetherpanel.template/v1
id: tarkov-fika
name: Tarkov (Fika Mod) (Legacy)
category: Imported
summary: Tarkov Dedicated Server using SPT-AKI v3.11.4 and the Fika Server Mod v2.4.8
install:
  method: custom
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: server/SPT.Server.exe {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: SPT-AKI Server Port
    default: 6969
    protocol: tcp
    required: true
  - key: natport
    name: NAT Punch Server Port
    default: 6970
    protocol: udp
    required: true
config_files:
  - path: SPT_Data/Server/configs/http.json
    type: json
    editable: true
  - path: Aki_Data/Server/configs/http.json
    type: json
    editable: true
  - path: user/mods/fika-server/assets/configs/fika.jsonc
    type: json
    editable: true
