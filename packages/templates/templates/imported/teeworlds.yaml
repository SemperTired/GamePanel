schema: aetherpanel.template/v1
id: teeworlds
name: Teeworlds
category: Imported
summary: Teeworlds Dedicated Server
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://github.com/teeworlds/teeworlds/releases/download/0.7.5/teeworlds-0.7.5-win64.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: teeworlds_srv {PlatformArgs} -f serverconfig.cfg
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 8303
    protocol: udp
    required: true
  - key: consoleport
    name: Console Port
    default: 8304
    protocol: tcp
    required: true
config_files:
  - path: user/serverconfig.cfg
    type: text
    editable: true
config_schema:
  fields:
