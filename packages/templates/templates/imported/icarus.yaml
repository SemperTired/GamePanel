          must exist. For "Create and launch new prospect", the Prospect Type must be set; if no Prospect Save Name is
          set, a random save name will be created for regular prospects
        Keywords: startup,mode,load,create,resume,startupmode
        FieldName: StartupMode
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: StartupMode
        IncludeInCommandLine: false
        DefaultValue: '-CreateProspect="{{ProspectType}} {{Difficulty}} {{Hardcore}} {{ProspectSaveName}}" '
        EnumValues:
