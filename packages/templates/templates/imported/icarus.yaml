    - key: ShutdownIfNotJoinedFor
      label: No Join Shutdown Interval
      category: Icarus
      subcategory: Server
      description: >-
        Sets the period after which the server will exit a prospect and return to the lobby, if no player has joined. -1
        = run indefinitely, 0 = return to lobby immediately, >0 = interval for shutdown. Note that data loss/corruption
        may occur if the server is shut down in AMP before returning to the lobby
      keywords: shutdown,not,joined,interval,shutdownifnotjoinedfor
      input_type: number
      param_field_name: /Script/Icarus.DedicatedServerSettings.ShutdownIfNotJoinedFor
      default: '300'
      placeholder: '300'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: -1
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: No Join Shutdown Interval
        Category: Icarus:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the period after which the server will exit a prospect and return to the lobby, if no player has joined.
          -1 = run indefinitely, 0 = return to lobby immediately, >0 = interval for shutdown. Note that data
          loss/corruption may occur if the server is shut down in AMP before returning to the lobby
        Keywords: shutdown,not,joined,interval,shutdownifnotjoinedfor
        FieldName: ShutdownIfNotJoinedFor
        InputType: number
        MinValue: '-1'
        IsFlagArgument: false
        ParamFieldName: /Script/Icarus.DedicatedServerSettings.ShutdownIfNotJoinedFor
        IncludeInCommandLine: false
        DefaultValue: '300'
        Placeholder: '300'
        Suffix: seconds
        EnumValues: {}
