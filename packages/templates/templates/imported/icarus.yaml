          '-CreateProspect="{{ProspectType}} {{Difficulty}} {{Hardcore}} {{ProspectSaveName}}" ': Create and launch new prospect (default)
          '-LoadProspect={{ProspectSaveName}} ': Load existing prospect
          '-ResumeProspect ': Resume last prospect
