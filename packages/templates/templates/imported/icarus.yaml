schema: aetherpanel.template/v1
id: icarus
name: Icarus
category: Imported
summary: Icarus Dedicated Server
install:
  method: steamcmd
  app_id: '2089300'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: .proton/proton {PlatformArgs} -Port={GamePort} -QueryPort={QueryPort} {StartupMode}{FormattedArgs} -log=Icarus.log
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 17777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: Icarus/Saved/Config/WindowsServer/ServerSettings.ini
    type: ini
    editable: true
