    - key: StartupMode
      label: Startup Mode
      category: Icarus
      subcategory: Server
      description: >-
        Sets the server startup mode. For "Load existing prospect", the Prospect Save Name must be set and the file must
        exist. For "Create and launch new prospect", the Prospect Type must be set; if no Prospect Save Name is set, a
        random save name will be created for regular prospects
      keywords: startup,mode,load,create,resume,startupmode
      input_type: enum
      param_field_name: StartupMode
      default: '-CreateProspect="{{ProspectType}} {{Difficulty}} {{Hardcore}} {{ProspectSaveName}}" '
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Wait in lobby
        '-CreateProspect="{{ProspectType}} {{Difficulty}} {{Hardcore}} {{ProspectSaveName}}" ': Create and launch new prospect (default)
        '-LoadProspect={{ProspectSaveName}} ': Load existing prospect
        '-ResumeProspect ': Resume last prospect
      raw:
        DisplayName: Startup Mode
        Category: Icarus:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
