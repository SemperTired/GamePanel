schema: aetherpanel.template/v1
id: project5-sightseer
name: 'Project 5: Sightseer'
category: Imported
summary: 'Project 5: Sightseer Dedicated Server'
install:
  method: steamcmd
  app_id: '655780'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/mono {PlatformArgs} -port {GamePort} -http -localPath {FormattedArgs} {public}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 5190
    protocol: tcp
    required: true
config_files:
  - path: project5-sightseerconfig.json
    type: json
    editable: true
  - path: project5-sightseermetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: name
      label: Server Name
      category: Project 5 Sightseer
      subcategory: Server
      description: Server name as shown in the in-game browser
      keywords: server,name
      input_type: text
      param_field_name: name
      default: 'AetherNode Project 5: Sightseer Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Project 5 Sightseer:stadia_controller
        Subcategory: Server:dns:1
        Description: Server name as shown in the in-game browser
        Keywords: server,name
        FieldName: name
        InputType: text
        IsFlagArgument: false
        ParamFieldName: name
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: 'AetherNode Project 5: Sightseer Server'
        EnumValues: {}
    - key: public
      label: Make Server Public
      category: Project 5 Sightseer
      subcategory: Server
      description: If enabled, the server will be registered to the public lobby and be publicly visible in the in-game browser
      keywords: public
      input_type: checkbox
      param_field_name: public
      default: '-public'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-public'
      raw:
        DisplayName: Make Server Public
        Category: Project 5 Sightseer:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will be registered to the public lobby and be publicly visible in the in-game browser
        Keywords: public
        FieldName: public
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: public
        IncludeInCommandLine: false
        DefaultValue: '-public'
        EnumValues:
          'False': ''
          'True': '-public'
    - key: fn
      label: World Save Name
      category: Project 5 Sightseer
      subcategory: Server
      description: >-
        Sets the name of the world save to load (if it already exists) or to create. If the world save does not already
        exist, an admin must create it in-game after connecting to the server
      keywords: world,name,save
      input_type: text
      param_field_name: fn
      default: World.dat
      placeholder: World.dat
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: World Save Name
        Category: Project 5 Sightseer:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the name of the world save to load (if it already exists) or to create. If the world save does not
          already exist, an admin must create it in-game after connecting to the server
        Keywords: world,name,save
        FieldName: fn
        InputType: text
        IsFlagArgument: false
        ParamFieldName: fn
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: World.dat
        Placeholder: World.dat
        EnumValues: {}
    - key: admins
      label: Server Admins
      category: Project 5 Sightseer
      subcategory: Server
      description: List of Steam64 IDs for server admins. [Find Steam64 IDs](https://steamid.io/)
      keywords: admins
      input_type: list
      param_field_name: admins
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      special: listfile:./project5-sightseer/655780/ServerConfig/admin.txt
      raw:
        DisplayName: Server Admins
        Category: Project 5 Sightseer:stadia_controller
        Subcategory: Server:dns:1
        Description: List of Steam64 IDs for server admins. [Find Steam64 IDs](https://steamid.io/)
        Keywords: admins
        FieldName: admins
        InputType: list
        IsFlagArgument: false
        ParamFieldName: admins
        IncludeInCommandLine: false
        DefaultValue: ''
        Special: listfile:./project5-sightseer/655780/ServerConfig/admin.txt
        EnumValues: {}
  files: []
environment: {}
startup_variables:
  - key: name
    label: Server Name
    default: 'AetherNode Project 5: Sightseer Server'
    customer_editable: true
    required: false
    sensitive: false
  - key: public
    label: Make Server Public
    default: '-public'
    customer_editable: true
    required: false
    sensitive: false
  - key: fn
    label: World Save Name
    default: World.dat
    customer_editable: true
    required: false
    sensitive: false
  - key: admins
    label: Server Admins
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '655780'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

