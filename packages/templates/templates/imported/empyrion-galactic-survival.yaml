schema: aetherpanel.template/v1
id: empyrion-galactic-survival
name: Empyrion Galactic Survival
category: Imported
summary: Empyrion Galactic Survival Dedicated Server
install:
  method: steamcmd
  app_id: '530870'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} -batchmode -nographics -dedicated empyriondedicated.yaml -logFile -
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport1
    name: Game Port 1
    default: 30000
    protocol: both
    required: true
  - key: steamqueryport
    name: Steam Query Port
    default: 30001
    protocol: both
    required: true
  - key: gameport3
    name: Game Port 3
    default: 30002
    protocol: both
    required: true
  - key: gameport4
    name: Game Port 4
    default: 30003
    protocol: both
    required: true
  - key: telnetport
    name: Telnet Port
    default: 30004
    protocol: tcp
    required: true
config_files:
  - path: empyriondedicated.yaml
    type: json
    editable: true
config_schema:
  fields:
    - key: $GamePort1
      label: Server Port
      category: Empyrion Galactic Survival
      subcategory: Server
      description: Must be edited using the Edit Port button in ADS.
      keywords: ''
      input_type: number
      param_field_name: ServerConfig.Srv_Port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: Empyrion Galactic Survival:stadia_controller
        Subcategory: Server:dns:1
        Description: Must be edited using the Edit Port button in ADS.
        Keywords: ''
        FieldName: $GamePort1
        InputType: number
        IsFlagArgument: false
        ParamFieldName: ServerConfig.Srv_Port
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
        Hidden: true
    - key: $TelnetPort
      label: Telnet Port
      category: Empyrion Galactic Survival
      subcategory: Server
      description: Must be edited using the Edit Port button in ADS.
      keywords: ''
      input_type: number
      param_field_name: ServerConfig.Tel_Port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Telnet Port
        Category: Empyrion Galactic Survival:stadia_controller
        Subcategory: Server:dns:1
        Description: Must be edited using the Edit Port button in ADS.
        Keywords: ''
        FieldName: $TelnetPort
        InputType: number
        IsFlagArgument: false
        ParamFieldName: ServerConfig.Tel_Port
        IncludeInCommandLine: false
        DefaultValue: ''
