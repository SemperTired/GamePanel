schema: aetherpanel.template/v1
id: beammp
name: BeamMP
category: Imported
summary: BeamMP Dedicated Server
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: serverfiles/BeamMP-Server {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: maingameport
    name: Main Game Port
    default: 30814
    protocol: both
    required: true
config_files:
  - path: ServerConfig.toml
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerInstall
      label: Server Installation Configuration
      category: BeamMP
      subcategory: Server
      description: 'IMPORTANT: See the Updates tab for configuration options for installation of the server'
      keywords: ''
      input_type: hidden
      param_field_name: ServerInstall
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Installation Configuration
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: 'IMPORTANT: See the Updates tab for configuration options for installation of the server'
        Keywords: ''
        FieldName: ServerInstall
        InputType: hidden
        ParamFieldName: ServerInstall
        EnumValues: {}
    - key: AuthKey
      label: Auth Key
      category: BeamMP
      subcategory: Server
      description: >-
        The auth key for your server can be obtained from [Keymaster](https://beammp.com/keymaster). This is required
        for the server to start.
      keywords: auth,key,authkey
      input_type: text
      param_field_name: General.AuthKey
      default: ''
      required: true
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Auth Key
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          The auth key for your server can be obtained from [Keymaster](https://beammp.com/keymaster). This is required
          for the server to start.
        Keywords: auth,key,authkey
        FieldName: AuthKey
        InputType: text
        ParamFieldName: General.AuthKey
        DefaultValue: ''
        Required: true
        EnumValues: {}
    - key: Name
      label: Server Name
      category: BeamMP
      subcategory: Server
      description: >-
        The name of the server as shown in the server list (if the server is public). You can use [special
        characters](https://wiki.beammp.com/en/home/server-maintenance#customize-the-look-of-your-server-name) to format
        this with colors and styles.
      keywords: server,name
      input_type: text
      param_field_name: General.Name
      default: AetherNode BeamMP Server
      placeholder: AetherNode BeamMP Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          The name of the server as shown in the server list (if the server is public). You can use [special
          characters](https://wiki.beammp.com/en/home/server-maintenance#customize-the-look-of-your-server-name) to
          format this with colors and styles.
        Keywords: server,name
        FieldName: Name
        InputType: text
        ParamFieldName: General.Name
        DefaultValue: AetherNode BeamMP Server
        Placeholder: AetherNode BeamMP Server
        EnumValues: {}
    - key: Description
      label: Server Description
      category: BeamMP
      subcategory: Server
      description: >-
        The description for the server as shown in the server list (if the server is public). You can use [special
        characters](https://wiki.beammp.com/en/home/server-maintenance#customize-the-look-of-your-server-name) to format
        this with colors and styles.
      keywords: description
      input_type: text
      param_field_name: General.Description
      default: A BeamMP server
      placeholder: A BeamMP server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Description
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          The description for the server as shown in the server list (if the server is public). You can use [special
          characters](https://wiki.beammp.com/en/home/server-maintenance#customize-the-look-of-your-server-name) to
          format this with colors and styles.
        Keywords: description
        FieldName: Description
        InputType: text
        ParamFieldName: General.Description
        DefaultValue: A BeamMP server
        Placeholder: A BeamMP server
        EnumValues: {}
    - key: Tags
      label: Server Tags
      category: BeamMP
      subcategory: Server
      description: Comma-separated list of custom identifying tags for the server to make it easier to find in the server list.
      keywords: tags
      input_type: text
      param_field_name: General.Tags
      default: Freeroam
      placeholder: Freeroam
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Tags
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: Comma-separated list of custom identifying tags for the server to make it easier to find in the server list.
        Keywords: tags
        FieldName: Tags
        InputType: text
        ParamFieldName: General.Tags
        DefaultValue: Freeroam
        Placeholder: Freeroam
        EnumValues: {}
    - key: $MainGamePort
      label: Port
      category: BeamMP
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: General.Port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Port
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $MainGamePort
        InputType: number
        ParamFieldName: General.Port
        ExcludeFromImport: true
        Hidden: true
        EnumValues: {}
    - key: Private
      label: Make Server Private
      category: BeamMP
      subcategory: Server
      description: >-
        When enabled, your server will not be shown in the server list. Anyone with the correct IP and port can still
        connect.
      keywords: private
      input_type: checkbox
      param_field_name: General.Private
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Make Server Private
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          When enabled, your server will not be shown in the server list. Anyone with the correct IP and port can still
          connect.
        Keywords: private
        FieldName: Private
        InputType: checkbox
        ParamFieldName: General.Private
        DefaultValue: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: Map
      label: Map
      category: BeamMP
      subcategory: Server
      description: The map to load. If Custom is selected, Custom Map Name must also be set.
      keywords: map
      input_type: text
      param_field_name: General.Map
      default: /levels/gridmap_v2/info.json
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        /levels/automation_test_track/info.json: Automation Test Track
        /levels/derby/info.json: Derby
        /levels/driver_training/info.json: Driver Training
        /levels/east_coast_usa/info.json: East Coast USA
        /levels/gridmap_v2/info.json: Gridmap V2 (default)
        /levels/hirochi_raceway/info.json: Hirochi Raceway
        /levels/industrial/info.json: Industrial
        /levels/italy/info.json: Italy
        /levels/johnson_valley/info.json: Johnson Valley
        /levels/jungle_rock_island/info.json: Jungle Rock Island
        /levels/small_island/info.json: Small Island
        /levels/smallgrid/info.json: Smallgrid
        /levels/utah/info.json: Utah
        /levels/west_coast_usa/info.json: West Coast USA
        '{{CustomMap}}': '--Custom--'
      raw:
        DisplayName: Map
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: The map to load. If Custom is selected, Custom Map Name must also be set.
        Keywords: map
        FieldName: Map
        InputType: text
        ParamFieldName: General.Map
        DefaultValue: /levels/gridmap_v2/info.json
        EnumValues:
          /levels/automation_test_track/info.json: Automation Test Track
          /levels/derby/info.json: Derby
          /levels/driver_training/info.json: Driver Training
          /levels/east_coast_usa/info.json: East Coast USA
          /levels/gridmap_v2/info.json: Gridmap V2 (default)
          /levels/hirochi_raceway/info.json: Hirochi Raceway
          /levels/industrial/info.json: Industrial
          /levels/italy/info.json: Italy
          /levels/johnson_valley/info.json: Johnson Valley
          /levels/jungle_rock_island/info.json: Jungle Rock Island
          /levels/small_island/info.json: Small Island
          /levels/smallgrid/info.json: Smallgrid
          /levels/utah/info.json: Utah
          /levels/west_coast_usa/info.json: West Coast USA
          '{{CustomMap}}': '--Custom--'
    - key: CustomMap
      label: Custom Map Name
      category: BeamMP
      subcategory: Server
      description: >-
        Sets a custom map for the server. Custom type must be selected under "Map", and the map must be installed in
        Resources/Client.
      keywords: custom,map
      input_type: text
      param_field_name: CustomMap
      default: ''
      placeholder: /levels/minato_rock_crawling/info.json
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Map Name
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a custom map for the server. Custom type must be selected under "Map", and the map must be installed in
          Resources/Client.
        Keywords: custom,map
        FieldName: CustomMap
        InputType: text
        IsFlagArgument: false
        ParamFieldName: CustomMap
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: /levels/minato_rock_crawling/info.json
        EnumValues: {}
    - key: $MaxUsers
      label: Max Players
      category: BeamMP
      subcategory: Server
      description: The maximum number of players on the server at one time.
      keywords: max,players,maxplayers
      input_type: number
      param_field_name: General.MaxPlayers
      default: '8'
      placeholder: '8'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Max Players
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: The maximum number of players on the server at one time.
        Keywords: max,players,maxplayers
        FieldName: $MaxUsers
        InputType: number
        ParamFieldName: General.MaxPlayers
        DefaultValue: '8'
        Placeholder: '8'
        Suffix: players
        EnumValues: {}
    - key: MaxCars
      label: Max Cars Per Player
      category: BeamMP
      subcategory: Server
      description: >-
        The maximum number of cars allowed per player. Any additional cars a player tries to spawn will be deleted
        instantly.
      keywords: max,cars,maxcars
      input_type: number
      param_field_name: General.MaxCars
      default: '1'
      placeholder: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: cars
      enum_values: {}
      raw:
        DisplayName: Max Cars Per Player
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          The maximum number of cars allowed per player. Any additional cars a player tries to spawn will be deleted
          instantly.
        Keywords: max,cars,maxcars
        FieldName: MaxCars
        InputType: number
        ParamFieldName: General.MaxCars
        DefaultValue: '1'
        Placeholder: '1'
        MinValue: '1'
        Suffix: cars
        EnumValues: {}
    - key: ResourceFolder
      label: Resource Folder
      category: BeamMP
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: General.ResourceFolder
      default: Resources
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Resource Folder
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: ResourceFolder
        InputType: text
        ParamFieldName: General.ResourceFolder
        DefaultValue: Resources
        ExcludeFromImport: true
        Hidden: true
        EnumValues: {}
    - key: LogChat
      label: Log Chat Messages
      category: BeamMP
      subcategory: Server
      description: Whether to log chat messages in the console and log.
      keywords: log,chat,logging,logchat
      input_type: checkbox
      param_field_name: General.LogChat
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Log Chat Messages
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: Whether to log chat messages in the console and log.
        Keywords: log,chat,logging,logchat
        FieldName: LogChat
        InputType: checkbox
        ParamFieldName: General.LogChat
        DefaultValue: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: Debug
      label: Enable Debug Logging
      category: BeamMP
      subcategory: Server
      description: Turn on debug logging. Enabling this will drastically increase the size of the log file.
      keywords: debug,log,logging
      input_type: checkbox
      param_field_name: General.Debug
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Enable Debug Logging
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: Turn on debug logging. Enabling this will drastically increase the size of the log file.
        Keywords: debug,log,logging
        FieldName: Debug
        InputType: checkbox
        ParamFieldName: General.Debug
        DefaultValue: 'false'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: ImScaredOfUpdates
      label: Hide Update Messages
      category: BeamMP
      subcategory: Server
      description: >-
        Hides the periodic update message which notifies you of a new server version. Recommended to keep this setting
        disabled and always update as soon as possible.
      keywords: hide,updates,message,imscaredofupdates
      input_type: checkbox
      param_field_name: Misc.ImScaredOfUpdates
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Hide Update Messages
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Hides the periodic update message which notifies you of a new server version. Recommended to keep this setting
          disabled and always update as soon as possible.
        Keywords: hide,updates,message,imscaredofupdates
        FieldName: ImScaredOfUpdates
        InputType: checkbox
        ParamFieldName: Misc.ImScaredOfUpdates
        DefaultValue: 'false'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: SendErrors
      label: Send Errors
      category: BeamMP
      subcategory: Server
      description: >-
        If enabled, the server will send info about crashes and other issues to the BeamMP devs. This may include your
        config, who is on your server at the time of the error, and similar general information. This has no impact on
        server performance.
      keywords: send,errors,senderrors
      input_type: checkbox
      param_field_name: Misc.SendErrors
      default: 'true'
      placeholder: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Send Errors
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the server will send info about crashes and other issues to the BeamMP devs. This may include your
          config, who is on your server at the time of the error, and similar general information. This has no impact on
          server performance.
        Keywords: send,errors,senderrors
        FieldName: SendErrors
        InputType: checkbox
        ParamFieldName: Misc.SendErrors
        DefaultValue: 'true'
        Placeholder: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: SendErrorsShowMessage
      label: Enable Send Errors Message
      category: BeamMP
      subcategory: Server
      description: If enabled, the Send Errors message will show on startup.
      keywords: send,errors,show,message,senderrorsshowmessage
      input_type: checkbox
      param_field_name: Misc.SendErrorsShowMessage
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Enable Send Errors Message
        Category: BeamMP:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the Send Errors message will show on startup.
        Keywords: send,errors,show,message,senderrorsshowmessage
        FieldName: SendErrorsShowMessage
        InputType: checkbox
        ParamFieldName: Misc.SendErrorsShowMessage
        DefaultValue: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: ServerStream
      label: Server Release Stream
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets whether to install the latest release version, or a custom version as specified under Server Custom
        Version. Update the server after changing this setting
      keywords: server,version,release,pre-release,custom
      input_type: enum
      param_field_name: ServerStream
      default: release
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        release: Latest release version (default)
        prerelease: Custom version
      raw:
        DisplayName: Server Release Stream
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets whether to install the latest release version, or a custom version as specified under Server Custom
          Version. Update the server after changing this setting
        Keywords: server,version,release,pre-release,custom
        FieldName: ServerStream
        InputType: enum
        ParamFieldName: ServerStream
        DefaultValue: release
        EnumValues:
          release: Latest release version (default)
          prerelease: Custom version
    - key: ServerPrereleaseVersion
      label: Server Custom Version
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets the [server custom version](https://github.com/BeamMP/BeamMP-Server/releases) to install, if 'Custom
        version' is selected under Server Release Stream. Use the full tag name, for example: v3.8.5. Update the server
        after changing this setting
      keywords: server,version,pre-release
      input_type: text
      param_field_name: ServerPrereleaseVersion
      default: ''
      placeholder: v3.8.5
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Custom Version
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets the [server custom version](https://github.com/BeamMP/BeamMP-Server/releases) to install, if 'Custom
          version' is selected under Server Release Stream. Use the full tag name, for example: v3.8.5. Update the
          server after changing this setting
        Keywords: server,version,pre-release
        FieldName: ServerPrereleaseVersion
        InputType: text
        ParamFieldName: ServerPrereleaseVersion
        DefaultValue: ''
        Placeholder: v3.8.5
        EnumValues: {}
    - key: ServerVersion
      label: Linux Server Build
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets the server build to install on Linux, based on the host system. Use 'Debian 13' if using AetherPanel's
        Docker/Podman (if available for the Server Release Stream). The Server Release Stream, and Server Custom Version
        if relevant, must also be set accordingly. Update the server after changing this setting
      keywords: server,version
      input_type: enum
      param_field_name: ServerVersion
      default: debian.13
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        debian.13: Debian 13 (default)
        debian.12: Debian 12
        debian.11: Debian 11 (custom only)
        ubuntu.24.04: Ubuntu 24.04
        ubuntu.22.04: Ubuntu 22.04
        ubuntu.20.04: Ubuntu 20.04 (custom only)
      raw:
        DisplayName: Linux Server Build
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets the server build to install on Linux, based on the host system. Use 'Debian 13' if using AetherPanel's
          Docker/Podman (if available for the Server Release Stream). The Server Release Stream, and Server Custom
          Version if relevant, must also be set accordingly. Update the server after changing this setting
        Keywords: server,version
        FieldName: ServerVersion
        InputType: enum
        ParamFieldName: ServerVersion
        DefaultValue: debian.13
        EnumValues:
          debian.13: Debian 13 (default)
          debian.12: Debian 12
          debian.11: Debian 11 (custom only)
          ubuntu.24.04: Ubuntu 24.04
          ubuntu.22.04: Ubuntu 22.04
          ubuntu.20.04: Ubuntu 20.04 (custom only)
  files:
    - path: ServerConfig.toml
      type: ini
      format: '{0} = "{1}"'
      subsections: []
      raw:
        ConfigFile: ServerConfig.toml
        AutoMap: true
        Importable: true
        ConfigType: ini
        ConfigFormat: '{0} = "{1}"'
        ConfigFormatRegex: ^(?<key>.+?) = "(?<value>.*?)"$
    - path: ServerConfig.toml
      type: ini
      format: '{0} = {1}'
      subsections: []
      raw:
        ConfigFile: ServerConfig.toml
        AutoMap: true
        Importable: true
        ConfigType: ini
        ConfigFormat: '{0} = {1}'
        ConfigFormatRegex: ^(?<key>.+?) = (?<value>[^"]*?)$
environment: {}
startup_variables:
  - key: AuthKey
    label: Auth Key
    default: ''
    customer_editable: true
    required: true
    sensitive: true
  - key: Name
    label: Server Name
    default: AetherNode BeamMP Server
    customer_editable: true
    required: false
    sensitive: false
  - key: Description
    label: Server Description
    default: A BeamMP server
    customer_editable: true
    required: false
    sensitive: false
  - key: Tags
    label: Server Tags
    default: Freeroam
    customer_editable: true
    required: false
    sensitive: false
  - key: Private
    label: Make Server Private
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: Map
    label: Map
    default: /levels/gridmap_v2/info.json
    customer_editable: true
    required: false
    sensitive: false
  - key: CustomMap
    label: Custom Map Name
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: MaxCars
    label: Max Cars Per Player
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: ResourceFolder
    label: Resource Folder
    default: Resources
    customer_editable: true
    required: false
    sensitive: false
  - key: LogChat
    label: Log Chat Messages
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: Debug
    label: Enable Debug Logging
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: ImScaredOfUpdates
    label: Hide Update Messages
