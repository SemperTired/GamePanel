schema: aetherpanel.template/v1
id: counter-strike-go
name: 'Counter-Strike: Global Offensive'
category: Imported
summary: 'Counter-Strike: Global Offensive Dedicated Server'
install:
  method: steamcmd
  app_id: '740'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    740/srcds_linux {PlatformArgs} -game {mod} -console -usercon -nobreakpad -port {ServerPort} -ip
    {ApplicationIPBinding} -maxplayers_override {MaxUsers} -authkey "{authkey}" -tickrate {tickrate}
    {insecure}{nohltv}{CustomParameters} {CustomConVars} +tv_port {SourceTVPort} +sv_logfile 1 {FormattedArgs} +exec
    server.cfg +map {map} {gamemode} +sv_game_mode_flags {sv_game_mode_flags} +sv_skirmish_id {sv_skirmish_id} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
  - key: sourcetvport
    name: SourceTV Port
    default: 27020
    protocol: udp
    required: true
  - key: clientport
    name: Client Port
    default: 27005
    protocol: udp
    required: true
config_files:
  - path: csgo/cfg/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $RemoteAdminPassword
      label: RCON Password
      category: CSGO
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: rcon_password
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON Password
        Category: CSGO:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $RemoteAdminPassword
        InputType: text
        Hidden: true
        ParamFieldName: rcon_password
        EnumValues: {}
    - key: hostname
      label: Server Name
      category: CSGO
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: 'AetherNode Counter-Strike: Global Offensive Server'
      required: false
      sensitive: false
      hidden: false
