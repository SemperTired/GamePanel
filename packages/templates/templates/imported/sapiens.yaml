schema: aetherpanel.template/v1
id: sapiens
name: Sapiens
category: Imported
summary: Sapiens Dedicated Server
install:
  method: steamcmd
  app_id: '2886350'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    2886350/linuxServer {PlatformArgs} {ProvideLogs}{Advertise}--server-id "AMPServer" {StartupMode} --port
    "{ServerPort}" --http-port "{HTTPPort}" --savedir "." {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 16161
    protocol: udp
    required: true
  - key: steamport
    name: Steam Port
    default: 16162
    protocol: udp
    required: true
  - key: httpport
    name: HTTP Port
    default: 16168
    protocol: tcp
    required: true
config_files:
  - path: sapiensconfig.json
    type: json
    editable: true
  - path: sapiensmetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: StartupMode
      label: Startup Mode
      category: Sapiens
      subcategory: Server
      description: Sets the server startup mode
      keywords: startup,load,new
      input_type: enum
      param_field_name: StartupMode
      default: '--new "{{WorldName}}" --seed "{{WorldSeed}}"'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '--new "{{WorldName}}" --seed "{{WorldSeed}}"': Create new world with World Name and Seed (default)
        '--load "{{WorldName}}"': Load existing world by World Name
        '--load "{{WorldID}}"': Load existing world by World ID
      raw:
        DisplayName: Startup Mode
        Category: Sapiens:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server startup mode
        Keywords: startup,load,new
        FieldName: StartupMode
        InputType: enum
        ParamFieldName: StartupMode
        DefaultValue: '--new "{{WorldName}}" --seed "{{WorldSeed}}"'
        EnumValues:
          '--new "{{WorldName}}" --seed "{{WorldSeed}}"': Create new world with World Name and Seed (default)
          '--load "{{WorldName}}"': Load existing world by World Name
          '--load "{{WorldID}}"': Load existing world by World ID
    - key: WorldSeed
      label: World Seed
      category: Sapiens
      subcategory: Server
      description: Sets the seed to create a new world with. Empty = random seed
      keywords: world,seed
      input_type: text
      param_field_name: WorldSeed
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Seed
        Category: Sapiens:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the seed to create a new world with. Empty = random seed
        Keywords: world,seed
        FieldName: WorldSeed
        InputType: text
        ParamFieldName: WorldSeed
        DefaultValue: ''
        EnumValues: {}
    - key: WorldName
      label: World Name
      category: Sapiens
      subcategory: Server
      description: >-
        Sets the name of the world to create or load, as specified under Startup Mode. This will also be the name
        displayed in the server list, unless set otherwise in 'advertiseName' in config.lua for the world
      keywords: world,name
      input_type: text
      param_field_name: WorldName
      default: World
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Name
        Category: Sapiens:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the name of the world to create or load, as specified under Startup Mode. This will also be the name
          displayed in the server list, unless set otherwise in 'advertiseName' in config.lua for the world
        Keywords: world,name
        FieldName: WorldName
        InputType: text
        ParamFieldName: WorldName
        DefaultValue: World
        Required: true
        EnumValues: {}
    - key: WorldID
      label: World ID
      category: Sapiens
      subcategory: Server
      description: >-
        Sets the ID of the world to load, as specified under Startup Mode. Find the world ID in
        'sapiens/players/AMPServer/worlds'
      keywords: world,id
      input_type: text
      param_field_name: WorldID
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World ID
        Category: Sapiens:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the ID of the world to load, as specified under Startup Mode. Find the world ID in
          'sapiens/players/AMPServer/worlds'
        Keywords: world,id
        FieldName: WorldID
        InputType: text
        ParamFieldName: WorldID
        DefaultValue: ''
        EnumValues: {}
    - key: Advertise
      label: Advertise Server
      category: Sapiens
      subcategory: Server
      description: If enabled, the server will be shown in the in-game server list
      keywords: server,list,show,display,advertise
      input_type: checkbox
      param_field_name: Advertise
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '--advertise '
      raw:
        DisplayName: Advertise Server
        Category: Sapiens:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will be shown in the in-game server list
        Keywords: server,list,show,display,advertise
        FieldName: Advertise
        InputType: checkbox
        ParamFieldName: Advertise
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '--advertise '
    - key: $MaxUsers
      label: Player Limit
      category: Sapiens
      subcategory: Server
      description: >-
        Sets the maximum number of players at one time to display in the AetherPanel status tab. This is visual only - the
        actual maximum is set by 'maxPlayers' in config.lua for the world
      keywords: maximum,players,clients,limit,maxplayers
      input_type: number
      param_field_name: maxPlayers
      default: '16'
      placeholder: '16'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Sapiens:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the maximum number of players at one time to display in the AetherPanel status tab. This is visual only - the
          actual maximum is set by 'maxPlayers' in config.lua for the world
        Keywords: maximum,players,clients,limit,maxplayers
        FieldName: $MaxUsers
        InputType: number
        ParamFieldName: maxPlayers
        DefaultValue: '16'
        Placeholder: '16'
        Suffix: players
        EnumValues: {}
    - key: ProvideLogs
      label: Send Bug Reports
      category: Sapiens
      subcategory: Server
      description: >-
        Sets whether to automatically send bug reports (and optionally a world save, if requested by a developer) to the
        Sapiens developers
      keywords: crash,logs,bug,reports,world,save,developers
      input_type: enum
      param_field_name: ProvideLogs
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Do not send (default)
        '--yes ': Send bug reports
        '--yes-upload-world ': Send bug reports and world save
      raw:
        DisplayName: Send Bug Reports
        Category: Sapiens:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether to automatically send bug reports (and optionally a world save, if requested by a developer) to
          the Sapiens developers
        Keywords: crash,logs,bug,reports,world,save,developers
        FieldName: ProvideLogs
        InputType: enum
        ParamFieldName: ProvideLogs
        DefaultValue: ''
        EnumValues:
          '': Do not send (default)
          '--yes ': Send bug reports
          '--yes-upload-world ': Send bug reports and world save
  files: []
environment: {}
startup_variables:
  - key: StartupMode
    label: Startup Mode
    default: '--new "{{WorldName}}" --seed "{{WorldSeed}}"'
    customer_editable: true
    required: false
    sensitive: false
  - key: WorldSeed
    label: World Seed
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: WorldName
    label: World Name
    default: World
    customer_editable: true
    required: true
    sensitive: false
  - key: WorldID
    label: World ID
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: Advertise
    label: Advertise Server
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ProvideLogs
    label: Send Bug Reports
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '1060230'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

