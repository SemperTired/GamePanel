schema: aetherpanel.template/v1
id: ground-branch
name: Ground Branch
category: Imported
summary: Ground Branch Dedicated Server
install:
  method: steamcmd
  app_id: '476400'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} {ServerMap}?Mission={ServerMission}?{FormattedArgs}{CustomServerArgs}
    QueryPort={QueryPort} MultiHome={ApplicationIPBinding} -nohomedir -stdout -FullStdOutLogOutput
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: ./GroundBranch/ServerConfig/Server.ini
    type: ini
    editable: true
  - path: ./GroundBranch/ServerConfig/Vote.ini
    type: ini
    editable: true
  - path: ./GroundBranch/ServerConfig/Ban.ini
    type: ini
    editable: true
  - path: ./GroundBranch/ServerConfig/TeamKill.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerName
      label: Server Name
      category: Ground Branch
      subcategory: Server
      description: Sets the name of the server as shown in the server browser. Maximum 64 characters
      keywords: name,servername
      input_type: text
      param_field_name: /Script/RBZooKeeper.ZKServer.ServerName
      default: AMP Powered Ground Branch Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Ground Branch:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server as shown in the server browser. Maximum 64 characters
        Keywords: name,servername
        FieldName: ServerName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: /Script/RBZooKeeper.ZKServer.ServerName
        IncludeInCommandLine: false
        DefaultValue: AMP Powered Ground Branch Server
        EnumValues: {}
    - key: ServerMOTD
      label: MOTD
      category: Ground Branch
      subcategory: Server
      description: >-
        Sets the player welcome message (MOTD). Maximum 512 characters. <br> = line break, <b> = bold line, <h1 - 3> =
        heading 1, 2, 3 etc
      keywords: motd,welcome,message,servermotd
      input_type: Textarea
      param_field_name: /Script/RBZooKeeper.ZKServer.ServerMOTD
      default: <h1>Welcome!<br>This is my Ground Branch server.<br><b>Enjoy!
      placeholder: <h1>Welcome!<br>This is my Ground Branch server.<br><b>Enjoy!
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: MOTD
