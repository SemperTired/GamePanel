    - key: GameMode
      label: Game Mode
      category: Call of Duty Black Ops
      subcategory: Server
      description: >-
        Sets the game mode. Configure the relevant config file accordingly - 'Plutonium/storage/t5/dedicated.cfg' for
        Multiplayer, 'Plutonium/storage/t5/dedicated_sp.cfg' for Zombies
      keywords: game,mode,gamemode
      input_type: enum
      param_field_name: GameMode
      default: t5mp "{{$FullBaseDir}}T5" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated.cfg
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        t5mp "{{$FullBaseDir}}T5" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated.cfg: Multiplayer (default)
        t5sp "{{$FullBaseDir}}T5" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated_sp.cfg: Zombies
      raw:
        DisplayName: Game Mode
        Category: Call of Duty Black Ops:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the game mode. Configure the relevant config file accordingly - 'Plutonium/storage/t5/dedicated.cfg' for
          Multiplayer, 'Plutonium/storage/t5/dedicated_sp.cfg' for Zombies
        Keywords: game,mode,gamemode
        FieldName: GameMode
        InputType: enum
        ParamFieldName: GameMode
        DefaultValue: t5mp "{{$FullBaseDir}}T5" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated.cfg
        EnumValues:
          t5mp "{{$FullBaseDir}}T5" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated.cfg: Multiplayer (default)
          t5sp "{{$FullBaseDir}}T5" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated_sp.cfg: Zombies
