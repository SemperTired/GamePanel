schema: aetherpanel.template/v1
id: call-of-dutybo1
name: 'Call of Duty: Black Ops (Plutonium Mod)'
category: Imported
summary: 'Call of Duty: Black Ops Dedicated Server using the Plutonium mod launcher'
install:
  method: steamcmd
  app_id: '42700'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} {GameMode} +set net_port {ServerPort} +set net_ip {ApplicationIPBinding} +set
    rcon_password "{RemoteAdminPassword}" {FormattedArgs} {MapMode}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 28960
    protocol: both
    required: true
config_files:
  - path: Plutonium/storage/t5/dedicated.cfg
    type: text
    editable: true
  - path: Plutonium/storage/t5/dedicated_sp.cfg
    type: text
    editable: true
config_schema:
  fields:
