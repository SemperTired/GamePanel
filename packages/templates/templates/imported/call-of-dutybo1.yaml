      category: Call of Duty Black Ops
      subcategory: Server
      description: >-
        Sets the [server key](https://platform.plutonium.pw/serverkeys) required to run the server. This also sets the
        server name. A Plutonium account must be at least one week old to create a key, and game ownership must be
        [verified](https://forum.plutonium.pw/topic/32250/an-update-on-game-ownership-verification)
      keywords: server,key,serverkey
      input_type: password
      param_field_name: ServerKey
      default: ''
      required: true
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
