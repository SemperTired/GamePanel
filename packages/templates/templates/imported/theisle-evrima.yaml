      label: Queue Port
      category: The Isle
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: QueuePort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Queue Port
        Category: The Isle:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $QueuePort
        InputType: number
        Hidden: true
        ParamFieldName: QueuePort
        EnumValues: {}
