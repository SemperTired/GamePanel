schema: aetherpanel.template/v1
id: theisle-evrima
name: The Isle (EVRIMA)
category: Imported
summary: The Isle (EVRIMA) Dedicated Server
install:
  method: steamcmd
  app_id: '412680'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    412680/TheIsle/Binaries/Linux/TheIsleServer-Linux-Shipping TheIsle {PlatformArgs}
    ?Port={GamePort}?QueryPort={QueryPort}?MaxPlayers={MaxUsers} {FormattedArgs} -stdout -FullStdOutLogOutput
    -ini:Engine:[EpicOnlineServices]:DedicatedServerClientId=xyza7891gk5PRo3J7G9puCJGFJjmEguW
    -ini:Engine:[EpicOnlineServices]:DedicatedServerClientSecret=pKWl6t5i9NJK8gTpVlAxzENZ65P8hYzodV8Dqe5Rlc8
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: queueport
    name: Queue Port
    default: 10000
    protocol: tcp
    required: true
  - key: rconport
    name: RCON Port
    default: 8888
    protocol: tcp
    required: true
config_files:
  - path: TheIsle/Saved/Config/WindowsServer/Game.ini
    type: text
    editable: true
  - path: TheIsle/Saved/Config/LinuxServer/Game.ini
    type: text
    editable: true
config_schema:
  fields:
