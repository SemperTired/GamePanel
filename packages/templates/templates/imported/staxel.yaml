schema: aetherpanel.template/v1
id: staxel
name: Staxel
category: Imported
summary: Staxel Dedicated Server
install:
  method: steamcmd
  app_id: '405710'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/mono {PlatformArgs} --port={ServerPort} --interface={ApplicationIPBinding} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 38465
    protocol: tcp
    required: true
config_files:
  - path: staxelconfig.json
    type: json
    editable: true
  - path: staxelmetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: storage
      label: World Save Name
      category: Staxel
      subcategory: Server
      description: Sets the name of the world as saved locally in LocalContent. Defaults to "server" if not set
      keywords: world,name,save,storage
      input_type: text
      param_field_name: storage
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: World Save Name
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the world as saved locally in LocalContent. Defaults to "server" if not set
        Keywords: world,name,save,storage
        FieldName: storage
        InputType: text
        IsFlagArgument: false
        ParamFieldName: storage
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: seed
      label: World Seed
      category: Staxel
      subcategory: Server
      description: Sets the world seed when creating a new world (optional)
      keywords: world,seed
      input_type: text
      param_field_name: seed
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: World Seed
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the world seed when creating a new world (optional)
        Keywords: world,seed
        FieldName: seed
        InputType: text
        IsFlagArgument: false
        ParamFieldName: seed
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: worldSize
      label: World Size
      category: Staxel
      subcategory: Server
      description: Sets the world size when creating a new world
      keywords: world,size,worldsize
      input_type: number
      param_field_name: worldSize
      default: '1.00'
      placeholder: '1.00'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      min: 1
      max: 10
      enum_values: {}
      raw:
        DisplayName: World Size
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the world size when creating a new world
        Keywords: world,size,worldsize
        FieldName: worldSize
        InputType: number
        MinValue: '1'
        MaxValue: '10'
        IsFlagArgument: false
        ParamFieldName: worldSize
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: '1.00'
        Placeholder: '1.00'
        EnumValues: {}
    - key: farmCount
      label: Farm Count
      category: Staxel
      subcategory: Server
      description: Sets the farm count when creating a new world
      keywords: farm,count,farmcount
      input_type: number
      param_field_name: farmCount
      default: '1'
      placeholder: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      min: 1
      max: 4
      suffix: farms
      enum_values: {}
      raw:
        DisplayName: Farm Count
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the farm count when creating a new world
        Keywords: farm,count,farmcount
        FieldName: farmCount
        InputType: number
        MinValue: '1'
        MaxValue: '4'
        IsFlagArgument: false
        ParamFieldName: farmCount
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: '1'
        Placeholder: '1'
        Suffix: farms
        EnumValues: {}
    - key: name
      label: Server Name
      category: Staxel
      subcategory: Server
      description: Sets the server name. Must be within 3 to 16 characters, no spaces
      keywords: server,name
      input_type: text
      param_field_name: name
      default: AMPStaxelServer
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server name. Must be within 3 to 16 characters, no spaces
        Keywords: server,name
        FieldName: name
        InputType: text
        IsFlagArgument: false
        ParamFieldName: name
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: AMPStaxelServer
        EnumValues: {}
    - key: password
      label: Server Password
      category: Staxel
      subcategory: Server
      description: Sets the password for players to join the server. Default is no password
      keywords: password
      input_type: password
      param_field_name: password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password for players to join the server. Default is no password
        Keywords: password
        FieldName: password
        InputType: password
        IsFlagArgument: false
        ParamFieldName: password
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Staxel
      subcategory: Server
      description: Sets the maximum number of players that may connect to the server
      keywords: players,limit,maximum,playerlimit
      input_type: number
      param_field_name: playerLimit
      default: '4'
      placeholder: '4'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players that may connect to the server
        Keywords: players,limit,maximum,playerlimit
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: playerLimit
        IncludeInCommandLine: true
        DefaultValue: '4'
        Placeholder: '4'
        Suffix: players
        EnumValues: {}
    - key: creative
      label: Enable Creative Mode
      category: Staxel
      subcategory: Server
      description: If set, creative mode will be enabled on the server
      keywords: creative,mode
      input_type: checkbox
      param_field_name: creative
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Creative Mode
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, creative mode will be enabled on the server
        Keywords: creative,mode
        FieldName: creative
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: creative
        IncludeInCommandLine: true
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: noPause
      label: Disable Pause
      category: Staxel
      subcategory: Server
      description: If set, pausing of the server will be disabled, so that time will pass even when no players are online
      keywords: disable,pausing,pause,nopause
      input_type: checkbox
      param_field_name: noPause
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Disable Pause
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, pausing of the server will be disabled, so that time will pass even when no players are online
        Keywords: disable,pausing,pause,nopause
        FieldName: noPause
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: noPause
        IncludeInCommandLine: true
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: interface
      label: Server IP Binding
      category: Staxel
      subcategory: Server
      description: >-
        If required, you can change the binding of the server by changing the Application IP Binding for this instance.
        NOTE: The IP must be reachable by AMP, otherwise AMP's console won't work
      keywords: ip,binding,interface
      input_type: hidden
      param_field_name: interface
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server IP Binding
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If required, you can change the binding of the server by changing the Application IP Binding for this
          instance. NOTE: The IP must be reachable by AMP, otherwise AMP's console won't work
        Keywords: ip,binding,interface
        FieldName: interface
        InputType: hidden
        IsFlagArgument: false
        ParamFieldName: interface
        IncludeInCommandLine: false
        EnumValues: {}
    - key: upnp
      label: Enable UPnP
      category: Staxel
      subcategory: Server
      description: If enabled, the server will attempt to configure automatic port forwarding on a compatible router
      keywords: upnp
      input_type: checkbox
      param_field_name: upnp
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable UPnP
        Category: Staxel:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will attempt to configure automatic port forwarding on a compatible router
        Keywords: upnp
        FieldName: upnp
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: upnp
        IncludeInCommandLine: true
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
  files: []
environment: {}
startup_variables:
  - key: storage
    label: World Save Name
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: seed
    label: World Seed
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: worldSize
    label: World Size
    default: '1.00'
    customer_editable: true
    required: false
    sensitive: false
  - key: farmCount
    label: Farm Count
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: name
    label: Server Name
    default: AMPStaxelServer
    customer_editable: true
    required: false
    sensitive: false
  - key: password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: creative
    label: Enable Creative Mode
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: noPause
    label: Disable Pause
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: upnp
    label: Enable UPnP
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '405710'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
