schema: aetherpanel.template/v1
id: nightingale
name: Nightingale
category: Imported
summary: Nightingale Dedicated Server
install:
  method: steamcmd
  app_id: '3796810'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    3796810/NWX/Binaries/Linux/NWXServer-Linux-Shipping {PlatformArgs} NWX -port={GamePort} -statusPort={StatusPort}
    -multihome={ApplicationIPBinding}
    -ini:Engine:[HTTPServer.Listeners]:+ListenerOverrides=(Port={StatusPort},BindAddress={ApplicationIPBinding})
    -ini:Game:[/Script/Engine.GameSession]:MaxPlayers={MaxUsers}
    -ini:ServerSettings:[/Script/NWX.NWXServerSettings]:StartingDifficulty={StartingDifficulty} {FormattedArgs}
    {EnableCheats}-stdout -FullStdOutLogOutput
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: statusport
    name: Status Port
    default: 7778
    protocol: tcp
    required: true
config_files:
  - path: NWX/Config/ServerSettings.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: StartingDifficulty
      label: Starting Map Difficulty
      category: Nightingale
      subcategory: Server
      description: Sets the starting map difficulty for the very first map, if one is not supplied from an imported character
      keywords: starting,difficulty,map,StartingDifficulty
      input_type: enum
      param_field_name: /Script/NWX.NWXServerSettings.StartingDifficulty
      default: easy
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        easy: Easy (default)
        medium: Medium
        hard: Hard
        extreme: Extreme
      raw:
        DisplayName: Starting Map Difficulty
        Category: Nightingale:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the starting map difficulty for the very first map, if one is not supplied from an imported character
        Keywords: starting,difficulty,map,StartingDifficulty
        FieldName: StartingDifficulty
        InputType: enum
        ParamFieldName: /Script/NWX.NWXServerSettings.StartingDifficulty
        DefaultValue: easy
        EnumValues:
          easy: Easy (default)
          medium: Medium
          hard: Hard
          extreme: Extreme
    - key: Password
      label: Server Password
      category: Nightingale
      subcategory: Server
      description: Sets the password required for players to join the server. Default is no password
      keywords: password,server
      input_type: password
      param_field_name: /Script/NWX.NWXServerSettings.Password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Nightingale:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password required for players to join the server. Default is no password
        Keywords: password,server
        FieldName: Password
        InputType: password
        ParamFieldName: /Script/NWX.NWXServerSettings.Password
        DefaultValue: ''
        EnumValues: {}
    - key: Password
      label: Server Password
      category: Nightingale
      subcategory: Server
      description: ''
      keywords: ''
      input_type: password
      param_field_name: ini:ServerSettings:[/Script/NWX.NWXServerSettings]:Password
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Nightingale:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: Password
        InputType: password
        ParamFieldName: ini:ServerSettings:[/Script/NWX.NWXServerSettings]:Password
        IncludeInCommandLine: true
        SkipIfEmpty: true
        Hidden: true
        EnumValues: {}
    - key: AdminPassword
      label: Admin Password
      category: Nightingale
      subcategory: Server
      description: >-
        Sets the password that allows players to authenticate in-game to kick and ban other players. Default is no
        password, which disables the functionality
      keywords: admin,password
      input_type: password
      param_field_name: /Script/NWX.NWXServerSettings.AdminPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Admin Password
        Category: Nightingale:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the password that allows players to authenticate in-game to kick and ban other players. Default is no
          password, which disables the functionality
        Keywords: admin,password
        FieldName: AdminPassword
        InputType: password
        ParamFieldName: /Script/NWX.NWXServerSettings.AdminPassword
        DefaultValue: ''
        EnumValues: {}
    - key: AdminPassword
      label: Admin Password
      category: Nightingale
      subcategory: Server
      description: ''
      keywords: ''
      input_type: password
      param_field_name: ini:ServerSettings:[/Script/NWX.NWXServerSettings]:AdminPassword
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Admin Password
        Category: Nightingale:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: AdminPassword
        InputType: password
        ParamFieldName: ini:ServerSettings:[/Script/NWX.NWXServerSettings]:AdminPassword
        IncludeInCommandLine: true
        SkipIfEmpty: true
        Hidden: true
        EnumValues: {}
    - key: EnableCheats
      label: Enable Cheats
      category: Nightingale
      subcategory: Server
      description: If set, cheats will be enabled on the server
      keywords: enable,cheats,EnableCheats
      input_type: checkbox
      param_field_name: EnableCheats
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-EnableCheats '
      raw:
        DisplayName: Enable Cheats
        Category: Nightingale:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, cheats will be enabled on the server
        Keywords: enable,cheats,EnableCheats
        FieldName: EnableCheats
        InputType: checkbox
        ParamFieldName: EnableCheats
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-EnableCheats '
    - key: $MaxUsers
      label: Player Limit
      category: Nightingale
      subcategory: Server
      description: >-
        Sets the maximum number of players allowed on the server at one time. Warning: increasing the maximum above 6 is
        unsupported and may result in unintended behaviour
      keywords: max,maximum,players,limit,connection,MaxPlayers
      input_type: number
      param_field_name: MaxPlayers
      default: '6'
      placeholder: '6'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Nightingale:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the maximum number of players allowed on the server at one time. Warning: increasing the maximum above 6
          is unsupported and may result in unintended behaviour
        Keywords: max,maximum,players,limit,connection,MaxPlayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        ParamFieldName: MaxPlayers
        DefaultValue: '6'
        Placeholder: '6'
        Suffix: players
        EnumValues: {}
    - key: ServerBranch
      label: Server Branch
      category: Updates
      subcategory: Steam Downloads
      description: Sets the server branch to install. Update the server after switching branches
      keywords: server,branch,depot
      input_type: enum
      param_field_name: ServerBranch
      default: public
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        public: Public (default)
        public-test-realm: Test branch (public-test-realm)
      raw:
        DisplayName: Server Branch
        Category: Updates
        Subcategory: Steam Downloads:download
        Description: Sets the server branch to install. Update the server after switching branches
        Keywords: server,branch,depot
        FieldName: ServerBranch
        InputType: enum
        ParamFieldName: ServerBranch
        DefaultValue: public
        EnumValues:
          public: Public (default)
          public-test-realm: Test branch (public-test-realm)
  files:
    - path: NWX/Config/ServerSettings.ini
      type: ini
      subsections: []
      raw:
        ConfigFile: NWX/Config/ServerSettings.ini
        AutoMap: true
        Importable: true
        ConfigType: ini
environment: {}
startup_variables:
  - key: StartingDifficulty
    label: Starting Map Difficulty
    default: easy
    customer_editable: true
    required: false
    sensitive: false
  - key: Password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: Password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: AdminPassword
    label: Admin Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: AdminPassword
    label: Admin Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: EnableCheats
    label: Enable Cheats
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerBranch
    label: Server Branch
    default: public
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '1928980'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
