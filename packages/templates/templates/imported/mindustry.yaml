schema: aetherpanel.template/v1
id: mindustry
name: Mindustry
category: Imported
summary: Mindustry Dedicated Server
install:
  method: custom
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    java/bin/java {CustomJavaArgs} -jar server-release.jar config port {ServerPort},config socketInputPort
    {SocketInputPort},{host}{FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 6567
    protocol: both
    required: true
  - key: socketinputport
    name: Socket Input Port
    default: 6569
    protocol: tcp
    required: true
config_files:
  - path: mindustryconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: logging
      label: Enable Logging
      category: Mindustry
      subcategory: Server
      description: Enables logging to files by default
      keywords: ''
      input_type: text
      param_field_name: config logging
      default: 'true'
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Enable Logging
        Category: Mindustry:stadia_controller
        Subcategory: Server:dns:1
        Description: Enables logging to files by default
        Keywords: ''
        FieldName: logging
        InputType: text
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: config logging
        IncludeInCommandLine: true
        DefaultValue: 'true'
        EnumValues: {}
    - key: ServerVersion
      label: Server Version
      category: Mindustry
      subcategory: Server
      description: >-
        Sets the [server version](https://github.com/Anuken/Mindustry/tags) to install. Empty = latest release
        (default). NOTE: Update the server after changing this setting
      keywords: server,version,release
      input_type: text
      param_field_name: ServerVersion
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Version
        Category: Mindustry:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the [server version](https://github.com/Anuken/Mindustry/tags) to install. Empty = latest release
          (default). NOTE: Update the server after changing this setting
        Keywords: server,version,release
        FieldName: ServerVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: ServerVersion
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: name
      label: Server Name
      category: Mindustry
      subcategory: Server
      description: Sets the server name as displayed on clients. Don't include commas
      keywords: server,name
      input_type: text
      param_field_name: config name
      default: AMP Powered Mindustry Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Mindustry:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server name as displayed on clients. Don't include commas
        Keywords: server,name
        FieldName: name
        InputType: text
        IsFlagArgument: false
        ParamFieldName: config name
        IncludeInCommandLine: true
        DefaultValue: AMP Powered Mindustry Server
        EnumValues: {}
    - key: desc
      label: Server Description
      category: Mindustry
      subcategory: Server
      description: Sets the server description, displayed under the name. Maximum 100 characters. Don't include commas
      keywords: server,description,desc
      input_type: text
      param_field_name: config desc
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
