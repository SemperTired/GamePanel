          Custom Map Name
        Keywords: host,map
        FieldName: host
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: host
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues:
          '': None (default)
          host,: Random
          host Ancient_Caldera {{Mode}},: Ancient Caldera
          host Archipelago {{Mode}},: Archipelago
          host Debris_Field {{Mode}},: Debris Field
          host Domain {{Mode}},: Domain
          host Fork {{Mode}},: Fork
