        host Archipelago {{Mode}},: Archipelago
        host Debris_Field {{Mode}},: Debris Field
        host Domain {{Mode}},: Domain
        host Fork {{Mode}},: Fork
        host Fortress {{Mode}},: Fortress
        host Glacier {{Mode}},: Glacier
        host Islands {{Mode}},: Islands
        host Labyrinth {{Mode}},: Labyrinth
        host Maze {{Mode}},: Maze
