schema: aetherpanel.template/v1
id: teamspeak6
name: TeamSpeak 6
category: Imported
summary: TeamSpeak 6 Server
install:
  method: custom
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/tsserver {PlatformArgs} --accept-license=1 --default-voice-port={VoicePort}
    --filetransfer-port={FileTransferPort} --query-http-port={HTTPQueryPort} --query-ssh-port={SSHQueryPort}
    --query-https-port={HTTPSQueryPort} --voice-ip=[{ApplicationIPBinding},{IPv6Binding}]
    --filetransfer-ip=[{ApplicationIPBinding},{IPv6Binding}] --query-http-ip=[{ApplicationIPBinding},{IPv6Binding}]
    --query-ssh-ip=[{ApplicationIPBinding},{IPv6Binding}] --query-https-ip=[{ApplicationIPBinding},{IPv6Binding}]
    --config-file=tsserver.yaml {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: voiceport
    name: Voice Port
    default: 9987
    protocol: udp
    required: true
  - key: filetransferport
    name: File Transfer Port
    default: 30033
    protocol: tcp
    required: true
  - key: sshqueryport
    name: SSH Query Port
    default: 10022
    protocol: tcp
    required: true
  - key: httpqueryport
    name: HTTP Query Port
    default: 10080
    protocol: tcp
    required: true
  - key: httpsqueryport
    name: HTTPS Query Port
    default: 10443
    protocol: tcp
    required: true
config_files:
  - path: teamspeak6config.json
    type: json
    editable: true
  - path: teamspeak6metaconfig.json
    type: json
    editable: true
config_schema:
