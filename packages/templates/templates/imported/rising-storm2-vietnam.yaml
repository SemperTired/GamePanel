    - key: CustomMap
      label: Custom Map Name
      category: Rising Storm 2 Vietnam
      subcategory: Server
      description: Sets a custom map for the server. Custom type must be selected under "Server Map"
      keywords: custom,map
      input_type: text
      param_field_name: CustomMap
      default: ''
      required: false
