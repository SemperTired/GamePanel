schema: aetherpanel.template/v1
id: rising-storm2-vietnam
name: 'Rising Storm 2: Vietnam'
category: Imported
summary: 'Rising Storm 2: Vietnam Dedicated Server'
install:
  method: steamcmd
  app_id: '418480'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs}
    {ServerMap}?AdminName={AdminName}?AdminPassword={AdminPassword}?MaxPlayers={MaxUsers}?Difficulty={Difficulty}?{FormattedArgs}{CustomServerOptions}
    -Port={GamePort} -QueryPort={QueryPort} -WebAdminPort={WebAdminPort} -MultiHome={ApplicationIPBinding}
    {CustomServerSwitches} -stdout -FullStdOutLogOutput
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7787
    protocol: both
    required: true
  - key: webadminport
    name: Web Admin Port
    default: 8190
    protocol: tcp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: both
    required: true
config_files:
  - path: ROGame/Config/ROGame.ini
    type: ini
    editable: true
  - path: ROGame/Config/ROWeb.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: $WebAdminPort
      label: Web Admin Port
      category: Rising Storm 2 Vietnam
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: IpDrv.WebServer.ListenPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Web Admin Port
        Category: Rising Storm 2 Vietnam:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $WebAdminPort
        InputType: number
        Hidden: true
        ParamFieldName: IpDrv.WebServer.ListenPort
        EnumValues: {}
    - key: ServerName
      label: Server Name
      category: Rising Storm 2 Vietnam
      subcategory: Server
      description: Sets the name of the server as shown in the server browser
      keywords: name,servername
      input_type: text
      param_field_name: Engine.GameReplicationInfo.ServerName
      default: 'AMP Powered Rising Storm 2: Vietnam Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Rising Storm 2 Vietnam:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server as shown in the server browser
        Keywords: name,servername
        FieldName: ServerName
        InputType: text
        ParamFieldName: Engine.GameReplicationInfo.ServerName
        DefaultValue: 'AMP Powered Rising Storm 2: Vietnam Server'
        EnumValues: {}
    - key: GamePassword
      label: Server Password
      category: Rising Storm 2 Vietnam
      subcategory: Server
      description: Sets the password for players to join the server. Alpha-numeric characters only. Default is no password
      keywords: server,password,gamepassword
      input_type: password
      param_field_name: Engine.AccessControl.GamePassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Rising Storm 2 Vietnam:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password for players to join the server. Alpha-numeric characters only. Default is no password
        Keywords: server,password,gamepassword
        FieldName: GamePassword
        InputType: password
        ParamFieldName: Engine.AccessControl.GamePassword
        DefaultValue: ''
        EnumValues: {}
    - key: AdminPassword
      label: Admin Password
      category: Rising Storm 2 Vietnam
      subcategory: Server
      description: >-
        Sets the master server administrator password. Alpha-numeric characters only. Default is a strong random
        password
      keywords: admin,administrator,password,adminpassword
      input_type: password
      param_field_name: Engine.AccessControl.AdminPassword
      default: '{{randomdigits(16)}}'
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Admin Password
        Category: Rising Storm 2 Vietnam:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
