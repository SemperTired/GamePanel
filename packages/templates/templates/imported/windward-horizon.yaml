schema: aetherpanel.template/v1
id: windward-horizon
name: Windward Horizon
category: Imported
summary: Windward Horizon Dedicated Server
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: http://www.tasharen.com/wh/WHServer.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/mono {PlatformArgs} -port {GamePort} -lan {ApplicationIPBinding} -http {public}-app "{FullBaseDir}"
    {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 5137
    protocol: tcp
    required: true
config_files:
  - path: windward-horizonconfig.json
    type: json
    editable: true
  - path: windward-horizonmetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: name
      label: Server Name
      category: Windward Horizon
      subcategory: Server
      description: Sets the server name as shown in the in-game browser
      keywords: server,name
      input_type: text
      param_field_name: name
      default: AMP Powered Windward Horizon Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Windward Horizon:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server name as shown in the in-game browser
        Keywords: server,name
        FieldName: name
        InputType: text
        ParamFieldName: name
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: AMP Powered Windward Horizon Server
        EnumValues: {}
    - key: public
      label: Make Server Public
      category: Windward Horizon
      subcategory: Server
      description: If set, the server will be registered to the public lobby and be publicly visible in the in-game browser
      keywords: public
      input_type: checkbox
      param_field_name: public
      default: '-public '
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-public '
      raw:
        DisplayName: Make Server Public
        Category: Windward Horizon:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, the server will be registered to the public lobby and be publicly visible in the in-game browser
        Keywords: public
        FieldName: public
        InputType: checkbox
        ParamFieldName: public
        DefaultValue: '-public '
        EnumValues:
          'False': ''
          'True': '-public '
    - key: world
      label: World Name
      category: Windward Horizon
      subcategory: Server
      description: Sets the name of the world to load (if it already exists) or to create. Omit the .world suffix
      keywords: world,name
      input_type: text
      param_field_name: world
      default: World
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: World Name
        Category: Windward Horizon:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the world to load (if it already exists) or to create. Omit the .world suffix
        Keywords: world,name
        FieldName: world
        InputType: text
        ParamFieldName: world
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: World
        EnumValues: {}
    - key: admins
      label: Server Admins
      category: Windward Horizon
      subcategory: Server
      description: List of Steam64 IDs for server admins. [Find Steam64 IDs](https://steamid.io/)
      keywords: admins
      input_type: list
      param_field_name: admins
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      special: listfile:./windward-horizon/server/ServerConfig/admin.txt
      raw:
        DisplayName: Server Admins
        Category: Windward Horizon:stadia_controller
        Subcategory: Server:dns:1
        Description: List of Steam64 IDs for server admins. [Find Steam64 IDs](https://steamid.io/)
        Keywords: admins
        FieldName: admins
        InputType: list
        ParamFieldName: admins
        DefaultValue: ''
        Special: listfile:./windward-horizon/server/ServerConfig/admin.txt
        EnumValues: {}
    - key: ipv6
      label: Enable IPv6
      category: Windward Horizon
      subcategory: Server
      description: >-
        If set, IPv6 will be enabled for the server, causing it to bind to :: (all IPs). WARNING: This will override the
        server IPv4 address binding otherwise set by AMP for the instance and could cause port conflicts
      keywords: ipv6,binding,network
      input_type: checkbox
      param_field_name: public
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-ipv6 '
      raw:
        DisplayName: Enable IPv6
        Category: Windward Horizon:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, IPv6 will be enabled for the server, causing it to bind to :: (all IPs). WARNING: This will override
          the server IPv4 address binding otherwise set by AMP for the instance and could cause port conflicts
        Keywords: ipv6,binding,network
        FieldName: ipv6
        InputType: checkbox
        ParamFieldName: public
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-ipv6 '
  files: []
environment: {}
startup_variables:
  - key: name
    label: Server Name
    default: AMP Powered Windward Horizon Server
    customer_editable: true
    required: false
    sensitive: false
  - key: public
    label: Make Server Public
    default: '-public '
    customer_editable: true
    required: false
    sensitive: false
  - key: world
    label: World Name
    default: World
    customer_editable: true
    required: false
    sensitive: false
  - key: admins
    label: Server Admins
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ipv6
    label: Enable IPv6
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '2665460'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
