schema: aetherpanel.template/v1
id: garrys-mod
name: Garry's Mod
category: Imported
summary: Garry's Mod Dedicated Server
install:
  method: steamcmd
  app_id: '4020'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    4020/srcds_linux {PlatformArgs} -game garrysmod -console -usercon -nobreakpad -port {ServerPort} -ip
    {ApplicationIPBinding} {insecure}{nohltv}{CustomParameters} {CustomConVars} +tv_port {SourceTVPort} +clientport
    {ClientPort} +sv_logfile 1 {FormattedArgs} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
  - key: sourcetvport
    name: SourceTV Port
    default: 27020
    protocol: udp
    required: true
  - key: clientport
    name: Client Port
    default: 27005
    protocol: udp
    required: true
config_files:
  - path: garrysmod/cfg/server.cfg
    type: text
    editable: true
  - path: garrysmod/lua/autorun/server/resource.lua
    type: text
    editable: true
config_schema:
  fields:
    - key: hostname
      label: Server Name
      category: Garry's Mod
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AMP Powered Garry's Mod Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Garry's Mod:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        ParamFieldName: hostname
        DefaultValue: AMP Powered Garry's Mod Server
        EnumValues: {}
    - key: sv_lan
      label: LAN Server
      category: Garry's Mod
      subcategory: Server
      description: >-
        If enabled, the server will operate as a LAN server: no heartbeat, no authentication, and no non-class C
        addresses
      keywords: lan,local,sv_lan
      input_type: checkbox
      param_field_name: sv_lan
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
        DisplayName: LAN Server
        Category: Garry's Mod:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the server will operate as a LAN server: no heartbeat, no authentication, and no non-class C
          addresses
        Keywords: lan,local,sv_lan
        FieldName: sv_lan
        InputType: checkbox
        ParamFieldName: sv_lan
