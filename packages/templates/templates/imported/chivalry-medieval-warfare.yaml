schema: aetherpanel.template/v1
id: chivalry-medieval-warfare
name: 'Chivalry: Medieval Warfare'
category: Imported
summary: 'Chivalry: Medieval Warfare Dedicated Server'
install:
  method: steamcmd
  app_id: '220070'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} {Map}?steamsockets{modname}{CustomOptions} -Port={GamePort} -AuthPort={AuthPort}
    -QueryPort={QueryPort} -MultiHome={ApplicationIPBinding} -MaxPlayers={MaxUsers} {sdkfileid} -log=gameservers.log
    -seekfreeloadingserver
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: authport
    name: Auth Port
    default: 7778
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: UDKGame/Config/PCServer-UDKGame.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerName
      label: Server Name
      category: Chivalry Medieval Warfare
      subcategory: Server
      description: Sets the name of the server that is displayed in the server list
      keywords: server,name,servername
      input_type: text
      param_field_name: Engine.GameReplicationInfo.ServerName
      default: 'AMP Powered Chivalry: Medieval Warfare Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Chivalry Medieval Warfare:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that is displayed in the server list
        Keywords: server,name,servername
        FieldName: ServerName
        InputType: text
        ParamFieldName: Engine.GameReplicationInfo.ServerName
        DefaultValue: 'AMP Powered Chivalry: Medieval Warfare Server'
        EnumValues: {}
    - key: MessageOfTheDay
      label: Server MOTD
      category: Chivalry Medieval Warfare
      subcategory: Server
      description: Sets the welcome message (MOTD) displayed when players join the server
      keywords: server,motd,message,day,welcome,MessageOfTheDay
      input_type: text
      param_field_name: Engine.GameReplicationInfo.MessageOfTheDay
      default: Welcome to my server!
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
