schema: aetherpanel.template/v1
id: minecraft-bedrock
name: Minecraft Bedrock
category: Imported
summary: Minecraft Bedrock Dedicated Server
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: bedrock_server
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverportv4
    name: Server IPv4 Port
    default: 19132
    protocol: udp
    required: true
  - key: serverportv6
    name: Server IPv6 Port
    default: 19133
    protocol: udp
    required: true
  - key: debuggerport
    name: Debugger Port
    default: 19144
    protocol: udp
    required: true
config_files:
  - path: server.properties
    type: text
    editable: true
config_schema:
  fields:
    - key: server-name
      label: Server Name
      category: Minecraft Bedrock
      subcategory: Server
      description: Sets the name of the server that is shown in the in-game server list. No semi-colons allowed
      keywords: server,name,server-name
      input_type: text
      param_field_name: server-name
      default: AetherNode Minecraft Bedrock Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Minecraft Bedrock:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that is shown in the in-game server list. No semi-colons allowed
        Keywords: server,name,server-name
        FieldName: server-name
        InputType: text
        ParamFieldName: server-name
        DefaultValue: AetherNode Minecraft Bedrock Server
        EnumValues: {}
    - key: gamemode
      label: Game Mode
      category: Minecraft Bedrock
      subcategory: Server
      description: Sets the game mode for new players
      keywords: game,mode,gamemode
      input_type: enum
      param_field_name: gamemode
      default: survival
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        survival: Survival (default)
        creative: Creative
        adventure: Adventure
      raw:
        DisplayName: Game Mode
        Category: Minecraft Bedrock:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the game mode for new players
        Keywords: game,mode,gamemode
        FieldName: gamemode
        InputType: enum
        ParamFieldName: gamemode
        DefaultValue: survival
        EnumValues:
          survival: Survival (default)
          creative: Creative
          adventure: Adventure
    - key: force-gamemode
      label: Force Game Mode
      category: Minecraft Bedrock
      subcategory: Server
      description: >-
        If set, the server will send game mode values to clients other than the one saved during world creation, if
        those values are set in 'server.properties' after world creation
      keywords: force,gamemode,force-gamemode
      input_type: checkbox
      param_field_name: force-gamemode
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Force Game Mode
        Category: Minecraft Bedrock:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, the server will send game mode values to clients other than the one saved during world creation, if
          those values are set in 'server.properties' after world creation
        Keywords: force,gamemode,force-gamemode
        FieldName: force-gamemode
        InputType: checkbox
        ParamFieldName: force-gamemode
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: level-name
      label: Level Name
      category: Minecraft Bedrock
      subcategory: Server
      description: >-
        Sets the name of the level (world) to load, or create if it does not exist. No semi-colons allowed, nor any
        symbols that are illegal for file names. Levels are stored in the 'worlds' directory
      keywords: level,world,name,level-name
      input_type: text
      param_field_name: level-name
      default: Bedrock level
      placeholder: Bedrock level
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Level Name
