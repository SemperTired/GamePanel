schema: aetherpanel.template/v1
id: ark-sa-min
name: 'ARK: Survival Ascended (Minimal)'
category: Imported
summary: 'ARK: Survival Ascended Dedicated Server with Server API option and minimal settings (for Beacon use)'
install:
  method: steamcmd
  app_id: '2430930'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    .proton/proton {PlatformArgs}
    {Map}?listen?Port={GamePort}?RCONEnabled=True?RCONServerGameLogBuffer=600?RCONPort={RCONPort}{CustomOptions}?ServerAdminPassword={RemoteAdminPassword}
    -WinLiveMaxPlayers={MaxUsers}
    {passivemods}{mods}{pconlymods}{Colors}{exclusivejoin}{BattlEye}{usestore}-ServerPlatform={ServerPlatform}
    {UseDynamicConfig}{EnableIdlePlayerKick}{NoHangDetection}{DisableCustomCosmetics}{NoTransferFromFiltering}{NoGameAnalytics}{ForceAllowCaveFlyers}{nodinos}{ForceRespawnDinos}{DisableRailgunPVP}{UseStructureStasisGrid}-culture={culture}
    {EnableCluster}{ServerIP}{CustomFlags} -servergamelog
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 27020
    protocol: tcp
    required: true
config_files:
  - path: ark-sa-minconfig.json
    type: json
    editable: true
  - path: ark-sa-minmetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: Map
      label: Map
      category: ARK SA
      subcategory: Server
      description: Sets the map for the server. If Custom is selected, Custom Map Name must also be set
      keywords: map
      input_type: enum
      param_field_name: Map
      default: TheIsland_WP
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        TheIsland_WP: The Island (default)
        ScorchedEarth_WP: Scorched Earth
        TheCenter_WP: The Center
        Aberration_WP: Aberration
        Extinction_WP: Extinction
        Astraeos_WP: Astraeos
        Ragnarok_WP: Ragnarok
        Valguero_WP: Valguero
        LostColony_WP: Lost Colony
        '{{CustomMap}}': '--Custom--'
      raw:
        DisplayName: Map
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map for the server. If Custom is selected, Custom Map Name must also be set
        Keywords: map
        FieldName: Map
        InputType: enum
        ParamFieldName: Map
        DefaultValue: TheIsland_WP
        EnumValues:
          TheIsland_WP: The Island (default)
          ScorchedEarth_WP: Scorched Earth
          TheCenter_WP: The Center
          Aberration_WP: Aberration
          Extinction_WP: Extinction
          Astraeos_WP: Astraeos
          Ragnarok_WP: Ragnarok
          Valguero_WP: Valguero
          LostColony_WP: Lost Colony
          '{{CustomMap}}': '--Custom--'
    - key: CustomMap
      label: Custom Map Name
      category: ARK SA
      subcategory: Server
      description: >-
        Sets a custom map for the server. "Custom" type must be selected under Map, and the CurseForge Project ID for
        the map included under Mods List
      keywords: custom,map
      input_type: text
      param_field_name: CustomMap
      default: ''
      placeholder: Svartalfheim_WP
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Map Name
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a custom map for the server. "Custom" type must be selected under Map, and the CurseForge Project ID for
          the map included under Mods List
        Keywords: custom,map
        FieldName: CustomMap
        InputType: text
        ParamFieldName: CustomMap
        DefaultValue: ''
        Placeholder: Svartalfheim_WP
        EnumValues: {}
    - key: mods
      label: Use Mods
      category: ARK SA
      subcategory: Server
      description: >-
        If set, enables automatic mod downloading, updating and loading (on server start). Specify the relevant mods
        under Mods List. Don't enable this setting if no mods are specified under Mods List or the server will not start
      keywords: auto,managed,mods
      input_type: checkbox
      param_field_name: mods
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-mods={{modslist}} '
      raw:
        DisplayName: Use Mods
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, enables automatic mod downloading, updating and loading (on server start). Specify the relevant mods
          under Mods List. Don't enable this setting if no mods are specified under Mods List or the server will not
          start
        Keywords: auto,managed,mods
        FieldName: mods
        InputType: checkbox
        ParamFieldName: mods
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-mods={{modslist}} '
    - key: modslist
      label: Mods List
      category: ARK SA
      subcategory: Server
      description: >-
        Comma-separated and ordered list of [CurseForge Project IDs](https://www.curseforge.com/ark-survival-ascended)
        for mods (including events) to install and load on server start (map mods will not load unless also named as a
        "Custom" map under Custom Map Name). Requires Use Mods to be enabled
      keywords: mods,list
      input_type: text
      param_field_name: modslist
      default: ''
      placeholder: 900062,893657
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Mods List
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Comma-separated and ordered list of [CurseForge Project IDs](https://www.curseforge.com/ark-survival-ascended)
          for mods (including events) to install and load on server start (map mods will not load unless also named as a
          "Custom" map under Custom Map Name). Requires Use Mods to be enabled
        Keywords: mods,list
        FieldName: modslist
        InputType: text
        ParamFieldName: modslist
        DefaultValue: ''
        Placeholder: 900062,893657
        EnumValues: {}
    - key: passivemods
      label: Use Passive Mods
      category: ARK SA
      subcategory: Server
      description: >-
        If enabled, this option activates the -passivemods function, allowing specified mods to load their data while
        disabling their functionality (even if the mods are listed under Mods List). Don't enable this setting if no
        mods are specified under Passive Mods List or the server will not start
      keywords: passive,passivemods,mods
      input_type: checkbox
      param_field_name: passivemods
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-passivemods={{passivemodslist}} '
      raw:
        DisplayName: Use Passive Mods
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, this option activates the -passivemods function, allowing specified mods to load their data while
          disabling their functionality (even if the mods are listed under Mods List). Don't enable this setting if no
          mods are specified under Passive Mods List or the server will not start
        Keywords: passive,passivemods,mods
        FieldName: passivemods
        InputType: checkbox
        ParamFieldName: passivemods
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-passivemods={{passivemodslist}} '
    - key: passivemodslist
      label: Passive Mods List
      category: ARK SA
      subcategory: Server
      description: >-
        Comma-separated and ordered list of [CurseForge Project IDs](https://www.curseforge.com/ark-survival-ascended)
        for mods to be loaded in passive mode, disabling their functionality while retaining their data. Requires Use
        Passive Mods to be enabled. When enabled, at least one mod ID must be specified, or the server will not start
      keywords: passive,passivemods,mods,list
      input_type: text
      param_field_name: passivemodslist
      default: ''
      placeholder: '927090'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Passive Mods List
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Comma-separated and ordered list of [CurseForge Project IDs](https://www.curseforge.com/ark-survival-ascended)
          for mods to be loaded in passive mode, disabling their functionality while retaining their data. Requires Use
          Passive Mods to be enabled. When enabled, at least one mod ID must be specified, or the server will not start
        Keywords: passive,passivemods,mods,list
        FieldName: passivemodslist
        InputType: text
        ParamFieldName: passivemodslist
        DefaultValue: ''
        Placeholder: '927090'
        EnumValues: {}
    - key: pconlymods
      label: Enable Steam/PC Mods Only
      category: ARK SA
      subcategory: Server
      description: If set, crossplay mods will be disabled on the server
      keywords: crossplay,pc,steam,mods,pconlymods
      input_type: checkbox
      param_field_name: pconlymods
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-pconlymods '
      raw:
        DisplayName: Enable Steam/PC Mods Only
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, crossplay mods will be disabled on the server
        Keywords: crossplay,pc,steam,mods,pconlymods
        FieldName: pconlymods
        InputType: checkbox
        ParamFieldName: pconlymods
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-pconlymods '
    - key: Colors
      label: Dino Event Colors
      category: ARK SA
      subcategory: Server
      description: If particular event colors are selected, then dinos may spawn with those colors
      keywords: colors,event
      input_type: enum
      param_field_name: Colors
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': None
        '-EasterColors ': Easter Colors
        '-HalloweenColors ': Halloween Colors
        '-OlympicColors ': Olympic Colors
        '-PrideColors ': Pride Colors
        '-ServerUseEventColors ': Current Event Colors
      raw:
        DisplayName: Dino Event Colors
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: If particular event colors are selected, then dinos may spawn with those colors
        Keywords: colors,event
        FieldName: Colors
        InputType: enum
        ParamFieldName: Colors
        DefaultValue: ''
        EnumValues:
          '': None
          '-EasterColors ': Easter Colors
          '-HalloweenColors ': Halloween Colors
          '-OlympicColors ': Olympic Colors
          '-PrideColors ': Pride Colors
          '-ServerUseEventColors ': Current Event Colors
    - key: RCONPassword
      label: RCON/Server Admin Password
      category: ARK SA
      subcategory: Server
      description: >-
        See the Security and Privacy menu for configurable options for the server's RCON password. The RCON password is
        also used in the in-game console for players to access administrator commands (unless they are whitelisted)
      keywords: rcon,password,serveradminpassword
      input_type: hidden
      param_field_name: RCONPassword
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON/Server Admin Password
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          See the Security and Privacy menu for configurable options for the server's RCON password. The RCON password
          is also used in the in-game console for players to access administrator commands (unless they are whitelisted)
        Keywords: rcon,password,serveradminpassword
        FieldName: RCONPassword
        InputType: hidden
        ParamFieldName: RCONPassword
        EnumValues: {}
    - key: exclusivejoin
      label: Enable Player Whitelist
      category: ARK SA
      subcategory: Server
      description: >-
        If set, only players with EOS IDs listed under Whitelisted Players or Whitelisted Players Above Limit can join
        the server
      keywords: player,whitelist,exclusivejoin
      input_type: checkbox
      param_field_name: exclusivejoin
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-exclusivejoin '
      raw:
        DisplayName: Enable Player Whitelist
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, only players with EOS IDs listed under Whitelisted Players or Whitelisted Players Above Limit can join
          the server
        Keywords: player,whitelist,exclusivejoin
        FieldName: exclusivejoin
        InputType: checkbox
        ParamFieldName: exclusivejoin
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-exclusivejoin '
    - key: PlayerWhitelist
      label: Whitelisted Players
      category: ARK SA
      subcategory: Server
      description: >-
        List of EOS IDs for normal whitelisted players. EOS IDs can be found by using the 'whoami' command, by viewing
        another player's character in spectator mode, or by inspecting the server's log files
      keywords: player,whitelist,playersexclusivejoinlist
      input_type: list
      param_field_name: PlayerWhitelist
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      special: listfile:./arksa/2430930/ShooterGame/Binaries/Win64/PlayersExclusiveJoinList.txt
      raw:
        DisplayName: Whitelisted Players
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          List of EOS IDs for normal whitelisted players. EOS IDs can be found by using the 'whoami' command, by viewing
          another player's character in spectator mode, or by inspecting the server's log files
        Keywords: player,whitelist,playersexclusivejoinlist
        FieldName: PlayerWhitelist
        InputType: list
        ParamFieldName: PlayerWhitelist
        DefaultValue: ''
        Special: listfile:./arksa/2430930/ShooterGame/Binaries/Win64/PlayersExclusiveJoinList.txt
        EnumValues: {}
    - key: PlayerWhitelistAboveLimit
      label: Whitelisted Players Above Limit
      category: ARK SA
      subcategory: Server
      description: List of EOS IDs for whitelisted players who can join the server even if the number of player slots is exhausted
      keywords: player,whitelist,above,limit,PlayersJoinNoCheckList
      input_type: list
      param_field_name: PlayerWhitelistAboveLimit
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      special: listfile:./arksa/2430930/ShooterGame/Binaries/Win64/PlayersJoinNoCheckList.txt
      raw:
        DisplayName: Whitelisted Players Above Limit
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          List of EOS IDs for whitelisted players who can join the server even if the number of player slots is
          exhausted
        Keywords: player,whitelist,above,limit,PlayersJoinNoCheckList
        FieldName: PlayerWhitelistAboveLimit
        InputType: list
        ParamFieldName: PlayerWhitelistAboveLimit
        DefaultValue: ''
        Special: listfile:./arksa/2430930/ShooterGame/Binaries/Win64/PlayersJoinNoCheckList.txt
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: ARK SA
      subcategory: Server
      description: >-
        Sets the maximum number of players allowed on the server. May be exceeded as a result of players listed under
        Whitelisted Players Above Limit
      keywords: max,players,limit,maxplayers
      input_type: number
      param_field_name: MaxPlayers
      default: '70'
      placeholder: '70'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the maximum number of players allowed on the server. May be exceeded as a result of players listed under
          Whitelisted Players Above Limit
        Keywords: max,players,limit,maxplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        ParamFieldName: MaxPlayers
        DefaultValue: '70'
        Placeholder: '70'
        Suffix: players
        EnumValues: {}
    - key: BattlEye
      label: Disable BattlEye
      category: ARK SA
      subcategory: Server
      description: If set, BattlEye will be disabled on the server
      keywords: battleye,disable,nobattleye
      input_type: checkbox
      param_field_name: BattlEye
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-NoBattlEye '
      raw:
        DisplayName: Disable BattlEye
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, BattlEye will be disabled on the server
        Keywords: battleye,disable,nobattleye
        FieldName: BattlEye
        InputType: checkbox
        ParamFieldName: BattlEye
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-NoBattlEye '
    - key: ServerPlatform
      label: Client Platform/Crossplay Support
      category: ARK SA
      subcategory: Server
      description: >-
        List (separated by +, such as: XSX+PS5) of the game client platforms supported by the server. 'PC' = Steam/PC,
        'XSX' = Xbox, 'WINGDK' = Microsoft Store/PC, 'PS5' = PlayStation 5, 'ALL' = all platforms. Crossplay will be
        enabled if more than one platform is specified
      keywords: crossplay,platform,pc,xbox,ps5,windows,serverplatform
      input_type: text
      param_field_name: ServerPlatform
      default: ALL
      placeholder: ALL
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Client Platform/Crossplay Support
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          List (separated by +, such as: XSX+PS5) of the game client platforms supported by the server. 'PC' = Steam/PC,
          'XSX' = Xbox, 'WINGDK' = Microsoft Store/PC, 'PS5' = PlayStation 5, 'ALL' = all platforms. Crossplay will be
          enabled if more than one platform is specified
        Keywords: crossplay,platform,pc,xbox,ps5,windows,serverplatform
        FieldName: ServerPlatform
        InputType: text
        ParamFieldName: ServerPlatform
        DefaultValue: ALL
        Placeholder: ALL
        Required: true
        EnumValues: {}
    - key: UseDynamicConfig
      label: Use Dynamic Config
      category: ARK SA
      subcategory: Server
      description: >-
        If set, the server will use a dynamic config. The default dynamic config for the platform will be used if
        'CustomDynamicConfigUrl' is not set in GameUserSettings.ini
      keywords: use,dynamic,config,UseDynamicConfig
      input_type: checkbox
      param_field_name: UseDynamicConfig
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-UseDynamicConfig '
      raw:
        DisplayName: Use Dynamic Config
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, the server will use a dynamic config. The default dynamic config for the platform will be used if
          'CustomDynamicConfigUrl' is not set in GameUserSettings.ini
        Keywords: use,dynamic,config,UseDynamicConfig
        FieldName: UseDynamicConfig
        InputType: checkbox
        ParamFieldName: UseDynamicConfig
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-UseDynamicConfig '
    - key: EnableIdlePlayerKick
      label: Kick Idle Players
      category: ARK SA
      subcategory: Server
      description: >-
        If set, characters that have not moved or interacted within the Kick Idle Players Period will be kicked from the
        server
      keywords: kick,idle,players,enableidleplayerkick
      input_type: checkbox
      param_field_name: EnableIdlePlayerKick
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-EnableIdlePlayerKick '
      raw:
        DisplayName: Kick Idle Players
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, characters that have not moved or interacted within the Kick Idle Players Period will be kicked from
          the server
        Keywords: kick,idle,players,enableidleplayerkick
        FieldName: EnableIdlePlayerKick
        InputType: checkbox
        ParamFieldName: EnableIdlePlayerKick
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-EnableIdlePlayerKick '
    - key: NoHangDetection
      label: Disable Hang Detection
      category: ARK SA
      subcategory: Server
      description: >-
        If set, prevents the server from shutdown if its start-time takes more than 2700 seconds (45 minutes). Useful
        for servers with big saves or very slow machines
      keywords: hang,detection,disabled,NoHangDetection
      input_type: checkbox
      param_field_name: NoHangDetection
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-NoHangDetection '
      raw:
        DisplayName: Disable Hang Detection
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, prevents the server from shutdown if its start-time takes more than 2700 seconds (45 minutes). Useful
          for servers with big saves or very slow machines
        Keywords: hang,detection,disabled,NoHangDetection
        FieldName: NoHangDetection
        InputType: checkbox
        ParamFieldName: NoHangDetection
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-NoHangDetection '
    - key: DisableCustomCosmetics
      label: Disable Custom Cosmetics
      category: ARK SA
      subcategory: Server
      description: >-
        If set, the Custom Cosmetic system will be disabled (allowing players to use and display special mods that
        should only be skins and will be downloaded automatically by the connected clients)
      keywords: disable,custom,cosmetics,mods,skins,DisableCustomCosmetics
      input_type: checkbox
      param_field_name: DisableCustomCosmetics
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-DisableCustomCosmetics '
      raw:
        DisplayName: Disable Custom Cosmetics
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, the Custom Cosmetic system will be disabled (allowing players to use and display special mods that
          should only be skins and will be downloaded automatically by the connected clients)
        Keywords: disable,custom,cosmetics,mods,skins,DisableCustomCosmetics
        FieldName: DisableCustomCosmetics
        InputType: checkbox
        ParamFieldName: DisableCustomCosmetics
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-DisableCustomCosmetics '
    - key: NoTransferFromFiltering
      label: Filter Transfers
      category: ARK SA
      subcategory: Server
      description: >-
        If set, prevents ARK data usage between single player and servers that do not have a Cluster ID set. Even with a
        Cluster ID set, it is suggested to enable this option
      keywords: filter,data,transfer,notransferfromfiltering
      input_type: checkbox
      param_field_name: NoTransferFromFiltering
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-NoTransferFromFiltering '
      raw:
        DisplayName: Filter Transfers
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, prevents ARK data usage between single player and servers that do not have a Cluster ID set. Even with
          a Cluster ID set, it is suggested to enable this option
        Keywords: filter,data,transfer,notransferfromfiltering
        FieldName: NoTransferFromFiltering
        InputType: checkbox
        ParamFieldName: NoTransferFromFiltering
        DefaultValue: ''
