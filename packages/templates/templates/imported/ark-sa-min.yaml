    - key: usestore
      label: Use Unified Save Data
      category: ARK SA
      subcategory: Clusters
      description: >-
        If set, a player's character profile file (.arkprofile) will not be saved separately from the map save (.ark),
        nor its backup. When necessary (such as a character just transferred or a new character has been created), a
        temporary character profile file is created and kept until next world-save. Tribe profiles are stored in a
        different format (.arktributetribe)
      keywords: unified,save,usestore
      input_type: checkbox
      param_field_name: usestore
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '{{converttostore}}-usestore {{BackupTransferPlayerDatas}}'
      raw:
        DisplayName: Use Unified Save Data
        Category: ARK SA:stadia_controller
        Subcategory: Clusters:share:3
        Description: >-
          If set, a player's character profile file (.arkprofile) will not be saved separately from the map save (.ark),
          nor its backup. When necessary (such as a character just transferred or a new character has been created), a
          temporary character profile file is created and kept until next world-save. Tribe profiles are stored in a
          different format (.arktributetribe)
        Keywords: unified,save,usestore
        FieldName: usestore
        InputType: checkbox
        ParamFieldName: usestore
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '{{converttostore}}-usestore {{BackupTransferPlayerDatas}}'
    - key: converttostore
      label: Convert To Unified Save Data
      category: ARK SA
      subcategory: Clusters
      description: >-
        If set, non-stored data (default save behaviour of unofficial and legacy) will be converted to stored data
        (default save behaviour of official non-legacy) at next world-save. It will not delete older character profile
        saves. Requires Use Unified Save Data to be enabled
      keywords: unified,save,usestore,convert,converttostore
      input_type: checkbox
      param_field_name: converttostore
      default: ''
      required: false
