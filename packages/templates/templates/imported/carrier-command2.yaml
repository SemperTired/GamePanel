      label: Save Name
      category: Carrier Command 2
      subcategory: Server
      description: Sets the name of a save in the 'saved_games' directory to load when the server is started
      keywords: save,game,save_name
      input_type: text
      param_field_name: /data/@save_name
      default: ''
      required: false
      sensitive: false
