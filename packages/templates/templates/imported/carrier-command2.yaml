    - key: active_mod_folders
      label: Active Mods
      category: Carrier Command 2
      subcategory: Server
      description: >-
        The ['active_mod_folders' section](https://geometa.co.uk/wiki/carrier_command_2/view/dedicated_servers) of
        'server_config.xml' can be used to enable mods on the server. Example path: mods/2824746567. Mods can be
        downloaded via "Steam workshop items" under the Updates menu
