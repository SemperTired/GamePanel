schema: aetherpanel.template/v1
id: carrier-command2
name: Carrier Command 2
category: Imported
summary: Carrier Command 2 Dedicated Server
install:
  method: steamcmd
  app_id: '1489630'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/wine {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 25565
    protocol: udp
    required: true
  - key: steamport
    name: Steam Port
    default: 25566
    protocol: udp
    required: true
  - key: reservedport
    name: Reserved Port
    default: 25567
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 25568
    protocol: udp
    required: true
config_files:
  - path: server_config.xml
    type: xml
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Port
      category: Carrier Command 2
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: /data/@port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
