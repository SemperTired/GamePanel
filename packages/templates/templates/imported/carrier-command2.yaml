    - key: island_count
      label: Island Count
      category: Carrier Command 2
      subcategory: Server
      description: >-
        Sets the number of islands to spawn on the server. Warning: more than 64 will cause the client to crash when
        zooming in on the map
      keywords: island,count,island_count
      input_type: number
      param_field_name: /data/@island_count
