    - key: tombstoneMode
      label: Tombstone Mode
      category: Enshrouded
      subcategory: Gameplay
      description: >-
        Sets what happens to backpack items when players die. Lost items are stored in a tombstone and can be recovered
        there
      keywords: keep,lose,items,tombstone,tombstoneMode
      input_type: enum
      param_field_name: $.gameSettings.tombstoneMode
      default: AddBackpackMaterials
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        AddBackpackMaterials: Lose backpack materials (default)
        Everything: Lose everything
        NoTombstone: Keep everything (no tombstone)
      raw:
        DisplayName: Tombstone Mode
        Category: Enshrouded:stadia_controller
        Subcategory: Gameplay:joystick:2
        Description: >-
          Sets what happens to backpack items when players die. Lost items are stored in a tombstone and can be
          recovered there
