schema: aetherpanel.template/v1
id: enshrouded
name: Enshrouded
category: Imported
summary: Enshrouded Dedicated Server
install:
  method: steamcmd
  app_id: '2278520'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: .proton/proton {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: queryport
    name: Query Port
    default: 15637
    protocol: both
    required: true
config_files:
  - path: enshrouded_server.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $QueryPort
      label: Query Port
      category: Enshrouded
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.queryPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Query Port
        Category: Enshrouded:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $QueryPort
        InputType: number
        Hidden: true
        ParamFieldName: $.queryPort
        EnumValues: {}
