    - key: gameSettingsPreset
      label: Game Settings Preset
      category: Enshrouded
      subcategory: Gameplay
      description: >-
        Sets the difficulty setting for the game. If "Custom" is selected, the following individual gameplay settings
        can be configured. Otherwise the preset determines the gameplay settings
      keywords: settings,preset,gameSettingsPreset
      input_type: enum
      param_field_name: $.gameSettingsPreset
      default: Default
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        Default: Default (for first-time players)
        Relaxed: Relaxed (for base-building and light-hearted adventuring)
        Hard: Hard (for a tougher combat experience)
        Survival: Survival (for some punishment)
        Custom: Custom
      raw:
        DisplayName: Game Settings Preset
        Category: Enshrouded:stadia_controller
        Subcategory: Gameplay:joystick:2
