    - key: playerBodyHeatFactor
      label: Player Body Heat Factor
      category: Enshrouded
      subcategory: Gameplay
      description: >-
        Scales the maximum body heat for players by the set factor. The higher the factor the longer the player can stay
        in very cold areas before hypothermia sets in
      keywords: player,body,heat,factor,playerBodyHeatFactor
