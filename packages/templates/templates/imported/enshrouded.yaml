    - key: banlist
      label: Banned Players
      category: Enshrouded
      subcategory: Gameplay
      description: >-
        Players can be permanently banned from the server by accessing the banlist in-game via the Social-tab and adding
        them there. The banlist can also be edited directly by configuring 'bannedAccounts' in enshrouded_server.json -
        see enshrouded_server_readme.txt for format details
      keywords: banned,players,banlist,bannedAccounts
      input_type: hidden
      param_field_name: banlist
      default: ''
      required: false
