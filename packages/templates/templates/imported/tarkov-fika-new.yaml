schema: aetherpanel.template/v1
id: tarkov-fika-new
name: Tarkov (Fika Mod) 4.0.0+
category: Imported
summary: Tarkov Dedicated Server using SPT v4.0.0+ and the Fika Server Mod
install:
  method: custom
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: server/SPT/SPT.Server.Linux {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: SPT Server Port
    default: 6969
    protocol: tcp
    required: true
  - key: natport
    name: NAT Punch Server Port
    default: 6970
    protocol: udp
    required: true
config_files:
  - path: SPT/SPT_Data/configs/http.json
    type: json
    editable: true
  - path: SPT/user/mods/fika-server/assets/configs/fika.jsonc
    type: json
    editable: true
