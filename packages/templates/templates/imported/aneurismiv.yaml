    - key: ServerBranch
      label: Server Branch
      category: Updates
      subcategory: Steam Downloads
      description: Sets the server branch to install. Update the server after switching branches
      keywords: server,branch,depot
      input_type: enum
      param_field_name: ServerBranch
      default: public
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        public: Public (default)
        preview: Preview
      raw:
        DisplayName: Server Branch
        Category: Updates
        Subcategory: Steam Downloads:download
        Description: Sets the server branch to install. Update the server after switching branches
        Keywords: server,branch,depot
        FieldName: ServerBranch
        InputType: enum
        ParamFieldName: ServerBranch
        DefaultValue: public
        EnumValues:
          public: Public (default)
          preview: Preview
  files:
    - path: unity3d/Vellocet/ANEURISM IV/aniv.cfg
      type: kvp
      format: '{0} "{1}"'
      subsections: []
      raw:
        ConfigFile: unity3d/Vellocet/ANEURISM IV/aniv.cfg
        ConfigType: kvp
        AutoMap: true
        Importable: true
        ConfigFormat: '{0} "{1}"'
        ConfigFormatRegex: ^(?<key>.+?)\s+"?(?<value>.*?)"?$
    - path: unity3d/Vellocet/ANEURISM IV/motd.txt
      type: kvp
      format: '{0}{1}'
      subsections:
        - heading: $root
          setting_mappings:
            '': motd
      raw:
        ConfigFile: unity3d/Vellocet/ANEURISM IV/motd.txt
        ConfigType: kvp
        ConfigFormat: '{0}{1}'
        Subsections:
          - Heading: $root
            SettingMappings:
              '': motd
