      subcategory: Server
      description: Sets the loot rate per player
      keywords: loot,rate,lootRate
      input_type: number
      param_field_name: lootRate
      default: '3'
      placeholder: '3'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
