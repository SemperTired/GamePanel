schema: aetherpanel.template/v1
id: aneurismiv
name: ANEURISM IV
category: Imported
summary: ANEURISM IV Dedicated Server
install:
  method: steamcmd
  app_id: '2832030'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    2832030/aniv_server.x86_64 {PlatformArgs} {CustomArgs} -gameport {GamePort} -steamport {SteamPort} -queryport
    {QueryPort} {FormattedArgs} -timestamps
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: steamport
    name: Steam Port
    default: 7778
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 7779
    protocol: udp
    required: true
config_files:
  - path: unity3d/Vellocet/ANEURISM IV/aniv.cfg
    type: text
    editable: true
  - path: unity3d/Vellocet/ANEURISM IV/motd.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: rebootTime
      label: Disable Reboot
      category: ANEURISM IV
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: rebootTime
      default: none
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Disable Reboot
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: rebootTime
        InputType: text
        Hidden: true
        ParamFieldName: rebootTime
        DefaultValue: none
        EnumValues: {}
    - key: maintenanceTime
      label: Disable Maintenance
      category: ANEURISM IV
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: maintenanceTime
      default: 'null'
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Disable Maintenance
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: maintenanceTime
        InputType: text
        Hidden: true
        ParamFieldName: maintenanceTime
        DefaultValue: 'null'
        EnumValues: {}
    - key: serverName
      label: Server Name
      category: ANEURISM IV
      subcategory: Server
      description: Sets the server name displayed in the server browser, assuming Advertise Server is enabled
      keywords: server,name,serverName
      input_type: text
      param_field_name: serverName
      default: AetherNode ANEURISM IV Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server name displayed in the server browser, assuming Advertise Server is enabled
        Keywords: server,name,serverName
        FieldName: serverName
        InputType: text
        ParamFieldName: serverName
        DefaultValue: AetherNode ANEURISM IV Server
        EnumValues: {}
    - key: motd
      label: Server MOTD
      category: ANEURISM IV
      subcategory: Server
      description: Sets the message of the day (MOTD) displayed to joining players
      keywords: message,day,motd
      input_type: Textarea
      param_field_name: motd
      default: |-
        <b>Welcome to my cool server</b>
        Please go to the <color=green>next page</color> to view the rules.
        <page>
        <b>Rules</b>
        1. Be cool
        2. Be nice
        3. Have fun
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server MOTD
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the message of the day (MOTD) displayed to joining players
        Keywords: message,day,motd
        FieldName: motd
        InputType: Textarea
        ParamFieldName: motd
        DefaultValue: |-
          <b>Welcome to my cool server</b>
          Please go to the <color=green>next page</color> to view the rules.
          <page>
          <b>Rules</b>
          1. Be cool
          2. Be nice
          3. Have fun
        EnumValues: {}
    - key: advertiseServer
      label: Advertise Server
      category: ANEURISM IV
      subcategory: Server
      description: If set, the server will be displayed in the server browser
      keywords: enable,advertise,visibility,advertiseServer
      input_type: checkbox
      param_field_name: advertiseServer
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
        DisplayName: Advertise Server
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, the server will be displayed in the server browser
        Keywords: enable,advertise,visibility,advertiseServer
        FieldName: advertiseServer
        InputType: checkbox
        ParamFieldName: advertiseServer
        DefaultValue: '1'
        EnumValues:
          'False': '0'
          'True': '1'
    - key: map
      label: Initial Map
      category: ANEURISM IV
      subcategory: Server
      description: Sets the initial map to load on the server
      keywords: map
      input_type: enum
      param_field_name: map
      default: aneurismiv
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        aneurismiv: Nightmare (default)
        misery: Misery
      raw:
        DisplayName: Initial Map
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the initial map to load on the server
        Keywords: map
        FieldName: map
        InputType: enum
        ParamFieldName: map
        DefaultValue: aneurismiv
        IncludeInCommandLine: true
        Required: true
        EnumValues:
          aneurismiv: Nightmare (default)
          misery: Misery
    - key: password
      label: Server Password
      category: ANEURISM IV
      subcategory: Server
      description: Sets the password for players to connect to the server. Default is no password
      keywords: password
      input_type: password
      param_field_name: password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password for players to connect to the server. Default is no password
        Keywords: password
        FieldName: password
        InputType: password
        ParamFieldName: password
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: ANEURISM IV
      subcategory: Server
      description: Sets the maximum number of players allowed on the server at one time
      keywords: max,maximum,players,limit,maxplayers
      input_type: number
      param_field_name: maxplayers
      default: '50'
      placeholder: '50'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players allowed on the server at one time
        Keywords: max,maximum,players,limit,maxplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        ParamFieldName: maxplayers
        IncludeInCommandLine: true
        DefaultValue: '50'
        Placeholder: '50'
        Suffix: players
        EnumValues: {}
    - key: tickrate
      label: Tick Rate
      category: ANEURISM IV
      subcategory: Server
      description: Sets the tick rate of the server
      keywords: tick,rate,tickrate
      input_type: number
      param_field_name: tickrate
      default: '60'
      placeholder: '60'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: tps
      enum_values: {}
      raw:
        DisplayName: Tick Rate
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the tick rate of the server
        Keywords: tick,rate,tickrate
        FieldName: tickrate
        InputType: number
        MinValue: '1'
        ParamFieldName: tickrate
        IncludeInCommandLine: true
        DefaultValue: '60'
        Placeholder: '60'
        Suffix: tps
        EnumValues: {}
    - key: region
      label: Server Region
      category: ANEURISM IV
      subcategory: Server
      description: >-
        Sets a two-letter ISO code for the server region. Sets the corresponding flag icon next to the server name in
        the server browser
      keywords: server,region
      input_type: text
      param_field_name: region
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Region
        Category: ANEURISM IV:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a two-letter ISO code for the server region. Sets the corresponding flag icon next to the server name in
          the server browser
        Keywords: server,region
        FieldName: region
        InputType: text
        ParamFieldName: region
        DefaultValue: ''
        EnumValues: {}
    - key: enableReports
      label: Enable Reporting
      category: ANEURISM IV
      subcategory: Server
      description: If set, the server's reporting system will be enabled
      keywords: enable,reports,reporting,enableReports
      input_type: checkbox
      param_field_name: enableReports
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
