schema: aetherpanel.template/v1
id: insurgencysandstorm
name: Insurgency Sandstorm
category: Imported
summary: Insurgency Sandstorm Dedicated Server
install:
  method: steamcmd
  app_id: '581330'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    581330/Insurgency/Binaries/Linux/InsurgencyServer-Linux-Shipping
    {Map}?Scenario="{Scenario}"?Lighting="{Lighting}"?Game="{Game}"?Hostname="{Hostname}"?MaxPlayers="{MaxUsers}"?password="{password}"
    -Port={ApplicationPort1} -QueryPort={ApplicationPort2} -Rcon -RconPassword={RemoteAdminPassword}
    -RconListenPort={RemoteAdminPort} -log -GameStats -GameStatsToken={GameStatsToken} -GSLTToken={GSLTToken}
    {Mods_enabled} {EnableCheats}{FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Server Port
    default: 27102
    protocol: udp
    required: true
  - key: applicationport2
    name: Query Port
    default: 27131
    protocol: udp
    required: true
  - key: remoteadminport
    name: RCON Port
    default: 27015
    protocol: tcp
    required: true
config_files:
  - path: Insurgency/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
  - path: Insurgency/Saved/Config/LinuxServer/Game.ini
    type: ini
    editable: true
  - path: Insurgency/Config/Server/Motd.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: Map
      label: Starting Map
      category: Insurgency Sandstorm
      subcategory: Server
      description: Set the server's starting map. Not all scenarios work with all maps.
      keywords: Map
      input_type: enum
      param_field_name: Map
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: true
      enum_values:
        '': None/Random
        Bab: Bab
        Canyon: Crossing (Canyon)
        Citadel: Citadel
        Farmhouse: Farmhouse
        Gap: Gap
        Town: Hideout (Town)
        Sinjar: Hillside (Sinjar)
        Ministry: Ministry
        Compound: Outskirts (Compound)
        OilField: Refinery (Oilfield)
        PowerPlant: PowerPlant
        Precinct: Precinct
        Mountain: Summit (Mountain)
        Tell: Tell
        Buhriz: Tideway (Buhriz)
      raw:
        DisplayName: Starting Map
        Category: Insurgency Sandstorm:stadia_controller
        Subcategory: Server:dns:1
        Description: Set the server's starting map. Not all scenarios work with all maps.
        Keywords: Map
