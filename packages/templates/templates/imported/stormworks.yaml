        ParamFieldName: /server_data/@settings_menu
        IncludeInCommandLine: false
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: settings_menu_lock
      label: Lock Settings Menu
      category: Stormworks
      subcategory: World Creation
      description: >-
        If set, only admins can access the custom settings menu in-game (assuming it is enabled). Otherwise, all players
        will be able to access the menu if it is enabled.
      keywords: settings,menu,settingsmenu,lock,menulock,settings_menu_lock
