    - key: settings_menu
      label: Enable Settings Menu
      category: Stormworks
      subcategory: World Creation
      description: >-
        If set, enables the custom settings menu in-game (available only for admins if Lock Settings Menu is enabled).
        Otherwise, make sure to set all of the settings under the "Stormworks - Gameplay" menu since you won't be able
        to change them in-game.
      keywords: settings,menu,settingsmenu,lock,menulock,settings_menu
      input_type: checkbox
      param_field_name: /server_data/@settings_menu
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Settings Menu
        Category: Stormworks:stadia_controller
