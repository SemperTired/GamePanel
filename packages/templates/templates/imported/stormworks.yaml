schema: aetherpanel.template/v1
id: stormworks
name: Stormworks
category: Imported
summary: Stormworks Dedicated Server
install:
  method: steamcmd
  app_id: '573090'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} +server_dir "./" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 25564
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 25565
    protocol: udp
    required: true
config_files:
  - path: server_config.xml
    type: xml
    editable: true
config_schema:
  fields:
    - key: GeneralSettings
      label: General Settings
      category: Stormworks
      subcategory: General
      description: These settings are for setting up the Stormworks server. They can be changed after world creation.
      keywords: ''
      input_type: hidden
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: General Settings
        Category: Stormworks:stadia_controller
        Subcategory: General:settings:1
        Description: These settings are for setting up the Stormworks server. They can be changed after world creation.
        Keywords: ''
        FieldName: GeneralSettings
        InputType: hidden
        IsFlagArgument: false
        ParamFieldName: ''
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: admins
      label: Primary Admin
      category: Stormworks
      subcategory: General
      description: >-
        Sets the [Steam64 ID](https://steamid.io/) of the primary (first) admin on the server. Other admins (as well as
        authorized users and banned users) can be added in-game. See the [Stormworks
        Guide](https://discourse.cubecoders.com/docs?topic=5782?utm_source=ampcreate&utm_content=stormworks) for further
        information.
      keywords: admin,whitelist,blacklist,white,black,list,auth,authorized
      input_type: text
      param_field_name: /server_data/admins/id[1]/@value
      default: ''
      placeholder: '9087654321234567'
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Primary Admin
        Category: Stormworks:stadia_controller
        Subcategory: General:settings:1
        Description: >-
          Sets the [Steam64 ID](https://steamid.io/) of the primary (first) admin on the server. Other admins (as well
          as authorized users and banned users) can be added in-game. See the [Stormworks
          Guide](https://discourse.cubecoders.com/docs?topic=5782?utm_source=ampcreate&utm_content=stormworks) for
          further information.
        Keywords: admin,whitelist,blacklist,white,black,list,auth,authorized
        FieldName: admins
        InputType: text
        IsFlagArgument: false
        ParamFieldName: /server_data/admins/id[1]/@value
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: '9087654321234567'
        EnumValues: {}
    - key: Commands
      label: Player Permissions
      category: Stormworks
      subcategory: General
      description: >-
        Player permissions (and whitelisted players) can be set using in-game commands. See the [Stormworks
        Guide](https://discourse.cubecoders.com/docs?topic=5782?utm_source=ampcreate&utm_content=stormworks) for further
        information.
      keywords: whitelist,blacklist,white,black,list,auth,authorized,commands
      input_type: hidden
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
