schema: aetherpanel.template/v1
id: space-engineers-torch
name: Space Engineers (Torch)
category: Imported
summary: Space Engineers Dedicated Server with Torch API
install:
  method: steamcmd
  app_id: '298740'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} -instancename Server -instancepath "{FullBaseDir}servers" -noupdate -autostart
    -nogui -plugins 5c14d8ea-7032-4db1-a2e6-9134ef6cb8d9 {plugins} -console {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Server Port
    default: 27016
    protocol: udp
    required: true
  - key: applicationport2
    name: Steam Port
    default: 8766
    protocol: udp
    required: true
  - key: remoteadminport
    name: Remote API Port
    default: 8777
    protocol: both
    required: true
config_files:
  - path: servers/SpaceEngineers-Dedicated.cfg
    type: xml
    editable: true
  - path: servers/Saves/{{WorldName}}/Sandbox_config.sbc
    type: xml
    editable: true
  - path: Torch.cfg
    type: xml
    editable: true
