schema: aetherpanel.template/v1
id: subnautica2
name: Subnautica (Nitrox Mod)
category: Imported
summary: Nitrox Multiplayer Mod for Subnautica
install:
  method: steamcmd
  app_id: '264710'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    264710/Nitrox/Nitrox.Server.Subnautica {PlatformArgs} --data-path "{FullBaseDir}NitroxData" --game-path
    "{ClientFilesLocationMode}" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 11000
    protocol: udp
    required: true
config_files:
  - path: NitroxData/saves/{{save}}/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: Subnautica
      subcategory: Server
