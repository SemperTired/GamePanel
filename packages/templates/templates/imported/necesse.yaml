schema: aetherpanel.template/v1
id: necesse
name: Necesse
category: Imported
summary: >-
  Necesse is a top-down sandbox action-adventure game in a procedurally generated world. Progress your character's gear
  and settlement through fighting, mining, exploring, crafting, trading and more!
install:
  method: steamcmd
  app_id: '1169370'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 1169370/jre/bin/java -jar Server.jar -nogui -localdir -port {GamePort} -ip {ApplicationIPBinding} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 14159
    protocol: udp
    required: true
config_files:
  - path: cfg/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Game Port
      category: Necesse
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        FieldName: $GamePort
        InputType: number
        ParamFieldName: port
        Hidden: true
        EnumValues: {}
    - key: world
      label: World Name
      category: Necesse
      subcategory: Server
      description: Sets the world file to load (or create if it does not exist) at startup. Recommended to be a single word
      keywords: world,name
      input_type: text
      param_field_name: world
      default: world
      placeholder: world
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Name
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the world file to load (or create if it does not exist) at startup. Recommended to be a single word
        Keywords: world,name
        FieldName: world
        InputType: text
        ParamFieldName: world
        IncludeInCommandLine: true
        DefaultValue: world
        Placeholder: world
        Required: true
        EnumValues: {}
    - key: motd
      label: MOTD
      category: Necesse
      subcategory: Server
      description: Sets the message of the day that is displayed when players join. Use \n for a new line
      keywords: motd,message,day
      input_type: text
      param_field_name: motd
      default: Welcome to Necesse
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: MOTD
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the message of the day that is displayed when players join. Use \n for a new line
        Keywords: motd,message,day
        FieldName: motd
        InputType: text
        ParamFieldName: motd
        DefaultValue: Welcome to Necesse
        EnumValues: {}
    - key: password
      label: Server Password
      category: Necesse
      subcategory: Server
      description: Sets the password required to join the server. Empty = no password
      keywords: password
      input_type: password
      param_field_name: password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password required to join the server. Empty = no password
        Keywords: password
        FieldName: password
        InputType: password
        ParamFieldName: password
        DefaultValue: ''
        EnumValues: {}
    - key: owner
      label: Owner Name
      category: Necesse
      subcategory: Server
      description: Sets the name of a connecting player who will get owner permissions
      keywords: owner,name,permissions
      input_type: text
      param_field_name: owner
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Owner Name
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of a connecting player who will get owner permissions
        Keywords: owner,name,permissions
        FieldName: owner
        InputType: text
        ParamFieldName: owner
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Necesse
      subcategory: Server
      description: Sets the maximum number of players allowed to join the server at one time
      keywords: player,maximum,max,limit,slots
      input_type: number
      param_field_name: slots
      default: '10'
      placeholder: '10'
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      max: 250
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players allowed to join the server at one time
        Keywords: player,maximum,max,limit,slots
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        MaxValue: '250'
        ParamFieldName: slots
        DefaultValue: '10'
        Placeholder: '10'
        Suffix: players
        Required: true
        EnumValues: {}
    - key: pauseWhenEmpty
      label: Pause When Empty
      category: Necesse
      subcategory: Server
      description: If set, the server will pause when there are no connected players
      keywords: server,pause,empty,pauseWhenEmpty
      input_type: checkbox
      param_field_name: pauseWhenEmpty
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Pause When Empty
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, the server will pause when there are no connected players
        Keywords: server,pause,empty,pauseWhenEmpty
        FieldName: pauseWhenEmpty
        InputType: checkbox
        ParamFieldName: pauseWhenEmpty
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: mods
      label: Mods
      category: Necesse
      subcategory: Server
      description: >-
        Mods can be installed via "Steam workshop items" under the Updates menu. Update the server to download the mods
        to the 'workshop' directory. Then copy each relevant jar file to the 'mods' directory to load them on server
        start
      keywords: mods,workshop
      input_type: hidden
      param_field_name: mods
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Mods
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Mods can be installed via "Steam workshop items" under the Updates menu. Update the server to download the
          mods to the 'workshop' directory. Then copy each relevant jar file to the 'mods' directory to load them on
          server start
        Keywords: mods,workshop
        FieldName: mods
        InputType: hidden
        ParamFieldName: mods
        EnumValues: {}
    - key: language
      label: Language
      category: Necesse
      subcategory: Server
      description: >-
        Sets the language of the server. Only used for occasional messages in the logs. Must be a valid two-letter [ISO
        639-1 language code](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)
      keywords: language,server
      input_type: text
      param_field_name: language
      default: en
      placeholder: en
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Language
        Category: Necesse:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the language of the server. Only used for occasional messages in the logs. Must be a valid two-letter
          [ISO 639-1 language code](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)
        Keywords: language,server
        FieldName: language
        InputType: text
        ParamFieldName: language
        DefaultValue: en
        Placeholder: en
        EnumValues: {}
    - key: giveClientsPower
      label: Give Clients Power
      category: Necesse
      subcategory: Gameplay
      description: If set, clients will have much more power over what hits them, their position etc
      keywords: give,client,power,giveClientsPower
      input_type: checkbox
      param_field_name: giveClientsPower
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Give Clients Power
        Category: Necesse:stadia_controller
        Subcategory: Gameplay:joystick:2
        Description: If set, clients will have much more power over what hits them, their position etc
        Keywords: give,client,power,giveClientsPower
        FieldName: giveClientsPower
        InputType: checkbox
        ParamFieldName: giveClientsPower
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: maxClientLatencySeconds
      label: Maximum Client Latency
      category: Necesse
      subcategory: Gameplay
      description: Sets the maximum client latency allowed
      keywords: maxClientLatencySeconds,maximum,max,client,latency
      input_type: number
      param_field_name: maxClientLatencySeconds
      default: '30'
      placeholder: '30'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      enum_values: {}
      raw:
        DisplayName: Maximum Client Latency
        Category: Necesse:stadia_controller
        Subcategory: Gameplay:joystick:2
        Description: Sets the maximum client latency allowed
        Keywords: maxClientLatencySeconds,maximum,max,client,latency
        FieldName: maxClientLatencySeconds
