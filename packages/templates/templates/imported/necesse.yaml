        Placeholder: '30'
        EnumValues: {}
    - key: unloadLevelsCooldown
      label: Unload Levels Cooldown
      category: Necesse
      subcategory: Gameplay
      description: Sets the time that a level will stay loaded after the last player has left it
      keywords: unloadLevelsCooldown,unload,levels,cooldown
      input_type: number
      param_field_name: unloadLevelsCooldown
      default: '30'
      placeholder: '30'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: Unload Levels Cooldown
        Category: Necesse:stadia_controller
        Subcategory: Gameplay:joystick:2
        Description: Sets the time that a level will stay loaded after the last player has left it
        Keywords: unloadLevelsCooldown,unload,levels,cooldown
        FieldName: unloadLevelsCooldown
        InputType: number
        ParamFieldName: unloadLevelsCooldown
        DefaultValue: '30'
        Placeholder: '30'
        Suffix: seconds
        EnumValues: {}
    - key: worldBorderSize
      label: World Border Size
      category: Necesse
      subcategory: Gameplay
      description: Sets the maximum distance from spawn that players can travel. -1 = no border
      keywords: worldBorderSize,world,size,travel,border
      input_type: number
      param_field_name: worldBorderSize
      default: '-1'
      placeholder: '-1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: -1
      enum_values: {}
      raw:
        DisplayName: World Border Size
        Category: Necesse:stadia_controller
        Subcategory: Gameplay:joystick:2
        Description: Sets the maximum distance from spawn that players can travel. -1 = no border
