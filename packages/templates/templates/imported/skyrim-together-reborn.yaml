      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Allow SKSE
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, clients will be allowed to use SKSE
        Keywords: mod,policy,skse,ballowskse
        FieldName: bAllowSKSE
        InputType: checkbox
        ParamFieldName: ModPolicy.bAllowSKSE
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: bEnableModCheck
      label: Enable Mod Check
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        If set, enables the [mod policy
        feature](https://wiki.tiltedphoques.com/tilted-online/guides/server-guide/linux-setup/explaining-benablemodcheck),
        requiring all clients to have the same mods loaded in the same order. To use this, set the mod load order in
        SkyrimTogetherReborn/Data/loadorder.txt
      keywords: mod,policy,benablemodcheck
      input_type: checkbox
      param_field_name: ModPolicy.bEnableModCheck
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Mod Check
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, enables the [mod policy
          feature](https://wiki.tiltedphoques.com/tilted-online/guides/server-guide/linux-setup/explaining-benablemodcheck),
          requiring all clients to have the same mods loaded in the same order. To use this, set the mod load order in
          SkyrimTogetherReborn/Data/loadorder.txt
        Keywords: mod,policy,benablemodcheck
        FieldName: bEnableModCheck
        InputType: checkbox
        ParamFieldName: ModPolicy.bEnableModCheck
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: bPremiumMode
      label: Enable Premium Mode
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        If enabled, the server will run at a higher tickrate (60 instead of 30). Most networks should be able to run a
        server with this option enabled
      keywords: premium,tick,rate,bpremiummode
      input_type: checkbox
      param_field_name: GameServer.bPremiumMode
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Premium Mode
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the server will run at a higher tickrate (60 instead of 30). Most networks should be able to run a
