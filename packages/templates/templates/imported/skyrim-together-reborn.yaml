    - key: sLogLevel
      label: Log Level
      category: Skyrim Together Reborn
      subcategory: Server
      description: Sets the log level for the server console. Currently unused
      keywords: log,level,sloglevel
      input_type: enum
      param_field_name: general.sLogLevel
      default: info
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        info: Display all logged information (default)
        warn: Display warnings and critical information only
        error: Display critical information only
      raw:
        DisplayName: Log Level
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the log level for the server console. Currently unused
        Keywords: log,level,sloglevel
        FieldName: sLogLevel
        InputType: enum
        ParamFieldName: general.sLogLevel
        DefaultValue: info
        EnumValues:
          info: Display all logged information (default)
          warn: Display warnings and critical information only
          error: Display critical information only
  files:
    - path: SkyrimTogetherReborn/config/STServer.ini
      type: ini
      subsections: []
      raw:
        ConfigFile: SkyrimTogetherReborn/config/STServer.ini
        AutoMap: true
        ConfigType: ini
environment: {}
