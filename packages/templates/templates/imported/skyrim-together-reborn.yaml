        Keywords: item,drops,benableitemdrops
        FieldName: bEnableItemDrops
        InputType: checkbox
        ParamFieldName: Gameplay.bEnableItemDrops
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: bEnableXpSync
      label: Enable XP Sync
      category: Skyrim Together Reborn
      subcategory: Server
      description: If set, the XP sync system will be enabled
      keywords: xp,sync,benablexpsync
      input_type: checkbox
      param_field_name: Gameplay.bEnableXpSync
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable XP Sync
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, the XP sync system will be enabled
        Keywords: xp,sync,benablexpsync
        FieldName: bEnableXpSync
        InputType: checkbox
        ParamFieldName: Gameplay.bEnableXpSync
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: bEnableDeathSystem
      label: Enable Death System
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        If set, the custom death system will be enabled. Only disable this if you know what you're doing, and if you
        have a suitable death mod that replaces the mechanics. Reloading old saves every time you die will cause issues
      keywords: death,benabledeathsystem
      input_type: checkbox
      param_field_name: Gameplay.bEnableDeathSystem
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Death System
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, the custom death system will be enabled. Only disable this if you know what you're doing, and if you
          have a suitable death mod that replaces the mechanics. Reloading old saves every time you die will cause
          issues
        Keywords: death,benabledeathsystem
        FieldName: bEnableDeathSystem
        InputType: checkbox
        ParamFieldName: Gameplay.bEnableDeathSystem
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: bSyncPlayerHomes
      label: Sync Player Homes
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        If enabled, chests in player homes will be synced. This option is disabled by default to allow players to use
        their home chests for long term storage. Beware however that long term storage is not consistent in STR
      keywords: home,bsyncplayerhomes
      input_type: checkbox
      param_field_name: Gameplay.bSyncPlayerHomes
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Sync Player Homes
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, chests in player homes will be synced. This option is disabled by default to allow players to use
          their home chests for long term storage. Beware however that long term storage is not consistent in STR
        Keywords: home,bsyncplayerhomes
        FieldName: bSyncPlayerHomes
        InputType: checkbox
        ParamFieldName: Gameplay.bSyncPlayerHomes
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: bEnableGreetings
      label: Enable Greetings
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        If enabled, when a player walks close to an NPC, the NPC will start talking to the player with random dialogue.
        Enabling this setting can be annoying with dialogue sync implemented
      keywords: greetings,npc,dialogue,benablegreetings
      input_type: checkbox
      param_field_name: Gameplay.bEnableGreetings
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Greetings
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, when a player walks close to an NPC, the NPC will start talking to the player with random
          dialogue. Enabling this setting can be annoying with dialogue sync implemented
        Keywords: greetings,npc,dialogue,benablegreetings
        FieldName: bEnableGreetings
        InputType: checkbox
        ParamFieldName: Gameplay.bEnableGreetings
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: bAllowMO2
      label: Allow MO2
      category: Skyrim Together Reborn
      subcategory: Server
      description: If enabled, clients will be allowed to use Mod Organizer 2
      keywords: mod,policy,organizer,mo2,ballowmo2
      input_type: checkbox
      param_field_name: ModPolicy.bAllowMO2
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Allow MO2
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, clients will be allowed to use Mod Organizer 2
        Keywords: mod,policy,organizer,mo2,ballowmo2
        FieldName: bAllowMO2
        InputType: checkbox
        ParamFieldName: ModPolicy.bAllowMO2
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
