        InputType: number
        MinValue: '0'
        MaxValue: '1'
        ParamFieldName: Gameplay.fGoldLossFactor
        DefaultValue: '0'
        Placeholder: '0'
        EnumValues: {}
    - key: bEnableItemDrops
      label: Enable Item Drops
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        If set, dropping items in the world will be synced. Recommended to be disabled, as otherwise server crashes can
        occur
      keywords: item,drops,benableitemdrops
      input_type: checkbox
      param_field_name: Gameplay.bEnableItemDrops
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Item Drops
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, dropping items in the world will be synced. Recommended to be disabled, as otherwise server crashes
