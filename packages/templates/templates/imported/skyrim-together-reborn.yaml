    default: AetherNode Skyrim Together Reborn Server
    customer_editable: true
    required: false
    sensitive: false
  - key: bAnnounceServer
    label: Announce Server
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: sPassword
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: sAdminPassword
    label: Admin Password
    default: '{{newguid()}}'
    customer_editable: true
    required: false
