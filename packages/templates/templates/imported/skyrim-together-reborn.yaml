schema: aetherpanel.template/v1
id: skyrim-together-reborn
name: Skyrim Together Reborn
category: Imported
summary: Skyrim Together Reborn Server
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/wine {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 10578
    protocol: udp
    required: true
config_files:
  - path: SkyrimTogetherReborn/config/STServer.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Server Port
      category: Skyrim Together Reborn
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: GameServer.uPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        Hidden: true
        FieldName: $GamePort
        InputType: number
        ParamFieldName: GameServer.uPort
    - key: bConsole
      label: Enable Console
      category: Skyrim Together Reborn
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: general.bConsole
      default: 'true'
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Enable Console
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        Hidden: true
        FieldName: bConsole
        InputType: text
        ParamFieldName: general.bConsole
        DefaultValue: 'true'
        EnumValues: {}
    - key: DownloadURL
      label: Server Download URL
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        Sets the full URL to download the server from.
        [Login](https://www.nexusmods.com/skyrimspecialedition/mods/69993?tab=files) to Nexus Mods, select Manual
        Download for the required server version, and continue until the download begins. Then cancel the download and
        copy the "click here" download URL to AetherPanel. Update the server before the URL expires
      keywords: download,url
      input_type: url
      param_field_name: DownloadURL
      default: ''
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Download URL
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the full URL to download the server from.
          [Login](https://www.nexusmods.com/skyrimspecialedition/mods/69993?tab=files) to Nexus Mods, select Manual
          Download for the required server version, and continue until the download begins. Then cancel the download and
          copy the "click here" download URL to AetherPanel. Update the server before the URL expires
        Keywords: download,url
        FieldName: DownloadURL
        InputType: url
        ParamFieldName: DownloadURL
        DefaultValue: ''
        Required: true
        EnumValues: {}
    - key: sServerName
      label: Server Name
      category: Skyrim Together Reborn
      subcategory: Server
      description: Sets the name of the server as shown on the server list
      keywords: name,server,sservername
      input_type: text
      param_field_name: GameServer.sServerName
      default: AetherNode Skyrim Together Reborn Server
      placeholder: AetherNode Skyrim Together Reborn Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server as shown on the server list
        Keywords: name,server,sservername
        FieldName: sServerName
        InputType: text
        ParamFieldName: GameServer.sServerName
        IncludeInCommandLine: false
        DefaultValue: AetherNode Skyrim Together Reborn Server
        Placeholder: AetherNode Skyrim Together Reborn Server
    - key: bAnnounceServer
      label: Announce Server
      category: Skyrim Together Reborn
      subcategory: Server
      description: If enabled, the server will show on the server list, assuming no password is set
      keywords: announce,public,serverlist,bannounceserver
      input_type: checkbox
      param_field_name: LiveServices.bAnnounceServer
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Announce Server
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will show on the server list, assuming no password is set
        Keywords: announce,public,serverlist,bannounceserver
        FieldName: bAnnounceServer
        InputType: checkbox
        ParamFieldName: LiveServices.bAnnounceServer
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: sPassword
      label: Server Password
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        Sets the password required for players to connect to the server. Empty = disabled. If a password is set, the
        server will not show on the server list, and players must connect manually
      keywords: password,server,spassword
      input_type: password
      param_field_name: GameServer.sPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the password required for players to connect to the server. Empty = disabled. If a password is set, the
          server will not show on the server list, and players must connect manually
        Keywords: password,server,spassword
        FieldName: sPassword
        InputType: password
        ParamFieldName: GameServer.sPassword
        DefaultValue: ''
        EnumValues: {}
    - key: sAdminPassword
      label: Admin Password
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        Sets the admin password, for potential future admin panels. Default is a strong, random password. Currently
        unused
      keywords: admin,password,sadminpassword
      input_type: password
      param_field_name: GameServer.sAdminPassword
      default: '{{newguid()}}'
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Admin Password
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the admin password, for potential future admin panels. Default is a strong, random password. Currently
          unused
        Keywords: admin,password,sadminpassword
        FieldName: sAdminPassword
        InputType: password
        ParamFieldName: GameServer.sAdminPassword
        DefaultValue: '{{newguid()}}'
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Skyrim Together Reborn
      subcategory: Server
      description: Sets the maximum number of players that can connect to the server at one time
      keywords: player,count,limit,maximum,umaxplayercount
      input_type: number
      param_field_name: GameServer.uMaxPlayerCount
      default: '8'
      placeholder: '8'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players that can connect to the server at one time
        Keywords: player,count,limit,maximum,umaxplayercount
        FieldName: $MaxUsers
        InputType: number
        ParamFieldName: GameServer.uMaxPlayerCount
        DefaultValue: '8'
        Placeholder: '8'
        Suffix: players
        EnumValues: {}
    - key: uDifficulty
      label: Difficulty Level
      category: Skyrim Together Reborn
      subcategory: Server
      description: Sets the server difficulty level, which is enforced on all clients
      keywords: difficulty,level,udifficulty
      input_type: enum
      param_field_name: Gameplay.uDifficulty
      default: '4'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Novice
        '1': Apprentice
        '2': Adept
        '3': Expert
        '4': Master (default)
        '5': Legendary
      raw:
        DisplayName: Difficulty Level
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server difficulty level, which is enforced on all clients
        Keywords: difficulty,level,udifficulty
        FieldName: uDifficulty
        InputType: enum
        ParamFieldName: Gameplay.uDifficulty
        DefaultValue: '4'
        EnumValues:
          '0': Novice
          '1': Apprentice
          '2': Adept
          '3': Expert
          '4': Master (default)
          '5': Legendary
    - key: bEnablePvp
      label: Enable PvP
      category: Skyrim Together Reborn
      subcategory: Server
      description: >-
        If enabled, players can damage each other. Shouts on other players, like fus ro dah, also only work when this
        option is enabled
      keywords: pvp,damage,benablepvp
      input_type: checkbox
      param_field_name: Gameplay.bEnablePvp
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable PvP
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, players can damage each other. Shouts on other players, like fus ro dah, also only work when this
          option is enabled
        Keywords: pvp,damage,benablepvp
        FieldName: bEnablePvp
        InputType: checkbox
        ParamFieldName: Gameplay.bEnablePvp
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: uTimeScale
      label: Time Scale
      category: Skyrim Together Reborn
      subcategory: Server
      description: Sets how fast in-game time progresses
      keywords: time,scale,utimescale
      input_type: number
      param_field_name: Gameplay.uTimeScale
      default: '20'
      placeholder: '20'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 0
      max: 1000
      enum_values: {}
      raw:
        DisplayName: Time Scale
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets how fast in-game time progresses
        Keywords: time,scale,utimescale
        FieldName: uTimeScale
        InputType: number
        MinValue: '0'
        MaxValue: '1000'
        ParamFieldName: Gameplay.uTimeScale
        DefaultValue: '20'
        Placeholder: '20'
        EnumValues: {}
    - key: fGoldLossFactor
      label: Gold Loss Factor
      category: Skyrim Together Reborn
      subcategory: Server
      description: Sets how much gold a player loses when they die. 0 = no gold loss
      keywords: gold,loss,die,death,fgoldlossfactor
      input_type: number
      param_field_name: Gameplay.fGoldLossFactor
      default: '0'
      placeholder: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 0
      max: 1
      enum_values: {}
      raw:
        DisplayName: Gold Loss Factor
        Category: Skyrim Together Reborn:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets how much gold a player loses when they die. 0 = no gold loss
        Keywords: gold,loss,die,death,fgoldlossfactor
