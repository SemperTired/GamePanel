    - key: GameModeNew
      label: Game Mode
      category: Call of Duty Black Ops II
      subcategory: Server
      description: >-
        Sets the game mode. Configure the relevant config file accordingly - 'Plutonium/storage/t6/dedicated.cfg' for
        Multiplayer, 'Plutonium/storage/t6/dedicated_zm.cfg' for Zombies
      keywords: game,mode,gamemode
      input_type: enum
      param_field_name: GameModeNew
      default: t6mp "{{$FullBaseDir}}T6" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated.cfg
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        t6mp "{{$FullBaseDir}}T6" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated.cfg: Multiplayer (default)
        t6zm "{{$FullBaseDir}}T6" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec dedicated_zm.cfg: Zombies
      raw:
        DisplayName: Game Mode
        Category: Call of Duty Black Ops II:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the game mode. Configure the relevant config file accordingly - 'Plutonium/storage/t6/dedicated.cfg' for
