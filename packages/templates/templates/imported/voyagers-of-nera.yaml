      category: Voyagers of Nera
      subcategory: Server
      description: Sets often the server will automatically save
      keywords: autosave,timer,interval,AutosaveTimerSeconds
      input_type: number
      param_field_name: /Script/BoatGame.BGCustomHostServerSettings.AutosaveTimerSeconds
      default: '300'
      placeholder: '300'
