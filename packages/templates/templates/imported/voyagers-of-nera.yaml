schema: aetherpanel.template/v1
id: voyagers-of-nera
name: Voyagers of Nera
category: Imported
summary: Voyagers of Nera Dedicated Server
install:
  method: steamcmd
  app_id: '3937860'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    .proton/proton {PlatformArgs} BoatGame -Port={GamePort} -log=BoatGame.log -LoggingInShippingEnabled=true
    {FormattedArgs} {CustomArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: beaconport
    name: Beacon Port
    default: 7778
    protocol: udp
    required: true
config_files:
  - path: BoatGame/Saved/PersistedData/CustomConfig/CustomHostServerUserSettings.ini
    type: ini
    editable: true
  - path: BoatGame/Saved/PersistedData/CustomConfig/CustomGameUserSettings.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: HostServerDisplayName
      label: Server Name
      category: Voyagers of Nera
      subcategory: Server
      description: Sets the name of the server as shown in the server browser. Maximum 30 characters
      keywords: name,display,name,HostServerDisplayName
      input_type: text
      param_field_name: /Script/BoatGame.BGCustomHostServerSettings.HostServerDisplayName
      default: AMP Voyagers of Nera Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Voyagers of Nera:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server as shown in the server browser. Maximum 30 characters
        Keywords: name,display,name,HostServerDisplayName
        FieldName: HostServerDisplayName
        InputType: text
        ParamFieldName: /Script/BoatGame.BGCustomHostServerSettings.HostServerDisplayName
        DefaultValue: AMP Voyagers of Nera Server
        EnumValues: {}
    - key: HostServerPassword
      label: Server Password
      category: Voyagers of Nera
      subcategory: Server
      description: Sets the password for players to join the server. Default is no password
      keywords: server,password,HostServerPassword
      input_type: password
      param_field_name: /Script/BoatGame.BGCustomHostServerSettings.HostServerPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
