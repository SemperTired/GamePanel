    - key: EOS_OVERRIDE_HOST_IP
      label: Public IP Selection Mode
      category: Voyagers of Nera
      subcategory: Server
      description: >-
        Sets whether the server or AMP should automatically select the public IP advertised for the server, or whether
        it should use the IP set under Server Public IP
      keywords: public,ip,address,eos,override,host,EOS_OVERRIDE_HOST_IP
      input_type: enum
      param_field_name: EOS_OVERRIDE_HOST_IP
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Server automatically selects (default)
        '{{$ExternalIP}}': AMP automatically selects
        '{{ManualPublicIP}}': Manual selection
      raw:
        DisplayName: Public IP Selection Mode
        Category: Voyagers of Nera:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether the server or AMP should automatically select the public IP advertised for the server, or whether
          it should use the IP set under Server Public IP
