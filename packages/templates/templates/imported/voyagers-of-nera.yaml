        FieldName: HostServerPassword
        InputType: password
        ParamFieldName: /Script/BoatGame.BGCustomHostServerSettings.HostServerPassword
        DefaultValue: ''
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Voyagers of Nera
      subcategory: Server
      description: Sets the maximum number of players that may connect to the server at one time
      keywords: maximum,players,limit,MaxPlayers
      input_type: number
      param_field_name: /Script/BoatGame.BGCustomHostServerSettings.MaxPlayers
      default: '10'
      placeholder: '10'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      max: 10
      suffix: players
      enum_values: {}
