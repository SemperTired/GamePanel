      label: Certificate File Path
      category: code-server
      subcategory: Proxy and SSL
      description: ''
      keywords: ''
      input_type: text
      param_field_name: cert
      default: 'false'
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Certificate File Path
