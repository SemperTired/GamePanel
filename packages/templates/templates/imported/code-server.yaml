schema: aetherpanel.template/v1
id: code-server
name: code-server
category: Imported
summary: Self-hosted VS Code in the browser
install:
  method: custom
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/bin/code-server --bind-addr {ApplicationIPBinding}:{ServerPort} --user-data-dir "{FullBaseDir}data"
    --extensions-dir "{FullBaseDir}extensions" {SSLMode}{FormattedArgs}
    {{ignore-last-opened}}{{disable-getting-started-override}}{{disable-workspace-trust}}{{disable-file-downloads}}{{disable-file-uploads}}{{disable-telemetry}}{{disable-update-check}}{verbose}{{enable-proposed-api}}{{disable-proxy}}{{skip-auth-preflight}}{CustomArgs}
    "{WorkspacePath}"
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 9090
    protocol: tcp
    required: true
config_files:
  - path: config.yaml
    type: text
    editable: true
config_schema:
  fields:
