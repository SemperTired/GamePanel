      label: Web Authentication Mode
      category: code-server
      subcategory: Server
      description: >-
        Sets the authentication mode for the web UI. The Web Password or Hashed Web Password must be set if the
        authentication Mode is set to 'Password'
      keywords: auth,authentication,login,mode
      input_type: enum
      param_field_name: auth
      default: password
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
