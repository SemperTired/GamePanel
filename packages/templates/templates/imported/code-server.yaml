      label: Bind Address
      category: code-server
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: bind-addr
      default: '{{$ApplicationIPBinding}}:{{$ServerPort}}'
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Bind Address
        Category: code-server:code
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: bind-addr
        Hidden: true
        InputType: text
        ParamFieldName: bind-addr
        DefaultValue: '{{$ApplicationIPBinding}}:{{$ServerPort}}'
        ExcludeFromImport: true
        EnumValues: {}
