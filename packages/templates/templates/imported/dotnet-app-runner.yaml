  - key: DownloadSource
    label: App Download Source
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DownloadBranch
    label: Git Repo Branch
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DownloadUsername
    label: Git Repo Username
    default: ''
    customer_editable: true
