      label: Game Port
      category: Wreckfest
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: game_port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Wreckfest:stadia_controller
        Subcategory: Server:dns:1
