schema: aetherpanel.template/v1
id: wreckfest
name: Wreckfest
category: Imported
summary: Wreckfest Dedicated Server
install:
  method: steamcmd
  app_id: '361580'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} -s server_config=server_config.cfg --save-dir={FullBaseDir}saved -server_set
    game_port={GamePort} steam_port={SteamPort} query_port={QueryPort} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 33540
    protocol: udp
    required: true
  - key: steamport
    name: Steam Port
    default: 27015
    protocol: both
    required: true
  - key: queryport
    name: Query Port
    default: 27016
    protocol: udp
    required: true
config_files:
  - path: server_config.cfg
    type: text
    editable: true
config_schema:
  fields:
