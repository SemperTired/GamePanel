schema: aetherpanel.template/v1
id: eye-dc
name: 'E.Y.E: Divine Cybermancy'
category: Imported
summary: 'E.Y.E: Divine Cybermancy Dedicated Server'
install:
  method: steamcmd
  app_id: '91720'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} -game EYE -console -usercon -nobreakpad -port {ServerPort} -ip
    {ApplicationIPBinding} -insecure {nohltv}{CustomParameters} {CustomConVars} +tv_port {SourceTVPort} +clientport
    {ClientPort} +sv_logfile 1 {FormattedArgs} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
  - key: sourcetvport
    name: SourceTV Port
    default: 27020
    protocol: udp
    required: true
  - key: clientport
    name: Client Port
    default: 27005
    protocol: udp
    required: true
config_files:
  - path: EYE/cfg/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: hostname
      label: Server Name
      category: E.Y.E Divine Cybermancy
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: 'AMP Powered E.Y.E: Divine Cybermancy Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: E.Y.E Divine Cybermancy:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        ParamFieldName: hostname
        DefaultValue: 'AMP Powered E.Y.E: Divine Cybermancy Server'
        EnumValues: {}
    - key: sv_tags
      label: Server Tags
      category: E.Y.E Divine Cybermancy
      subcategory: Server
      description: Comma-separated list of server tags that give additional information about the server in the server browser
      keywords: tags,sv_tags
      input_type: text
      param_field_name: sv_tags
      default: ''
      placeholder: increased_maxplayers
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Tags
        Category: E.Y.E Divine Cybermancy:stadia_controller
        Subcategory: Server:dns:1
        Description: Comma-separated list of server tags that give additional information about the server in the server browser
        Keywords: tags,sv_tags
        FieldName: sv_tags
        InputType: text
        ParamFieldName: sv_tags
        DefaultValue: ''
        Placeholder: increased_maxplayers
        EnumValues: {}
    - key: sv_lan
      label: LAN Server
      category: E.Y.E Divine Cybermancy
      subcategory: Server
      description: >-
        If enabled, the server will operate as a LAN server: no heartbeat, no authentication, and no non-class C
        addresses
      keywords: lan,local,sv_lan
      input_type: checkbox
      param_field_name: sv_lan
      default: '0'
      required: false
