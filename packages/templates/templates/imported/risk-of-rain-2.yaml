schema: aetherpanel.template/v1
id: risk-of-rain-2
name: Risk of Rain 2
category: Imported
summary: Risk of Rain 2 Dedicated Server
install:
  method: steamcmd
  app_id: '632360'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Game Port
    default: 27015
    protocol: both
    required: true
  - key: applicationport2
    name: Steam Query Port
    default: 27016
    protocol: both
    required: true
  - key: applicationport3
    name: Steam Port
    default: 27017
    protocol: both
    required: true
config_files:
  - path: Risk of Rain 2_Data/Config/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $ApplicationPort1
      label: Game Port
      category: Risk of Rain 2
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: sv_port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationPort1
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: sv_port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: $ApplicationPort2
      label: Steam Query Port
      category: Risk of Rain 2
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: steam_server_query_port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Steam Query Port
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationPort2
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: steam_server_query_port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: $ApplicationPort3
      label: Steam Port
      category: Risk of Rain 2
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: steam_server_steam_port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Steam Port
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationPort3
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: steam_server_steam_port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: sv_hostname
      label: Host Name
      category: Risk of Rain 2
      subcategory: Server
      description: Sets the name of the server displayed publicly
      keywords: host,name,server,sv_hostname
      input_type: text
      param_field_name: sv_hostname
      default: ROR2 - Hosted by AetherNode
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Host Name
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server displayed publicly
        Keywords: host,name,server,sv_hostname
        FieldName: sv_hostname
        InputType: text
        IsFlagArgument: false
        ParamFieldName: sv_hostname
        IncludeInCommandLine: false
        DefaultValue: ROR2 - Hosted by AetherNode
        EnumValues: {}
    - key: sv_custom_tags
      label: Custom Tags
      category: Risk of Rain 2
      subcategory: Server
      description: Comma separated list of tags to display in the server browser
      keywords: custom,tags,sv_custom_tags
      input_type: text
      param_field_name: sv_custom_tags
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Tags
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Comma separated list of tags to display in the server browser
        Keywords: custom,tags,sv_custom_tags
        FieldName: sv_custom_tags
        InputType: text
        IsFlagArgument: false
        ParamFieldName: sv_custom_tags
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: sv_password
      label: Server Password
      category: Risk of Rain 2
      subcategory: Server
      description: Sets the password for players to join the server. Default is no password
      keywords: server,password,users,sv_password
      input_type: password
      param_field_name: sv_password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password for players to join the server. Default is no password
        Keywords: server,password,users,sv_password
        FieldName: sv_password
        InputType: password
        IsFlagArgument: false
        ParamFieldName: sv_password
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Risk of Rain 2
      subcategory: Server
      description: Sets the maximum number of players that may join the server at one time
      keywords: max,players,sv_maxplayers
      input_type: number
      param_field_name: sv_maxplayers
      default: '4'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players that may join the server at one time
        Keywords: max,players,sv_maxplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: sv_maxplayers
        IncludeInCommandLine: false
        DefaultValue: '4'
        EnumValues: {}
    - key: steam_server_heartbeat_enabled
      label: Advertise Server
      category: Risk of Rain 2
      subcategory: Server
      description: If enabled, the server will be advertised on the server list
      keywords: advertise,server,list,steam,heartbeat,steam_server_heartbeat_enabled
      input_type: checkbox
      param_field_name: steam_server_heartbeat_enabled
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': '1'
        'False': '0'
      raw:
        DisplayName: Advertise Server
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will be advertised on the server list
        Keywords: advertise,server,list,steam,heartbeat,steam_server_heartbeat_enabled
        FieldName: steam_server_heartbeat_enabled
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: steam_server_heartbeat_enabled
        IncludeInCommandLine: false
        DefaultValue: '1'
        EnumValues:
          'True': '1'
          'False': '0'
    - key: gamemode
      label: Game Mode
      category: Risk of Rain 2
      subcategory: Server
      description: Sets the game mode for the server
      keywords: game,mode,gamemode
      input_type: enum
      param_field_name: gamemode
      default: ClassicRun
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        EclipseRun: Eclipse
        ClassicRun: Normal (default)
        InfiniteTowerRun: Simulacrum
      raw:
        DisplayName: Game Mode
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the game mode for the server
        Keywords: game,mode,gamemode
        FieldName: gamemode
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: gamemode
        IncludeInCommandLine: false
        DefaultValue: ClassicRun
        EnumValues:
          EclipseRun: Eclipse
          ClassicRun: Normal (default)
          InfiniteTowerRun: Simulacrum
    - key: UserSettings
      label: Additional Server Settings
      category: Risk of Rain 2
      subcategory: Server
      description: >-
        Specifies additional [settings](https://riskofrain2.fandom.com/wiki/Developer_Console) to include in
        "server.cfg". Each setting must be on a separate line and end with a semi-colon (;)
      keywords: additional,settings,custom
      input_type: Textarea
      param_field_name: UserSettings
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Additional Server Settings
        Category: Risk of Rain 2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Specifies additional [settings](https://riskofrain2.fandom.com/wiki/Developer_Console) to include in
          "server.cfg". Each setting must be on a separate line and end with a semi-colon (;)
        Keywords: additional,settings,custom
        FieldName: UserSettings
        InputType: Textarea
        IsFlagArgument: false
        ParamFieldName: UserSettings
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: BepInExInstall
      label: Install BepInEx
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        If set, BepInEx will be installed when the server is updated. Configure "BepInEx Version" accordingly. NOTE:
        Update the server after enabling this option
      keywords: install,bepinex
      input_type: checkbox
      param_field_name: BepInExInstall
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Install BepInEx
        Category: Updates
        Subcategory: Runtime Configuration:build:3
        Description: >-
          If set, BepInEx will be installed when the server is updated. Configure "BepInEx Version" accordingly. NOTE:
          Update the server after enabling this option
        Keywords: install,bepinex
        FieldName: BepInExInstall
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: BepInExInstall
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: BepInExVersion
      label: BepInEx Version
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        Sets the [BepInEx version](https://thunderstore.io/package/bbepis/BepInExPack/versions/) to install. Empty =
        latest. NOTE: Update the server after switching versions!
      keywords: install,bepinex,version
      input_type: text
      param_field_name: BepInExVersion
      default: ''
      placeholder: 5.4.2109
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: BepInEx Version
        Category: Updates
        Subcategory: Runtime Configuration:build:3
        Description: >-
          Sets the [BepInEx version](https://thunderstore.io/package/bbepis/BepInExPack/versions/) to install. Empty =
          latest. NOTE: Update the server after switching versions!
        Keywords: install,bepinex,version
        FieldName: BepInExVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: BepInExVersion
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: 5.4.2109
        EnumValues: {}
  files:
    - path: Risk of Rain 2_Data/Config/server.cfg
      type: template
      subsections: []
      raw:
        ConfigFile: Risk of Rain 2_Data/Config/server.cfg
        ConfigType: template
        AutoMap: true
        ConfigFileTemplate: risk-of-rain-2/AMP_server.cfg
environment: {}
startup_variables:
  - key: sv_hostname
    label: Host Name
    default: ROR2 - Hosted by AetherNode
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_custom_tags
    label: Custom Tags
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: steam_server_heartbeat_enabled
    label: Advertise Server
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: gamemode
    label: Game Mode
    default: ClassicRun
    customer_editable: true
    required: false
    sensitive: false
  - key: UserSettings
    label: Additional Server Settings
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: BepInExInstall
    label: Install BepInEx
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: BepInExVersion
    label: BepInEx Version
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '632360'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

