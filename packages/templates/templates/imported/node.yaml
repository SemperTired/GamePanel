    sensitive: false
  - key: DownloadPassword
    label: Git Repo Password/Token
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: DownloadFilename
    label: GitHub Release Filename
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DownloadVersion
    label: GitHub Release Version
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: NodeRelease
    label: Node.js Release Stream
    default: '22'
    customer_editable: true
