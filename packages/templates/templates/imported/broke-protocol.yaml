schema: aetherpanel.template/v1
id: broke-protocol
name: Broke Protocol
category: Imported
summary: Broke Protocol Dedicated Server
install:
  method: steamcmd
  app_id: '696370'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: server/bpgameserver.x86_64 -batchmode -logfile - -ignorePlugins "{ignorePlugins}"
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 5557
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 5558
    protocol: udp
    required: true
config_files:
  - path: settings.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Game Port
      category: Broke Protocol
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Broke Protocol:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: $.port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: serverName
      label: Server Name
      category: Broke Protocol
      subcategory: Server
      description: Sets the server name visible in the server list (up to 48 characters). Color codes supported
      keywords: server,name
      input_type: text
      param_field_name: $.serverName
      default: AMP Powered Broke Protocol Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Broke Protocol:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server name visible in the server list (up to 48 characters). Color codes supported
        Keywords: server,name
        FieldName: serverName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.serverName
        IncludeInCommandLine: false
        DefaultValue: AMP Powered Broke Protocol Server
        EnumValues: {}
    - key: map
      label: Server Map
      category: Broke Protocol
      subcategory: Server
      description: Sets the map the server will load. Can be subscribed to on Steam or included in the "Maps" directory
      keywords: map
      input_type: text
      param_field_name: $.map
      default: Default
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Map
        Category: Broke Protocol:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map the server will load. Can be subscribed to on Steam or included in the "Maps" directory
        Keywords: map
        FieldName: map
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.map
        IncludeInCommandLine: false
        DefaultValue: Default
        EnumValues: {}
    - key: URL
      label: Server URL
      category: Broke Protocol
      subcategory: Server
      description: Sets the URL displayed in the server list (up to 48 characters)
      keywords: server,url
      input_type: text
      param_field_name: $.URL
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server URL
        Category: Broke Protocol:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the URL displayed in the server list (up to 48 characters)
        Keywords: server,url
        FieldName: URL
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.URL
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Broke Protocol
      subcategory: Server
      description: Maximum number of players that may connect to the server at one time (up to 255)
      keywords: player,limit,maximum
      input_type: number
      param_field_name: $.players
      default: '32'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Broke Protocol:stadia_controller
        Subcategory: Server:dns:1
        Description: Maximum number of players that may connect to the server at one time (up to 255)
        Keywords: player,limit,maximum
        FieldName: $MaxUsers
        InputType: number
        IsFlagArgument: false
        ParamFieldName: $.players
        IncludeInCommandLine: false
        DefaultValue: '32'
        EnumValues: {}
        MinValue: '1'
    - key: whitelist
      label: Enable Whitelist
      category: Broke Protocol
      subcategory: Server
      description: If enabled, only whitelisted players can join
      keywords: whitelist,enable
      input_type: checkbox
      param_field_name: $.whitelist
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Enable Whitelist
        Category: Broke Protocol:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, only whitelisted players can join
        Keywords: whitelist,enable
        FieldName: whitelist
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.whitelist
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: whitelistedPlayers
      label: Whitelisted Players
      category: Broke Protocol
      subcategory: Server
      description: List of account names for whitelisted players
      keywords: whitelisted,players
      input_type: list
      param_field_name: whitelistedPlayers
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      special: listfile:./brokeprotocol/whitelist.txt
      raw:
        DisplayName: Whitelisted Players
        Category: Broke Protocol:stadia_controller
        Subcategory: Server:dns:1
        Description: List of account names for whitelisted players
        Keywords: whitelisted,players
        FieldName: whitelistedPlayers
        InputType: list
        IsFlagArgument: false
        ParamFieldName: whitelistedPlayers
        IncludeInCommandLine: false
        DefaultValue: ''
        Special: listfile:./brokeprotocol/whitelist.txt
        EnumValues: {}
    - key: ignorePlugins
      label: Ignored Plugins
      category: Broke Protocol
      subcategory: Server
      description: Sets a list of plugins to ignore. WarSource is ignored by default
      keywords: plugins,ignore,ignored,ignoreplugins
      input_type: text
      param_field_name: ignorePlugins
      default: '!WarSource#:Other:Plugins:Here'
      placeholder: '!WarSource#:Other:Plugins:Here'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Ignored Plugins
        Category: Broke Protocol:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets a list of plugins to ignore. WarSource is ignored by default
        Keywords: plugins,ignore,ignored,ignoreplugins
        FieldName: ignorePlugins
        InputType: text
        IsFlagArgument: false
        ParamFieldName: ignorePlugins
        IncludeInCommandLine: false
        DefaultValue: '!WarSource#:Other:Plugins:Here'
        Placeholder: '!WarSource#:Other:Plugins:Here'
        EnumValues: {}
  files:
    - path: settings.json
      type: json
      subsections: []
      raw:
        ConfigFile: settings.json
        AutoMap: true
        ConfigType: json
environment: {}
startup_variables:
  - key: serverName
    label: Server Name
    default: AMP Powered Broke Protocol Server
    customer_editable: true
    required: false
    sensitive: false
  - key: map
    label: Server Map
    default: Default
    customer_editable: true
    required: false
    sensitive: false
  - key: URL
    label: Server URL
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: whitelist
    label: Enable Whitelist
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: whitelistedPlayers
    label: Whitelisted Players
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ignorePlugins
    label: Ignored Plugins
    default: '!WarSource#:Other:Plugins:Here'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '696370'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
