schema: aetherpanel.template/v1
id: xonotic
name: Xonotic
category: Imported
summary: Xonotic Dedicated Server
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://{{serverreleasestream}}-{{serverversion}}.zip/
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    Xonotic/xonotic-linux64-dedicated {PlatformArgs} +serverconfig server.cfg -userdir "{FullBaseDir}ServerData"
    {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 26000
    protocol: udp
    required: true
config_files:
  - path: ServerData/data/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Port
      category: Xonotic
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Port
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Server Binding
      category: Xonotic
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: net_address
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Binding
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationIPBinding
        InputType: text
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: net_address
        IncludeInCommandLine: false
        EnumValues: {}
    - key: log_file
      label: Log File
      category: Xonotic
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: log_file
      default: server.log
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Log File
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: log_file
        InputType: text
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: log_file
        IncludeInCommandLine: false
        DefaultValue: server.log
        EnumValues: {}
    - key: ServerReleaseStream
      label: Server Release Stream
      category: Xonotic
      subcategory: Server
      description: >-
        Sets Stable or Autobuild (nightly) release stream. Needs "Server Version" set as well. NOTE: Update the server
        after changing this setting!
      keywords: release,stable,autobuild
      input_type: enum
      default: dl.xonotic.org/xonotic
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        dl.xonotic.org/xonotic: Stable
        beta.xonotic.org/autobuild/Xonotic: Autobuild
      raw:
        DisplayName: Server Release Stream
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets Stable or Autobuild (nightly) release stream. Needs "Server Version" set as well. NOTE: Update the server
          after changing this setting!
        Keywords: release,stable,autobuild
        FieldName: ServerReleaseStream
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: ''
        IncludeInCommandLine: false
        DefaultValue: dl.xonotic.org/xonotic
        EnumValues:
          dl.xonotic.org/xonotic: Stable
          beta.xonotic.org/autobuild/Xonotic: Autobuild
    - key: ServerVersion
      label: Server Version
      category: Xonotic
      subcategory: Server
      description: >-
        [Stable build version](https://xonotic.org/download/) or [Autobuild
        version](https://beta.xonotic.org/autobuild/) to install. Set "Server Release Stream" as appropriate. NOTE:
        Update the server after changing this setting!
      keywords: server,version,build
      input_type: text
      default: 0.8.5
      placeholder: 0.8.5 | 20220528 | latest
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Version
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          [Stable build version](https://xonotic.org/download/) or [Autobuild
          version](https://beta.xonotic.org/autobuild/) to install. Set "Server Release Stream" as appropriate. NOTE:
          Update the server after changing this setting!
        Keywords: server,version,build
        FieldName: ServerVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: ''
        IncludeInCommandLine: false
        DefaultValue: 0.8.5
        Placeholder: 0.8.5 | 20220528 | latest
        Required: true
        EnumValues: {}
    - key: hostname
      label: Server Name
      category: Xonotic
      subcategory: Server
      description: Server name visible in the server list ("$g_xonoticversion" is replaced with the current version)
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: Xonotic $g_xonoticversion Server - Hosted by AetherNode
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: Server name visible in the server list ("$g_xonoticversion" is replaced with the current version)
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        IsFlagArgument: false
        ParamFieldName: hostname
        IncludeInCommandLine: false
        DefaultValue: Xonotic $g_xonoticversion Server - Hosted by AetherNode
        EnumValues: {}
    - key: sv_public
      label: Server Public Status
      category: Xonotic
      subcategory: Server
      description: Sets the public status of the server and whether it is included in the master server list
      keywords: public,list,private
      input_type: enum
      param_field_name: sv_public
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Public but not included in server list
        '1': Public and included in server list
        '-1': Not public
      raw:
        DisplayName: Server Public Status
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the public status of the server and whether it is included in the master server list
        Keywords: public,list,private
        FieldName: sv_public
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: sv_public
        IncludeInCommandLine: false
        DefaultValue: '1'
        EnumValues:
          '0': Public but not included in server list
          '1': Public and included in server list
          '-1': Not public
    - key: $RemoteAdminPassword
      label: RCON Password
      category: Xonotic
      subcategory: Server
      description: See the Security and Privacy menu for configurable options for the server's RCON
      keywords: rcon,password
      input_type: hidden
      param_field_name: rcon_password
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON Password
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: See the Security and Privacy menu for configurable options for the server's RCON
        Keywords: rcon,password
        FieldName: $RemoteAdminPassword
        InputType: hidden
        IsFlagArgument: false
        ParamFieldName: rcon_password
        IncludeInCommandLine: false
        EnumValues: {}
    - key: sv_motd
      label: Welcome Message
      category: Xonotic
      subcategory: Server
      description: Welcome message when players join the server
      keywords: welcome,message,motd
      input_type: text
      param_field_name: sv_motd
      default: Welcome to Xonotic Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Welcome Message
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: Welcome message when players join the server
        Keywords: welcome,message,motd
        FieldName: sv_motd
        InputType: text
        IsFlagArgument: false
        ParamFieldName: sv_motd
        IncludeInCommandLine: false
        DefaultValue: Welcome to Xonotic Server
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Xonotic
      subcategory: Server
      description: Maximum number of players that may connect to the server (including spectators)
      keywords: players,limit
      input_type: number
      param_field_name: maxplayers
      default: '8'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: Maximum number of players that may connect to the server (including spectators)
        Keywords: players,limit
        FieldName: $MaxUsers
        InputType: number
        IsFlagArgument: false
        ParamFieldName: maxplayers
        IncludeInCommandLine: false
        DefaultValue: '8'
        Suffix: players
        EnumValues: {}
        MinValue: '1'
    - key: g_start_delay
      label: Game Start Delay
      category: Xonotic
      subcategory: Server
      description: Sets the delay before the game starts to let players join the server first
      keywords: start,delay
      input_type: number
      param_field_name: g_start_delay
      default: '15'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: Game Start Delay
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the delay before the game starts to let players join the server first
        Keywords: start,delay
        FieldName: g_start_delay
        InputType: number
        IsFlagArgument: false
        ParamFieldName: g_start_delay
        IncludeInCommandLine: false
        DefaultValue: '15'
        Suffix: seconds
        EnumValues: {}
    - key: g_maplist
      label: Maps
      category: Xonotic
      subcategory: Server
      description: Space-separated list of maps for the server. Empty = all maps
      keywords: maps
      input_type: text
      param_field_name: g_maplist
      default: >-
        afterslime atelier boil catharsis courtfun dance drain erbium finalrage fuse geoplanetary glowplant implosion
        leave_em_behind nexballarena oilrig runningman runningmanctf silentsiege solarium space-elevator stormkeep
        techassault vorix warfare xoylent
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Maps
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: Space-separated list of maps for the server. Empty = all maps
        Keywords: maps
        FieldName: g_maplist
        InputType: text
        IsFlagArgument: false
        ParamFieldName: g_maplist
        IncludeInCommandLine: false
        DefaultValue: >-
          afterslime atelier boil catharsis courtfun dance drain erbium finalrage fuse geoplanetary glowplant implosion
          leave_em_behind nexballarena oilrig runningman runningmanctf silentsiege solarium space-elevator stormkeep
          techassault vorix warfare xoylent
        EnumValues: {}
    - key: g_maplist_shuffle
      label: Shuffle Map List
      category: Xonotic
      subcategory: Server
      description: If enabled, a random map will be selected for each game. Otherwise the maps will be selected in sequence
      keywords: shuffle,maps
      input_type: checkbox
      param_field_name: g_maplist_shuffle
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
        DisplayName: Shuffle Map List
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, a random map will be selected for each game. Otherwise the maps will be selected in sequence
        Keywords: shuffle,maps
        FieldName: g_maplist_shuffle
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: g_maplist_shuffle
        IncludeInCommandLine: false
        DefaultValue: '1'
        EnumValues:
          'False': '0'
          'True': '1'
    - key: g_maplist_mostrecent_count
      label: Minimum Maps Before Repeat
      category: Xonotic
      subcategory: Server
      description: Number of maps that have to be played before a map can be repeated
      keywords: maps,recent,count
      input_type: number
      param_field_name: g_maplist_mostrecent_count
      default: '3'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: maps
      enum_values: {}
      raw:
        DisplayName: Minimum Maps Before Repeat
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: Number of maps that have to be played before a map can be repeated
        Keywords: maps,recent,count
        FieldName: g_maplist_mostrecent_count
        InputType: number
        IsFlagArgument: false
        ParamFieldName: g_maplist_mostrecent_count
        IncludeInCommandLine: false
        DefaultValue: '3'
        Suffix: maps
        EnumValues: {}
    - key: sv_status_privacy
      label: Hide IPs from Clients
      category: Xonotic
      subcategory: Server
      description: If enabled, IP addresses are hidden from "status" replies shown to clients
      keywords: hide,ip,client
      input_type: checkbox
      param_field_name: sv_status_privacy
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
        DisplayName: Hide IPs from Clients
        Category: Xonotic:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, IP addresses are hidden from "status" replies shown to clients
        Keywords: hide,ip,client
        FieldName: sv_status_privacy
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: sv_status_privacy
        IncludeInCommandLine: false
        DefaultValue: '1'
        EnumValues:
          'False': '0'
          'True': '1'
  files:
    - path: ServerData/data/server.cfg
      type: kvp
      format: '{0} "{1}"'
      subsections: []
      raw:
        ConfigFile: ServerData/data/server.cfg
        AutoMap: true
        ConfigType: kvp
        ConfigFormat: '{0} "{1}"'
        ConfigFormatRegex: ^(?<key>.+?) "(?<value>.*?)"$
environment: {}
startup_variables:
  - key: log_file
    label: Log File
    default: server.log
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerReleaseStream
    label: Server Release Stream
    default: dl.xonotic.org/xonotic
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerVersion
    label: Server Version
    default: 0.8.5
    customer_editable: true
    required: true
    sensitive: false
  - key: hostname
    label: Server Name
    default: Xonotic $g_xonoticversion Server - Hosted by AetherNode
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_public
    label: Server Public Status
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_motd
    label: Welcome Message
    default: Welcome to Xonotic Server
    customer_editable: true
    required: false
    sensitive: false
  - key: g_start_delay
    label: Game Start Delay
    default: '15'
    customer_editable: true
    required: false
    sensitive: false
  - key: g_maplist
    label: Maps
    default: >-
      afterslime atelier boil catharsis courtfun dance drain erbium finalrage fuse geoplanetary glowplant implosion
      leave_em_behind nexballarena oilrig runningman runningmanctf silentsiege solarium space-elevator stormkeep
      techassault vorix warfare xoylent
    customer_editable: true
    required: false
    sensitive: false
  - key: g_maplist_shuffle
    label: Shuffle Map List
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: g_maplist_mostrecent_count
    label: Minimum Maps Before Repeat
    default: '3'
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_status_privacy
    label: Hide IPs from Clients
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: false
  providers: []
  collection_support: false
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

