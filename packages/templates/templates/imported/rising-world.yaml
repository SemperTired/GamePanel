schema: aetherpanel.template/v1
id: rising-world
name: Rising World (Unity Version)
category: Imported
summary: Rising World Unity Dedicated Server
install:
  method: steamcmd
  app_id: '339010'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    339010/RisingWorldServer.x64 {PlatformArgs} +Server_Port={ServerPort} +RCON_Port={RCONPort}
    +Server_IP={ApplicationIPBinding} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 4255
    protocol: both
    required: true
  - key: queryport
    name: Query Port
    default: 4254
    protocol: tcp
    required: true
  - key: rconport
    name: RCON Port
    default: 4253
    protocol: tcp
    required: true
config_files:
  - path: server.properties
    type: text
    editable: true
config_schema:
