schema: aetherpanel.template/v1
id: puck
name: Puck
category: Imported
summary: Puck Dedicated Server
install:
  method: steamcmd
  app_id: '3481440'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 3481440/Puck {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 30609
    protocol: both
    required: true
config_files:
  - path: server_config.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: Puck
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        ParamFieldName: $.port
        ExcludeFromImport: true
        EnumValues: {}
    - key: name
      label: Server Name
      category: Puck
      subcategory: Server
      description: >-
        Sets the server name shown in the server browser. [Unity rich text
        formatting](https://docs.unity3d.com/Packages/com.unity.ugui@1.0/manual/StyledText.html) is supported
      keywords: display,server,browser,name
      input_type: text
      param_field_name: $.name
      default: AetherNode Puck Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the server name shown in the server browser. [Unity rich text
          formatting](https://docs.unity3d.com/Packages/com.unity.ugui@1.0/manual/StyledText.html) is supported
        Keywords: display,server,browser,name
        FieldName: name
        InputType: text
        ParamFieldName: $.name
        DefaultValue: AetherNode Puck Server
        EnumValues: {}
    - key: password
      label: Server Password
      category: Puck
      subcategory: Server
      description: Sets the password required to connect to the server. Default is no password
      keywords: server,password
      input_type: password
      param_field_name: $.password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password required to connect to the server. Default is no password
        Keywords: server,password
        FieldName: password
        InputType: password
        ParamFieldName: $.password
        DefaultValue: ''
        EnumValues: {}
    - key: gameMode
      label: Game Mode
      category: Puck
      subcategory: Server
      description: Sets the game mode for the server
      keywords: game,mode,gameMode
      input_type: text
      param_field_name: $.gameMode
      default: public
      placeholder: public
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Mode
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the game mode for the server
        Keywords: game,mode,gameMode
        FieldName: gameMode
        InputType: text
        ParamFieldName: $.gameMode
        DefaultValue: public
        Placeholder: public
        EnumValues: {}
    - key: level
      label: Level
      category: Puck
      subcategory: Server
      description: Sets the map/level to be loaded on the server
      keywords: level,map
      input_type: text
      param_field_name: $.level
      default: default
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Level
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map/level to be loaded on the server
        Keywords: level,map
        FieldName: level
        InputType: text
        ParamFieldName: $.level
        DefaultValue: default
        EnumValues: {}
    - key: isPublic
      label: Make Server Public
      category: Puck
      subcategory: Server
      description: If set, the server will be visible in the server browser
      keywords: server,public,isPublic
      input_type: checkbox
      param_field_name: $.isPublic
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Make Server Public
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, the server will be visible in the server browser
        Keywords: server,public,isPublic
        FieldName: isPublic
        InputType: checkbox
        ParamFieldName: $.isPublic
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: $MaxUsers
      label: Player Limit
      category: Puck
      subcategory: Server
      description: Sets the maximum number of players allowed on the server at one time
      keywords: maximum,players,clients,limit,maxPlayers
      input_type: number
      param_field_name: $.maxPlayers
      default: '12'
      placeholder: '12'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players allowed on the server at one time
        Keywords: maximum,players,clients,limit,maxPlayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        ParamFieldName: $.maxPlayers
        DefaultValue: '12'
        Placeholder: '12'
        Suffix: players
        EnumValues: {}
    - key: tickRate
      label: Tick Rate
      category: Puck
      subcategory: Server
      description: Sets the physics simulation and sync tick rate for the server
      keywords: tick,rate,tickRate
      input_type: number
      param_field_name: $.tickRate
      default: '200'
      placeholder: '200'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: Hz
      enum_values: {}
      raw:
        DisplayName: Tick Rate
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the physics simulation and sync tick rate for the server
        Keywords: tick,rate,tickRate
        FieldName: tickRate
        InputType: number
        ParamFieldName: $.tickRate
        DefaultValue: '200'
        Placeholder: '200'
        Suffix: Hz
        EnumValues: {}
    - key: voip
      label: Enable VOIP
      category: Puck
      subcategory: Server
      description: If set, VOIP will be enabled on the server
      keywords: enable,voip,useVoip
      input_type: checkbox
      param_field_name: $.useVoip
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable VOIP
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, VOIP will be enabled on the server
        Keywords: enable,voip,useVoip
        FieldName: voip
        InputType: checkbox
        ParamFieldName: $.useVoip
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: useWhitelist
      label: Use Whitelist
      category: Puck
      subcategory: Server
      description: >-
        If set, only whitelisted players can join the server. Whitelisted players must be listed in
        'whitelisted_steam_ids.json'
      keywords: whitelist,useWhitelist
      input_type: checkbox
      param_field_name: $.useWhitelist
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Use Whitelist
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, only whitelisted players can join the server. Whitelisted players must be listed in
          'whitelisted_steam_ids.json'
        Keywords: whitelist,useWhitelist
        FieldName: useWhitelist
        InputType: checkbox
        ParamFieldName: $.useWhitelist
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: modslist
      label: Mods List
      category: Puck
      subcategory: Server
      description: >-
        To set an array of mod configs specifying which Workshop mods are enabled on the server and whether clients must
        have them, edit the 'mods' setting in 'server_config.json'. [More
        details](https://codionca.github.io/PuckGuide/#step-7-create-server-configuration)
      keywords: modslist,mods,workshop
      input_type: hidden
      param_field_name: modslist
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Mods List
        Category: Puck:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          To set an array of mod configs specifying which Workshop mods are enabled on the server and whether clients
          must have them, edit the 'mods' setting in 'server_config.json'. [More
          details](https://codionca.github.io/PuckGuide/#step-7-create-server-configuration)
        Keywords: modslist,mods,workshop
        FieldName: modslist
        InputType: hidden
        ParamFieldName: modslist
        DefaultValue: ''
        EnumValues: {}
    - key: ServerBranch
      label: Server Branch
      category: Updates
      subcategory: Steam Downloads
      description: Sets the server branch to install. Update the server after switching branches
      keywords: server,branch,depot
      input_type: enum
      param_field_name: ServerBranch
      default: public
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        public: Public (default)
        pre-release: Pre-release
      raw:
        DisplayName: Server Branch
        Category: Updates
        Subcategory: Steam Downloads:download
        Description: Sets the server branch to install. Update the server after switching branches
        Keywords: server,branch,depot
        FieldName: ServerBranch
        InputType: enum
        ParamFieldName: ServerBranch
        DefaultValue: public
        EnumValues:
          public: Public (default)
          pre-release: Pre-release
  files:
    - path: server_config.json
      type: json
      subsections: []
      raw:
        ConfigFile: server_config.json
        AutoMap: true
        Importable: true
        ConfigType: json
environment: {}
startup_variables:
  - key: name
    label: Server Name
    default: AetherNode Puck Server
    customer_editable: true
    required: false
    sensitive: false
  - key: password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: gameMode
    label: Game Mode
    default: public
    customer_editable: true
    required: false
    sensitive: false
  - key: level
    label: Level
    default: default
    customer_editable: true
    required: false
    sensitive: false
  - key: isPublic
    label: Make Server Public
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: tickRate
    label: Tick Rate
    default: '200'
    customer_editable: true
    required: false
    sensitive: false
  - key: voip
    label: Enable VOIP
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: useWhitelist
    label: Use Whitelist
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerBranch
    label: Server Branch
    default: public
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '2994020'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

