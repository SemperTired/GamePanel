schema: aetherpanel.template/v1
id: beasts-of-bermuda
name: Beasts of Bermuda
category: Imported
summary: Beasts of Bermuda Dedicated Server
install:
  method: steamcmd
  app_id: '882430'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} BeastsOfBermuda -Port={GamePort} -QueryPort={SteamQueryPort}
    -MultiHome={ApplicationIPBinding} {FormattedArgs} -stdout -FullStdOutLogOutput
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: steamqueryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: WindowsServer/BeastsOfBermuda/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: SessionName
      label: Session Name
      category: Beasts of Bermuda
      subcategory: Server
      description: Sets the server name displayed in the server browser. Use underscores (_) instead of spaces!
      keywords: session,name,sessionname
      input_type: text
      param_field_name: SessionName
      default: AMP_Powered_Beasts_of_Bermuda_Server
      placeholder: AMP_Powered_Beasts_of_Bermuda_Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Session Name
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server name displayed in the server browser. Use underscores (_) instead of spaces!
        Keywords: session,name,sessionname
        FieldName: SessionName
        InputType: text
        ParamFieldName: SessionName
        IncludeInCommandLine: true
        DefaultValue: AMP_Powered_Beasts_of_Bermuda_Server
        Placeholder: AMP_Powered_Beasts_of_Bermuda_Server
        EnumValues: {}
    - key: MapNameOverride
      label: Map Name
      category: Beasts of Bermuda
      subcategory: Server
      description: Sets the initial map to load on the server
      keywords: map,name,override,mapnameoverride
      input_type: enum
      param_field_name: /Script/BeastsOfBermuda.ServerGameInstance.MapNameOverride
      default: Forest_Island
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        Ancestral_Plains: Ancestral Plains
        Ancestral_Plains_Canvas: Ancestral Plains Canvas
        Bloodbath: Bloodbath (Unoptimized)
        Bloodbath_Canvas: Bloodbath Canvas (Unoptimized)
        DM_Caldera: Caldera
        DM_Caldera_Canvas: Caldera Canvas
        Forest_Island: Forest Island (default)
        Forest_Island_Canvas: Forest Island Canvas
        Islatitania: Islatitania
        Rival_Shores: Rival Shores
        Rival_Shores_Canvas: Rival Shores Canvas
        Scorched_Valley: Scorched Valley
        Temporal_Drift: Temporal Drift
        Test_Performance: Test Performance
        BB_Test_Map: Test Map (Debug)
        Volcano_Bay: Volcano Bay
      raw:
        DisplayName: Map Name
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the initial map to load on the server
        Keywords: map,name,override,mapnameoverride
        FieldName: MapNameOverride
        InputType: enum
        ParamFieldName: /Script/BeastsOfBermuda.ServerGameInstance.MapNameOverride
        IncludeInCommandLine: false
        DefaultValue: Forest_Island
        EnumValues:
          Ancestral_Plains: Ancestral Plains
          Ancestral_Plains_Canvas: Ancestral Plains Canvas
          Bloodbath: Bloodbath (Unoptimized)
          Bloodbath_Canvas: Bloodbath Canvas (Unoptimized)
          DM_Caldera: Caldera
          DM_Caldera_Canvas: Caldera Canvas
          Forest_Island: Forest Island (default)
          Forest_Island_Canvas: Forest Island Canvas
          Islatitania: Islatitania
          Rival_Shores: Rival Shores
          Rival_Shores_Canvas: Rival Shores Canvas
          Scorched_Valley: Scorched Valley
          Temporal_Drift: Temporal Drift
          Test_Performance: Test Performance
          BB_Test_Map: Test Map (Debug)
          Volcano_Bay: Volcano Bay
    - key: MapName
      label: Display Map Name Mode
      category: Beasts of Bermuda
      subcategory: Server
      description: >-
        Sets whether to display the actual Map Name in the server browser, or instead the Custom Display Map Name. This
        doesn't affect the actual map loaded on the server
      keywords: display,map,name,mode,custom,mapname
      input_type: enum
      param_field_name: MapName
      default: '{{MapNameOverride}}'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '{{MapNameOverride}}': Use Map Name (default)
        '{{CustomMapName}}': Use Custom Display Map Name
      raw:
        DisplayName: Display Map Name Mode
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether to display the actual Map Name in the server browser, or instead the Custom Display Map Name.
          This doesn't affect the actual map loaded on the server
        Keywords: display,map,name,mode,custom,mapname
        FieldName: MapName
        InputType: enum
        ParamFieldName: MapName
        IncludeInCommandLine: true
        DefaultValue: '{{MapNameOverride}}'
        EnumValues:
          '{{MapNameOverride}}': Use Map Name (default)
          '{{CustomMapName}}': Use Custom Display Map Name
    - key: CustomMapName
      label: Custom Display Map Name
      category: Beasts of Bermuda
      subcategory: Server
      description: >-
        Sets a custom map name to display in the server browser, if 'Use Custom Map Display Map Name' is selected under
        Display Map Name Mode
      keywords: custom,display,map,name,mapname
      input_type: text
      param_field_name: CustomMapName
      default: ''
      placeholder: MyMapName
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Display Map Name
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a custom map name to display in the server browser, if 'Use Custom Map Display Map Name' is selected
          under Display Map Name Mode
        Keywords: custom,display,map,name,mapname
        FieldName: CustomMapName
        InputType: text
        ParamFieldName: CustomMapName
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: MyMapName
        EnumValues: {}
    - key: GameMode
      label: Game Mode
      category: Beasts of Bermuda
      subcategory: Server
      description: Sets the game mode for the server
      keywords: game,mode,gamemode
      input_type: enum
      param_field_name: GameMode
      default: Free_Roam
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        Free_Roam: Free Roam (default)
        Life_Cycle: Life Cycle
        Combat: Combat
      raw:
        DisplayName: Game Mode
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the game mode for the server
        Keywords: game,mode,gamemode
        FieldName: GameMode
        InputType: enum
        ParamFieldName: GameMode
        IncludeInCommandLine: true
        DefaultValue: Free_Roam
        EnumValues:
          Free_Roam: Free Roam (default)
          Life_Cycle: Life Cycle
          Combat: Combat
    - key: GameMode
      label: Game Mode
      category: Beasts of Bermuda
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: /Script/BeastsOfBermuda.ServerGameInstance.GameMode
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Mode
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: GameMode
        InputType: text
        Hidden: true
        ParamFieldName: /Script/BeastsOfBermuda.ServerGameInstance.GameMode
        EnumValues: {}
    - key: ServerPassword
      label: Server Password
      category: Beasts of Bermuda
      subcategory: Server
      description: Sets the password required for players to join the server
      keywords: server,password,serverpassword
      input_type: password
      param_field_name: ServerPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password required for players to join the server
        Keywords: server,password,serverpassword
        FieldName: ServerPassword
        InputType: password
        ParamFieldName: ServerPassword
        IncludeInCommandLine: true
        DefaultValue: ''
        SkipIfEmpty: true
        EnumValues: {}
    - key: AdminPassword
      label: Admin Password
      category: Beasts of Bermuda
      subcategory: Server
      description: Sets the admin password. Default is a strong random password
      keywords: admin,password,adminpassword
      input_type: password
      param_field_name: AdminPassword
      default: '{{newguid()}}'
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Admin Password
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the admin password. Default is a strong random password
        Keywords: admin,password,adminpassword
        FieldName: AdminPassword
        InputType: password
        ParamFieldName: AdminPassword
        IncludeInCommandLine: true
        DefaultValue: '{{newguid()}}'
        SkipIfEmpty: true
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Beasts of Bermuda
      subcategory: Server
      description: Sets the maximum number of players that can connect to the server at one time
      keywords: maximum,player,limit,numplayers
      input_type: number
      param_field_name: NumPlayers
      default: '32'
      placeholder: '32'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players that can connect to the server at one time
        Keywords: maximum,player,limit,numplayers
        FieldName: $MaxUsers
        InputType: number
        ParamFieldName: NumPlayers
        IncludeInCommandLine: true
        DefaultValue: '32'
        Placeholder: '32'
        Suffix: players
        EnumValues: {}
    - key: DiscordLink
      label: Discord Link
      category: Beasts of Bermuda
      subcategory: Server
      description: >-
        Sets a link for players to click in-game to join a Discord server. Only include the invite code, not the full
        URL
      keywords: discord,link,discordlink
      input_type: text
      param_field_name: /Script/BeastsOfBermuda.ServerGameInstance.DiscordLink
      default: ''
      placeholder: yubWudJZpb
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Discord Link
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a link for players to click in-game to join a Discord server. Only include the invite code, not the full
          URL
        Keywords: discord,link,discordlink
        FieldName: DiscordLink
        InputType: text
        ParamFieldName: /Script/BeastsOfBermuda.ServerGameInstance.DiscordLink
        DefaultValue: ''
        Placeholder: yubWudJZpb
        EnumValues: {}
    - key: CustomSettings
      label: Custom Settings
      category: Beasts of Bermuda
      subcategory: Server
      description: >-
        To configure other settings for the server, [generate](https://cleafspear.github.io/) a configuration file and
        paste the contents into WindowsServer/BeastsOfBermuda/Saved/Config/WindowsServer/Game.ini
      keywords: custom,settings
      input_type: hidden
      param_field_name: CustomSettings
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Settings
        Category: Beasts of Bermuda:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          To configure other settings for the server, [generate](https://cleafspear.github.io/) a configuration file and
          paste the contents into WindowsServer/BeastsOfBermuda/Saved/Config/WindowsServer/Game.ini
        Keywords: custom,settings
        FieldName: CustomSettings
        InputType: hidden
        ParamFieldName: CustomSettings
        EnumValues: {}
  files:
    - path: WindowsServer/BeastsOfBermuda/Saved/Config/WindowsServer/Game.ini
      type: ini
      format: '{0}="{1}"'
      subsections: []
      raw:
        ConfigFile: WindowsServer/BeastsOfBermuda/Saved/Config/WindowsServer/Game.ini
        ConfigType: ini
        AutoMap: true
        Importable: true
        ConfigFormat: '{0}="{1}"'
        ConfigFormatRegex: ^(?<key>.+?)\s*=\s*"(?<value>.*?)"$
    - path: WindowsServer/BeastsOfBermuda/Saved/Config/WindowsServer/Game.ini
      type: ini
      format: '{0}={1}'
      subsections: []
      raw:
        ConfigFile: WindowsServer/BeastsOfBermuda/Saved/Config/WindowsServer/Game.ini
        ConfigType: ini
        AutoMap: true
        Importable: true
        ConfigFormat: '{0}={1}'
        ConfigFormatRegex: ^(?<key>.+?)\s*=\s*(?<value>[^"]*?)$
environment: {}
startup_variables:
  - key: SessionName
    label: Session Name
    default: AMP_Powered_Beasts_of_Bermuda_Server
    customer_editable: true
    required: false
    sensitive: false
  - key: MapNameOverride
    label: Map Name
    default: Forest_Island
    customer_editable: true
    required: false
    sensitive: false
  - key: MapName
    label: Display Map Name Mode
    default: '{{MapNameOverride}}'
    customer_editable: true
    required: false
    sensitive: false
  - key: CustomMapName
    label: Custom Display Map Name
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: GameMode
    label: Game Mode
    default: Free_Roam
    customer_editable: true
    required: false
    sensitive: false
  - key: GameMode
    label: Game Mode
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerPassword
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: AdminPassword
    label: Admin Password
    default: '{{newguid()}}'
    customer_editable: true
    required: false
    sensitive: true
  - key: DiscordLink
    label: Discord Link
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '719890'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
