schema: aetherpanel.template/v1
id: euro-truck-simulator-2
name: Euro Truck Simulator 2
category: Imported
summary: Euro Truck Simulator 2 Dedicated Server
install:
  method: steamcmd
  app_id: '1948160'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 1948160/bin/linux_x64/eurotrucks2_server {PlatformArgs} -nosingle {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: mainserverport
    name: Main Server Port
    default: 27015
    protocol: udp
    required: true
  - key: querydedicatedport
    name: Query Dedicated Port
    default: 27016
    protocol: udp
    required: true
config_files:
  - path: Euro Truck Simulator 2/server_config.sii
    type: text
    editable: true
config_schema:
  fields:
    - key: lobby_name
      label: Lobby Name
      category: Euro Truck Simulator
      subcategory: Server
      description: Session name, limited to 63 characters.
      keywords: lobby,name
      input_type: text
      param_field_name: lobby_name
      default: Euro Truck Simulator Server - Powered by AMP
      placeholder: Euro Truck Simulator Server - Powered by AMP
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Lobby Name
        Category: Euro Truck Simulator:stadia_controller
        Subcategory: Server:dns:1
        Description: Session name, limited to 63 characters.
        Keywords: lobby,name
        FieldName: lobby_name
        InputType: text
        IsFlagArgument: false
        ParamFieldName: lobby_name
        IncludeInCommandLine: false
        DefaultValue: Euro Truck Simulator Server - Powered by AMP
        Placeholder: Euro Truck Simulator Server - Powered by AMP
