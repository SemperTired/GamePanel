schema: aetherpanel.template/v1
id: assetto-corsa-comp
name: Assetto Corsa Competizione
category: Imported
summary: Assetto Corsa Competizione Dedicated Server
install:
  method: steamcmd
  app_id: '1430110'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/wine {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: udpport
    name: UDP Port
    default: 9231
    protocol: udp
    required: true
  - key: tcpport
    name: TCP Port
    default: 9232
    protocol: tcp
    required: true
config_files:
  - path: server/cfg/configuration.json
    type: json
    editable: true
  - path: server/cfg/settings.json
    type: json
    editable: true
  - path: server/cfg/event.json
    type: json
    editable: true
  - path: server/cfg/assistRules.json
    type: json
    editable: true
config_schema:
