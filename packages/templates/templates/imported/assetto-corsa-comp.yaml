      label: UDP Port
      category: Assetto Corsa Competizione
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: udpPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: UDP Port
        Category: Assetto Corsa Competizione:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $UDPPort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: udpPort
        IncludeInCommandLine: false
        ExcludeFromImport: true
