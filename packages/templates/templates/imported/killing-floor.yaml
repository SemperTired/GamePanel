schema: aetherpanel.template/v1
id: killing-floor
name: Killing Floor
category: Imported
summary: Killing Floor Dedicated Server
install:
  method: steamcmd
  app_id: '215350'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/System/ucc-bin-real server
    {Map}{CustomUrlArgs}?game={Game}?VACSecured={VACSecured}?MaxPlayers={MaxUsers}?multihome={ApplicationIPBinding}?AdminName=admin?AdminPassword={AdminPassword}
    -Port={GamePort} -QueryPort={QueryPort} -WebAdminPort={WebAdminPort} -nohomedir -log=server.log {FormattedArgs}
    {CustomSwitches}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7707
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 7708
    protocol: udp
    required: true
  - key: gamespyport
    name: GameSpy Port
    default: 7717
    protocol: udp
    required: true
  - key: webadminport
    name: Web Admin Port
    default: 8075
    protocol: tcp
    required: true
  - key: steamport
    name: Steam Port
    default: 20560
    protocol: udp
    required: true
  - key: masterserverport
    name: Master Server Browser Port
    default: 28852
    protocol: both
    required: true
config_files:
  - path: System/KillingFloor.ini
    type: ini
    editable: true
config_schema:
  fields:
