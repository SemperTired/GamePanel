schema: aetherpanel.template/v1
id: rimworld-together
name: Rimworld Together - RimWorld Server
category: Imported
summary: Rimworld Together - a free multiplayer mod for RimWorld
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: GameServer {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 25555
    protocol: tcp
    required: true
config_files:
  - path: Configs/ServerConfig.json
    type: json
    editable: true
  - path: Configs/WhitelistConfig.json
    type: json
    editable: true
  - path: Configs/ServerBrowserConfig.json
    type: json
    editable: true
  - path: Configs/ChatConfig.json
    type: json
    editable: true
  - path: Configs/BackupConfig.json
    type: json
    editable: true
  - path: Configs/ActionConfig.json
    type: json
    editable: true
  - path: Configs/RoadConfig.json
    type: json
    editable: true
config_schema:
