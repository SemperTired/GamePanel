      label: Server Port
      category: Rimworld Together
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.Port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: Rimworld Together:stadia_controller
