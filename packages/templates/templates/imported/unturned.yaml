schema: aetherpanel.template/v1
id: unturned
name: Unturned
category: Imported
summary: Unturned 3 Dedicated Server with RocketMod and optional OpenMod
install:
  method: steamcmd
  app_id: '1110390'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 1110390/Unturned_Headless.x86_64 {PlatformArgs} -batchmode -nographics {FormattedArgs} +{ServerType}/{ServerID}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Game Port
    default: 27015
    protocol: both
    required: true
  - key: queryport
    name: Query Port
    default: 27016
    protocol: both
    required: true
  - key: remoteadminport
    name: RCON Port
    default: 27115
    protocol: tcp
    required: true
config_files:
  - path: Servers/{{ServerID}}/Server/Commands.dat
    type: text
    editable: true
  - path: Servers/{{ServerID}}/WorkshopDownloadConfig.json
    type: text
    editable: true
  - path: Servers/{{ServerID}}/Rocket/Rocket.config.xml
    type: xml
    editable: true
  - path: Servers/{{ServerID}}/OpenMod/openmod.unturned.yaml
    type: text
    editable: true
