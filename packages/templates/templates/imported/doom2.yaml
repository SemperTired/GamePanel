  files:
    - path: server.cfg
      type: kvp
      format: '{0} "{1}"'
      subsections: []
      raw:
        ConfigFile: server.cfg
        ConfigType: kvp
        AutoMap: true
        Importable: true
        ConfigFormat: '{0} "{1}"'
        ConfigFormatRegex: ^(?://)?(?<key>.+?)\s+"(?<value>.*?)"$
    - path: server.cfg
      type: kvp
      format: '{0} {1}'
      subsections: []
      raw:
        ConfigFile: server.cfg
        ConfigType: kvp
        AutoMap: true
        Importable: true
        ConfigFormat: '{0} {1}'
        ConfigFormatRegex: ^(?://)?(?<key>.+?)\s+(?<value>[^"]*?)$
