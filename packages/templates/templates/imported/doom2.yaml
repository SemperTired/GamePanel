schema: aetherpanel.template/v1
id: doom2
name: DOOM II (Zandronum Mod)
category: Imported
summary: DOOM II Dedicated Server using Zandronum Mod
install:
  method: steamcmd
  app_id: '2280'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/zandronum-server {PlatformArgs} -host -port {ServerPort} -iwad "{IWADPath}" {FormattedArgs} -useip
    {ApplicationIPBinding} {CustomArgs} +exec server.cfg +exec maps.cfg
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 10666
    protocol: udp
    required: true
config_files:
  - path: server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: sv_adminlistfile
      label: Admin List File
      category: DOOM II
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: sv_adminlistfile
      default: adminlist.txt
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Admin List File
        Category: DOOM II:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: sv_adminlistfile
        InputType: text
        ParamFieldName: sv_adminlistfile
        ExcludeFromImport: true
        Hidden: true
        DefaultValue: adminlist.txt
        EnumValues: {}
    - key: sv_colorstripmethod
      label: Color Strip Method
      category: DOOM II
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: sv_colorstripmethod
      default: '0'
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Color Strip Method
        Category: DOOM II:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: sv_colorstripmethod
        InputType: text
        ParamFieldName: sv_colorstripmethod
        ExcludeFromImport: true
        Hidden: true
        DefaultValue: '0'
        EnumValues: {}
    - key: IWADPath
      label: IWAD Path
      category: DOOM II
      subcategory: Server
      description: >-
        Sets the path to the DOOM II IWAD file to use. 'Default' assumes that AMP manages the download from Steam of the
        client files. If that is disabled under Updates, select 'Custom' and specify Custom IWAD Path accordingly
      keywords: iwad,path
      input_type: enum
      param_field_name: IWADPath
      default: client/base/doom2/DOOM2.WAD
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        client/base/doom2/DOOM2.WAD: Default
        '{{CustomIWADPath}}': Custom
      raw:
        DisplayName: IWAD Path
        Category: DOOM II:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the path to the DOOM II IWAD file to use. 'Default' assumes that AMP manages the download from Steam of
          the client files. If that is disabled under Updates, select 'Custom' and specify Custom IWAD Path accordingly
        Keywords: iwad,path
        FieldName: IWADPath
        InputType: enum
        ParamFieldName: IWADPath
        DefaultValue: client/base/doom2/DOOM2.WAD
        EnumValues:
          client/base/doom2/DOOM2.WAD: Default
          '{{CustomIWADPath}}': Custom
    - key: CustomIWADPath
      label: Custom IWAD Path
      category: DOOM II
      subcategory: Server
      description: Sets a custom path to use for the IWAD Path, if 'Custom' is selected
      keywords: custom,iwad,path
