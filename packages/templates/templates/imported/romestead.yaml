schema: aetherpanel.template/v1
id: romestead
name: Romestead
category: Imported
summary: Romestead Dedicated Server
install:
  method: steamcmd
  app_id: '4763510'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 4763510/Dotnet/dotnet {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 8050
    protocol: udp
    required: true
config_files:
  - path: config.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Game Port
      category: Romestead
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.Port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Romestead:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        Hidden: true
        ParamFieldName: $.Port
        ExcludeFromImport: true
        EnumValues: {}
