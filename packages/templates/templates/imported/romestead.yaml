        FieldName: AutoCreateWorldSize
        InputType: enum
        ParamFieldName: $.AutoCreateWorldSize
        DefaultValue: '1'
        EnumValues:
          '0': Small
          '1': Standard
          '2': Large
    - key: AutoCreateWorldSeed
      label: World Seed
      category: Romestead
      subcategory: Server
      description: Sets the seed for generation of a new world. Empty = random seed
      keywords: seed,world,generation,random,AutoCreateWorldSeed
      input_type: text
      param_field_name: $.AutoCreateWorldSeed
      default: ''
