        FieldName: AutoCreateWorldSeed
        InputType: text
        ParamFieldName: $.AutoCreateWorldSeed
        DefaultValue: ''
        EnumValues: {}
    - key: Password
      label: Server Password
      category: Romestead
      subcategory: Server
      description: Sets the password required to join the server. Empty = no password
