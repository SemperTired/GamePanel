    - key: EnableCheats
      label: Enable Cheats
      category: Romestead
      subcategory: Server
      description: If set, cheats will be enabled on the server. Not currently used
      keywords: enable,cheats,commands,console,EnableCheats
      input_type: checkbox
      param_field_name: $.EnableCheats
      default: 'false'
      required: false
      sensitive: false
