        FieldName: DotnetVersion
        InputType: text
        ParamFieldName: DotnetVersion
        DefaultValue: ''
        Placeholder: 8.0.27
        EnumValues: {}
  files:
    - path: config.json
      type: json
      subsections: []
      raw:
        ConfigFile: config.json
        AutoMap: true
        Importable: true
        ConfigType: json
environment: {}
startup_variables:
  - key: AutoCreateAndLoadWorld
    label: Create New World
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: AutoStartWorldName
    label: World Name
    default: world
    customer_editable: true
    required: true
    sensitive: false
  - key: AutoCreateWorldSize
    label: World Size
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: AutoCreateWorldSeed
    label: World Seed
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: Password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: EnableCheats
    label: Enable Cheats
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: DotnetVersion
    label: Dotnet Version
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '1805320'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

