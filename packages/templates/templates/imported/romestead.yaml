        DefaultValue: 'true'
        EnumValues: {}
    - key: AutoStartWorldName
      label: World Name
      category: Romestead
      subcategory: Server
      description: >-
        Sets the name of the world to load when the server starts. A new world will be generated if it does not already
        exist
      keywords: world,name,map,save,AutoStartWorldName
      input_type: text
      param_field_name: $.AutoStartWorldName
      default: world
      placeholder: world
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Name
        Category: Romestead:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the name of the world to load when the server starts. A new world will be generated if it does not
          already exist
        Keywords: world,name,map,save,AutoStartWorldName
        FieldName: AutoStartWorldName
        InputType: text
        ParamFieldName: $.AutoStartWorldName
        Required: true
        DefaultValue: world
        Placeholder: world
        EnumValues: {}
    - key: AutoCreateWorldSize
      label: World Size
      category: Romestead
      subcategory: Server
      description: Sets the size for generation of a new world. A large world requires at least 8GB of RAM to generate
      keywords: world,size,map,generation,AutoCreateWorldSize
      input_type: enum
      param_field_name: $.AutoCreateWorldSize
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Small
        '1': Standard
        '2': Large
