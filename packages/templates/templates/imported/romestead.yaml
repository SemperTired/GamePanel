    - key: DotnetVersion
      label: Dotnet Version
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        Sets the [.NET Runtime 8.0 version](https://dotnet.microsoft.com/en-us/download/dotnet/8.0) to install. Empty =
        latest. Update the server after changing this setting
      keywords: dotnet,version
      input_type: text
      param_field_name: DotnetVersion
      default: ''
      placeholder: 8.0.27
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
