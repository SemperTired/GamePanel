      label: Player Limit
      category: Romestead
      subcategory: Server
      description: Sets the maximum number of players allowed on the server at one time
      keywords: player,limit,max,maximum,players,slots,MaxPlayers
      input_type: number
      param_field_name: $.MaxPlayers
      default: '8'
      placeholder: '8'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
