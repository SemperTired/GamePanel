schema: aetherpanel.template/v1
id: arma-reforger
name: Arma Reforger
category: Imported
summary: Arma Reforger Dedicated Server
install:
  method: steamcmd
  app_id: '1874900'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    1874900/ArmaReforgerServer {PlatformArgs} -gproj "{FullBaseDir}addons/data/ArmaReforger.gproj" -profile
    "{FullBaseDir}AReforgerMaster" -bepath "{FullBaseDir}battleye" -bindPort {GamePort} -a2sPort {QueryPort} -config
    "{FullBaseDir}Configs/serverconfig.json" -a2sIpAddress {ApplicationIPBinding} -listScenarios -noThrow
    {FormattedArgs} {addonsVerify}{addonsRepair}{logStats} {CustomServerArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 2001
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 17777
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 19999
    protocol: udp
    required: true
config_files:
  - path: Configs/serverconfig.json
    type: text
    editable: true
