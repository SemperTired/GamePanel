      label: Day-Night Cycle Speed Multiplier
      category: Abiotic Factor
      subcategory: Sandbox
      description: >-
        Sets the speed multiplier for the day-night cycle. Higher will make clock time pass faster. This will NOT affect
        the speed of other cooldowns, respawn times, and so on
