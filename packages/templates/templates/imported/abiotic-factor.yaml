        installed, allowing the server to be modded
      keywords: install,ue4ss,unreal,engine,scripting,system,igromanru,modding
      input_type: enum
      param_field_name: InstallUE4SS
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Do nothing (default)
        'false': Remove UE4SS files
        'true': Install latest igromanru build
      raw:
        DisplayName: Install UE Scripting System
        Category: Updates
        Subcategory: Runtime Configuration:build:3
        Description: >-
          Sets the action to take when the server is updated. If the installation option is selected, the latest build
          of the [igromanru experimental Unreal Engine 4/5 Scripting System](https://github.com/igromanru/AF-UE4SS) will
          be installed, allowing the server to be modded
        Keywords: install,ue4ss,unreal,engine,scripting,system,igromanru,modding
        FieldName: InstallUE4SS
        InputType: enum
        ParamFieldName: InstallUE4SS
        DefaultValue: ''
        EnumValues:
          '': Do nothing (default)
          'false': Remove UE4SS files
          'true': Install latest igromanru build
