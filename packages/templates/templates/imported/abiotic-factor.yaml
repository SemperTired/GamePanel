schema: aetherpanel.template/v1
id: abiotic-factor
name: Abiotic Factor
category: Imported
summary: Abiotic Factor Dedicated Server
install:
  method: steamcmd
  app_id: '2857200'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} AbioticFactor -stdout -FullStdOutLogOutput
    {useperfthreads}{NoAsyncLoadingThread}{useallavailablecores}{LANOnly}{UseLocalIPs} -Port={GamePort}
    -QueryPort={QueryPort} -SteamServerName="{ServerName}" -SandboxIniPath=Config/WindowsServer/SandboxSettings.ini
    {FormattedArgs} {CustomArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: AbioticFactor/Saved/Config/WindowsServer/SandboxSettings.ini
    type: ini
    editable: true
  - path: AbioticFactor/Binaries/Win64/ue4ss/UE4SS-settings.ini
    type: ini
    editable: true
