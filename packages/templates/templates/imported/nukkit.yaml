schema: aetherpanel.template/v1
id: nukkit
name: Nukkit
category: Imported
summary: Cloudburst Nukkit Server for Minecraft Bedrock
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://repo.opencollab.dev/api/maven/latest/file/maven-snapshots/cn/nukkit/nukkit/1.0-SNAPSHOT?extension=jar
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    {JavaVersion} -Xms{MinMemory}M -Xmx{MaxMemory}M -Dfile.encoding=UTF-8 {AdditionalJavaArgs} -jar nukkit.jar
    {JarOptions}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 19132
    protocol: both
    required: true
config_files:
  - path: server.properties
    type: text
    editable: true
  - path: nukkit.yml
    type: text
    editable: true
config_schema:
  fields:
    - key: motd
      label: Server Name
      category: Nukkit
      subcategory: Server
      description: Sets the name of the server that is shown in the in-game server list. No semi-colons allowed
      keywords: motd,server,name
      input_type: text
      param_field_name: motd
      default: AMP Powered Nukkit Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Nukkit:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that is shown in the in-game server list. No semi-colons allowed
        Keywords: motd,server,name
        FieldName: motd
        InputType: text
        ParamFieldName: motd
        DefaultValue: AMP Powered Nukkit Server
        EnumValues: {}
    - key: sub-motd
      label: Server Sub MOTD
      category: Nukkit
      subcategory: Server
      description: Sets the second line of the MOTD for the server, shown only in LAN
      keywords: sub-motd,server,message
      input_type: text
      param_field_name: sub-motd
      default: Made with Nukkit
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Sub MOTD
        Category: Nukkit:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the second line of the MOTD for the server, shown only in LAN
        Keywords: sub-motd,server,message
        FieldName: sub-motd
        InputType: text
        ParamFieldName: sub-motd
        DefaultValue: Made with Nukkit
        EnumValues: {}
    - key: generator-settings
      label: Generator Settings
      category: Nukkit
      subcategory: Server
      description: Sets settings to customise the world generation process
      keywords: generator,settings,generator-settings
      input_type: text
      param_field_name: generator-settings
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Generator Settings
        Category: Nukkit:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets settings to customise the world generation process
        Keywords: generator,settings,generator-settings
        FieldName: generator-settings
        InputType: text
        ParamFieldName: generator-settings
        DefaultValue: ''
        EnumValues: {}
    - key: level-name
      label: Level Name
      category: Nukkit
      subcategory: Server
      description: >-
        Sets the name of the level (world) to load, or create if it does not exist. No semi-colons allowed, nor any
        symbols that are illegal for file names. Levels are stored in the 'worlds' directory
      keywords: level,world,name,level-name
      input_type: text
      param_field_name: level-name
      default: world
      placeholder: world
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Level Name
        Category: Nukkit:stadia_controller
