        EnumValues: {}
    - key: level-type
      label: Level Type
      category: Nukkit
      subcategory: Server
      description: Sets the type of map that is generated for a new world
      keywords: level,type,level-type
      input_type: enum
      param_field_name: level-type
      default: default
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        default: Default
        normal: Normal
        flat: Flat
        nether: Nether
        the_end: The End
        void: Void
      raw:
