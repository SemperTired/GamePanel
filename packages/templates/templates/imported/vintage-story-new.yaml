schema: aetherpanel.template/v1
id: vintage-story-new
name: Vintage Story 1.18.8+
category: Imported
summary: Vintage Story Dedicated Server, from v1.18.8+
install:
  method: custom
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: server/VintagestoryServer {PlatformArgs} --port {ServerPort} --dataPath "../data" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 42420
    protocol: both
    required: true
config_files:
  - path: data/serverconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Port
      category: Vintage Story
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.Port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Port
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: $.Port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: AdvertiseServer
      label: Make Server Public
      category: Vintage Story
      subcategory: Server
      description: If enabled, the server will be added to the public server listing
      keywords: public
      input_type: checkbox
      param_field_name: $.AdvertiseServer
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Make Server Public
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will be added to the public server listing
        Keywords: public
        FieldName: AdvertiseServer
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.AdvertiseServer
        IncludeInCommandLine: false
        DefaultValue: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: ServerName
      label: Server Name
      category: Vintage Story
      subcategory: Server
      description: Server name visible in the server list
      keywords: server,name
      input_type: text
      param_field_name: $.ServerName
      default: Vintage Story Server - Powered by AMP
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: Server name visible in the server list
        Keywords: server,name
        FieldName: ServerName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.ServerName
        IncludeInCommandLine: false
        DefaultValue: Vintage Story Server - Powered by AMP
        EnumValues: {}
    - key: WelcomeMessage
      label: Welcome Message
      category: Vintage Story
      subcategory: Server
      description: Welcome message when players join the server. Placeholder {0} will be replaced with the player's nickname
      keywords: welcome,message,motd
      input_type: text
      param_field_name: $.WelcomeMessage
      default: Welcome, {0}, may you survive well and prosper
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Welcome Message
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: Welcome message when players join the server. Placeholder {0} will be replaced with the player's nickname
        Keywords: welcome,message,motd
        FieldName: WelcomeMessage
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.WelcomeMessage
        IncludeInCommandLine: false
        DefaultValue: Welcome, {0}, may you survive well and prosper
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Vintage Story
      subcategory: Server
      description: Maximum number of players that may connect to the server
      keywords: players,limit
      input_type: number
      param_field_name: $.MaxClients
      default: '16'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: Maximum number of players that may connect to the server
        Keywords: players,limit
        FieldName: $MaxUsers
        InputType: number
        IsFlagArgument: false
        ParamFieldName: $.MaxClients
        IncludeInCommandLine: false
        DefaultValue: '16'
        Suffix: players
        EnumValues: {}
        MinValue: '1'
    - key: WhitelistMode
      label: Whitelist Mode
      category: Vintage Story
      subcategory: Server
      description: >-
        Sets whether the whitelist is enabled, meaning only whitelisted players can join the server. Default = enabled.
        Only for versions 1.20 and above
      keywords: whitelist,mode,WhitelistMode
      input_type: enum
      param_field_name: $.WhitelistMode
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Default
        '1': 'Off'
        '2': 'On'
      raw:
        DisplayName: Whitelist Mode
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether the whitelist is enabled, meaning only whitelisted players can join the server. Default =
          enabled. Only for versions 1.20 and above
        Keywords: whitelist,mode,WhitelistMode
        FieldName: WhitelistMode
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: $.WhitelistMode
        IncludeInCommandLine: false
        DefaultValue: '0'
        EnumValues:
          '0': Default
          '1': 'Off'
          '2': 'On'
    - key: OnlyWhitelisted
      label: Enable Whitelist (Legacy)
      category: Vintage Story
      subcategory: Server
      description: If enabled, only whitelisted players can join the server. Only for versions 1.19 and below
      keywords: whitelist
      input_type: checkbox
      param_field_name: $.OnlyWhitelisted
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Enable Whitelist (Legacy)
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, only whitelisted players can join the server. Only for versions 1.19 and below
        Keywords: whitelist
        FieldName: OnlyWhitelisted
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.OnlyWhitelisted
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: AllowPvP
      label: Allow PvP
      category: Vintage Story
      subcategory: Server
      description: If enabled, players can hit other players
      keywords: pvp
      input_type: checkbox
      param_field_name: $.AllowPvP
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Allow PvP
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, players can hit other players
        Keywords: pvp
        FieldName: AllowPvP
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.AllowPvP
        IncludeInCommandLine: false
        DefaultValue: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: Upnp
      label: Enable UPnP
      category: Vintage Story
      subcategory: Server
      description: If enabled, the server will attempt to configure automatic port forwarding on a compatible router
      keywords: upnp
      input_type: checkbox
      param_field_name: $.Upnp
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Enable UPnP
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will attempt to configure automatic port forwarding on a compatible router
        Keywords: upnp
        FieldName: Upnp
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.Upnp
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: ServerReleaseStream
      label: Server Release Stream
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets the server release stream from which to install the latest server version (for Stable and Unstable only),
        unless a specific version is specified under Server Version. Update the server after changing this setting
      keywords: server,release,stream
      input_type: enum
      param_field_name: ServerReleaseStream
      default: stable
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        stable: Stable (default)
        unstable: Unstable
        pre: Preview
      raw:
        DisplayName: Server Release Stream
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets the server release stream from which to install the latest server version (for Stable and Unstable only),
          unless a specific version is specified under Server Version. Update the server after changing this setting
        Keywords: server,release,stream
        FieldName: ServerReleaseStream
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: ServerReleaseStream
        IncludeInCommandLine: false
        DefaultValue: stable
        EnumValues:
          stable: Stable (default)
          unstable: Unstable
          pre: Preview
    - key: ServerVersion
      label: Server Version
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets the server version to install. Empty = latest version if Stable or Unstable is selected under Server
        Release Stream. For Preview, a version identifier must be specified. Minimum 1.18.8. For Linux ARM64, a
        corresponding [ARM64 experimental server version](https://github.com/anegostudios/VintagestoryServerArm64) must
        exist. Update the server after changing this setting
      keywords: server,version
      input_type: text
      param_field_name: ServerVersion
      default: ''
      placeholder: 1.18.15 | 1.20.0-rc.1 | 1.20.0-pre.13
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Version
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets the server version to install. Empty = latest version if Stable or Unstable is selected under Server
          Release Stream. For Preview, a version identifier must be specified. Minimum 1.18.8. For Linux ARM64, a
          corresponding [ARM64 experimental server version](https://github.com/anegostudios/VintagestoryServerArm64)
          must exist. Update the server after changing this setting
        Keywords: server,version
        FieldName: ServerVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: ServerVersion
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: 1.18.15 | 1.20.0-rc.1 | 1.20.0-pre.13
        EnumValues: {}
    - key: ServerDownloadSource
      label: Server Download Source
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets the source location to download the server from. Use the Alternative mirror if the Default CDN is not
        working. NOTE: Update the server after changing this setting!
      keywords: server,download,source,cdn,mirror
      input_type: enum
      param_field_name: ServerDownloadSource
      default: cdn.vintagestory.at/gamefiles
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        cdn.vintagestory.at/gamefiles: Default CDN
        account.vintagestory.at/files: Alternative mirror
      raw:
        DisplayName: Server Download Source
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets the source location to download the server from. Use the Alternative mirror if the Default CDN is not
          working. NOTE: Update the server after changing this setting!
        Keywords: server,download,source,cdn,mirror
        FieldName: ServerDownloadSource
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: ServerDownloadSource
        IncludeInCommandLine: false
        DefaultValue: cdn.vintagestory.at/gamefiles
        EnumValues:
          cdn.vintagestory.at/gamefiles: Default CDN
          account.vintagestory.at/files: Alternative mirror
    - key: DotnetRelease
      label: Dotnet Release Stream
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets the .NET release stream from which to install the latest .NET SDK version, unless a specific version is
        specified under Dotnet Version. Use 8.0 for Vintage Story v1.21.x and 10.0 for Vintage Story v1.22.x. Update the
        server after changing this setting
      keywords: dotnet,release,stream
      input_type: enum
      param_field_name: DotnetRelease
      default: '10.0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '10.0': 10.0 (default)
        '8.0': '8.0 '
        '7.0': '7.0'
      raw:
        DisplayName: Dotnet Release Stream
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets the .NET release stream from which to install the latest .NET SDK version, unless a specific version is
          specified under Dotnet Version. Use 8.0 for Vintage Story v1.21.x and 10.0 for Vintage Story v1.22.x. Update
          the server after changing this setting
        Keywords: dotnet,release,stream
        FieldName: DotnetRelease
        InputType: enum
        ParamFieldName: DotnetRelease
        IncludeInCommandLine: false
        DefaultValue: '10.0'
        EnumValues:
          '10.0': 10.0 (default)
          '8.0': '8.0 '
          '7.0': '7.0'
    - key: DotnetSDKVersion
      label: Dotnet Version
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets the .NET SDK [7.0](https://dotnet.microsoft.com/en-us/download/dotnet/7.0),
        [8.0](https://dotnet.microsoft.com/en-us/download/dotnet/8.0) or
        [10.0](https://dotnet.microsoft.com/en-us/download/dotnet/10.0) version to install. Empty = latest version for
        the release stream specified under Dotnet Release Stream. Use an 8.0 version for Vintage Story v1.21.x, and a
        10.0 version for Vintage Story v1.22.x. Update the server after changing this setting
      keywords: dotnet,version
      input_type: text
      param_field_name: DotnetSDKVersion
      default: ''
      placeholder: 8.0.316
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Dotnet Version
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets the .NET SDK [7.0](https://dotnet.microsoft.com/en-us/download/dotnet/7.0),
          [8.0](https://dotnet.microsoft.com/en-us/download/dotnet/8.0) or
          [10.0](https://dotnet.microsoft.com/en-us/download/dotnet/10.0) version to install. Empty = latest version for
          the release stream specified under Dotnet Release Stream. Use an 8.0 version for Vintage Story v1.21.x, and a
          10.0 version for Vintage Story v1.22.x. Update the server after changing this setting
        Keywords: dotnet,version
        FieldName: DotnetSDKVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: DotnetSDKVersion
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: 8.0.316
        EnumValues: {}
  files:
    - path: data/serverconfig.json
      type: json
      subsections: []
      raw:
        ConfigFile: data/serverconfig.json
        AutoMap: true
        ConfigType: json
environment: {}
startup_variables:
  - key: AdvertiseServer
    label: Make Server Public
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerName
    label: Server Name
    default: Vintage Story Server - Powered by AMP
    customer_editable: true
    required: false
    sensitive: false
  - key: WelcomeMessage
    label: Welcome Message
    default: Welcome, {0}, may you survive well and prosper
    customer_editable: true
    required: false
    sensitive: false
  - key: WhitelistMode
    label: Whitelist Mode
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: OnlyWhitelisted
    label: Enable Whitelist (Legacy)
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: AllowPvP
    label: Allow PvP
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: Upnp
    label: Enable UPnP
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerReleaseStream
    label: Server Release Stream
    default: stable
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerVersion
    label: Server Version
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerDownloadSource
    label: Server Download Source
    default: cdn.vintagestory.at/gamefiles
    customer_editable: true
    required: false
    sensitive: false
  - key: DotnetRelease
    label: Dotnet Release Stream
    default: '10.0'
    customer_editable: true
    required: false
    sensitive: false
  - key: DotnetSDKVersion
    label: Dotnet Version
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: false
  providers: []
  collection_support: false
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
