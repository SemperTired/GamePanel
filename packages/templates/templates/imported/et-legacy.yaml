schema: aetherpanel.template/v1
id: et-legacy
name: 'ET: Legacy'
category: Imported
summary: 'ET: Legacy Dedicated Server - a Wolfenstein: Enemy Territory server'
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://cdn.splashdamage.com/downloads/games/wet/WolfET_2_60b_custom.exe
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/etlded.{ServerVersion} +set fs_basepath "{FullBaseDir}" +set fs_homepath "{FullBaseDir}data" +exec
    etl_server.cfg +set fs_game "{mod}" +set net_port {ServerPort} +set net_port6 {ServerPort} +set net_ip
    "{ApplicationIPBinding}" +set net_ip6 "{net_ip6}" +set rconpassword "{RemoteAdminPassword}" {FormattedArgs}
    {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 27960
    protocol: both
    required: true
config_files:
  - path: etmain/etl_server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: ET Legacy
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: net_port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: ET Legacy:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
