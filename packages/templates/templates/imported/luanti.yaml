schema: aetherpanel.template/v1
id: luanti
name: Luanti
category: Imported
summary: Luanti Dedicated Server (versions 5.10.0+)
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: >-
    https://github.com/minetest/minetest/releases/download/%7B%7BServerVersion%7D%7D/luanti-%7B%7BServerVersion%7D%7D-win64.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/bin/luantiserver {PlatformArgs} --port {ServerPort} --config "{FullBaseDir}minetest.conf" --world
    "{FullBaseDir}worlds/{worldname}" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 30000
    protocol: udp
    required: true
config_files:
  - path: minetest.conf
    type: text
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: Luanti
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: Luanti:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        Hidden: true
        InputType: number
        ParamFieldName: port
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Server IP Binding
      category: Luanti
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: bind_address
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server IP Binding
        Category: Luanti:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationIPBinding
