      subcategory: Server
      description: >-
        If enabled, the server will be automatically reported to the server list that is specified under Server List
        URL. The server port must be accessible externally for the server to be listed
      keywords: server,announce,public,server_announce
      input_type: checkbox
      param_field_name: server_announce
