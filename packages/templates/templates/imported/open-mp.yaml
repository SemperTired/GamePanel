    - key: sleep
      label: Sleep Period
      category: open.mp
      subcategory: Server
      description: >-
        Sets how long the main open.mp and raknet networking thread will 'sleep' idly during each sync cycle. Higher
        values decrease server processing, but reduce sync quality, and vice versa. Don't change this unless your player
        count is very high and you have server FPS stability issues
      keywords: sleep,networking,thread
      input_type: number
      param_field_name: $.sleep
      default: '5.0'
      placeholder: '5.0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: milliseconds
      enum_values: {}
      raw:
        DisplayName: Sleep Period
        Category: open.mp:stadia_controller
        Subcategory: Server:dns:1
