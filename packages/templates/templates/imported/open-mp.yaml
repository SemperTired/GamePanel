schema: aetherpanel.template/v1
id: open-mp
name: 'open.mp - Grand Theft Auto: San Andreas Server'
category: Imported
summary: 'open.mp Multiplayer Mod for Grand Theft Auto: San Andreas'
install:
  method: custom
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: server/omp-server {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 7777
    protocol: both
    required: true
config_files:
  - path: config.json
    type: json
    editable: true
config_schema:
