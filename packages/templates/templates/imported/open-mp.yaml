          values decrease server processing, but reduce sync quality, and vice versa. Don't change this unless your
          player count is very high and you have server FPS stability issues
        Keywords: sleep,networking,thread
        FieldName: sleep
        InputType: number
        ParamFieldName: $.sleep
        DefaultValue: '5.0'
        Placeholder: '5.0'
        Suffix: milliseconds
        EnumValues: {}
    - key: use_dyn_ticks
      label: Use Dynamic Ticks
      category: open.mp
      subcategory: Server
      description: >-
        If set, the server's tickrate will be kept at a constant count by using CPU more to cover the gap if there's any
        drop. The count is based on the Sleep Period (for example, Sleep Period of 5 = constant tick count of 200 ticks
        per second)
