schema: aetherpanel.template/v1
id: tmodloader
name: tModLoader (Legacy)
category: Imported
summary: tModLoader (Legacy) server using Steam or GitHub
install:
  method: steamcmd
  app_id: '1281930'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    serverfiles/tModLoaderServer -server {FormattedArgs} -players {MaxUsers} -port {ApplicationPort1} -config
    tmodloaderserverconfig.txt
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Server Port
    default: 7777
    protocol: both
    required: true
config_files:
  - path: tmodloaderserverconfig.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: Seed
      label: World Seed
      category: Terraria
      subcategory: Generation
      description: Which world seed to use when generating a new world
      keywords: seed,new,world
      input_type: text
      param_field_name: seed
      default: PoweredByAMP
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Seed
        Category: Terraria:stadia_controller
        Subcategory: Generation:globe:1
        Keywords: seed,new,world
        Description: Which world seed to use when generating a new world
        FieldName: Seed
        ParamFieldName: seed
        placeholder: PoweredByAMP
        InputType: text
        IncludeInCommandLine: true
        DefaultValue: PoweredByAMP
    - key: WorldSize
      label: World Size
      category: Terraria
      subcategory: Generation
      description: Set the Size of the World
      keywords: size,new,world
      input_type: enum
      param_field_name: autocreate
      default: '3'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '1': 1 - Small World
        '2': 2 - Medium World
        '3': 3 - Large World
      raw:
        DisplayName: World Size
        Category: Terraria:stadia_controller
        Subcategory: Generation:globe:1
        Keywords: size,new,world
        Description: Set the Size of the World
        FieldName: WorldSize
        ParamFieldName: autocreate
        IncludeInCommandLine: true
        InputType: enum
        EnumValues:
          '1': 1 - Small World
          '2': 2 - Medium World
          '3': 3 - Large World
        DefaultValue: '3'
    - key: Difficulty
      label: Difficulty
      category: Terraria
      subcategory: Generation
      description: The difficulty of a newly generated world
      keywords: difficulty,new,world,journey,expert,master
      input_type: enum
      param_field_name: difficulty
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Classic
        '1': Expert
      raw:
        DisplayName: Difficulty
        Category: Terraria:stadia_controller
        Subcategory: Generation:globe:1
        Keywords: difficulty,new,world,journey,expert,master
        Description: The difficulty of a newly generated world
        FieldName: Difficulty
        ParamFieldName: difficulty
        InputType: enum
        EnumValues:
          '0': Classic
          '1': Expert
        IncludeInCommandLine: false
        DefaultValue: '0'
    - key: WorldName
      label: Created World Name
      category: Terraria
      subcategory: Generation
      description: >-
        How to name the new world if one is generated. Make sure the World name under Terraria Server Settings matches
        this name if you want to load it in subsequent starts.
      keywords: name,new,world
      input_type: text
      param_field_name: worldname
      default: world
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Created World Name
        Category: Terraria:stadia_controller
        Subcategory: Generation:globe:1
        Keywords: name,new,world
        Description: >-
          How to name the new world if one is generated. Make sure the World name under Terraria Server Settings matches
          this name if you want to load it in subsequent starts.
        FieldName: WorldName
        ParamFieldName: worldname
        placeholder: World
        InputType: text
        IncludeInCommandLine: true
        DefaultValue: world
    - key: Backups
      label: Backup count
      category: Terraria
      subcategory: Generation
      description: Sets the number of rolling world backups to keep
      keywords: backup,backups,count,world,rollback
      input_type: number
      param_field_name: worldrollbackstokeep
      default: '2'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Backup count
        Category: Terraria:stadia_controller
        Subcategory: Generation:globe:1
        Keywords: backup,backups,count,world,rollback
        Description: Sets the number of rolling world backups to keep
        FieldName: Backups
        ParamFieldName: worldrollbackstokeep
        placeholder: '2'
        suffix: Backups
        InputType: number
        IncludeInCommandLine: false
        DefaultValue: 2
    - key: ModPath
      label: Mod Path
      category: Terraria
      subcategory: ModLoader
      description: >-
        Where tModLoader will read mods from.
        [instructions](https://github.com/jasperfirecai2/AetherPanel-templates/wiki/Managing-mods-with-tmodloader)
      keywords: folder,path,mod,mods,tmodloader
      input_type: text
      param_field_name: modpath
      default: ModLoader/Mods
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Mod Path
        Category: Terraria:stadia_controller
        Subcategory: ModLoader:upload:2
        Keywords: folder,path,mod,mods,tmodloader
        Description: >-
          Where tModLoader will read mods from.
          [instructions](https://github.com/jasperfirecai2/AetherPanel-templates/wiki/Managing-mods-with-tmodloader)
        FieldName: ModPath
        ParamFieldName: modpath
        placeholder: ModLoader/Mods
        InputType: text
        IncludeInCommandLine: false
        DefaultValue: ModLoader/Mods
    - key: ModPack
      label: Mod Pack
      category: Terraria
      subcategory: ModLoader
      description: Which modpack to load (does not install mods for you!)
      keywords: pack,mod,mods,modpack,tmodloader
      input_type: text
      param_field_name: modpack
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Mod Pack
        Category: Terraria:stadia_controller
        Subcategory: ModLoader:upload:2
        Keywords: pack,mod,mods,modpack,tmodloader
        Description: Which modpack to load (does not install mods for you!)
        FieldName: ModPack
        ParamFieldName: modpack
        placeholder: modpack
        suffix: .json
        InputType: text
        IncludeInCommandLine: false
        DefaultValue: ''
    - key: Source
      label: Update Source
      category: Updates
      subcategory: Server Updates
      description: >-
        Select where to obtain tModLoader. Steam requires you to own
        [Terraria](https://store.steampowered.com/app/105600/Terraria/) &
        [tModLoader](https://store.steampowered.com/app/1281930/tModLoader/) on your account and accept tModLoader's ToS
        by installing it as a game to a device you can login from.
      keywords: download,source,steam,github,tmodloader
      input_type: enum
      default: GitHub
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        GitHub: GitHub
        Steam: Steam
      raw:
        DisplayName: Update Source
        Category: Updates
        Subcategory: Server Updates:build:-1
        Keywords: download,source,steam,github,tmodloader
        Description: >-
          Select where to obtain tModLoader. Steam requires you to own
          [Terraria](https://store.steampowered.com/app/105600/Terraria/) &
          [tModLoader](https://store.steampowered.com/app/1281930/tModLoader/) on your account and accept tModLoader's
          ToS by installing it as a game to a device you can login from.
        FieldName: Source
        IncludeInCommandLine: false
        InputType: enum
        EnumValues:
          GitHub: GitHub
          Steam: Steam
        DefaultValue: GitHub
    - key: BetaBranch
      label: Server Branch
      category: Updates
      subcategory: Server Updates
      description: 'Sets the beta branch to install. NOTE: Update Source MUST be Steam. Press update AFTER changing this setting.'
      keywords: branch,depot,beta,steam,version
      input_type: text
      param_field_name: BetaBranch
      default: 1.3-legacy
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Branch
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: 'Sets the beta branch to install. NOTE: Update Source MUST be Steam. Press update AFTER changing this setting.'
        Keywords: branch,depot,beta,steam,version
        FieldName: BetaBranch
        InputType: text
        IsFlagArgument: false
        ParamFieldName: BetaBranch
        IncludeInCommandLine: false
        DefaultValue: 1.3-legacy
        placeholder: 1.3-legacy
    - key: WorldPath
      label: World Path
      category: Terraria
      subcategory: Server
      description: The relative path to save worlds in
      keywords: folder,path,world,saves,savegame,worlds
      input_type: text
      param_field_name: worldpath
      default: ModLoader/Worlds
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Path
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: folder,path,world,saves,savegame,worlds
        Description: The relative path to save worlds in
        FieldName: WorldPath
        ParamFieldName: worldpath
        placeholder: ModLoader/Worlds
        suffix: ''
        InputType: text
        IncludeInCommandLine: false
        DefaultValue: ModLoader/Worlds
    - key: World
      label: World Name
      category: Terraria
      subcategory: Server
      description: Which world to load on boot
      keywords: name,world,worldname,load,boot
      input_type: text
      param_field_name: world
      default: ModLoader/Worlds/world.wld
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Name
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: name,world,worldname,load,boot
        Description: Which world to load on boot
        FieldName: World
        ParamFieldName: world
        placeholder: ModLoader/Worlds/world.wld
        suffix: ''
        InputType: text
        IncludeInCommandLine: true
        DefaultValue: ModLoader/Worlds/world.wld
    - key: $MaxUsers
      label: Max Players
      category: Terraria
      subcategory: Server
      description: The maximum players in the server
      keywords: players,max,maximum
      input_type: number
      param_field_name: maxplayers
      default: '8'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      enum_values: {}
      raw:
        DisplayName: Max Players
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: players,max,maximum
        Description: The maximum players in the server
        FieldName: $MaxUsers
        ParamFieldName: maxplayers
        placeholder: '8'
        suffix: Users
        InputType: number
        IncludeInCommandLine: false
        DefaultValue: '8'
        MinValue: '1'
    - key: Password
      label: Password
      category: Terraria
      subcategory: Server
      description: The password players must enter to join
      keywords: password,pw,security
      input_type: password
      param_field_name: password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Password
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: password,pw,security
        Description: The password players must enter to join
        FieldName: Password
        ParamFieldName: password
        placeholder: Password123
        suffix: ''
        InputType: password
        IncludeInCommandLine: false
        DefaultValue: ''
    - key: BanList
      label: Ban List
      category: Terraria
      subcategory: Server
      description: Where to store the ban list
      keywords: ban,banlist,bans,security
      input_type: text
      param_field_name: banlist
      default: banlist.txt
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Ban List
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: ban,banlist,bans,security
        Description: Where to store the ban list
        FieldName: BanList
        ParamFieldName: banlist
        placeholder: banlist.txt
        suffix: ''
        InputType: text
        IncludeInCommandLine: false
        DefaultValue: banlist.txt
    - key: Motd
      label: Motd
      category: Terraria
      subcategory: Server
      description: The motto/message of the day
      keywords: motd,motto,message,welcome
      input_type: text
      param_field_name: motd
      default: Welcome!
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Motd
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: motd,motto,message,welcome
        Description: The motto/message of the day
        FieldName: Motd
        ParamFieldName: motd
        placeholder: Welcome!
        suffix: ''
        InputType: text
        IncludeInCommandLine: false
        DefaultValue: Welcome!
    - key: Language
      label: Language
      category: Terraria
      subcategory: Server
      description: The language of your server
      keywords: language,lang
      input_type: enum
      param_field_name: language
      default: en-US
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        en-US: English
        de-DE: German
        it-IT: Italian
        fr-FR: French
        es-ES: Spanish
        ru-RU: Russian
        zh-Hans: Chinese
        pt-PT: Portuguese
        pt-BR: Portuguese (Brazil)
        pl-PL: Polish
      raw:
        DisplayName: Language
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: language,lang
        Description: The language of your server
        FieldName: Language
        ParamFieldName: language
        InputType: enum
        EnumValues:
          en-US: English
          de-DE: German
          it-IT: Italian
          fr-FR: French
          es-ES: Spanish
          ru-RU: Russian
          zh-Hans: Chinese
          pt-PT: Portuguese
          pt-BR: Portuguese (Brazil)
          pl-PL: Polish
        IncludeInCommandLine: false
        DefaultValue: en-US
    - key: Priority
      label: Priority
      category: Terraria
      subcategory: Server
      description: The process priority
      keywords: priority,process,prio,performance
      input_type: enum
      param_field_name: priority
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Realtime
        '1': High
        '2': AboveNormal
        '3': Normal
        '4': BelowNormal
        '5': Idle
      raw:
        DisplayName: Priority
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: priority,process,prio,performance
        Description: The process priority
        FieldName: Priority
        ParamFieldName: priority
        InputType: enum
        EnumValues:
          '0': Realtime
          '1': High
          '2': AboveNormal
          '3': Normal
          '4': BelowNormal
          '5': Idle
        IncludeInCommandLine: false
        DefaultValue: '1'
    - key: NPCStream
      label: NPC Stream
      category: Terraria
      subcategory: Server
      description: >-
        Reduces enemy skipping but increases bandwidth usage. The lower the number the less skipping will happen, but
        more data is sent. 0 is off.
      keywords: npc,stream,skipping,lag,bandwidth,performance
      input_type: number
      param_field_name: npcstream
      default: '60'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: NPC Stream
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: npc,stream,skipping,lag,bandwidth,performance
        Description: >-
          Reduces enemy skipping but increases bandwidth usage. The lower the number the less skipping will happen, but
          more data is sent. 0 is off.
        FieldName: NPCStream
        ParamFieldName: npcstream
        placeholder: '60'
        InputType: number
        IncludeInCommandLine: false
        DefaultValue: 60
    - key: Slowliquids
      label: Slower Liquids
      category: Terraria
      subcategory: Server
      description: >-
        Reduces maximum liquids moving at the same time. If enabled may reduce lag but liquids may take longer to
        settle.
      keywords: slow,liquid,liquids slower,lag,performance
      input_type: checkbox
      param_field_name: slowliquids
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
        DisplayName: Slower Liquids
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: slow,liquid,liquids slower,lag,performance
        Description: >-
          Reduces maximum liquids moving at the same time. If enabled may reduce lag but liquids may take longer to
          settle.
        FieldName: Slowliquids
        ParamFieldName: slowliquids
        InputType: checkbox
        IncludeInCommandLine: false
        EnumValues:
          'False': '0'
          'True': '1'
        DefaultValue: '1'
    - key: Secure
      label: Cheat Protection
      category: Terraria
      subcategory: Server
      description: Enable/Disable additional cheat protection. This may cause unwanted automatic kicks
      keywords: security,cheat,cheats,auto,kick,spam
      input_type: checkbox
      param_field_name: secure
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
        DisplayName: Cheat Protection
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: security,cheat,cheats,auto,kick,spam
        Description: Enable/Disable additional cheat protection. This may cause unwanted automatic kicks
        FieldName: Secure
        ParamFieldName: secure
        InputType: checkbox
        IncludeInCommandLine: false
        EnumValues:
          'False': '0'
          'True': '1'
        DefaultValue: '0'
    - key: DisableAnnouncementBox
      label: Disable Announcement Box
      category: Terraria
      subcategory: Server
      description: Enable/Disable the text announcements Announcement Box makes when pulsed from wire.
      keywords: announcement,box,disable,griefing
      input_type: checkbox
      param_field_name: disableannouncementbox
      default: '-disableannouncementbox'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Disable Announcement Box
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: announcement,box,disable,griefing
        Description: Enable/Disable the text announcements Announcement Box makes when pulsed from wire.
        FieldName: DisableAnnouncementBox
        InputType: checkbox
        IncludeInCommandLine: true
        ParamFieldName: disableannouncementbox
        IsFlagArgument: true
        DefaultValue: '-disableannouncementbox'
    - key: AnnouncementBoxRange
      label: Announcement Box Range
      category: Terraria
      subcategory: Server
      description: Sets the announcement box text messaging range in pixels, -1 for serverwide announcements.
      keywords: announcement,box,range,griefing
      input_type: number
      param_field_name: announcementboxrange
      default: '-1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Announcement Box Range
        Category: Terraria:stadia_controller
        Subcategory: Server:dns:3
        Keywords: announcement,box,range,griefing
        Description: Sets the announcement box text messaging range in pixels, -1 for serverwide announcements.
        FieldName: AnnouncementBoxRange
        placeholder: '-1'
        suffix: Pixels
        InputType: number
        IncludeInCommandLine: true
        ParamFieldName: announcementboxrange
        DefaultValue: '-1'
  files:
    - path: tmodloaderserverconfig.txt
      type: kvp
      format: '{0}={1}'
      subsections: []
      raw:
        ConfigFile: tmodloaderserverconfig.txt
        AutoMap: true
        ConfigType: kvp
        ConfigFormat: '{0}={1}'
environment: {}
