schema: aetherpanel.template/v1
id: sa-mp
name: San Andreas Multiplayer
category: Imported
summary: 'San Andreas Multiplayer Mod for Grand Theft Auto: San Andreas'
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://files.samp-sc.com/downloader.php?filename=samp037_svr_R2-1-1_win32.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: samp03svr {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 7777
    protocol: udp
    required: true
config_files:
  - path: server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: San Andreas MP
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: San Andreas MP:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        ParamFieldName: port
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Server/RCON IP Binding
      category: San Andreas MP
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: bind
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server/RCON IP Binding
        Category: San Andreas MP:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationIPBinding
        InputType: text
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: bind
        EnumValues: {}
