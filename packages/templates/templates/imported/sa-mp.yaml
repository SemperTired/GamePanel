    - key: gamemode0
      label: Initial Gamemode
      category: San Andreas MP
      subcategory: Server
      description: >-
        Sets the gamemode to start the server with. If "Custom" is selected, Custom Initial Gamemode must also be
        specified. Subsequent gamemodes (gamemode1 to gamemode15) can be set under Additional Server Settings
      keywords: initial,gamemode,gamemode0
      input_type: enum
      param_field_name: gamemode0
      default: grandlarc
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        grandlarc: Grand Larceny
        rivershell: Rivershell
        lvdm: LVDM (Ventura's DeathMatch) ~ Moneygrub
        timertest: Timer Test
        barron: RC Barnstorm
        bare: Bare Script
        '{{CustomGamemode}}': '--Custom--'
      raw:
        DisplayName: Initial Gamemode
        Category: San Andreas MP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the gamemode to start the server with. If "Custom" is selected, Custom Initial Gamemode must also be
          specified. Subsequent gamemodes (gamemode1 to gamemode15) can be set under Additional Server Settings
        Keywords: initial,gamemode,gamemode0
        FieldName: gamemode0
        InputType: enum
        ParamFieldName: gamemode0
        DefaultValue: grandlarc
        EnumValues:
          grandlarc: Grand Larceny
          rivershell: Rivershell
          lvdm: LVDM (Ventura's DeathMatch) ~ Moneygrub
          timertest: Timer Test
          barron: RC Barnstorm
          bare: Bare Script
          '{{CustomGamemode}}': '--Custom--'
    - key: CustomGamemode
      label: Custom Initial Gamemode
      category: San Andreas MP
      subcategory: Server
      description: >-
        Sets a custom gamemode to use for the Initial Gamemode, if "Custom" is selected. The custom gamemode files must
        be included in the gamemodes directory
      keywords: custom,initial,gamemode,gamemode0
