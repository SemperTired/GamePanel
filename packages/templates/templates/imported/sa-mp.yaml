    - key: stream_rate
      label: Stream Rate
      category: San Andreas MP
      subcategory: Server
      description: >-
        Sets the time before the streaming in of server entities is retested for each player. Lower values increases
        server processing as it has to recheck streaming conditions more frequently for each player
      keywords: stream,rate,stream_rate
