    - key: stream_distance
      label: Stream Distance
      category: San Andreas MP
      subcategory: Server
      description: >-
        Sets the distance on the X,Y plane that players will stream in server entities. Higher values makes players see
        server entities at a greater distance, but requires more client processing and potentially more bandwidth
      keywords: stream,distance,stream_distance
      input_type: number
      param_field_name: stream_distance
      default: '300.0'
