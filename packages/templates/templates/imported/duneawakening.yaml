schema: aetherpanel.template/v1
id: duneawakening
name: Dune Awakening
category: Imported
summary: Dune Awakening Dedicated Server
install:
  method: steamcmd
  app_id: '4754530'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: scripts/console.sh {FullRootDir}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: rmqgameport
    name: RabbitMQ Game (AMQPS)
    default: 5673
    protocol: tcp
    required: true
  - key: rmqgamehttpport
    name: RabbitMQ Game (HTTP mgmt)
    default: 15673
    protocol: tcp
    required: true
  - key: gameport
    name: UE5 game port pool
    default: 7777
    protocol: udp
    required: true
config_files:
  - path: state/ue5-saved/UserSettings/UserEngine.ini
    type: ini
    editable: true
  - path: state/ue5-saved/UserSettings/UserGame.ini
    type: ini
    editable: true
  - path: state/ondemand.ini
    type: text
    editable: true
config_schema:
  fields:
    - key: FlsServiceAuthToken
      label: Self-Host Service Token
      category: Dune Awakening
      subcategory: Server & Networking
      description: >-
        Your Funcom Self-Host Service Token. Generate one at
        [account.duneawakening.com](https://account.duneawakening.com/) and paste it here (starts with `eyJ...`).
      keywords: fls,token,self,host,funcom,auth
      input_type: password
      default: ''
      placeholder: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9....
      required: true
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Self-Host Service Token
        Category: Dune Awakening:gamepad
        Subcategory: Server & Networking:public
        Description: >-
          Your Funcom Self-Host Service Token. Generate one at
          [account.duneawakening.com](https://account.duneawakening.com/) and paste it here (starts with `eyJ...`).
        Keywords: fls,token,self,host,funcom,auth
        FieldName: FlsServiceAuthToken
        InputType: password
        IsFlagArgument: false
        ParamFieldName: ''
        IncludeInCommandLine: false
        Required: true
        DefaultValue: ''
        EnumValues: {}
        Placeholder: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9....
    - key: WorldNameOverride
      label: FLS World Name (override)
      category: Dune Awakening
      subcategory: Server & Networking
      description: >-
        Leave blank for new deployments. Set this only to reclaim the FLS WorldName bound to your Service Token by a
        previous deployment.
      keywords: world,name,battlegroup
      input_type: text
      default: ''
      placeholder: sh-<your-hostid>-tczine
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
