    - key: sv_privatePassword
      label: Private Client Password
      category: Quake III Arena
      subcategory: Server
      description: >-
        Sets the password for private clients, if any, to connect to the server. Specify the required number of private
        clients under Private Client Number. Server Password should not be set
      keywords: private,client,password,sv_privatepassword
      input_type: password
      param_field_name: sv_privatePassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
