        Category: Quake III Arena:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the server will notify clients that it requires a password to connect. The password must be set
          under Server Password
        Keywords: server,password,g_needpass
        FieldName: g_needpass
        InputType: checkbox
        ParamFieldName: g_needpass
        IncludeInCommandLine: false
        DefaultValue: '0'
        EnumValues:
          'False': '0'
          'True': '1'
    - key: g_password
      label: Server Password
      category: Quake III Arena
      subcategory: Server
      description: >-
        Sets the password required to connect to the server. Default is no password. Require Server Password must also
        be enabled
      keywords: server,password,g_password
      input_type: password
      param_field_name: g_password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Quake III Arena:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the password required to connect to the server. Default is no password. Require Server Password must also
          be enabled
        Keywords: server,password,g_password
        FieldName: g_password
        InputType: password
        ParamFieldName: g_password
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: $RemoteAdminPassword
      label: RCON Password
      category: Quake III Arena
      subcategory: Server
      description: See the Security and Privacy menu for configurable options for the server's RCON
      keywords: rcon,password,rconpassword
      input_type: hidden
      param_field_name: rconpassword
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON Password
        Category: Quake III Arena:stadia_controller
        Subcategory: Server:dns:1
        Description: See the Security and Privacy menu for configurable options for the server's RCON
