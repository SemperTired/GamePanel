        Subcategory: Server:dns:1
        Description: >-
          Sets the map to start the server with.  If "Custom" is selected, Custom Initial Map must also be specified.
          This setting will be overridden if map rotation is configured in baseq3/server.cfg
        Keywords: map
        FieldName: map_name
        InputType: enum
        ParamFieldName: map_name
        IncludeInCommandLine: false
