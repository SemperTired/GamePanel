schema: aetherpanel.template/v1
id: quake3-arena
name: Quake III Arena
category: Imported
summary: Quake III Arena Dedicated Server
install:
  method: steamcmd
  app_id: '2200'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/ioq3ded.x86_64 {PlatformArgs} +set fs_homepath "{FullBaseDir}" +set net_port {ServerPort} +set net_ip
    {ApplicationIPBinding} +set fs_game {mod} +{map_type} {map_name} +set rconpassword "{RemoteAdminPassword}"
    {FormattedArgs} +exec base.cfg
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 27960
    protocol: both
    required: true
config_files:
  - path: '{{mod}}/base.cfg'
    type: text
    editable: true
config_schema:
  fields:
    - key: sv_hostname
      label: Server Name
      category: Quake III Arena
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,sv_hostname
      input_type: text
      param_field_name: sv_hostname
      default: AMP Powered Quake III Arena Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Quake III Arena:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,sv_hostname
        FieldName: sv_hostname
        InputType: text
        ParamFieldName: sv_hostname
        IncludeInCommandLine: false
        DefaultValue: AMP Powered Quake III Arena Server
        EnumValues: {}
    - key: g_motd
      label: Message Of The Day
      category: Quake III Arena
      subcategory: Server
      description: Sets the message of the day (MOTD) displayed when players join
      keywords: message,motd,g_motd
      input_type: text
      param_field_name: g_motd
      default: Welcome to Quake III Arena!
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Message Of The Day
        Category: Quake III Arena:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the message of the day (MOTD) displayed when players join
        Keywords: message,motd,g_motd
        FieldName: g_motd
        InputType: text
        ParamFieldName: g_motd
        IncludeInCommandLine: false
        DefaultValue: Welcome to Quake III Arena!
        EnumValues: {}
    - key: mod
      label: Server Mod Name
      category: Quake III Arena
      subcategory: Server
      description: >-
        Sets the name of the mod directory to load, allowing the use of third-party Q3A mods. Don't change this from the
        default 'baseq3' unless you know what you are doing!
      keywords: server,mod,directory,game
      input_type: text
      param_field_name: mod
      default: baseq3
      placeholder: baseq3
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Mod Name
        Category: Quake III Arena:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the name of the mod directory to load, allowing the use of third-party Q3A mods. Don't change this from
          the default 'baseq3' unless you know what you are doing!
        Keywords: server,mod,directory,game
        FieldName: mod
        InputType: text
        ParamFieldName: mod
        DefaultValue: baseq3
        Placeholder: baseq3
        EnumValues: {}
    - key: dedicated
      label: Make Server Public
      category: Quake III Arena
      subcategory: Server
      description: If enabled, the server will be visible publicly. Otherwise it will only be accessible from the LAN
      keywords: public,visible,dedicated
      input_type: checkbox
      param_field_name: dedicated
      default: '2'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'False': '1'
        'True': '2'
      raw:
        DisplayName: Make Server Public
        Category: Quake III Arena:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will be visible publicly. Otherwise it will only be accessible from the LAN
        Keywords: public,visible,dedicated
        FieldName: dedicated
        InputType: checkbox
        ParamFieldName: dedicated
        IncludeInCommandLine: true
        DefaultValue: '2'
        EnumValues:
          'False': '1'
          'True': '2'
    - key: g_needpass
      label: Require Server Password
      category: Quake III Arena
      subcategory: Server
      description: >-
        If enabled, the server will notify clients that it requires a password to connect. The password must be set
        under Server Password
      keywords: server,password,g_needpass
      input_type: checkbox
      param_field_name: g_needpass
      default: '0'
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
