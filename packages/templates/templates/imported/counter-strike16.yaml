schema: aetherpanel.template/v1
id: counter-strike16
name: Counter-Strike 1.6
category: Imported
summary: Counter-Strike 1.6 Dedicated Server
install:
  method: steamcmd
  app_id: '90'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    90/hlds_linux {PlatformArgs} -console -game cstrike -port {GameRCONPort} -sys_ticrate={sys_ticrate} -nobreakpad
    {insecure}{pingboost}{CustomParameters} {CustomConVars} +ip {ApplicationIPBinding} +rcon_password
    "{RemoteAdminPassword}" {FormattedArgs} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gamerconport
    name: Game and RCON Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: cstrike/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: hostname
      label: Server Name
      category: Counter-Strike
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AMP Powered Counter-Strike 1.6 Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Counter-Strike:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        ParamFieldName: hostname
        DefaultValue: AMP Powered Counter-Strike 1.6 Server
        EnumValues: {}
    - key: motd
      label: Server MOTD
      category: Counter-Strike
      subcategory: Server
      description: >-
        The message of the day (MOTD) that is shown to joining players can be configured in cstrike/motd.txt. Plain text
        or HTML formatting is allowed
      keywords: message,welcome,motd
      input_type: hidden
      param_field_name: motd
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server MOTD
        Category: Counter-Strike:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          The message of the day (MOTD) that is shown to joining players can be configured in cstrike/motd.txt. Plain
          text or HTML formatting is allowed
        Keywords: message,welcome,motd
        FieldName: motd
        InputType: hidden
        ParamFieldName: motd
        EnumValues: {}
    - key: sv_lan
      label: LAN Server
      category: Counter-Strike
      subcategory: Server
      description: >-
        If enabled, the server will operate as a LAN server: no heartbeat, no authentication, no non-class C addresses,
        9999.0 rate, etc
      keywords: lan,local,sv_lan
      input_type: checkbox
      param_field_name: sv_lan
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
        DisplayName: LAN Server
        Category: Counter-Strike:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the server will operate as a LAN server: no heartbeat, no authentication, no non-class C
          addresses, 9999.0 rate, etc
        Keywords: lan,local,sv_lan
        FieldName: sv_lan
        InputType: checkbox
        ParamFieldName: sv_lan
        DefaultValue: '0'
        EnumValues:
          'False': '0'
          'True': '1'
    - key: sv_password
      label: Server Password
      category: Counter-Strike
      subcategory: Server
      description: Sets the password required to connect to the server. Default is no password
      keywords: server,password,sv_password
      input_type: password
      param_field_name: sv_password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
