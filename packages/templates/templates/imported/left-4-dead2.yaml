schema: aetherpanel.template/v1
id: left-4-dead2
name: Left 4 Dead 2
category: Imported
summary: Left 4 Dead 2 Dedicated Server
install:
  method: steamcmd
  app_id: '222860'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    222860/srcds_linux {PlatformArgs} -game left4dead2 -console -usercon -nobreakpad -port {ServerPort} -ip
    {ApplicationIPBinding} -maxplayers {MaxUsers} {insecure}{nohltv}{CustomParameters} {CustomConVars} +tv_port
    {SourceTVPort} +sv_logfile 1 {FormattedArgs} +exec server.cfg +map {map} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
  - key: sourcetvport
    name: SourceTV Port
    default: 27020
    protocol: udp
    required: true
config_files:
  - path: left4dead2/cfg/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $RemoteAdminPassword
      label: RCON Password
      category: Left 4 Dead 2
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: rcon_password
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON Password
        Category: Left 4 Dead 2:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $RemoteAdminPassword
        InputType: text
        Hidden: true
        ParamFieldName: rcon_password
        EnumValues: {}
    - key: hostname
      label: Server Name
      category: Left 4 Dead 2
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AetherNode Left 4 Dead 2 Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Left 4 Dead 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        ParamFieldName: hostname
        DefaultValue: AetherNode Left 4 Dead 2 Server
        EnumValues: {}
    - key: sv_search_key
      label: Server Search Key
      category: Left 4 Dead 2
