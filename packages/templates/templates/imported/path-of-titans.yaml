schema: aetherpanel.template/v1
id: path-of-titans
name: Path of Titans
category: Imported
summary: Path of Titans Dedicated Server
install:
  method: alderon
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    PathOfTitans/Binaries/Linux/PathOfTitansServer-Linux-Shipping PathOfTitans {ServerMap}?listen?MaxPlayers={MaxUsers}
    {PlatformArgs} -log -Port={GamePort} -QueryPort={QueryPort} -RconPort={RCONPort}
    -RconPassword="{RemoteAdminPassword}" -MultiHome={ApplicationIPBinding} -ServerName={ServerName} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: reservedport
    name: Reserved Port
    default: 7778
    protocol: both
    required: true
  - key: statsport
    name: Stats Port
    default: 7780
    protocol: both
    required: true
  - key: rconport
    name: RCON Port
    default: 7779
    protocol: both
    required: true
  - key: queryport
    name: Query Port
    default: 7781
    protocol: udp
    required: true
config_files:
  - path: PathOfTitans/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
  - path: PathOfTitans/Saved/Config/LinuxServer/Game.ini
    type: ini
    editable: true
  - path: PathOfTitans/Saved/MOTD.txt
    type: text
    editable: true
  - path: PathOfTitans/Saved/Rules.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: AuthToken
      label: Auth Token
      category: Path of Titans
      subcategory: Server
      description: >-
        Sets the [auth token](https://alderongames.com/oauth/hosting-token) to install and run the server. The
        associated account must have access to the game
      keywords: auth,token,authtoken
      input_type: password
      param_field_name: AuthToken
      default: ''
      required: true
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Auth Token
