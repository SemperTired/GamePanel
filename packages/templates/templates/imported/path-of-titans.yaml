environment: {}
startup_variables:
  - key: AuthToken
    label: Auth Token
    default: ''
    customer_editable: true
    required: true
    sensitive: true
  - key: ServerGUID
    label: Server GUID
    default: '{{newguid()}}'
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerName
    label: Server Name
    default: AMP_Powered_POT_Server
    customer_editable: true
    required: false
    sensitive: false
  - key: Rules
    label: Server Rules
    default: |-
      <title>Server Rules</>
      <red>1 - Please only attack Camptos.</>
      Camptosauruses are very evil!

      <orange>2 - Corpse Cove is closed due to dirty water.</>

      These are the only rules on this server!
      <large>Thanks, and have fun!</>
    customer_editable: true
    required: false
    sensitive: false
  - key: MOTD
    label: Welcome Message
    default: |-
      <title>Welcome to Path of Titans Server - powered by AMP!</>
      <large>Have fun!</>
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerPassword
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: BattlEyeAntiCheatbEnabled
    label: Enable BattlEye Anti-Cheat
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerMap
    label: Server Map
    default: Panjura
    customer_editable: true
    required: false
    sensitive: false
  - key: CustomMap
    label: Custom Map Name
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: bServerAllowMap
    label: Enable Full Map
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: bServerAllowMinimap
    label: Enable Minimap
    default: 'true'
