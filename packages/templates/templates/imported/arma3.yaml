    - key: $MaxUsers
      label: Player Limit
      category: Arma 3
      subcategory: Server
      description: Sets the maximum number of clients (including headless clients) that may connect to the server at one time
      keywords: maximum,players,clients,limit,maxplayers
      input_type: number
      param_field_name: maxPlayers
      default: '64'
      placeholder: '64'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Arma 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of clients (including headless clients) that may connect to the server at one time
        Keywords: maximum,players,clients,limit,maxplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: maxPlayers
        IncludeInCommandLine: false
        DefaultValue: '64'
        Placeholder: '64'
        Suffix: players
        EnumValues: {}
    - key: mod
      label: Load Mods
      category: Arma 3
      subcategory: Server
      description: >-
        Semi-colon separated list (moddir1;moddir2) of [mod
        directories](https://discourse.cubecoders.com/t/arma-3-server-guide/3475#p-7295-h-42-loading-6) to load (not
        server-side only mods). ONE LINE ONLY! Specify simply the mod ID or @modname (as applicable to the Updates
        settings) for any mods downloaded under Updates or the Store. Otherwise, use mod directory paths relative to the
        server base directory or full paths. Alternatively use the Startup Parameters File option
      keywords: mods,addons,modding,modification,workshop,plugins,mod
      input_type: Textarea
      param_field_name: mod
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Load Mods
        Category: Arma 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Semi-colon separated list (moddir1;moddir2) of [mod
          directories](https://discourse.cubecoders.com/t/arma-3-server-guide/3475#p-7295-h-42-loading-6) to load (not
          server-side only mods). ONE LINE ONLY! Specify simply the mod ID or @modname (as applicable to the Updates
          settings) for any mods downloaded under Updates or the Store. Otherwise, use mod directory paths relative to
          the server base directory or full paths. Alternatively use the Startup Parameters File option
        Keywords: mods,addons,modding,modification,workshop,plugins,mod
        FieldName: mod
        InputType: Textarea
        IsFlagArgument: false
        ParamFieldName: mod
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: serverMod
      label: Load Server Mods
      category: Arma 3
      subcategory: Server
      description: >-
        Semi-colon separated list (moddir1;moddir2) of [server-side only mod
        directories](https://discourse.cubecoders.com/t/arma-3-server-guide/3475#p-7295-h-42-loading-6) to load (the
        mods are not broadcast to clients). ONE LINE ONLY! Specify simply the mod ID or @modname (as applicable to the
        Updates settings) for any mods downloaded under Updates or the Store. Otherwise, use mod directory paths
        relative to the server base directory or full paths. Alternatively use the Startup Parameters File option
      keywords: mods,addons,modding,modification,workshop,plugins,server,servermod
      input_type: Textarea
      param_field_name: serverMod
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Load Server Mods
        Category: Arma 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Semi-colon separated list (moddir1;moddir2) of [server-side only mod
          directories](https://discourse.cubecoders.com/t/arma-3-server-guide/3475#p-7295-h-42-loading-6) to load (the
          mods are not broadcast to clients). ONE LINE ONLY! Specify simply the mod ID or @modname (as applicable to the
          Updates settings) for any mods downloaded under Updates or the Store. Otherwise, use mod directory paths
          relative to the server base directory or full paths. Alternatively use the Startup Parameters File option
        Keywords: mods,addons,modding,modification,workshop,plugins,server,servermod
        FieldName: serverMod
        InputType: Textarea
        IsFlagArgument: false
        ParamFieldName: serverMod
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: clientmod
      label: Client Mods
      category: Arma 3
      subcategory: Server
      description: >-
        Semi-colon separated list (moddir1;moddir2) of [client-side only mod
        directories](https://discourse.cubecoders.com/t/arma-3-server-guide/3475#p-7295-h-42-loading-6). ONE LINE ONLY!
        These won't be loaded by the server, but will be used by the Manage Bikeys setting if enabled. Specify simply
        the mod ID or @modname (as applicable to the Updates settings) for any mods downloaded under Updates or the
        Store. Otherwise, use mod directory paths relative to the server base directory or full paths
      keywords: mods,addons,modding,modification,workshop,plugins,client,clientmod
      input_type: Textarea
      param_field_name: clientmod
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Client Mods
        Category: Arma 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Semi-colon separated list (moddir1;moddir2) of [client-side only mod
          directories](https://discourse.cubecoders.com/t/arma-3-server-guide/3475#p-7295-h-42-loading-6). ONE LINE
          ONLY! These won't be loaded by the server, but will be used by the Manage Bikeys setting if enabled. Specify
          simply the mod ID or @modname (as applicable to the Updates settings) for any mods downloaded under Updates or
          the Store. Otherwise, use mod directory paths relative to the server base directory or full paths
        Keywords: mods,addons,modding,modification,workshop,plugins,client,clientmod
        FieldName: clientmod
        InputType: Textarea
        ParamFieldName: clientmod
        DefaultValue: ''
        EnumValues: {}
    - key: ManageBikeys
      label: Manage Bikeys
      category: Arma 3
      subcategory: Server
      description: >-
        If enabled, the bikey files for each of the mods specified in Load Mods and Client Mods will be copied to the
        'keys' directory on server start, to enable addon signature verification. All existing bikeys in that directory
        (other than the default 'a3.bikey') will be deleted
      keywords: mods,addons,bikeys
      input_type: checkbox
      param_field_name: ManageBikeys
      default: 'false'
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Manage Bikeys
        Category: Arma 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the bikey files for each of the mods specified in Load Mods and Client Mods will be copied to the
          'keys' directory on server start, to enable addon signature verification. All existing bikeys in that
          directory (other than the default 'a3.bikey') will be deleted
        Keywords: mods,addons,bikeys
        FieldName: ManageBikeys
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: ManageBikeys
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: ip
      label: Server/RCON IP Binding
      category: Arma 3
      subcategory: Server
      description: >-
        If required, you can change the binding of the server and BattlEye RCON by changing the Application IP Binding
        for this instance. NOTE: The IP must be reachable by AetherPanel, otherwise AetherPanel's console won't work
      keywords: ip,binding
      input_type: hidden
      param_field_name: ip
      default: ''
      required: false
