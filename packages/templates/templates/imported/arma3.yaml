    - key: serverCommandPassword
      label: Command Password
      category: Arma 3
      subcategory: Server
      description: Sets the password required by alternate syntax of "serverCommand" server-side scripting. Default is no password
      keywords: command,password,servercommandpassword
      input_type: password
      param_field_name: serverCommandPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
