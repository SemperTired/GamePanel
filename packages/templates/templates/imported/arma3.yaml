      category: Arma 3
      subcategory: Server
      description: Sets the list of [Steam64 IDs](https://steamid.io/) for server admins. Format is "SteamID","SteamID"
      keywords: admins
      input_type: text
      param_field_name: admins
      default: ''
      placeholder: '"12345678901234567","76543210987654321"'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
