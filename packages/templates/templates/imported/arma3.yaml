  files:
    - path: server.cfg
      type: template
      subsections: []
      raw:
        ConfigFile: server.cfg
        AutoMap: true
        ConfigType: template
        ConfigFileTemplate: ./arma3/233780/AMP_server.cfg
    - path: battleye/beserver{{ServerExecutable}}.cfg
      type: kvp
      format: '{0} {1}'
      subsections:
        - heading: $root
          setting_mappings:
            RConPassword: $RemoteAdminPassword
            RConPort: $RCONPort
            RConIP: $ApplicationIPBinding
      raw:
        ConfigFile: battleye/beserver{{ServerExecutable}}.cfg
        ConfigType: kvp
        ConfigFormat: '{0} {1}'
        Subsections:
          - Heading: $root
            SettingMappings:
              RConPassword: $RemoteAdminPassword
              RConPort: $RCONPort
              RConIP: $ApplicationIPBinding
