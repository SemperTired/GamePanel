schema: aetherpanel.template/v1
id: arma3
name: Arma 3
category: Imported
summary: Arma 3 Dedicated Server
install:
  method: steamcmd
  app_id: '233780'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    233780/arma3server{ServerExecutable} {PlatformArgs} -name=AMPServer "-profiles={FullBaseDir}A3Master"
    "-bepath={FullBaseDir}battleye" -port={GamePort} -config=server.cfg -cfg=basic.cfg -world=empty
    -ip={ApplicationIPBinding} {autoInit}{FormattedArgs} {parfile}{CustomServerArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 2302
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 2303
    protocol: udp
    required: true
  - key: steamport
    name: Steam Port
    default: 2304
    protocol: udp
    required: true
  - key: reservedport
    name: Reserved Port
    default: 2305
    protocol: udp
    required: true
  - key: battleyeport
    name: BattlEye Port
    default: 2306
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 2307
    protocol: udp
    required: true
config_files:
  - path: server.cfg
    type: text
    editable: true
  - path: battleye/beserver{{ServerExecutable}}.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: hostname
      label: Server Name
      category: Arma 3
      subcategory: Server
      description: Sets the server name visible in the game browser
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: Arma 3 Server - Hosted by AetherNode
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Arma 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server name visible in the game browser
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        IsFlagArgument: false
        ParamFieldName: hostname
        IncludeInCommandLine: false
        DefaultValue: Arma 3 Server - Hosted by AetherNode
        EnumValues: {}
    - key: password
      label: Server Password
      category: Arma 3
      subcategory: Server
      description: Sets the password required to connect to the server. Default is no password
      keywords: server,password
      input_type: password
      param_field_name: password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Arma 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password required to connect to the server. Default is no password
        Keywords: server,password
        FieldName: password
        InputType: password
        IsFlagArgument: false
        ParamFieldName: password
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: passwordAdmin
      label: Admin Password
      category: Arma 3
      subcategory: Server
      description: Sets the password required for admin access to the server. Default is no password
      keywords: admin,password,passwordadmin
      input_type: password
      param_field_name: passwordAdmin
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
