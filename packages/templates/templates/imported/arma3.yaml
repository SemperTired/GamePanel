        FieldName: verifySignatures
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: verifySignatures
        IncludeInCommandLine: false
        DefaultValue: '2'
        EnumValues:
          'False': '0'
          'True': '2'
    - key: allowedFilePatching
      label: Allow Client File Patching
      category: Arma 3
      subcategory: Server
      description: Specifies whether to prevent or allow file patching for clients
      keywords: file,patching,allowedfilepatching
      input_type: enum
      param_field_name: allowedFilePatching
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Do not allow (default)
        '1': Allow headless clients only
        '2': Allow all clients
      raw:
        DisplayName: Allow Client File Patching
        Category: Arma 3:stadia_controller
        Subcategory: Server:dns:1
