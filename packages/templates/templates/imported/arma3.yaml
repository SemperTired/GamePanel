        ParamFieldName: filePatchingExceptions
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: '"12345678901234567","76543210987654321"'
        EnumValues: {}
    - key: requiredBuild
      label: Minimum Client Version
      category: Arma 3
      subcategory: Server
      description: >-
        Sets the minimum client version, below which clients won't be allowed to join. Default of 99999999 equates to
        the server version. NOTE: If the server uses the Performance Profiling Build in any way, set this to 0,
        otherwise no client can connect
      keywords: required,build,requiredbuild
      input_type: number
      param_field_name: requiredBuild
      default: '99999999'
      placeholder: '99999999'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
