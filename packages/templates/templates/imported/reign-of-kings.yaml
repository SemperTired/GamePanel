schema: aetherpanel.template/v1
id: reign-of-kings
name: Reign Of Kings
category: Imported
summary: Reign Of Kings Dedicated Server
install:
  method: steamcmd
  app_id: '381690'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} -batchmode -nographics -silent-crashes {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and Ping Port
    default: 7350
    protocol: both
    required: true
  - key: authport
    name: Auth and RCON Port
    default: 27015
    protocol: both
    required: true
config_files:
  - path: Configuration/ServerSettings.cfg
    type: text
    editable: true
  - path: Configuration/ConsoleSettings.cfg
    type: text
    editable: true
