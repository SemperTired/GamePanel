  files:
    - path: Configuration/ServerSettings.cfg
      type: kvp
      format: '{0} = ''{1}'''
      subsections: []
      raw:
        ConfigFile: Configuration/ServerSettings.cfg
        AutoMap: true
        ConfigType: kvp
        ConfigFormat: '{0} = ''{1}'''
        ConfigFormatRegex: ^(?<key>.+?) = '(?<value>.*?)'.*$
    - path: Configuration/ConsoleSettings.cfg
      type: kvp
      format: '{0} = ''{1}'''
      subsections:
        - heading: $root
          setting_mappings:
            enableRCon: 'True'
            rConPassword: $RemoteAdminPassword
            rConPort: $AuthPort
      raw:
        ConfigFile: Configuration/ConsoleSettings.cfg
        ConfigType: kvp
        ConfigFormat: '{0} = ''{1}'''
        Subsections:
          - Heading: $root
            SettingMappings:
              enableRCon: 'True'
              rConPassword: $RemoteAdminPassword
              rConPort: $AuthPort
