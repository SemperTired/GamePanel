schema: aetherpanel.template/v1
id: tes3mp
name: 'TES3MP - The Elder Scrolls III: Morrowind Server'
category: Imported
summary: 'TES3MP and OpenMW Engine for The Elder Scrolls III: Morrowind Dedicated Server'
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://github.com/TES3MP/TES3MP/releases/download/tes3mp-0.8.1/tes3mp.Win64.release.0.8.1.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: TES3MP-server/tes3mp-server.x86_64 {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Main Game Port
    default: 25565
    protocol: udp
    required: true
config_files:
  - path: tes3mp-server-default.cfg
    type: ini
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Server Port
      category: TES3MP
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: General.port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        Hidden: true
        ParamFieldName: General.port
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Local Address
      category: TES3MP
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: General.localAddress
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Local Address
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationIPBinding
        InputType: text
        Hidden: true
        ParamFieldName: General.localAddress
        EnumValues: {}
    - key: Plugins.home
      label: Server Data Folder
      category: TES3MP
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: Plugins.home
      default: ./server
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Data Folder
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: Plugins.home
        InputType: text
        Hidden: true
        ParamFieldName: Plugins.home
        DefaultValue: ./server
        EnumValues: {}
    - key: General.hostname
      label: Server Name
      category: TES3MP
      subcategory: Server
      description: Sets the name of the server as shown in the server browser
      keywords: name,server,hostname
      input_type: text
      param_field_name: General.hostname
      default: AMP Powered TES3MP Server
      placeholder: AMP Powered TES3MP Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server as shown in the server browser
        Keywords: name,server,hostname
        FieldName: General.hostname
        InputType: text
        ParamFieldName: General.hostname
        DefaultValue: AMP Powered TES3MP Server
        Placeholder: AMP Powered TES3MP Server
        EnumValues: {}
    - key: General.password
      label: Server Password
      category: TES3MP
      subcategory: Server
      description: Sets the password required for players to connect to the server. Blank = no password
      keywords: password,server
      input_type: password
      param_field_name: General.password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password required for players to connect to the server. Blank = no password
        Keywords: password,server
        FieldName: General.password
        InputType: password
        ParamFieldName: General.password
        DefaultValue: ''
        EnumValues: {}
    - key: MasterServer.enabled
      label: Make Server Public
      category: TES3MP
      subcategory: Server
      description: >-
        If set, enables communication with the TES3MP master server set under Master Server Address, so that the server
        is shown in the server browser. Note that connection via the server browser can be unreliable
      keywords: masterserver,master,enabled,server,browser
      input_type: checkbox
      param_field_name: MasterServer.enabled
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Make Server Public
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, enables communication with the TES3MP master server set under Master Server Address, so that the
          server is shown in the server browser. Note that connection via the server browser can be unreliable
        Keywords: masterserver,master,enabled,server,browser
        FieldName: MasterServer.enabled
        InputType: checkbox
        ParamFieldName: MasterServer.enabled
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: $MaxUsers
      label: Player Limit
      category: TES3MP
      subcategory: Server
      description: Sets the maximum number of players that may connect to the server at one time
      keywords: maximum,players,clients,limit,maxplayers,slots,maximumplayers
      input_type: number
      param_field_name: General.maximumPlayers
      default: '64'
      placeholder: '64'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players that may connect to the server at one time
        Keywords: maximum,players,clients,limit,maxplayers,slots,maximumplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        ParamFieldName: General.maximumPlayers
        DefaultValue: '64'
        Placeholder: '64'
        Suffix: players
        EnumValues: {}
    - key: Plugins.plugins
      label: Lua Plugins
      category: TES3MP
      subcategory: Server
      description: Comma-separated list of Lua scripts to load as plugins
      keywords: plugins,lua,scripts
      input_type: text
      param_field_name: Plugins.plugins
      default: serverCore.lua
      placeholder: serverCore.lua
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Lua Plugins
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: Comma-separated list of Lua scripts to load as plugins
        Keywords: plugins,lua,scripts
        FieldName: Plugins.plugins
        InputType: text
        ParamFieldName: Plugins.plugins
        DefaultValue: serverCore.lua
        Placeholder: serverCore.lua
        EnumValues: {}
    - key: General.logLevel
      label: Log Level
      category: TES3MP
      subcategory: Server
      description: Sets the log level for the server console. A minimum of "Info" is required in AMP
      keywords: log,level,loglevel
      input_type: enum
      param_field_name: General.logLevel
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Verbose
        '1': Info (default)
      raw:
        DisplayName: Log Level
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the log level for the server console. A minimum of "Info" is required in AMP
        Keywords: log,level,loglevel
        FieldName: General.logLevel
        InputType: enum
        ParamFieldName: General.logLevel
        DefaultValue: '1'
        EnumValues:
          '0': Verbose
          '1': Info (default)
    - key: MasterServer.address
      label: Master Server Address
      category: TES3MP
      subcategory: Server
      description: Sets the address of the master server to use
      keywords: masterserver,master,server,address,ip,host
      input_type: text
      param_field_name: MasterServer.address
      default: master.tes3mp.com
      placeholder: master.tes3mp.com
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Master Server Address
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the address of the master server to use
        Keywords: masterserver,master,server,address,ip,host
        FieldName: MasterServer.address
        InputType: text
        ParamFieldName: MasterServer.address
        DefaultValue: master.tes3mp.com
        Placeholder: master.tes3mp.com
        EnumValues: {}
    - key: MasterServer.port
      label: Master Server Port
      category: TES3MP
      subcategory: Server
      description: Sets the port to connect to the master server
      keywords: masterserver,master,server,port
      input_type: number
      param_field_name: MasterServer.port
      default: '25561'
      placeholder: '25561'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Master Server Port
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the port to connect to the master server
        Keywords: masterserver,master,server,port
        FieldName: MasterServer.port
        InputType: number
        ParamFieldName: MasterServer.port
        DefaultValue: '25561'
        Placeholder: '25561'
        EnumValues: {}
    - key: MasterServer.rate
      label: Master Server Update Rate
      category: TES3MP
      subcategory: Server
      description: Sets the rate at which updated information about the server is sent to the master server
      keywords: masterserver,master,server,rate,update
      input_type: number
      param_field_name: MasterServer.rate
      default: '10000'
      placeholder: '10000'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Master Server Update Rate
        Category: TES3MP:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the rate at which updated information about the server is sent to the master server
        Keywords: masterserver,master,server,rate,update
        FieldName: MasterServer.rate
        InputType: number
        ParamFieldName: MasterServer.rate
        DefaultValue: '10000'
        Placeholder: '10000'
        EnumValues: {}
  files:
    - path: tes3mp-server-default.cfg
      type: ini
      format: '{0} = {1}'
      subsections: []
      raw:
        ConfigFile: tes3mp-server-default.cfg
        AutoMap: true
        ConfigType: ini
        ConfigFormat: '{0} = {1}'
        ConfigFormatRegex: ^(?<key>.+?)\s*=\s*(?<value>.*?)$
environment: {}
startup_variables:
  - key: Plugins.home
    label: Server Data Folder
    default: ./server
    customer_editable: true
    required: false
    sensitive: false
  - key: General.hostname
    label: Server Name
    default: AMP Powered TES3MP Server
    customer_editable: true
    required: false
    sensitive: false
  - key: General.password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: MasterServer.enabled
    label: Make Server Public
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: Plugins.plugins
    label: Lua Plugins
    default: serverCore.lua
    customer_editable: true
    required: false
    sensitive: false
  - key: General.logLevel
    label: Log Level
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: MasterServer.address
    label: Master Server Address
    default: master.tes3mp.com
    customer_editable: true
    required: false
    sensitive: false
  - key: MasterServer.port
    label: Master Server Port
    default: '25561'
    customer_editable: true
    required: false
    sensitive: false
  - key: MasterServer.rate
    label: Master Server Update Rate
    default: '10000'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '22320'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
