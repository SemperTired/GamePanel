        FieldName: Host.ListenAddress
        InputType: text
        ParamFieldName: Host.ListenAddress
        DefaultValue: ''
        EnumValues: {}
    - key: Host.AdvertiseAddress
      label: Advertised IP Address
      category: LOTR Return to Moria
      subcategory: Server
      description: >-
        Sets the server IP address reported to clients. Normally keep this set as 'Auto', however if there is an issue
        with automatic detection of your public IP address, then select 'Specific address' and configure Specific
        Advertise Address accordingly
      keywords: advertise,address,AdvertiseAddress
      input_type: enum
      param_field_name: Host.AdvertiseAddress
      default: auto
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        auto: Auto (default)
        local: Local (LAN only)
        '{{SpecificAdvertiseAddress}}': Specific address
      raw:
        DisplayName: Advertised IP Address
