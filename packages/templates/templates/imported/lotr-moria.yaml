    - key: Host.ListenAddress
      label: Binding IP Address
      category: LOTR Return to Moria
      subcategory: Server
      description: >-
        Sets the local IP address to bind the server to. Normally keep this setting empty, which will result in the
        server binding to all network interfaces. Otherwise, specify an IPv4 or IPv6 address that is configured on the
        host to bind to
      keywords: listen,address,ListenAddress
      input_type: text
      param_field_name: Host.ListenAddress
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Binding IP Address
        Category: LOTR Return to Moria:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the local IP address to bind the server to. Normally keep this setting empty, which will result in the
          server binding to all network interfaces. Otherwise, specify an IPv4 or IPv6 address that is configured on the
