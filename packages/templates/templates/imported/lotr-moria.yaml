schema: aetherpanel.template/v1
id: lotr-moria
name: 'The Lord of the Rings: Return to Moria'
category: Imported
summary: 'The Lord of the Rings: Return to Moria Dedicated Server'
install:
  method: steamcmd
  app_id: '3349480'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/wine {PlatformArgs} Moria -log
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 7777
    protocol: both
    required: true
config_files:
  - path: MoriaServerConfig.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Listen Port
      category: LOTR Return to Moria
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: Host.ListenPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Listen Port
        Category: LOTR Return to Moria:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        ParamFieldName: Host.ListenPort
        ExcludeFromImport: true
        EnumValues: {}
    - key: Console.Enabled
      label: Enable Console
      category: LOTR Return to Moria
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: Console.Enabled
      default: 'false'
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Enable Console
        Category: LOTR Return to Moria:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: Console.Enabled
        InputType: text
        Hidden: true
        ParamFieldName: Console.Enabled
        DefaultValue: 'false'
        ExcludeFromImport: true
        EnumValues: {}
    - key: World.Name
      label: Server Name
      category: LOTR Return to Moria
      subcategory: Server
      description: >-
        Sets the name of the world to load, or to create if it does not exist. This will also be the server name that is
        displayed publicly. Note that apostrophes in the name may cause loading issues
      keywords: server,name
      input_type: text
      param_field_name: World.Name
      default: 'AetherNode LOTR: Return to Moria Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: LOTR Return to Moria:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the name of the world to load, or to create if it does not exist. This will also be the server name that
          is displayed publicly. Note that apostrophes in the name may cause loading issues
        Keywords: server,name
        FieldName: World.Name
        InputType: text
        ParamFieldName: World.Name
        DefaultValue: 'AetherNode LOTR: Return to Moria Server'
        EnumValues: {}
    - key: World.OptionalWorldFilename
      label: World Filename
      category: LOTR Return to Moria
      subcategory: Server
      description: Sets an optional file name of the world to load. Helpful if you have multiple worlds with the same name
      keywords: world,filename,OptionalWorldFilename
      input_type: text
      param_field_name: World.OptionalWorldFilename
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
