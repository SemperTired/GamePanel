      label: Loaded Area Limit
      category: LOTR Return to Moria
      subcategory: Server
      description: >-
        Sets the maximum number of areas to keep loaded at once. This number greatly impacts memory, CPU usage and
        bandwidth. The default of 12 generally supports 8 player sessions well
