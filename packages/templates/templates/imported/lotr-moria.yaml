        DefaultValue: ''
        EnumValues: {}
    - key: Main.Password
      label: Server Password
      category: LOTR Return to Moria
      subcategory: Server
      description: Sets the password required for players to join the server. Default is no password
      keywords: password,server
      input_type: password
      param_field_name: Main.OptionalPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
