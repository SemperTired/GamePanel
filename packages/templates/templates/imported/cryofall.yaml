    - key: no_client_mods
      label: Prohibit Client Mods
      category: CryoFall
      subcategory: Server
      description: If set, client mods will be disallowed. Recommended to enable this setting for PvP servers
      keywords: prohibit,disallow,mods,modifications,no_client_mods
      input_type: checkbox
      param_field_name: /settings/server/no_client_mods
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
