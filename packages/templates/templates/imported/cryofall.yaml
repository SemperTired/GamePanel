        Keywords: server,save,backup,limit,count,save_backups_count
        FieldName: save_backups_count
        InputType: number
        MinValue: '3'
        MaxValue: '100'
        ParamFieldName: /settings/server/save_backups_count
        DefaultValue: '25'
        Placeholder: '25'
        Suffix: backups
        EnumValues: {}
    - key: fps
      label: Server Framerate
      category: CryoFall
      subcategory: Server
      description: 'Sets the server framerate (tick rate). Recommended: 40'
      keywords: framerate,frames,tick,rate,fps
      input_type: number
      param_field_name: /settings/server/fps
      default: '40'
      placeholder: '40'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 20
      max: 60
      suffix: fps
      enum_values: {}
      raw:
        DisplayName: Server Framerate
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: 'Sets the server framerate (tick rate). Recommended: 40'
        Keywords: framerate,frames,tick,rate,fps
        FieldName: fps
        InputType: number
        MinValue: '20'
        MaxValue: '60'
        ParamFieldName: /settings/server/fps
        DefaultValue: '40'
        Placeholder: '40'
        Suffix: fps
        EnumValues: {}
    - key: fps_network_physics_update
      label: Physics Update Rate
      category: CryoFall
      subcategory: Server
      description: >-
        Sets the rate at which physics updates are sent to players. Affects game latency. Recommended: 20. At least 10
        for smooth movement required, higher than 30 not needed but possibly useful for fast-paced servers. Best to keep
        in exact ratio with Server Framerate (eg 1:1, 1:2)
      keywords: physics,update,rate,fps_network_physics_update
      input_type: number
      param_field_name: /settings/server/fps_network_physics_update
      default: '20'
      placeholder: '20'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 10
      max: 60
      enum_values: {}
      raw:
        DisplayName: Physics Update Rate
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the rate at which physics updates are sent to players. Affects game latency. Recommended: 20. At least 10
          for smooth movement required, higher than 30 not needed but possibly useful for fast-paced servers. Best to
          keep in exact ratio with Server Framerate (eg 1:1, 1:2)
        Keywords: physics,update,rate,fps_network_physics_update
        FieldName: fps_network_physics_update
        InputType: number
        MinValue: '10'
        MaxValue: '60'
        ParamFieldName: /settings/server/fps_network_physics_update
        DefaultValue: '20'
        Placeholder: '20'
        EnumValues: {}
    - key: min_log_severity
      label: Minimum Logging Level
      category: CryoFall
      subcategory: Server
      description: Sets the server's minimum logging level. AMP requires at least an Important level
      keywords: log,logging,level,min_log_severity
      input_type: enum
      param_field_name: /settings/misc/min_log_severity
      default: Important
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        Debug: Debug
        Info: Info
        Important: Important (default)
      raw:
        DisplayName: Minimum Logging Level
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server's minimum logging level. AMP requires at least an Important level
        Keywords: log,logging,level,min_log_severity
        FieldName: min_log_severity
        InputType: enum
        ParamFieldName: /settings/misc/min_log_severity
        DefaultValue: Important
        EnumValues:
          Debug: Debug
          Info: Info
          Important: Important (default)
    - key: DotnetVersion
      label: Dotnet Version
      category: CryoFall
      subcategory: Server
      description: >-
        Sets the [ASP.NET Core Runtime 6.0 version](https://dotnet.microsoft.com/en-us/download/dotnet/6.0) to install.
        Empty = latest. Update the server after switching versions!
      keywords: dotnet,version
      input_type: text
      param_field_name: DotnetVersion
      default: ''
      placeholder: 6.0.24
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Dotnet Version
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the [ASP.NET Core Runtime 6.0 version](https://dotnet.microsoft.com/en-us/download/dotnet/6.0) to
          install. Empty = latest. Update the server after switching versions!
        Keywords: dotnet,version
        FieldName: DotnetVersion
        InputType: text
        ParamFieldName: DotnetVersion
        DefaultValue: ''
        Placeholder: 6.0.24
        EnumValues: {}
  files:
    - path: Data/SettingsServer.xml
      type: xml
      subsections: []
      raw:
        ConfigFile: Data/SettingsServer.xml
        AutoMap: true
        ConfigType: xml
environment: {}
startup_variables:
