    - key: save_backups_count
      label: Backup Limit
      category: CryoFall
      subcategory: Server
      description: >-
        Sets the limit on the number of backup copies to store for the savegame for each slot. Keep to a reasonable
        number as each savegame usually takes 20-40MB
      keywords: server,save,backup,limit,count,save_backups_count
      input_type: number
      param_field_name: /settings/server/save_backups_count
      default: '25'
      placeholder: '25'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 3
      max: 100
      suffix: backups
      enum_values: {}
      raw:
        DisplayName: Backup Limit
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
