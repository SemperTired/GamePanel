        Placeholder: AMP Powered CryoFall Server.
        EnumValues: {}
    - key: welcome_message
      label: Server MOTD
      category: CryoFall
      subcategory: Server
      description: >-
        Sets the player welcome message (MOTD) displayed on login. Maximum 4096 characters. Text formatting allowed:
        [b]Bold[/b], [u]underscore[/u], [color=#FF0000]colors[/color], [*] for list bullet points [*] and [br] for a new
        line
      keywords: motd,welcome,message,welcome_message
      input_type: Textarea
      param_field_name: /settings/server/welcome_message
      default: Welcome to my CryoFall server!
      placeholder: Welcome to my CryoFall server!
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server MOTD
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the player welcome message (MOTD) displayed on login. Maximum 4096 characters. Text formatting allowed:
          [b]Bold[/b], [u]underscore[/u], [color=#FF0000]colors[/color], [*] for list bullet points [*] and [br] for a
          new line
        Keywords: motd,welcome,message,welcome_message
        FieldName: welcome_message
        InputType: Textarea
        ParamFieldName: /settings/server/welcome_message
        DefaultValue: Welcome to my CryoFall server!
        Placeholder: Welcome to my CryoFall server!
        EnumValues: {}
    - key: savegame_slot_id
      label: Savegame Slot ID
      category: CryoFall
      subcategory: Server
      description: >-
        Sets the slot ID for the savegame. Each slot ID will be for a unique world. To start a new world for a given
        slot, delete the associated savegame in 'Data/Saves'
      keywords: server,save,savegame,slot,id,savegame_slot_id
      input_type: number
      param_field_name: /settings/server/savegame_slot_id
      default: '0'
      placeholder: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 0
      enum_values: {}
      raw:
        DisplayName: Savegame Slot ID
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the slot ID for the savegame. Each slot ID will be for a unique world. To start a new world for a given
          slot, delete the associated savegame in 'Data/Saves'
        Keywords: server,save,savegame,slot,id,savegame_slot_id
        FieldName: savegame_slot_id
        InputType: number
        MinValue: '0'
        ParamFieldName: /settings/server/savegame_slot_id
        DefaultValue: '0'
        Placeholder: '0'
        EnumValues: {}
    - key: server_operators_list
      label: Server Operators/Admins
      category: CryoFall
      subcategory: Server
      description: >-
        Comma separated list of server operators (users with admin access). Use the in-game username as written in the
        bottom right corner of the main menu for each operator
      keywords: server,operators,server_operators_list
      input_type: text
      param_field_name: /settings/server/server_operators_list
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
