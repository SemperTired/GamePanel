    - key: $MaxUsers
      label: Player Limit
      category: CryoFall
      subcategory: Server
      description: Sets the maximum number of players that may connect to the server at one time
      keywords: maximum,players,clients,limit,players_max_count
      input_type: number
      param_field_name: /settings/server/players_max_count
      default: '100'
      placeholder: '100'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: CryoFall:stadia_controller
