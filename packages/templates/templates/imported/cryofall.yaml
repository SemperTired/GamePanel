schema: aetherpanel.template/v1
id: cryofall
name: CryoFall
category: Imported
summary: CryoFall Dedicated Server
install:
  method: steamcmd
  app_id: '1061710'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    1061710/dotnet/dotnet {PlatformArgs} ./CryoFall_Server.dll loadOrNew +server.port {ServerPort} +server.ip
    {ApplicationIPBinding}  +server.maxplayers {MaxUsers} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 6000
    protocol: udp
    required: true
config_files:
  - path: Data/SettingsServer.xml
    type: xml
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: CryoFall
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: /settings/network/port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        ParamFieldName: /settings/network/port
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Server IP Binding
      category: CryoFall
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: /settings/network/ip
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server IP Binding
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationIPBinding
        InputType: text
        Hidden: true
        ParamFieldName: /settings/network/ip
        EnumValues: {}
    - key: is_public_server
      label: Make Server Public
      category: CryoFall
      subcategory: Server
      description: If set, the server will be added to the public server list
      keywords: public,is_public_server
      input_type: checkbox
      param_field_name: /settings/network/is_public_server
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': '0'
        'True': '1'
      raw:
        DisplayName: Make Server Public
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, the server will be added to the public server list
        Keywords: public,is_public_server
        FieldName: is_public_server
        InputType: checkbox
        ParamFieldName: /settings/network/is_public_server
        DefaultValue: '0'
        EnumValues:
          'False': '0'
          'True': '1'
    - key: public_server_host_name
      label: Public Server Domain Name
      category: CryoFall
      subcategory: Server
      description: >-
        Sets a domain name to display to clients instead of the server IP address. The domain name must match the server
        IP. May require the server binding to be changed
      keywords: server,domain,name,hostname,public_server_host_name
      input_type: text
      param_field_name: /settings/network/public_server_host_name
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Public Server Domain Name
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a domain name to display to clients instead of the server IP address. The domain name must match the
          server IP. May require the server binding to be changed
        Keywords: server,domain,name,hostname,public_server_host_name
        FieldName: public_server_host_name
        InputType: text
        ParamFieldName: /settings/network/public_server_host_name
        DefaultValue: ''
        EnumValues: {}
    - key: name
      label: Server Name
      category: CryoFall
      subcategory: Server
      description: Sets the server name visible to clients. Maximum 64 characters
      keywords: server,name
      input_type: text
      param_field_name: /settings/server/name
      default: AMP Powered CryoFall Server
      placeholder: AMP Powered CryoFall Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
