        Keywords: prohibit,disallow,mods,modifications,no_client_mods
        FieldName: no_client_mods
        InputType: checkbox
        ParamFieldName: /settings/server/no_client_mods
        DefaultValue: '0'
        EnumValues:
          'False': '0'
          'True': '1'
    - key: modsconfig
      label: Server Mods
      category: CryoFall
      subcategory: Server
      description: >-
        Server mods can be loaded by installing them in the 'Data/Mods' directory and specifying them in
        'Data/ModsConfig.xml'. See [these
        instructions](https://cryofall.fandom.com/wiki/Mod_Installation?action=edit&section=2)
      keywords: server,mods,modsconfig
      input_type: hidden
      param_field_name: modsconfig
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Mods
        Category: CryoFall:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Server mods can be loaded by installing them in the 'Data/Mods' directory and specifying them in
          'Data/ModsConfig.xml'. See [these
          instructions](https://cryofall.fandom.com/wiki/Mod_Installation?action=edit&section=2)
        Keywords: server,mods,modsconfig
        FieldName: modsconfig
        InputType: hidden
        ParamFieldName: modsconfig
        EnumValues: {}
    - key: autosave_interval
      label: Autosave Interval
      category: CryoFall
      subcategory: Server
      description: Sets the server autosave interval
      keywords: server,autosave,interval,autosave_interval
      input_type: number
      param_field_name: /settings/server/autosave_interval
      default: '60'
      placeholder: '60'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: minutes
