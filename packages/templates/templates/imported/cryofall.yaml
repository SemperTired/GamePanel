    label: Make Server Public
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: public_server_host_name
    label: Public Server Domain Name
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: name
    label: Server Name
    default: AMP Powered CryoFall Server
    customer_editable: true
    required: false
    sensitive: false
  - key: description
    label: Server Description
    default: AMP Powered CryoFall Server.
    customer_editable: true
    required: false
    sensitive: false
  - key: welcome_message
    label: Server MOTD
    default: Welcome to my CryoFall server!
    customer_editable: true
    required: false
    sensitive: false
  - key: savegame_slot_id
    label: Savegame Slot ID
    default: '0'
