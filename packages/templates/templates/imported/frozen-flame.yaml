schema: aetherpanel.template/v1
id: frozen-flame
name: Frozen Flame
category: Imported
summary: Frozen Flame Dedicated Server
install:
  method: steamcmd
  app_id: '1348640'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    1348640/FrozenFlame/Binaries/Linux/FrozenFlameServer-Linux-Shipping {PlatformArgs} -Port={GamePort}
    -QueryPort={QueryPort} -RconPort={RCONPort} -RconPassword={RemoteAdminPassword} -ip={PublicIP}
    {noeac}{PublicServer}{FormattedArgs} -LOCALLOGTIMES
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: both
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 25575
    protocol: tcp
    required: true
config_files:
  - path: FrozenFlame/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
  - path: FrozenFlame/Saved/Config/LinuxServer/Game.ini
    type: ini
    editable: true
  - path: FrozenFlame/Saved/Config/WindowsServer/GameModeSurvive.ini
    type: ini
    editable: true
  - path: FrozenFlame/Saved/Config/LinuxServer/GameModeSurvive.ini
    type: ini
    editable: true
  - path: FrozenFlame/Saved/Config/WindowsServer/HeavenNormal.ini
    type: ini
    editable: true
  - path: FrozenFlame/Saved/Config/LinuxServer/HeavenNormal.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerName
      label: Server Name
      category: Frozen Flame
      subcategory: Server
      description: The name of the server as it appears publicly
      keywords: name,servername
      input_type: text
      param_field_name: MetaGameServerName
      default: AMP Powered Frozen Flame Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Frozen Flame:stadia_controller
        Subcategory: Server:dns:1
        Description: The name of the server as it appears publicly
        Keywords: name,servername
        FieldName: ServerName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: MetaGameServerName
        IncludeInCommandLine: true
        DefaultValue: AMP Powered Frozen Flame Server
        EnumValues: {}
    - key: ServerPassword
      label: Server Password
      category: Frozen Flame
      subcategory: Server
      description: Password to connect to the server
      keywords: server,password,serverpassword
      input_type: password
      param_field_name: /Script/FrozenFlame.FGameSession.ServerPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
