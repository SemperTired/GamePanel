schema: aetherpanel.template/v1
id: the-front
name: The Front
category: Imported
summary: The Front Dedicated Server
install:
  method: steamcmd
  app_id: '2612550'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/ProjectWar/Binaries/Linux/TheFrontServer ProjectWar
    ProjectWar_Start?DedicatedServer?MaxPlayers={MaxUsers}{UseSteamSocket} -server -game -ConfigServerName="AetherPanel"
    -Port={GamePort} -QueryPort={SteamQueryPort} -BeaconPort={BeaconPort} -ShutDownServicePort={ShutDownServicePort}
    -OutIPAddress={PublicIP} -QueueThreshold={MaxUsers} -ServerAdminAccounts={ServerAdminAccounts}
    -EnableParallelCharacterMovementTickFunction -EnableParallelCharacterTickFunction -UseDynamicPhysicsScene
    -fullcrashdumpalways -Game.PhysicsVehicle={GamePhysicsVehicle} -ansimalloc -Game.MaxFrameRate={GameMaxFrameRate}
    -MaxQueueSize=50 -QueueValidTime=120 -UseEAC={UseEAC} {FormattedArgs} {CustomServerArgs} {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 5001
    protocol: udp
    required: true
  - key: steamqueryport
    name: Steam Query Port
    default: 27015
    protocol: udp
    required: true
  - key: beaconport
    name: Beacon Port
    default: 5002
    protocol: udp
    required: true
  - key: shutdownserviceport
    name: Shutdown Service Port
    default: 5003
    protocol: tcp
    required: true
config_files:
  - path: TheFrontManager/ServerConfig_AMP.ini
    type: ini
    editable: true
config_schema:
