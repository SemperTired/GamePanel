schema: aetherpanel.template/v1
id: palworld-modded
name: Palworld (Modded)
category: Imported
summary: Palworld Dedicated Server with Steam Workshop and legacy Unreal Engine 4/5 Scripting System modding support
install:
  method: steamcmd
  app_id: '2394010'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} Pal {CommunityServer}-Port={GamePort} -QueryPort={QueryPort} -RCONPort={RCONPort}
    -MultiHome={ApplicationIPBinding} -publicport={PublicPort} -publicip={PublicIP} -players={MaxUsers}
    {MultiThread}{FormattedArgs} {CustomArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 8211
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 25575
    protocol: tcp
    required: true
config_files:
  - path: Pal/Saved/Config/WindowsServer/PalWorldSettings.ini
    type: text
    editable: true
  - path: Pal/Binaries/Win64/UE4SS-settings.ini
    type: ini
    editable: true
  - path: Pal/Binaries/Win64/ue4ss/UE4SS-settings.ini
    type: ini
    editable: true
  - path: steamapps/workshop/content/1623730/3625223587/UE4SS-settings.ini
    type: ini
    editable: true
  - path: Mods/PalModSettings.ini
    type: ini
    editable: true
