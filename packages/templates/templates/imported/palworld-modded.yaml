    - key: InstallUE4SS
      label: Install UE Scripting System
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        Sets the action to take when the server is updated. If an installation option is selected, the selected build of
        the Unreal Engine 4/5 Scripting System will be installed from either the [UE4SS-RE
        repo](https://github.com/UE4SS-RE/RE-UE4SS) or the [Okaetsu forked repo](https://github.com/Okaetsu/RE-UE4SS),
        allowing the server to be modded without using the Steam Workshop. Also set the Specific UE4SS-RE Experimental
        Build Version if relevant
      keywords: install,ue4ss,unreal,engine,scripting,system,ue4ss-re,okaetsu,modding,experimental
      input_type: enum
      param_field_name: InstallUE4SS
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Do nothing (default)
        'false': Remove UE4SS files
        experimental-palworld: Install latest Okaetsu experimental build (recommended build)
        experimental-latest: Install latest UE4SS-RE experimental build
        experimental: Install specific UE4SS-RE experimental build
        'true': Install latest UE4SS-RE release build
      raw:
        DisplayName: Install UE Scripting System
        Category: Updates
        Subcategory: Runtime Configuration:build:3
        Description: >-
          Sets the action to take when the server is updated. If an installation option is selected, the selected build
          of the Unreal Engine 4/5 Scripting System will be installed from either the [UE4SS-RE
          repo](https://github.com/UE4SS-RE/RE-UE4SS) or the [Okaetsu forked repo](https://github.com/Okaetsu/RE-UE4SS),
          allowing the server to be modded without using the Steam Workshop. Also set the Specific UE4SS-RE Experimental
          Build Version if relevant
        Keywords: install,ue4ss,unreal,engine,scripting,system,ue4ss-re,okaetsu,modding,experimental
        FieldName: InstallUE4SS
        InputType: enum
        ParamFieldName: InstallUE4SS
        DefaultValue: ''
        EnumValues:
          '': Do nothing (default)
          'false': Remove UE4SS files
          experimental-palworld: Install latest Okaetsu experimental build (recommended build)
          experimental-latest: Install latest UE4SS-RE experimental build
          experimental: Install specific UE4SS-RE experimental build
          'true': Install latest UE4SS-RE release build
    - key: UE4SSExperimentalVersion
      label: Specific UE4SS-RE Experimental Build Version
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        If "Install specific UE4SS-RE experimental build" is selected under Install UE Scripting System, sets the
        [relevant UE4SS-RE version](https://github.com/UE4SS-RE/RE-UE4SS/releases/tag/experimental) to install. Example:
