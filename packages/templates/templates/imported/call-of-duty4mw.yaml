schema: aetherpanel.template/v1
id: call-of-duty4mw
name: 'Call of Duty 4: Modern Warfare'
category: Imported
summary: 'Call of Duty 4: Modern Warfare Dedicated Server'
install:
  method: steamcmd
  app_id: '7940'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} +set sv_punkbuster 0 +exec "server.cfg" +set net_port {GamePort} +set authPort
    {AuthPort} +set masterPort {MasterPort} {map_mode}{FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 28960
    protocol: udp
    required: true
  - key: authport
    name: Authentication Port
    default: 20800
    protocol: udp
    required: true
  - key: masterport
    name: Master Port
    default: 20810
    protocol: udp
    required: true
config_files:
  - path: main/server.cfg
    type: text
    editable: true
config_schema:
  fields:
