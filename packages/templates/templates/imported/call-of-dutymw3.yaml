schema: aetherpanel.template/v1
id: call-of-dutymw3
name: 'Call of Duty: Modern Warfare 3 (2011)'
category: Imported
summary: 'Call of Duty: Modern Warfare 3 (2011) Dedicated Server'
install:
  method: steamcmd
  app_id: '42750'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} +set sv_config "server.cfg" +set net_queryPort {OpenGamePort} +set net_port
    {SecureGamePort} +set net_authPort {AuthPort} +set net_masterServerPort {MasterServerPort} +start_map_rotate
    {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: opengameport
    name: Open Game Port
    default: 27014
    protocol: udp
    required: true
  - key: securegameport
    name: Secure Game Port
    default: 27015
    protocol: udp
    required: true
  - key: authport
    name: Authentication Port
    default: 8766
    protocol: udp
    required: true
  - key: masterserverport
    name: Master Server Port
    default: 27016
    protocol: udp
    required: true
config_files:
  - path: admin/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: sv_hostname
      label: Server Name
      category: COD Modern Warfare 3
      subcategory: Server
      description: Sets the name of the server
      keywords: server,name
      input_type: text
      param_field_name: sv_hostname
      default: 'AMP Powered Call of Duty: Modern Warfare 3 Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server
        Keywords: server,name
        FieldName: sv_hostname
        InputType: text
        IsFlagArgument: false
        ParamFieldName: sv_hostname
        IncludeInCommandLine: false
        DefaultValue: 'AMP Powered Call of Duty: Modern Warfare 3 Server'
        EnumValues: {}
    - key: dedicated
      label: Make Server Public
      category: COD Modern Warfare 3
      subcategory: Server
      description: If enabled, the server will be visible publicly. Otherwise it will only be accessible from the local network
      keywords: public,visible
      input_type: checkbox
      param_field_name: dedicated
      default: '2'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'True': '2'
        'False': '1'
      raw:
        DisplayName: Make Server Public
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will be visible publicly. Otherwise it will only be accessible from the local network
        Keywords: public,visible
        FieldName: dedicated
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: dedicated
        IncludeInCommandLine: true
        DefaultValue: '2'
        EnumValues:
          'True': '2'
          'False': '1'
    - key: g_password
      label: Server Password
      category: COD Modern Warfare 3
      subcategory: Server
      description: Sets the password to join the server
      keywords: password
      input_type: password
      param_field_name: g_password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password to join the server
        Keywords: password
        FieldName: g_password
        InputType: password
        IsFlagArgument: false
        ParamFieldName: g_password
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: rcon_password
      label: RCON Password
      category: COD Modern Warfare 3
      subcategory: Server
      description: >-
        Sets the RCON password to allow sending console commands in-game. Default is no password, disabling console
        commands
      keywords: rcon,password
      input_type: password
      param_field_name: rcon_password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON Password
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the RCON password to allow sending console commands in-game. Default is no password, disabling console
          commands
        Keywords: rcon,password
        FieldName: rcon_password
        InputType: password
        IsFlagArgument: false
        ParamFieldName: rcon_password
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: COD Modern Warfare 3
      subcategory: Server
      description: The maximum number of players allowed on the server
      keywords: max,players,limit
      input_type: number
      param_field_name: sv_maxclients
      default: '16'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      max: 18
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: The maximum number of players allowed on the server
        Keywords: max,players,limit
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        MaxValue: '18'
        IsFlagArgument: false
        ParamFieldName: sv_maxclients
        IncludeInCommandLine: false
        DefaultValue: '16'
        EnumValues: {}
    - key: sv_privateClients
      label: Private Player Limit
      category: COD Modern Warfare 3
      subcategory: Server
      description: >-
        The maximum number of private players allowed on the server (those that can use non-public reserved slots). Will
        be limited to the Player Limit
      keywords: max,private,players,limit
      input_type: number
      param_field_name: sv_privateClients
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 0
      max: 18
      enum_values: {}
      raw:
        DisplayName: Private Player Limit
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          The maximum number of private players allowed on the server (those that can use non-public reserved slots).
          Will be limited to the Player Limit
        Keywords: max,private,players,limit
        FieldName: sv_privateClients
        InputType: number
        MinValue: '0'
        MaxValue: '18'
        IsFlagArgument: false
        ParamFieldName: sv_privateClients
        IncludeInCommandLine: false
        DefaultValue: '0'
        EnumValues: {}
    - key: sv_privatePassword
      label: Private Player Password
      category: COD Modern Warfare 3
      subcategory: Server
      description: >-
        Sets the password for private players to join the server. Private players entering this password have access to
        all slots on the server, otherwise the players only have access to the public slots (Player Limit less Private
        Player Limit)
      keywords: private,player,password
      input_type: password
      param_field_name: sv_privatePassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Private Player Password
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the password for private players to join the server. Private players entering this password have access
          to all slots on the server, otherwise the players only have access to the public slots (Player Limit less
          Private Player Limit)
        Keywords: private,player,password
        FieldName: sv_privatePassword
        InputType: password
        IsFlagArgument: false
        ParamFieldName: sv_privatePassword
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: sv_maprotation
      label: Map Rotation
      category: COD Modern Warfare 3
      subcategory: Server
      description: >-
        Sets the dedicated server play list (DSPL) for map rotation. Valid game options are controlled via the dedicated
        server recipe (DSR) specified in the DSPL
      keywords: map,rotation
      input_type: text
      param_field_name: sv_maprotation
      default: default
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Map Rotation
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the dedicated server play list (DSPL) for map rotation. Valid game options are controlled via the
          dedicated server recipe (DSR) specified in the DSPL
        Keywords: map,rotation
        FieldName: sv_maprotation
        InputType: text
        IsFlagArgument: false
        ParamFieldName: sv_maprotation
        IncludeInCommandLine: false
        DefaultValue: default
        EnumValues: {}
    - key: sv_voice
      label: Server Voice Chat
      category: COD Modern Warfare 3
      subcategory: Server
      description: Sets the server voice chat configuration
      keywords: voice,chat
      input_type: enum
      param_field_name: sv_voice
      default: '2'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': No Chat
        '1': Free Chat
        '2': Team Chat (default)
      raw:
        DisplayName: Server Voice Chat
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server voice chat configuration
        Keywords: voice,chat
        FieldName: sv_voice
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: sv_voice
        IncludeInCommandLine: false
        DefaultValue: '2'
        EnumValues:
          '0': No Chat
          '1': Free Chat
          '2': Team Chat (default)
    - key: g_allowVote
      label: Enable Voting
      category: COD Modern Warfare 3
      subcategory: Server
      description: If enabled, voting is allowed for player kick, map restart and next map
      keywords: vote,voting
      input_type: checkbox
      param_field_name: g_allowVote
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': '1'
        'False': '0'
      raw:
        DisplayName: Enable Voting
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, voting is allowed for player kick, map restart and next map
        Keywords: vote,voting
        FieldName: g_allowVote
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: g_allowVote
        IncludeInCommandLine: false
        DefaultValue: '1'
        EnumValues:
          'True': '1'
          'False': '0'
    - key: g_deadChat
      label: Enable Dead Chat
      category: COD Modern Warfare 3
      subcategory: Server
      description: If enabled, dead players will be allowed to chat with living players
      keywords: dead,chat
      input_type: checkbox
      param_field_name: g_deadChat
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': '1'
        'False': '0'
      raw:
        DisplayName: Enable Dead Chat
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, dead players will be allowed to chat with living players
        Keywords: dead,chat
        FieldName: g_deadChat
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: g_deadChat
        IncludeInCommandLine: false
        DefaultValue: '0'
        EnumValues:
          'True': '1'
          'False': '0'
    - key: g_inactivity
      label: Inactivity Kick Period
      category: COD Modern Warfare 3
      subcategory: Server
      description: Time before the server will kick a player for inactivity
      keywords: inactivity,afk,period
      input_type: number
      param_field_name: g_inactivity
      default: '120'
      placeholder: 0 - 10000
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 0
      max: 10000
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: Inactivity Kick Period
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Time before the server will kick a player for inactivity
        Keywords: inactivity,afk,period
        FieldName: g_inactivity
        InputType: number
        IsFlagArgument: false
        MinValue: '0'
        MaxValue: '10000'
        ParamFieldName: g_inactivity
        IncludeInCommandLine: false
        DefaultValue: '120'
        Suffix: seconds
        Placeholder: 0 - 10000
        EnumValues: {}
    - key: sv_kickBanTime
      label: Temporary Ban Period
      category: COD Modern Warfare 3
      subcategory: Server
      description: Time for a player temporary ban (on kick/tempban)
      keywords: ban,period,temporary
      input_type: number
      param_field_name: sv_kickBanTime
      default: '300'
      placeholder: 0 - 3600
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 0
      max: 3600
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: Temporary Ban Period
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Time for a player temporary ban (on kick/tempban)
        Keywords: ban,period,temporary
        FieldName: sv_kickBanTime
        InputType: number
        IsFlagArgument: false
        MinValue: '0'
        MaxValue: '3600'
        ParamFieldName: sv_kickBanTime
        IncludeInCommandLine: true
        DefaultValue: '300'
        Suffix: seconds
        Placeholder: 0 - 3600
        EnumValues: {}
    - key: sv_floodProtect
      label: Enable Flood Protection
      category: COD Modern Warfare 3
      subcategory: Server
      description: >-
        If enabled, flood protection applies, so user commands are throttled. Should be enabled on
        non-password-protected public servers
      keywords: flood,protection
      input_type: checkbox
      param_field_name: sv_floodProtect
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'True': '1'
        'False': '0'
      raw:
        DisplayName: Enable Flood Protection
        Category: COD Modern Warfare 3:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, flood protection applies, so user commands are throttled. Should be enabled on
          non-password-protected public servers
        Keywords: flood,protection
        FieldName: sv_floodProtect
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: sv_floodProtect
        IncludeInCommandLine: true
        DefaultValue: '1'
        EnumValues:
          'True': '1'
          'False': '0'
  files:
    - path: admin/server.cfg
      type: kvp
      format: seta {0} "{1}"
      subsections: []
      raw:
        ConfigFile: admin/server.cfg
        AutoMap: true
        ConfigType: kvp
        ConfigFormat: seta {0} "{1}"
        ConfigFormatRegex: ^seta (?<key>.+?) "?(?<value>.*?)"?$
environment: {}
startup_variables:
  - key: sv_hostname
    label: Server Name
    default: 'AMP Powered Call of Duty: Modern Warfare 3 Server'
    customer_editable: true
    required: false
    sensitive: false
  - key: dedicated
    label: Make Server Public
    default: '2'
    customer_editable: true
    required: false
    sensitive: false
  - key: g_password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: rcon_password
    label: RCON Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: sv_privateClients
    label: Private Player Limit
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_privatePassword
    label: Private Player Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: sv_maprotation
    label: Map Rotation
    default: default
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_voice
    label: Server Voice Chat
    default: '2'
    customer_editable: true
    required: false
    sensitive: false
  - key: g_allowVote
    label: Enable Voting
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: g_deadChat
    label: Enable Dead Chat
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: g_inactivity
    label: Inactivity Kick Period
    default: '120'
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_kickBanTime
    label: Temporary Ban Period
    default: '300'
    customer_editable: true
    required: false
    sensitive: false
  - key: sv_floodProtect
    label: Enable Flood Protection
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '42690'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
