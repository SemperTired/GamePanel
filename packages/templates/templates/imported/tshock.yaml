schema: aetherpanel.template/v1
id: tshock
name: TShock - Terraria Server
category: Imported
summary: TShock Dedicated Server for Terraria
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    TShock.Server {PlatformArgs} -port {ServerPort} -ip {ApplicationIPBinding} -world "Worlds/{world}" -worldselectpath
    "{FullBaseDir}Worlds" -configpath "{FullBaseDir}tshock" -logpath "tshock/logs"
    {disableannouncementbox}{secure}{noupnp}{forceupdate}{ignoreversion}{FormattedArgs} {CustomServerArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 7777
    protocol: tcp
    required: true
  - key: restapiport
    name: Rest API Port
    default: 7878
    protocol: tcp
    required: true
config_files:
  - path: tshock/config.json
    type: json
    editable: true
  - path: tshock/motd.txt
    type: text
    editable: true
