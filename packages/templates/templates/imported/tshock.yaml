      label: Server Port
      category: TShock
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.Settings.ServerPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
