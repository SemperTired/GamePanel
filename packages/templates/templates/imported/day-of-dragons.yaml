schema: aetherpanel.template/v1
id: day-of-dragons
name: Day of Dragons
category: Imported
summary: Day of Dragons Dedicated Server
install:
  method: steamcmd
  app_id: '1088320'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    1088320/Dragons/Binaries/Linux/DragonsServer-Linux-Shipping Dragons -Port={GamePort} -QueryPort={QueryPort}
    -SteamServerName="{SteamServerName}" {FormattedArgs} -stdout {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: Dragons/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
  - path: Dragons/Saved/Config/LinuxServer/Game.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: SteamServerName
      label: Server Name
      category: Day of Dragons
      subcategory: Server
      description: Name of the server as it appears publicly
      keywords: name
      input_type: text
      param_field_name: SteamServerName
      default: AMP Powered Day of Dragons Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
