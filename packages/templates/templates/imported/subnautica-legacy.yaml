    - key: ClientFilesLocationMode
      label: Client Files Location Mode
      category: Updates
      subcategory: Server Updates
      description: >-
        Sets whether the server uses the default location (the instance's base directory) to locate the Subnautica
        (Legacy) client files, or whether the location specified under Custom Client Files Location is used instead.
        Unless already installed via AetherPanel before the Subnautica 'legacy' branch was removed from Steam, the client files
        will need to be supplied manually
      keywords: client,files,location,mode
      input_type: enum
      param_field_name: ClientFilesLocationMode
      default: ''
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': '--Please select--'
        '{{$FullBaseDir}}': Default
        '{{CustomClientFilesLocation}}': Custom
      raw:
        DisplayName: Client Files Location Mode
        Category: Updates
        Subcategory: Server Updates:build:-1
        Description: >-
          Sets whether the server uses the default location (the instance's base directory) to locate the Subnautica
          (Legacy) client files, or whether the location specified under Custom Client Files Location is used instead.
          Unless already installed via AetherPanel before the Subnautica 'legacy' branch was removed from Steam, the client
          files will need to be supplied manually
        Keywords: client,files,location,mode
        FieldName: ClientFilesLocationMode
        InputType: enum
        ParamFieldName: ClientFilesLocationMode
        DefaultValue: ''
        Required: true
        EnumValues:
          '': '--Please select--'
          '{{$FullBaseDir}}': Default
          '{{CustomClientFilesLocation}}': Custom
    - key: CustomClientFilesLocation
      label: Custom Client Files Location
      category: Updates
      subcategory: Server Updates
      description: >-
