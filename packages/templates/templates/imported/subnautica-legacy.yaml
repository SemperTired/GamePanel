        ParamFieldName: Seed
        DefaultValue: ''
        EnumValues: {}
    - key: GameMode
      label: Game Mode
      category: Subnautica
      subcategory: Server
      description: Sets the server game mode
      keywords: game,mode,GameMode
      input_type: enum
      param_field_name: GameMode
      default: SURVIVAL
