schema: aetherpanel.template/v1
id: subnautica-legacy
name: Subnautica (Legacy Nitrox Mod)
category: Imported
summary: Nitrox Multiplayer Mod for Subnautica (Legacy)
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://github.com/SubnauticaNitrox/Nitrox/releases/download/1.7.1.0/Nitrox_1.7.1.0.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/mono {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 11000
    protocol: udp
    required: true
config_files:
  - path: server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: Subnautica
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: ServerPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: Subnautica:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        ParamFieldName: ServerPort
        EnumValues: {}
    - key: SaveName
      label: Save Name
      category: Subnautica
      subcategory: Server
      description: Sets the save name
      keywords: save,name,SaveName
      input_type: text
      param_field_name: SaveName
      default: MyWorld
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
