schema: aetherpanel.template/v1
id: smalland
name: 'Smalland: Survive the Wilds'
category: Imported
summary: 'Smalland: Survive the Wilds Dedicated Server'
install:
  method: steamcmd
  app_id: '808040'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    808040/SMALLAND/Binaries/Linux/SMALLANDServer-Linux-Shipping {PlatformArgs} SMALLAND
    /Game/Maps/WorldGame/WorldGame_Smalland{FRIENDLYFIRE}{PEACEFULMODE}{KEEPINVENTORY}{NODETERIORATION}{PRIVATE}{TAMEDCREATURESIMMORTAL}{CROSSPLAY}?{FormattedArgs}{CustomOptions}?SESSIONPLATFORM=pc
    -ini:Engine:[EpicOnlineServices]:DeploymentId=50f2b148496e4cbbbdeefbecc2ccd6a3
    -ini:Engine:[EpicOnlineServices]:DedicatedServerClientId=xyza78918KT08TkA6emolUay8yhvAAy2
    -ini:Engine:[EpicOnlineServices]:DedicatedServerClientSecret=aN2GtVw7aHb6hx66HwohNM+qktFaO3vtrLSbGdTzZWk
    -Port={ServerPort} -NOSTEAM -stdout -FullStdOutLogOutput
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 7777
    protocol: udp
    required: true
config_files:
  - path: smallandconfig.json
    type: json
    editable: true
  - path: smallandmetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: SERVERNAME
      label: Server Name
      category: Smalland
      subcategory: Server
      description: Sets the name of the server that appears in the server browser
      keywords: server,name,servername
      input_type: text
      param_field_name: SERVERNAME
      default: 'AetherNode Smalland: Survive the Wilds Server'
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Smalland:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server browser
        Keywords: server,name,servername
        FieldName: SERVERNAME
        InputType: text
        ParamFieldName: SERVERNAME
        IncludeInCommandLine: true
        DefaultValue: 'AetherNode Smalland: Survive the Wilds Server'
        Required: true
        EnumValues: {}
    - key: WORLDNAME
      label: World Name
      category: Smalland
      subcategory: Server
      description: Sets the world name, which corresponds to the save file name
      keywords: world,name,worldname
      input_type: text
