schema: aetherpanel.template/v1
id: teamspeak3
name: TeamSpeak 3
category: Imported
summary: TeamSpeak 3 Server
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: teamspeak3-server_win64/ts3server {PlatformArgs} inifile=teamspeak3server.ini license_accepted=1 {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: voice
    name: Voice Port
    default: 9987
    protocol: udp
    required: true
  - key: filetransfer
    name: File Transfer Port
    default: 30033
    protocol: tcp
    required: true
  - key: serverqueryraw
    name: Telnet Port
    default: 10011
    protocol: tcp
    required: true
  - key: serverqueryssh
    name: SSH Port
    default: 10022
    protocol: tcp
    required: true
  - key: webqueryhttp
    name: HTTP Port
    default: 10080
    protocol: tcp
    required: true
  - key: webqueryhttps
    name: HTTPS Port
    default: 10443
    protocol: tcp
    required: true
config_files:
  - path: teamspeak3-server_win64/teamspeak3server.ini
    type: text
    editable: true
