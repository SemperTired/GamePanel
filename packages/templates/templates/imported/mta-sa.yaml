schema: aetherpanel.template/v1
id: mta-sa
name: 'Multi Theft Auto: San Andreas'
category: Imported
summary: 'Multi Theft Auto: San Andreas Multiplayer Mod for Grand Theft Auto: San Andreas'
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://mirror-cdn.multitheftauto.com/mtasa/main/mtasa-1.6.exe
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/mta-server64 {PlatformArgs} -u -n --port {ServerPort} --httpport {ServerPort} --httpserver {httpserver}
    --maxplayers {MaxUsers} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 22003
    protocol: both
    required: true
  - key: aseport
    name: ASE Port
    default: 22126
    protocol: udp
    required: true
config_files:
  - path: mods/deathmatch/mtaserver.conf
    type: xml
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Server Port
      category: Multi Theft Auto
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: /config/serverport
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: Multi Theft Auto:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
