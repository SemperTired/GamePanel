schema: aetherpanel.template/v1
id: humanitz
name: HumanitZ
category: Imported
summary: HumanitZ Dedicated Server
install:
  method: steamcmd
  app_id: '2728330'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    2728330/HumanitZServer/Binaries/Linux/HumanitZServer-Linux-Shipping HumanitZServer -Port={GamePort}
    -QueryPort={QueryPort} -SteamServerName="{ServerName}" {FormattedArgs} -stdout {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: both
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 8888
    protocol: tcp
    required: true
config_files:
  - path: HumanitZServer/GameServerSettings.ini
    type: ini
    editable: true
