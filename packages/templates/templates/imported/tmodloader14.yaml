    - key: Source
      label: Update Source
      category: Updates
      subcategory: Server Updates
      description: >-
        Select where to obtain tModLoader. Steam requires you to own
        [Terraria](https://store.steampowered.com/app/105600/Terraria/) &
        [tModLoader](https://store.steampowered.com/app/1281930/tModLoader/) on your account and accept tModLoader's ToS
