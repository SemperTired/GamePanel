schema: aetherpanel.template/v1
id: tmodloader14
name: tModLoader 1.4+
category: Imported
summary: tModLoader 1.4+ server using Steam or GitHub
install:
  method: steamcmd
  app_id: '1281930'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    serverfiles/dotnet/dotnet {FullBaseDir}/tModLoader.dll -server {FormattedArgs} -players {MaxUsers} -port
    {ApplicationPort1} -config tmodloader14serverconfig.txt
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Server Port
    default: 7777
    protocol: both
    required: true
config_files:
  - path: tmodloader14serverconfig.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: Seed
      label: World Seed
      category: Terraria
      subcategory: Generation
      description: Which world seed to use when generating a new world
      keywords: seed,new,world
      input_type: text
      param_field_name: seed
      default: PoweredByAMP
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Seed
        Category: Terraria:stadia_controller
        Subcategory: Generation:globe:1
        Keywords: seed,new,world
        Description: Which world seed to use when generating a new world
        FieldName: Seed
        ParamFieldName: seed
        placeholder: PoweredByAMP
        InputType: text
        IncludeInCommandLine: true
        DefaultValue: PoweredByAMP
    - key: WorldSize
      label: World Size
      category: Terraria
      subcategory: Generation
      description: Set the Size of the World
      keywords: size,new,world
      input_type: enum
      param_field_name: autocreate
      default: '3'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '1': 1 - Small World
        '2': 2 - Medium World
        '3': 3 - Large World
      raw:
        DisplayName: World Size
        Category: Terraria:stadia_controller
        Subcategory: Generation:globe:1
        Keywords: size,new,world
        Description: Set the Size of the World
        FieldName: WorldSize
        ParamFieldName: autocreate
        IncludeInCommandLine: true
        InputType: enum
        EnumValues:
          '1': 1 - Small World
          '2': 2 - Medium World
          '3': 3 - Large World
        DefaultValue: '3'
    - key: Difficulty
      label: Difficulty
      category: Terraria
      subcategory: Generation
      description: The difficulty of a newly generated world
      keywords: difficulty,new,world,journey,expert,master
      input_type: enum
      param_field_name: difficulty
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Classic
        '1': Expert
        '2': Master
        '3': Journey
      raw:
        DisplayName: Difficulty
        Category: Terraria:stadia_controller
        Subcategory: Generation:globe:1
        Keywords: difficulty,new,world,journey,expert,master
        Description: The difficulty of a newly generated world
        FieldName: Difficulty
        ParamFieldName: difficulty
        InputType: enum
        EnumValues:
          '0': Classic
          '1': Expert
          '2': Master
          '3': Journey
        IncludeInCommandLine: false
        DefaultValue: '0'
    - key: WorldName
      label: Created World Name
      category: Terraria
      subcategory: Generation
      description: >-
        How to name the new world if one is generated. Make sure the World name under Terraria Server Settings matches
        this name if you want to load it in subsequent starts.
      keywords: name,new,world
      input_type: text
      param_field_name: worldname
      default: world
      required: false
      sensitive: false
      hidden: false
