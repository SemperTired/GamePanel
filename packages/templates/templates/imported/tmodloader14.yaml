          this name if you want to load it in subsequent starts.
        FieldName: WorldName
        ParamFieldName: worldname
        placeholder: World
        InputType: text
        IncludeInCommandLine: true
        DefaultValue: world
    - key: Backups
      label: Backup count
      category: Terraria
      subcategory: Generation
      description: Sets the number of rolling world backups to keep
