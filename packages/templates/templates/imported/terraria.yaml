schema: aetherpanel.template/v1
id: terraria
name: Terraria
category: Imported
summary: Terraria generic module with support for various options.
install:
  method: steamcmd
  app_id: '105600'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    serverfiles/TerrariaServer -server {FormattedArgs} -players {MaxUsers} -port {ApplicationPort1} -config
    terrariaserverconfig.txt
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Main Game Port
    default: 7777
    protocol: tcp
    required: true
config_files:
  - path: terrariaserverconfig.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: Seed
      label: World Seed
      category: Terraria
      subcategory: Generator
      description: Which world seed to use when generating a new world
      keywords: seed,new,world
      input_type: text
      param_field_name: seed
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Seed
        Category: Terraria:stadia_controller
        Subcategory: Generator:build:1
        Keywords: seed,new,world
        Description: Which world seed to use when generating a new world
        FieldName: Seed
        ParamFieldName: seed
        placeholder: PoweredByAMP
        suffix: ''
        InputType: text
        IncludeInCommandLine: true
        DefaultValue: ''
        EnumValues: {}
    - key: WorldSize
      label: World Size
      category: Terraria
      subcategory: Generator
      description: Set the Size of the World
      keywords: size,new,world
      input_type: enum
      param_field_name: autocreate
      default: '3'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '1': 1 - Small World
        '2': 2 - Medium World
        '3': 3 - Large World
      raw:
        DisplayName: World Size
        Category: Terraria:stadia_controller
        Subcategory: Generator:build:1
        Keywords: size,new,world
        Description: Set the Size of the World
        FieldName: WorldSize
        ParamFieldName: autocreate
        IncludeInCommandLine: true
        InputType: enum
        EnumValues:
          '1': 1 - Small World
          '2': 2 - Medium World
          '3': 3 - Large World
        DefaultValue: '3'
    - key: Difficulty
      label: Difficulty
      category: Terraria
      subcategory: Generator
      description: The difficulty of a newly generated world
      keywords: difficulty,new,world,journey,expert,master
      input_type: enum
      param_field_name: difficulty
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Classic
        '1': Expert
        '2': Master
        '3': Journey
      raw:
        DisplayName: Difficulty
        Category: Terraria:stadia_controller
        Subcategory: Generator:build:1
        Keywords: difficulty,new,world,journey,expert,master
        Description: The difficulty of a newly generated world
        FieldName: Difficulty
