        Sets whether and how mods specifed under Mods List are downloaded, updated and installed. AetherPanel manages = AetherPanel
        manages mods when the server is updated (can overcome failures with ARK's system, especially on Windows, but may
        be slower). ARK manages = the ARK server manages mods when the server is started
      keywords: auto,managed,mods,management,mode,automanagedmods
      input_type: enum
      param_field_name: automanagedmods
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
