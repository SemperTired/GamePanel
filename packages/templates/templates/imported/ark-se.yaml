schema: aetherpanel.template/v1
id: ark-se
name: 'ARK: Survival Evolved'
category: Imported
summary: 'ARK: Survival Evolved Dedicated Server'
install:
  method: steamcmd
  app_id: '376030'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    376030/ShooterGame/Binaries/Linux/ShooterGameServer
    {Map}?listen?Port={GamePort}?QueryPort={QueryPort}?RCONEnabled=True?RCONServerGameLogBuffer=600?RCONPort={RCONPort}?ServerAdminPassword={RemoteAdminPassword}?SessionName="{SessionName}"?MultiHome={ApplicationIPBinding}?{FormattedArgs}{OverrideOfficialDifficulty}{CustomOptions}
    {automanagedmods}{exclusivejoin}{BattlEye}{crossplay}{epiconly}{UseVivox}{insecure}{EnableIdlePlayerKick}{AllowFlyerSpeedLeveling}{ForceAllowCaveFlyers}{nodinos}{PreventHibernation}{ForceRespawnDinos}{DisableRailgunPVP}{UseStructureStasisGrid}{AutoDestroyStructures}
    -ActiveEvent={ActiveEvent} -PublicIPForEpic={PublicIPForEpic} -culture={culture} {EnableCluster}{CustomFlags}
    -servergamelog
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: peerport
    name: Peer Port
    default: 7778
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 27020
    protocol: tcp
    required: true
config_files:
  - path: ./ShooterGame/Saved/Config/LinuxServer/GameUserSettings.ini
    type: ini
    editable: true
  - path: ./ShooterGame/Saved/Config/LinuxServer/Game.ini
    type: ini
    editable: true
  - path: ./ShooterGame/Saved/Config/WindowsServer/GameUserSettings.ini
    type: ini
    editable: true
  - path: ./ShooterGame/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: SessionName
      label: Server Name
      category: ARK SE
      subcategory: Server
      description: Set the name of the server as it appears publicly. Don't include a question mark
      keywords: server,name,sessionname
      input_type: text
      param_field_name: SessionName
      default: 'AetherNode ARK: Survival Evolved Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: ARK SE:stadia_controller
        Subcategory: Server:dns:1
        Description: Set the name of the server as it appears publicly. Don't include a question mark
        Keywords: server,name,sessionname
        FieldName: SessionName
