  files:
    - path: Pavlov/Saved/Config/LinuxServer/Game.ini
      type: ini
      subsections: []
      raw:
        ConfigFile: Pavlov/Saved/Config/LinuxServer/Game.ini
        AutoMap: true
        ConfigType: ini
        ConfigFormatRegex: ^(?<key>.+?)=(?<value>.*?)$
    - path: Pavlov/Saved/Config/RconSettings.txt
      type: kvp
      format: '{0}={1}'
      subsections:
        - heading: $root
          setting_mappings:
            Password: $RemoteAdminPassword
            Port: $RemoteAdminPort
      raw:
        ConfigFile: Pavlov/Saved/Config/RconSettings.txt
        ConfigType: kvp
        ConfigFormat: '{0}={1}'
        Subsections:
          - Heading: $root
            SettingMappings:
              Password: $RemoteAdminPassword
              Port: $RemoteAdminPort
