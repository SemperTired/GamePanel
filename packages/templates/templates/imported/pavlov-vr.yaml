    - key: ApiKey
      label: API Key
      category: Pavlov VR
      subcategory: Server
      description: >-
        Sets a unique API key to allow the server to appear in the server list. [Get your API
        key](https://pavlov-ms.vankrupt.com/servers/v1/key)
      keywords: api,key,apikey
      input_type: password
      param_field_name: /Script/Pavlov.DedicatedServer.ApiKey
      default: ''
      required: false
      sensitive: true
      hidden: false
