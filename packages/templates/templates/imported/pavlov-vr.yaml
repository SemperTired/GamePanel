    - key: ServerVersion
      label: Server Release Version
      category: Updates
      subcategory: Steam Downloads
      description: 'Sets the server release version to install. NOTE: Update the server after changing this setting!'
      keywords: server,version,pc,shack,beta,rc
      input_type: enum
      default: public
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
