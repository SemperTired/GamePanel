schema: aetherpanel.template/v1
id: pavlov-vr
name: Pavlov VR
category: Imported
summary: Pavlov VR Dedicated Server
install:
  method: steamcmd
  app_id: '622970'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    622970/Pavlov/Binaries/Linux/PavlovServer-Linux-Shipping Pavlov -PORT={ApplicationPort1} {FormattedArgs} -stdout
    -forcelogflush
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Main Game Port
    default: 7777
    protocol: both
    required: true
  - key: applicationport2
    name: Secondary Game Port
    default: 8177
    protocol: both
    required: true
  - key: remoteadminport
    name: RCON Port
    default: 9100
    protocol: tcp
    required: true
config_files:
  - path: Pavlov/Saved/Config/LinuxServer/Game.ini
    type: ini
    editable: true
  - path: Pavlov/Saved/Config/RconSettings.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: ServerName
      label: Server Name
      category: Pavlov VR
      subcategory: Server
      description: Sets the server name visible in the server list. Maximum 35 characters (approx)
      keywords: server,name,servername
      input_type: text
      param_field_name: /Script/Pavlov.DedicatedServer.ServerName
      default: Pavlov VR Server - Hosted by AetherNode
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Pavlov VR:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the server name visible in the server list. Maximum 35 characters (approx)
        Keywords: server,name,servername
        FieldName: ServerName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: /Script/Pavlov.DedicatedServer.ServerName
        IncludeInCommandLine: false
        DefaultValue: Pavlov VR Server - Hosted by AetherNode
        EnumValues: {}
    - key: bEnabled
      label: Include In Server List
      category: Pavlov VR
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: /Script/Pavlov.DedicatedServer.bEnabled
      default: 'true'
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Include In Server List
