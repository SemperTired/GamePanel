    - key: ServerPlatform
      label: Client Platform/Crossplay Support
      category: ARK SA
      subcategory: Server
      description: >-
        List (separated by +, such as: XSX+PS5) of the game client platforms supported by the server. 'PC' = Steam/PC,
        'XSX' = Xbox, 'WINGDK' = Microsoft Store/PC, 'PS5' = PlayStation 5, 'ALL' = all platforms. Crossplay will be
