schema: aetherpanel.template/v1
id: ark-sa
name: 'ARK: Survival Ascended'
category: Imported
summary: 'ARK: Survival Ascended Dedicated Server with Server API option'
install:
  method: steamcmd
  app_id: '2430930'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    .proton/proton {PlatformArgs}
    {Map}?listen?Port={GamePort}?RCONEnabled=True?RCONServerGameLogBuffer=600?RCONPort={RCONPort}?{FormattedArgs}{OverrideOfficialDifficulty}{CustomOptions}?ServerAdminPassword={RemoteAdminPassword}
    -WinLiveMaxPlayers={MaxUsers}
    {passivemods}{mods}{pconlymods}{Colors}{exclusivejoin}{BattlEye}{usestore}-ServerPlatform={ServerPlatform}
    {EnableIdlePlayerKick}{NoHangDetection}{NoTransferFromFiltering}{NoGameAnalytics}{AllowSpeedLeveling}{ForceAllowCaveFlyers}{nodinos}{ForceRespawnDinos}{DisableRailgunPVP}{UseStructureStasisGrid}-culture={culture}
    {EnableCluster}{ServerIP}{CustomFlags} -servergamelog
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: httpserverport
    name: HTTP Server Port
    default: 8888
    protocol: tcp
    required: true
  - key: rconport
    name: RCON Port
    default: 27020
    protocol: tcp
    required: true
config_files:
  - path: ShooterGame/Saved/Config/WindowsServer/GameUserSettings.ini
    type: ini
    editable: true
  - path: ShooterGame/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: SessionName
      label: Server Name
      category: ARK SA
      subcategory: Server
      description: Set the name of the server as it appears publicly
      keywords: server,name,sessionname
      input_type: text
      param_field_name: SessionSettings.SessionName
      default: 'AetherNode ARK: Survival Ascended Server'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: Set the name of the server as it appears publicly
        Keywords: server,name,sessionname
        FieldName: SessionName
        InputType: text
        ParamFieldName: SessionSettings.SessionName
        DefaultValue: 'AetherNode ARK: Survival Ascended Server'
        EnumValues: {}
    - key: MOTDMessage
      label: MOTD
      category: ARK SA
      subcategory: Server
      description: Sets the player welcome message (MOTD)
      keywords: motd,welcome,message
      input_type: text
      param_field_name: MessageOfTheDay.Message
      default: Welcome to ARK!
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: MOTD
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the player welcome message (MOTD)
        Keywords: motd,welcome,message
        FieldName: MOTDMessage
        InputType: text
        ParamFieldName: MessageOfTheDay.Message
        DefaultValue: Welcome to ARK!
        EnumValues: {}
    - key: MOTDDuration
      label: MOTD Duration
      category: ARK SA
      subcategory: Server
      description: Sets the time period for display of the MOTD
      keywords: motd,message,period,duration
      input_type: number
      param_field_name: MessageOfTheDay.Duration
      default: '20'
      placeholder: '20'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: MOTD Duration
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the time period for display of the MOTD
        Keywords: motd,message,period,duration
        FieldName: MOTDDuration
        InputType: number
        ParamFieldName: MessageOfTheDay.Duration
        DefaultValue: '20'
        Placeholder: '20'
        Suffix: seconds
        EnumValues: {}
    - key: Map
      label: Map
      category: ARK SA
      subcategory: Server
      description: Sets the map for the server. If Custom is selected, Custom Map Name must also be set
      keywords: map
      input_type: enum
      param_field_name: Map
      default: TheIsland_WP
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        TheIsland_WP: The Island (default)
        ScorchedEarth_WP: Scorched Earth
        TheCenter_WP: The Center
        Aberration_WP: Aberration
        Extinction_WP: Extinction
        Astraeos_WP: Astraeos
        Ragnarok_WP: Ragnarok
        Valguero_WP: Valguero
        LostColony_WP: Lost Colony
        '{{CustomMap}}': '--Custom--'
      raw:
        DisplayName: Map
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map for the server. If Custom is selected, Custom Map Name must also be set
        Keywords: map
        FieldName: Map
        InputType: enum
        ParamFieldName: Map
        DefaultValue: TheIsland_WP
        EnumValues:
          TheIsland_WP: The Island (default)
          ScorchedEarth_WP: Scorched Earth
          TheCenter_WP: The Center
          Aberration_WP: Aberration
          Extinction_WP: Extinction
          Astraeos_WP: Astraeos
          Ragnarok_WP: Ragnarok
          Valguero_WP: Valguero
          LostColony_WP: Lost Colony
          '{{CustomMap}}': '--Custom--'
    - key: CustomMap
      label: Custom Map Name
      category: ARK SA
      subcategory: Server
      description: >-
        Sets a custom map for the server. "Custom" type must be selected under Map, and the CurseForge Project ID for
        the map included under Mods List
      keywords: custom,map
      input_type: text
      param_field_name: CustomMap
      default: ''
      placeholder: Svartalfheim_WP
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Map Name
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a custom map for the server. "Custom" type must be selected under Map, and the CurseForge Project ID for
          the map included under Mods List
        Keywords: custom,map
        FieldName: CustomMap
        InputType: text
        ParamFieldName: CustomMap
        DefaultValue: ''
        Placeholder: Svartalfheim_WP
        EnumValues: {}
    - key: mods
      label: Use Mods
      category: ARK SA
      subcategory: Server
      description: >-
        If set, enables automatic mod downloading, updating and loading (on server start). Specify the relevant mods
        under Mods List. Don't enable this setting if no mods are specified under Mods List or the server will not start
      keywords: auto,managed,mods
      input_type: checkbox
      param_field_name: mods
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-mods={{modslist}} '
      raw:
        DisplayName: Use Mods
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, enables automatic mod downloading, updating and loading (on server start). Specify the relevant mods
          under Mods List. Don't enable this setting if no mods are specified under Mods List or the server will not
          start
        Keywords: auto,managed,mods
        FieldName: mods
        InputType: checkbox
        ParamFieldName: mods
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-mods={{modslist}} '
    - key: modslist
      label: Mods List
      category: ARK SA
      subcategory: Server
      description: >-
        Comma-separated and ordered list of [CurseForge Project IDs](https://www.curseforge.com/ark-survival-ascended)
        for mods (including events) to install and load on server start (map mods will not load unless also named as a
        "Custom" map under Custom Map Name). Requires Use Mods to be enabled
      keywords: mods,list
      input_type: text
      param_field_name: modslist
      default: ''
      placeholder: 900062,893657
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Mods List
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Comma-separated and ordered list of [CurseForge Project IDs](https://www.curseforge.com/ark-survival-ascended)
          for mods (including events) to install and load on server start (map mods will not load unless also named as a
          "Custom" map under Custom Map Name). Requires Use Mods to be enabled
        Keywords: mods,list
        FieldName: modslist
        InputType: text
        ParamFieldName: modslist
        DefaultValue: ''
        Placeholder: 900062,893657
        EnumValues: {}
    - key: passivemods
      label: Use Passive Mods
      category: ARK SA
      subcategory: Server
      description: >-
        If enabled, this option activates the -passivemods function, allowing specified mods to load their data while
        disabling their functionality (even if the mods are listed under Mods List). Don't enable this setting if no
        mods are specified under Passive Mods List or the server will not start
      keywords: passive,passivemods,mods
      input_type: checkbox
      param_field_name: passivemods
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-passivemods={{passivemodslist}} '
      raw:
        DisplayName: Use Passive Mods
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, this option activates the -passivemods function, allowing specified mods to load their data while
          disabling their functionality (even if the mods are listed under Mods List). Don't enable this setting if no
          mods are specified under Passive Mods List or the server will not start
        Keywords: passive,passivemods,mods
        FieldName: passivemods
        InputType: checkbox
        ParamFieldName: passivemods
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-passivemods={{passivemodslist}} '
    - key: passivemodslist
      label: Passive Mods List
      category: ARK SA
      subcategory: Server
      description: >-
        Comma-separated and ordered list of [CurseForge Project IDs](https://www.curseforge.com/ark-survival-ascended)
