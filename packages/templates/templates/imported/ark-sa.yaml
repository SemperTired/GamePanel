        Passive Mods to be enabled. When enabled, at least one mod ID must be specified, or the server will not start
      keywords: passive,passivemods,mods,list
      input_type: text
      param_field_name: passivemodslist
      default: ''
      placeholder: '927090'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Passive Mods List
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Comma-separated and ordered list of [CurseForge Project IDs](https://www.curseforge.com/ark-survival-ascended)
          for mods to be loaded in passive mode, disabling their functionality while retaining their data. Requires Use
          Passive Mods to be enabled. When enabled, at least one mod ID must be specified, or the server will not start
        Keywords: passive,passivemods,mods,list
        FieldName: passivemodslist
        InputType: text
        ParamFieldName: passivemodslist
        DefaultValue: ''
        Placeholder: '927090'
        EnumValues: {}
    - key: pconlymods
