        Keywords: rcon,password,serveradminpassword
        FieldName: RCONPassword
        InputType: hidden
        ParamFieldName: RCONPassword
        IncludeInCommandLine: false
        EnumValues: {}
    - key: ServerPassword
      label: Server Password
      category: ARK SA
      subcategory: Server
      description: Sets the password for players to join the server
      keywords: server,password,serverpassword
      input_type: password
      param_field_name: ServerSettings.ServerPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: ARK SA:stadia_controller
        Subcategory: Server:dns:1
