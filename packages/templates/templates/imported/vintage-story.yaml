environment: {}
startup_variables:
  - key: AdvertiseServer
    label: Make Server Public
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerName
    label: Server Name
    default: Vintage Story Server - Hosted by AetherNode
    customer_editable: true
    required: false
    sensitive: false
  - key: WelcomeMessage
    label: Welcome Message
    default: Welcome, {0}, may you survive well and prosper
    customer_editable: true
    required: false
    sensitive: false
  - key: OnlyWhitelisted
    label: Enable Whitelist
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: AllowPvP
    label: Allow PvP
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: Upnp
    label: Enable UPnP
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
