        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: Upnp
      label: Enable UPnP
      category: Vintage Story
      subcategory: Server
      description: If enabled, the server will attempt to configure automatic port forwarding on a compatible router
      keywords: upnp
      input_type: checkbox
      param_field_name: $.Upnp
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
