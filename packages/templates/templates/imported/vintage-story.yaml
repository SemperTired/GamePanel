schema: aetherpanel.template/v1
id: vintage-story
name: Vintage Story (Legacy)
category: Imported
summary: Vintage Story Dedicated Server, up to v1.18.7
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://cdn.vintagestory.at/gamefiles/stable/vs_server_%7B%7BServerVersion%7D%7D.tar.gz
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/mono {PlatformArgs} --port {ServerPort} --dataPath "../data" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 42420
    protocol: tcp
    required: true
config_files:
  - path: data/serverconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Port
      category: Vintage Story
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.Port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Port
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: $.Port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: AdvertiseServer
      label: Make Server Public
      category: Vintage Story
      subcategory: Server
      description: If enabled, the server will be added to the public server listing
      keywords: public
      input_type: checkbox
      param_field_name: $.AdvertiseServer
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Make Server Public
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will be added to the public server listing
        Keywords: public
        FieldName: AdvertiseServer
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.AdvertiseServer
        IncludeInCommandLine: false
        DefaultValue: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: ServerName
      label: Server Name
      category: Vintage Story
      subcategory: Server
      description: Server name visible in the server list
      keywords: server,name
      input_type: text
      param_field_name: $.ServerName
      default: Vintage Story Server - Hosted by AetherNode
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: Server name visible in the server list
        Keywords: server,name
        FieldName: ServerName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.ServerName
        IncludeInCommandLine: false
        DefaultValue: Vintage Story Server - Hosted by AetherNode
        EnumValues: {}
    - key: WelcomeMessage
      label: Welcome Message
      category: Vintage Story
      subcategory: Server
      description: Welcome message when players join the server. Placeholder {0} will be replaced with the player's nickname
      keywords: welcome,message,motd
      input_type: text
      param_field_name: $.WelcomeMessage
      default: Welcome, {0}, may you survive well and prosper
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Welcome Message
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: Welcome message when players join the server. Placeholder {0} will be replaced with the player's nickname
        Keywords: welcome,message,motd
        FieldName: WelcomeMessage
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.WelcomeMessage
        IncludeInCommandLine: false
        DefaultValue: Welcome, {0}, may you survive well and prosper
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Vintage Story
      subcategory: Server
      description: Maximum number of players that may connect to the server
      keywords: players,limit
      input_type: number
      param_field_name: $.MaxClients
      default: '16'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: Maximum number of players that may connect to the server
        Keywords: players,limit
        FieldName: $MaxUsers
        InputType: number
        IsFlagArgument: false
        ParamFieldName: $.MaxClients
        IncludeInCommandLine: false
        DefaultValue: '16'
        Suffix: players
        EnumValues: {}
        MinValue: '1'
    - key: OnlyWhitelisted
      label: Enable Whitelist
      category: Vintage Story
      subcategory: Server
      description: If enabled, only whitelisted players can join the server
      keywords: whitelist
      input_type: checkbox
      param_field_name: $.OnlyWhitelisted
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
