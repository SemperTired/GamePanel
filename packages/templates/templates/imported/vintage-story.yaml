        DisplayName: Enable Whitelist
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, only whitelisted players can join the server
        Keywords: whitelist
        FieldName: OnlyWhitelisted
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.OnlyWhitelisted
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: AllowPvP
      label: Allow PvP
      category: Vintage Story
      subcategory: Server
      description: If enabled, players can hit other players
      keywords: pvp
      input_type: checkbox
      param_field_name: $.AllowPvP
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Allow PvP
        Category: Vintage Story:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, players can hit other players
        Keywords: pvp
        FieldName: AllowPvP
        InputType: checkbox
