schema: aetherpanel.template/v1
id: day-of-defeat
name: Day of Defeat
category: Imported
summary: Day of Defeat Dedicated Server
install:
  method: steamcmd
  app_id: '90'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    90/hlds_linux {PlatformArgs} -console -game {mod} -port {GameRCONPort} -sys_ticrate={sys_ticrate} -nobreakpad
    {insecure}{pingboost}{CustomParameters} {CustomConVars} +ip {ApplicationIPBinding} +rcon_password
    "{RemoteAdminPassword}" {FormattedArgs} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gamerconport
    name: Game and RCON Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: dod/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: hostname
      label: Server Name
      category: Day of Defeat
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AMP Powered Day of Defeat Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Day of Defeat:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        ParamFieldName: hostname
        DefaultValue: AMP Powered Day of Defeat Server
        EnumValues: {}
    - key: motd
      label: Server MOTD
      category: Day of Defeat
      subcategory: Server
      description: >-
        The message of the day (MOTD) that is shown to joining players can be configured in mod/motd.txt. Plain text or
        HTML formatting is allowed
      keywords: message,welcome,motd
      input_type: hidden
      param_field_name: motd
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server MOTD
        Category: Day of Defeat:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          The message of the day (MOTD) that is shown to joining players can be configured in mod/motd.txt. Plain text
          or HTML formatting is allowed
        Keywords: message,welcome,motd
        FieldName: motd
        InputType: hidden
        ParamFieldName: motd
        IncludeInCommandLine: false
        EnumValues: {}
    - key: mod
      label: Server Mod Name
      category: Day of Defeat
      subcategory: Server
      description: >-
        Sets the name of the mod directory to load, allowing the use of third-party Day of Defeat mods. Don't change
        this from the default 'dod' unless you know what you are doing!
      keywords: server,mod,directory,game
      input_type: text
      param_field_name: mod
      default: dod
      placeholder: dod
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Mod Name
        Category: Day of Defeat:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the name of the mod directory to load, allowing the use of third-party Day of Defeat mods. Don't change
          this from the default 'dod' unless you know what you are doing!
        Keywords: server,mod,directory,game
        FieldName: mod
        InputType: text
        ParamFieldName: mod
        DefaultValue: dod
        Placeholder: dod
        EnumValues: {}
    - key: sv_lan
      label: LAN Server
      category: Day of Defeat
      subcategory: Server
      description: >-
        If enabled, the server will operate as a LAN server: no heartbeat, no authentication, no non-class C addresses,
        9999.0 rate, etc
      keywords: lan,local,sv_lan
      input_type: checkbox
      param_field_name: sv_lan
      default: '0'
      required: false
