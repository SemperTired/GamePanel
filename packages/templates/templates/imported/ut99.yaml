schema: aetherpanel.template/v1
id: ut99
name: Unreal Tournament 99
category: Imported
summary: >-
  Unreal Tournament (UT99) Dedicated Server. Based on v436 official server, with Bonus Packs 1 to 4 plus OldUnreal patch
  as selected by user
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: >-
    https://unreal-archive-files-eu.s3.de.io.cloud.ovh.net/managed/Unreal%20Tournament/patches-updates/bonus-packs/utbonuspack4-zip.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    System{ServerExecutable}/ucc-bin server {MapName}?{FormattedArgs} ini=../System/_AMP_UnrealTournament.ini
    userini=../System/User.ini log=server.log port={GamePort} {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 7778
    protocol: udp
    required: true
  - key: masterserverport1
    name: Master Server Port 1
    default: 7779
    protocol: udp
    required: true
  - key: masterserverport2
    name: Master Server Port 2
    default: 7780
    protocol: udp
    required: true
  - key: masterserverport3
    name: Master Server Port 3
    default: 7781
    protocol: udp
    required: true
  - key: masterserverport4
    name: Master Server Port 4
    default: 7782
    protocol: udp
    required: true
  - key: webserverport
    name: Webserver Port
    default: 8888
    protocol: tcp
    required: true
config_files:
  - path: System/_AMP_UnrealTournament.ini
    type: ini
    editable: true
  - path: System/User.ini
    type: ini
    editable: true
