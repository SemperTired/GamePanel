    - key: PatchVersion
      label: OldUnreal Patch Version
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        Sets the OldUnreal patch version to apply to the server. On Linux, AMP installs the 64 bit version for 469c and
        above, unless the 32 bit version is selected. Set the Server Executable for Linux accordingly. Update the server
        after changing this setting!
      keywords: oldunreal,patch,version
      input_type: enum
      param_field_name: PatchVersion
      default: 469e
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        469b: 469b - 32 bit
        469c: 469c - 32 bit (Windows), 64 bit (Linux)
        469c32: 469c - 32 bit (Linux)
        469d: 469d - 32 bit (Windows), 64 bit (Linux)
        469d32: 469d - 32 bit (Linux)
        469e: 469e - 32 bit (Windows), 64 bit (Linux) (default)
        '469e32': 469e - 32 bit (Linux)
      raw:
        DisplayName: OldUnreal Patch Version
        Category: Updates
        Subcategory: Runtime Configuration:build:-1
        Description: >-
          Sets the OldUnreal patch version to apply to the server. On Linux, AMP installs the 64 bit version for 469c
          and above, unless the 32 bit version is selected. Set the Server Executable for Linux accordingly. Update the
          server after changing this setting!
        Keywords: oldunreal,patch,version
        FieldName: PatchVersion
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: PatchVersion
        IncludeInCommandLine: false
        DefaultValue: 469e
        EnumValues:
          469b: 469b - 32 bit
          469c: 469c - 32 bit (Windows), 64 bit (Linux)
          469c32: 469c - 32 bit (Linux)
          469d: 469d - 32 bit (Windows), 64 bit (Linux)
          469d32: 469d - 32 bit (Linux)
          469e: 469e - 32 bit (Windows), 64 bit (Linux) (default)
          '469e32': 469e - 32 bit (Linux)
    - key: ServerExecutable
      label: Server Executable (Linux)
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        Sets whether to run the 32 bit or 64 bit version of the server executable on Linux. The appropriate OldUnreal
        Patch Version must also be installed
      keywords: server,executable,32bit,64bit
      input_type: enum
      param_field_name: ServerExecutable
      default: '64'
