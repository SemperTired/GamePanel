    - key: $MaxUsers
      label: Player Limit
      category: VEIN
      subcategory: Server
      description: Sets the maximum number of players that may connect to the server at one time
      keywords: maximum,players,clients,limit,maxplayers
      input_type: number
      param_field_name: /Script/Engine.GameSession.MaxPlayers
      default: '16'
      placeholder: '16'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
