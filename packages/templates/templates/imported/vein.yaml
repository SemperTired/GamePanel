schema: aetherpanel.template/v1
id: vein
name: VEIN
category: Imported
summary: VEIN Dedicated Server
install:
  method: steamcmd
  app_id: '2131400'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    2131400/Vein/Binaries/Linux/VeinServer-Linux-Test {PlatformArgs} Vein -Port={GamePort} -QueryPort={QueryPort}
    {MultiHome}{FormattedArgs} -UseGameSaveDir -stdout -FullStdOutLogOutput
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 7878
    protocol: udp
    required: true
config_files:
  - path: Vein/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
  - path: Vein/Saved/Config/LinuxServer/Game.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerName
      label: Server Name
      category: VEIN
      subcategory: Server
      description: Sets the name of the server that is shown in the server browser
      keywords: name,ServerName
      input_type: text
      param_field_name: /Script/Vein.VeinGameSession.ServerName
      default: AMP Powered VEIN Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: VEIN:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that is shown in the server browser
        Keywords: name,ServerName
        FieldName: ServerName
        InputType: text
        ParamFieldName: /Script/Vein.VeinGameSession.ServerName
        DefaultValue: AMP Powered VEIN Server
        EnumValues: {}
    - key: ServerDescription
      label: Server Description
      category: VEIN
      subcategory: Server
      description: Sets the description of the server that is shown in the server browser
      keywords: description,ServerDescription
      input_type: text
      param_field_name: /Script/Vein.VeinGameSession.ServerDescription
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Description
        Category: VEIN:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the description of the server that is shown in the server browser
        Keywords: description,ServerDescription
        FieldName: ServerDescription
        InputType: text
        ParamFieldName: /Script/Vein.VeinGameSession.ServerDescription
        DefaultValue: ''
        EnumValues: {}
    - key: bPublic
      label: Make Server Public
      category: VEIN
      subcategory: Server
      description: If enabled, the server will be listed in the server browser
      keywords: public,visible,server,browser,bPublic
      input_type: checkbox
      param_field_name: /Script/Vein.VeinGameSession.bPublic
      default: 'True'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'False'
        'True': 'True'
      raw:
        DisplayName: Make Server Public
        Category: VEIN:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, the server will be listed in the server browser
        Keywords: public,visible,server,browser,bPublic
        FieldName: bPublic
