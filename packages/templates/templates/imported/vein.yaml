          'True': 'True'
    - key: Password
      label: Server Password
      category: VEIN
      subcategory: Server
      description: Sets the password required to connect to the server. Default is no password
      keywords: server,password
      input_type: password
      param_field_name: /Script/Vein.VeinGameSession.Password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
