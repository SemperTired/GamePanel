schema: aetherpanel.template/v1
id: titanfall2
name: Titanfall 2
category: Imported
summary: Northstar Dedicated Server Mod for Titanfall 2, with NSWrap wrapper on Linux
install:
  method: steamcmd
  app_id: '1237970'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    1237970/nswrap/nswrap {PlatformArgs} -dedicated -multiple -profile="{profile}" -port {ServerPort}
    -maxplayersplaylist {CustomParameters} +setplaylist {setplaylist} +mp_gamemode {mp_gamemode}
    +setplaylistvaroverrides "max_players {MaxUsers} {CustomPlaylistOverrides}" {FormattedArgs}
    +net_compresspackets_minsize 64 +net_compresspackets 1 +spewlog_enable 0 +sv_maxrate 127000 {CustomConVars}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 37015
    protocol: udp
    required: true
config_files:
  - path: '{{profile}}/mods/Northstar.CustomServers/mod/cfg/autoexec_ns_server.cfg'
    type: text
    editable: true
config_schema:
  fields:
    - key: profile
      label: Server Profile
      category: Titanfall 2
      subcategory: Server
      description: Sets the server profile to use. This is used to store server settings and player data
      keywords: server,profile
      input_type: text
      param_field_name: profile
      default: R2Northstar
      placeholder: R2Northstar
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Profile
