schema: aetherpanel.template/v1
id: killing-floor-2
name: Killing Floor 2
category: Imported
summary: Killing Floor 2 Dedicated Server
install:
  method: steamcmd
  app_id: '232130'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    232130/Binaries/Win64/KFGameSteamServer.bin.x86_64 {Map}{CustomUrlArgs}?Game={Game}?MaxPlayers={MaxUsers}
    -Port={ApplicationPort1} -QueryPort={ApplicationPort2} -WebAdminPort={RemoteAdminPort}
    -Multihome={ApplicationIPBinding} {FormattedArgs} {CustomSwitches}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Server Port
    default: 7777
    protocol: udp
    required: true
  - key: applicationport2
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: remoteadminport
    name: RCON Port
    default: 9080
    protocol: tcp
    required: true
config_files:
  - path: ./KFGame/Config/PCServer-KFGame.ini
    type: ini
    editable: true
  - path: ./KFGame/Config/LinuxServer-KFGame.ini
    type: ini
    editable: true
  - path: ./KFGame/Config/KFWeb.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: Map
      label: Starting Map
      category: Killing Floor 2
      subcategory: Server
      description: >-
        Set the server's starting map. Survival compatible maps denoted with "*". If "Custom" is selected, Custom
        Starting Map Name must also be set
      keywords: Map
      input_type: enum
      param_field_name: Map
      default: KF-Bioticslab
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        KF-Airship: Airship
        KF-AshwoodAsylum: Ashwood Asylum
        KF-Biolapse: Biolapse
        KF-Bioticslab: Biotics Lab*
        KF-BlackForest: Black Forest
        KF-BurningParis: Burning Paris*
        KF-CarillonHamlet: Carillon Hamlet
