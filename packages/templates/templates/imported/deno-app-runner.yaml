schema: aetherpanel.template/v1
id: deno-app-runner
name: Deno App Runner
category: Imported
summary: Deno App Runner
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: deno/deno run {DenoArgs} {ApplicationName} {CommandLineArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Main Port
    default: 8000
    protocol: both
    required: true
config_files:
  - path: deno-app-runnerconfig.json
    type: json
    editable: true
  - path: deno-app-runnermetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: DownloadType
      label: App Download Type
      category: Deno App Runner
      subcategory: Download
      description: >-
        Sets how to download the app. Specify the App Download Source and the relevant Git repo or GitHub release
        settings accordingly. Update the app after changing this setting
      keywords: download,type
      input_type: enum
      param_field_name: DownloadType
      default: ''
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': '--Please select--'
        DownloadURL: Download URL
        GithubRelease: GitHub release
        GitRepo: Git repo
        None: None
      raw:
        DisplayName: App Download Type
        Category: Deno App Runner:code
        Subcategory: Download:download:2
        Description: >-
          Sets how to download the app. Specify the App Download Source and the relevant Git repo or GitHub release
          settings accordingly. Update the app after changing this setting
        Keywords: download,type
        FieldName: DownloadType
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: DownloadType
        IncludeInCommandLine: false
        DefaultValue: ''
        Required: true
        EnumValues:
          '': '--Please select--'
          DownloadURL: Download URL
          GithubRelease: GitHub release
          GitRepo: Git repo
          None: None
    - key: DownloadSource
      label: App Download Source
      category: Deno App Runner
      subcategory: Download
      description: >-
        Sets the source for the App Download Type. Git repo = URL that ends in .git. GitHub release = User/Repo.
        Download URL = URL to a zip file. Update the app after changing this setting
      keywords: download,source
      input_type: text
      param_field_name: DownloadSource
      default: ''
      placeholder: https://github.com/username/deno-app.git
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: App Download Source
        Category: Deno App Runner:code
        Subcategory: Download:download:2
        Description: >-
          Sets the source for the App Download Type. Git repo = URL that ends in .git. GitHub release = User/Repo.
          Download URL = URL to a zip file. Update the app after changing this setting
        Keywords: download,source
        FieldName: DownloadSource
        InputType: text
        IsFlagArgument: false
        ParamFieldName: DownloadSource
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: https://github.com/username/deno-app.git
        EnumValues: {}
    - key: DownloadBranch
      label: Git Repo Branch
      category: Deno App Runner
      subcategory: Download
      description: If "Git repo" is selected under App Download Type, sets the branch if required. Empty = default branch
      keywords: git,repo,branch,DownloadBranch
      input_type: text
      param_field_name: DownloadBranch
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Git Repo Branch
        Category: Deno App Runner:code
        Subcategory: Download:download:2
        Description: If "Git repo" is selected under App Download Type, sets the branch if required. Empty = default branch
        Keywords: git,repo,branch,DownloadBranch
        FieldName: DownloadBranch
        InputType: text
        ParamFieldName: DownloadBranch
        DefaultValue: ''
        EnumValues: {}
    - key: DownloadUsername
      label: Git Repo Username
      category: Deno App Runner
      subcategory: Download
      description: If "Git repo" is selected under App Download Type, sets the username if login is required
      keywords: git,repo,username,DownloadUsername
      input_type: text
      param_field_name: DownloadUsername
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Git Repo Username
        Category: Deno App Runner:code
        Subcategory: Download:download:2
        Description: If "Git repo" is selected under App Download Type, sets the username if login is required
        Keywords: git,repo,username,DownloadUsername
        FieldName: DownloadUsername
        InputType: text
        ParamFieldName: DownloadUsername
        DefaultValue: ''
        EnumValues: {}
    - key: DownloadPassword
      label: Git Repo Password/Token
      category: Deno App Runner
      subcategory: Download
      description: If "Git repo" is selected under App Download Type, sets the password/token if login is required
      keywords: git,repo,password,token,DownloadPassword
      input_type: password
      param_field_name: DownloadPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Git Repo Password/Token
        Category: Deno App Runner:code
        Subcategory: Download:download:2
        Description: If "Git repo" is selected under App Download Type, sets the password/token if login is required
        Keywords: git,repo,password,token,DownloadPassword
        FieldName: DownloadPassword
        InputType: password
        ParamFieldName: DownloadPassword
        DefaultValue: ''
        EnumValues: {}
    - key: DownloadFilename
      label: GitHub Release Filename
      category: Deno App Runner
      subcategory: Download
      description: If "GitHub release" is selected under App Download Type, sets the name of the zip file to download
      keywords: github,release,filename
      input_type: text
      param_field_name: DownloadFilename
      default: ''
      placeholder: deno-app.zip
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: GitHub Release Filename
        Category: Deno App Runner:code
        Subcategory: Download:download:2
        Description: If "GitHub release" is selected under App Download Type, sets the name of the zip file to download
        Keywords: github,release,filename
        FieldName: DownloadFilename
        InputType: text
        IsFlagArgument: false
        ParamFieldName: DownloadFilename
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: deno-app.zip
        EnumValues: {}
    - key: DownloadVersion
      label: GitHub Release Version
      category: Deno App Runner
      subcategory: Download
      description: If "GitHub release" is selected under App Download Type, sets the release version to download. Empty = latest
      keywords: github,release,version
      input_type: text
      param_field_name: DownloadVersion
      default: ''
      placeholder: 1.0.0
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: GitHub Release Version
        Category: Deno App Runner:code
        Subcategory: Download:download:2
        Description: If "GitHub release" is selected under App Download Type, sets the release version to download. Empty = latest
        Keywords: github,release,version
        FieldName: DownloadVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: DownloadVersion
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: 1.0.0
        EnumValues: {}
    - key: DenoVersion
      label: Deno Version
      category: Deno App Runner
      subcategory: App
      description: >-
        Sets the [Deno version](https://github.com/denoland/deno/releases) to install. Format: v1.40.0. Empty = latest
        version. Update the server after changing this setting
      keywords: deno,version,DenoVersion
      input_type: text
      param_field_name: DenoVersion
      default: ''
      placeholder: v1.40.0
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Deno Version
        Category: Deno App Runner:code
        Subcategory: App:settings:1
        Description: >-
          Sets the [Deno version](https://github.com/denoland/deno/releases) to install. Format: v1.40.0. Empty = latest
          version. Update the server after changing this setting
        Keywords: deno,version,DenoVersion
        FieldName: DenoVersion
        InputType: text
        ParamFieldName: DenoVersion
        DefaultValue: ''
        Placeholder: v1.40.0
        EnumValues: {}
    - key: RunAppSetupCommands
      label: Run App Setup Commands
      category: Deno App Runner
      subcategory: App
      description: >-
        If enabled, the command(s) specified under App Setup Commands will be run when the server is updated and after
        the app is installed
      keywords: app,setup,command,RunAppSetupCommands
      input_type: checkbox
      param_field_name: RunAppSetupCommands
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Run App Setup Commands
        Category: Deno App Runner:code
        Subcategory: App:settings:1
        Description: >-
          If enabled, the command(s) specified under App Setup Commands will be run when the server is updated and after
          the app is installed
        Keywords: app,setup,command,RunAppSetupCommands
        FieldName: RunAppSetupCommands
        InputType: checkbox
        ParamFieldName: RunAppSetupCommands
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: AppSetupCommands
      label: App Setup Commands
      category: Deno App Runner
      subcategory: App
      description: >-
        Sets any required command(s) to run to set up the app after it is installed, if Run App Setup Commands is
        enabled. Linux: command1; command2 | Windows: command1 & command2. Include "deno" as needed
      keywords: app,setup,command,AppSetupCommands
      input_type: text
      param_field_name: AppSetupCommands
      default: ''
      placeholder: deno cache main.ts | deno task build
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: App Setup Commands
        Category: Deno App Runner:code
        Subcategory: App:settings:1
        Description: >-
          Sets any required command(s) to run to set up the app after it is installed, if Run App Setup Commands is
          enabled. Linux: command1; command2 | Windows: command1 & command2. Include "deno" as needed
        Keywords: app,setup,command,AppSetupCommands
        FieldName: AppSetupCommands
        InputType: text
        ParamFieldName: AppSetupCommands
        DefaultValue: ''
        Placeholder: deno cache main.ts | deno task build
        EnumValues: {}
    - key: ApplicationName
      label: App Name
      category: Deno App Runner
      subcategory: App
      description: >-
        Sets the name of the Deno app to execute. Do not include "deno" in front. Include any relative path from the
        base directory or App Installation Location, if applicable. Supports both .ts and .js files
      keywords: app,application,name
      input_type: text
      param_field_name: ApplicationName
      default: ''
      placeholder: main.ts | server.js | src/app.ts
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: App Name
        Category: Deno App Runner:code
        Subcategory: App:settings:1
        Description: >-
          Sets the name of the Deno app to execute. Do not include "deno" in front. Include any relative path from the
          base directory or App Installation Location, if applicable. Supports both .ts and .js files
        Keywords: app,application,name
        FieldName: ApplicationName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: ApplicationName
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: main.ts | server.js | src/app.ts
        EnumValues: {}
    - key: ApplicationLocation
      label: App Installation Location
      category: Deno App Runner
      subcategory: App
      description: >-
        Sets any applicable subdirectory path (under the base directory) that the app is installed in. This will set the
        working directory for running the app accordingly
      keywords: app,application,location,directory,subdirectory,path,ApplicationLocation
      input_type: text
      param_field_name: ApplicationLocation
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: App Installation Location
        Category: Deno App Runner:code
        Subcategory: App:settings:1
        Description: >-
          Sets any applicable subdirectory path (under the base directory) that the app is installed in. This will set
          the working directory for running the app accordingly
        Keywords: app,application,location,directory,subdirectory,path,ApplicationLocation
        FieldName: ApplicationLocation
        InputType: text
        ParamFieldName: ApplicationLocation
        DefaultValue: ''
        EnumValues: {}
    - key: DenoArgs
      label: Deno Command Line Arguments
      category: Deno App Runner
      subcategory: App
      description: >-
        Sets Deno command line arguments (not app command line arguments) to include as startup parameters. Common
        options: --allow-net, --allow-read, --allow-write, --allow-env
      keywords: deno,command,line,arguments,args,permissions
      input_type: text
      param_field_name: DenoArgs
      default: '--allow-net --allow-read --allow-write --allow-env'
      placeholder: '--allow-net --allow-read --allow-write --allow-env'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Deno Command Line Arguments
        Category: Deno App Runner:code
        Subcategory: App:settings:1
        Description: >-
          Sets Deno command line arguments (not app command line arguments) to include as startup parameters. Common
          options: --allow-net, --allow-read, --allow-write, --allow-env
        Keywords: deno,command,line,arguments,args,permissions
        FieldName: DenoArgs
        InputType: text
        ParamFieldName: DenoArgs
        DefaultValue: '--allow-net --allow-read --allow-write --allow-env'
        Placeholder: '--allow-net --allow-read --allow-write --allow-env'
        EnumValues: {}
    - key: EnvVars
      label: App Environment Variables
      category: Deno App Runner
      subcategory: App
      description: >-
        To set a list of environment variables to run the app with, create a '.env' file in the working directory. Deno
        can load environment variables using --allow-env permission
      keywords: environment,variables,EnvVars
      input_type: hidden
      param_field_name: EnvVars
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: App Environment Variables
        Category: Deno App Runner:code
        Subcategory: App:settings:1
        Description: >-
          To set a list of environment variables to run the app with, create a '.env' file in the working directory.
          Deno can load environment variables using --allow-env permission
        Keywords: environment,variables,EnvVars
        FieldName: EnvVars
        InputType: hidden
        ParamFieldName: EnvVars
        EnumValues: {}
    - key: CommandLineArgs
      label: App Command Line Arguments
      category: Deno App Runner
      subcategory: App
      description: Sets app command line arguments (not Deno command line arguments) to include as startup parameters
      keywords: app,command,line,arguments,args
      input_type: text
      param_field_name: CommandLineArgs
      default: ''
      placeholder: '--port=8000 --host=0.0.0.0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: App Command Line Arguments
        Category: Deno App Runner:code
        Subcategory: App:settings:1
        Description: Sets app command line arguments (not Deno command line arguments) to include as startup parameters
        Keywords: app,command,line,arguments,args
        FieldName: CommandLineArgs
        InputType: text
        IsFlagArgument: false
        ParamFieldName: CommandLineArgs
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: '--port=8000 --host=0.0.0.0'
        EnumValues: {}
  files: []
environment: {}
startup_variables:
  - key: DownloadType
    label: App Download Type
    default: ''
    customer_editable: true
    required: true
    sensitive: false
  - key: DownloadSource
    label: App Download Source
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DownloadBranch
    label: Git Repo Branch
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DownloadUsername
    label: Git Repo Username
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DownloadPassword
    label: Git Repo Password/Token
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: DownloadFilename
    label: GitHub Release Filename
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DownloadVersion
    label: GitHub Release Version
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DenoVersion
    label: Deno Version
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: RunAppSetupCommands
    label: Run App Setup Commands
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: AppSetupCommands
    label: App Setup Commands
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ApplicationName
    label: App Name
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ApplicationLocation
    label: App Installation Location
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: DenoArgs
    label: Deno Command Line Arguments
    default: '--allow-net --allow-read --allow-write --allow-env'
    customer_editable: true
    required: false
    sensitive: false
  - key: CommandLineArgs
    label: App Command Line Arguments
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: false
  providers: []
  collection_support: false
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: amp_import
  url: https://github.com/CubeCoders/AMPTemplates
  needs_review: true
