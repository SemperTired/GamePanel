schema: aetherpanel.template/v1
id: blackwake
name: Blackwake
category: Imported
summary: Blackwake Dedicated Server
install:
  method: steamcmd
  app_id: '423410'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} -batchmode -nographics {FormattedArgs} -logfile -
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 25001
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: Server.cfg
    type: text
    editable: true
config_schema:
  fields:
