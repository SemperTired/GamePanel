      label: Game Port
      category: Blackwake
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Blackwake:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: port
        IncludeInCommandLine: false
