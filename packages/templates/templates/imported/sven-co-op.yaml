schema: aetherpanel.template/v1
id: sven-co-op
name: Sven Co-op
category: Imported
summary: Sven Co-op imported from public game template metadata.
install:
  method: steamcmd
  app_id: '276060'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    276060/svends_i686 -console -game {mod} -port {ApplicationPort1} -nobreakpad {insecure}{CustomParameters}
    {CustomConVars} +ip {ApplicationIPBinding} +rcon_password "{RemoteAdminPassword}" {FormattedArgs} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Server and RCON Port
    default: 27015
    protocol: both
    required: true
config_files:
  - path: svencoop/server.cfg
    type: text
    editable: true
config_schema:
  fields:
