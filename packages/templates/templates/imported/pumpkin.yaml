schema: aetherpanel.template/v1
id: pumpkin
name: Pumpkin
category: Imported
summary: The world's fastest Minecraft server. Pumpkin is in early development. Built with Rust for maximum performance.
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://github.com/Pumpkin-MC/Pumpkin/releases/download/nightly/pumpkin-X64-Linux
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: pumpkin {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: javaport
    name: Java Edition Port
    default: 25565
    protocol: both
    required: true
  - key: bedrockport
    name: Bedrock Edition Port
    default: 19132
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 25575
    protocol: tcp
    required: true
config_files:
  - path: pumpkin.toml
    type: ini
    editable: true
config_schema:
  fields:
