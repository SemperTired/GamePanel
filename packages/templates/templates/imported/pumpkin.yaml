      label: Java Address
      category: Minecraft
      subcategory: Server and Startup
      description: ''
      keywords: ''
      input_type: text
      param_field_name: java_edition_address
      default: '{{$ApplicationIPBinding}}:{{$JavaPort}}'
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Java Address
