schema: aetherpanel.template/v1
id: openstarbound
name: OpenStarbound
category: Imported
summary: OpenStarbound Dedicated Server
install:
  method: steamcmd
  app_id: '211820'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: server/linux/starbound_server {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and Query Port
    default: 21025
    protocol: both
    required: true
  - key: rconport
    name: RCON Port
    default: 21026
    protocol: both
    required: true
config_files:
  - path: storage/starbound_server.config
    type: json
    editable: true
