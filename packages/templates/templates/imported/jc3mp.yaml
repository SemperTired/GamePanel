    - key: announce
      label: Server Announce
      category: Just Cause 3
      subcategory: Server
      description: Add a check here if you want to announce your server on the master server browser list.
      keywords: Server Announce
      input_type: checkbox
      param_field_name: announce
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Server Announce
        Category: Just Cause 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Add a check here if you want to announce your server on the master server browser list.
        Keywords: Server Announce
        FieldName: announce
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: announce
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: requiredDLC
      label: Required DLCs
      category: Just Cause 3
      subcategory: Server
      description: >-
        Comma separated list of owned DLC IDs required to join. [A list is available
        here](https://just-cause.mp/docs/general/information/Server%20Configuration). Empty = no DLCs required to join.
      keywords: dlcs
      input_type: text
      param_field_name: requiredDLC
      default: ''
      placeholder: 400551,400490,442051,401850,348880,388294,442050,488293,388290,388291,388292,442052
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Required DLCs
