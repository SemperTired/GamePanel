    - key: $MaxUsers
      label: Players
      category: Just Cause 3
      subcategory: Server
      description: Number of players allowed to join.
      keywords: players
      input_type: number
      param_field_name: maxPlayers
      default: '20'
      required: true
      sensitive: false
