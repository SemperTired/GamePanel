      enum_values: {}
      raw:
        DisplayName: Description
        Category: Just Cause 3:stadia_controller
        Subcategory: Server:dns:1
        Description: Displayed in the server browser.
        Keywords: description
        FieldName: description
        InputType: text
        IsFlagArgument: false
        ParamFieldName: description
        IncludeInCommandLine: false
        DefaultValue: Hosted by AetherNode
        EnumValues: {}
    - key: tickrate
      label: Tick Rate
      category: Just Cause 3
      subcategory: Server
      description: Maxium FPS for the server (default is 60).
      keywords: tickrate
      input_type: number
      param_field_name: maxTickRate
      default: '60'
      required: false
