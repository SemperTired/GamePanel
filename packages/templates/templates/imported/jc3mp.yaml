          Comma separated list of owned DLC IDs required to join. [A list is available
          here](https://just-cause.mp/docs/general/information/Server%20Configuration). Empty = no DLCs required to
          join.
        Keywords: dlcs
        FieldName: requiredDLC
        InputType: text
        IsFlagArgument: false
        ParamFieldName: requiredDLC
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: 400551,400490,442051,401850,348880,388294,442050,488293,388290,388291,388292,442052
        EnumValues: {}
  files:
    - path: config.json
      type: template
      subsections: []
      raw:
        ConfigFile: config.json
        AutoMap: true
        ConfigType: template
        ConfigFileTemplate: jc3mpserverconfig.json
environment: {}
startup_variables:
  - key: password
    label: Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: description
    label: Description
    default: Hosted by AetherNode
    customer_editable: true
    required: false
    sensitive: false
  - key: tickrate
    label: Tick Rate
    default: '60'
    customer_editable: true
    required: false
    sensitive: false
  - key: name
    label: Name
    default: JC3MP-AetherPanel
    customer_editable: true
    required: false
    sensitive: false
  - key: announce
    label: Server Announce
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: requiredDLC
    label: Required DLCs
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '619910'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

