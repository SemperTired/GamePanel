schema: aetherpanel.template/v1
id: jc3mp
name: Just Cause 3 Multiplayer Mod
category: Imported
summary: Just Cause 3 Multiplayer Dedicated Server
install:
  method: steamcmd
  app_id: '619960'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 619960/Server
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: port
    name: Game Port
    default: 4200
    protocol: tcp
    required: true
  - key: queryport
    name: Query Port
    default: 4201
    protocol: both
    required: true
  - key: steamport
    name: Steam Port
    default: 4202
    protocol: both
    required: true
  - key: httpport
    name: HTTP Port
    default: 4203
    protocol: both
    required: true
config_files:
  - path: config.json
    type: text
    editable: true
config_schema:
  fields:
    - key: $port
      label: Game Port
      category: Just Cause 3
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: gport
      default: '4200'
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Just Cause 3:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        FieldName: $port
        InputType: number
        IsFlagArgument: false
        ParamFieldName: gport
        IncludeInCommandLine: false
        Hidden: true
        DefaultValue: '4200'
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Host IP
      category: Just Cause 3
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: hostip
      default: 0.0.0.0
      required: false
      sensitive: false
