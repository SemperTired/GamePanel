schema: aetherpanel.template/v1
id: open-world
name: Open World - RimWorld Server
category: Imported
summary: Open World - a free multiplayer mod for RimWorld
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: server/OpenWorldServer {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 25555
    protocol: tcp
    required: true
config_files:
  - path: Data/Config.json
    type: json
    editable: true
  - path: Data/Deep Config.json
    type: json
    editable: true
  - path: Data/Values.json
    type: json
    editable: true
  - path: Data/Difficulty.json
    type: json
    editable: true
config_schema:
  fields:
