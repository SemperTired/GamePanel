      label: Server Port
      category: Open World
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.ServerPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: Open World:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        Hidden: true
        ParamFieldName: $.ServerPort
        EnumValues: {}
