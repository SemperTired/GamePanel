schema: aetherpanel.template/v1
id: avorion
name: Avorion
category: Imported
summary: Avorion Dedicated Server
install:
  method: steamcmd
  app_id: '565060'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    565060/bin/AvorionServer {PlatformArgs} --port {GamePort} --query-port {QueryPort} --steam-query-port
    {SteamQueryPort} --steam-master-port {SteamPort} --rcon-port {RCONPort} --rcon-password "{RemoteAdminPassword}"
    --datapath "{FullBaseDir}galaxies" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 27000
    protocol: both
    required: true
  - key: queryport
    name: Query Port
    default: 27003
    protocol: udp
    required: true
  - key: steamqueryport
    name: Steam Query Port
    default: 27020
    protocol: udp
    required: true
  - key: steamport
    name: Steam Port
    default: 27021
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 27015
    protocol: tcp
    required: true
config_files:
  - path: galaxies/{{GalaxyName}}/server.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerName
      label: Server Name
      category: Avorion
      subcategory: Server
      description: Server name shown in the server list
      keywords: server,name
      input_type: text
      param_field_name: server-name
      default: Avorion Server - Hosted by AetherNode
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: Server name shown in the server list
        Keywords: server,name
        FieldName: ServerName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: server-name
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: Avorion Server - Hosted by AetherNode
        EnumValues: {}
    - key: Description
      label: Server Description
      category: Avorion
      subcategory: Server
      description: Server description shown in the server list. Requires the galaxy to be generated first
      keywords: server,description
      input_type: text
      param_field_name: Administration.description
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Description
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: Server description shown in the server list. Requires the galaxy to be generated first
        Keywords: server,description
        FieldName: Description
        InputType: text
        IsFlagArgument: false
        ParamFieldName: Administration.description
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: Password
      label: Server Password
      category: Avorion
      subcategory: Server
      description: Sets the password to connect to the server. Default is no password. Requires the galaxy to be generated first
      keywords: server,password
      input_type: password
      param_field_name: Administration.password
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password to connect to the server. Default is no password. Requires the galaxy to be generated first
        Keywords: server,password
        FieldName: Password
        InputType: password
        IsFlagArgument: false
        ParamFieldName: Administration.password
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: Listed
      label: List Server
      category: Avorion
      subcategory: Server
      description: >-
        If enabled, the server will be displayed on public server lists. Requires the "Steam Relay Network" connection
        mode
      keywords: public,visible,listed
      input_type: checkbox
      param_field_name: listed
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: List Server
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the server will be displayed on public server lists. Requires the "Steam Relay Network" connection
          mode
        Keywords: public,visible,listed
        FieldName: Listed
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: listed
        IncludeInCommandLine: true
        DefaultValue: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: UseSteamNetworking
      label: Connection Mode
      category: Avorion
      subcategory: Server
      description: >-
        Sets the connection mode - either through the Steam relay network, or via a direct port connection on the Game
        Port. Steam relay network is recommended for dedicated servers
      keywords: steam,relay,network,port
      input_type: enum
      param_field_name: use-steam-networking
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '0': Direct Port Connection
        '1': Steam Relay Network
      raw:
        DisplayName: Connection Mode
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the connection mode - either through the Steam relay network, or via a direct port connection on the Game
          Port. Steam relay network is recommended for dedicated servers
        Keywords: steam,relay,network,port
        FieldName: UseSteamNetworking
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: use-steam-networking
        IncludeInCommandLine: true
        DefaultValue: '1'
        EnumValues:
          '0': Direct Port Connection
          '1': Steam Relay Network
    - key: GalaxyName
      label: Galaxy Name
      category: Avorion
      subcategory: Server
      description: >-
        Sets the galaxy name for the server, with the world data saved under this name in the "galaxies" directory.
        Start and stop the server after changing this setting to allow galaxy generation
      keywords: galaxy,name
      input_type: text
      param_field_name: galaxy-name
      default: avorion_galaxy
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Galaxy Name
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the galaxy name for the server, with the world data saved under this name in the "galaxies" directory.
          Start and stop the server after changing this setting to allow galaxy generation
        Keywords: galaxy,name
        FieldName: GalaxyName
        InputType: text
        IsFlagArgument: false
        ParamFieldName: galaxy-name
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: avorion_galaxy
        EnumValues: {}
    - key: Seed
      label: Galaxy Seed
      category: Avorion
      subcategory: Server
      description: >-
        Sets the seed to generate the galaxy. Alphanumeric characters only. Default is 0. Changing this after the server
        has been running and players logged in can lead to broken saves
      keywords: galaxy,seed
      input_type: text
      param_field_name: seed
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Galaxy Seed
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the seed to generate the galaxy. Alphanumeric characters only. Default is 0. Changing this after the
          server has been running and players logged in can lead to broken saves
        Keywords: galaxy,seed
        FieldName: Seed
        InputType: text
        IsFlagArgument: false
        ParamFieldName: seed
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: '0'
        EnumValues: {}
    - key: Scenario
      label: Galaxy Scenario
      category: Avorion
      subcategory: Server
      description: >-
        Sets the scenario for the galaxy. Changing this after the server has been running and players logged in can lead
        to broken saves
      keywords: scenario
      input_type: enum
      param_field_name: scenario
      default: normal
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        creative: Creative
        normal: Normal
        classic: Classic
        freeplay: FreePlay
      raw:
        DisplayName: Galaxy Scenario
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the scenario for the galaxy. Changing this after the server has been running and players logged in can
          lead to broken saves
        Keywords: scenario
        FieldName: Scenario
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: scenario
        IncludeInCommandLine: true
        DefaultValue: normal
        EnumValues:
          creative: Creative
          normal: Normal
          classic: Classic
          freeplay: FreePlay
    - key: Difficulty
      label: Server Difficulty
      category: Avorion
      subcategory: Server
      description: Sets the difficulty level of the server
      keywords: difficulty
      input_type: enum
      param_field_name: difficulty
      default: '0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '0': Veteran (default)
        '1': Expert
        '2': Hardcore
        '3': Insane
        '-3': Beginner
        '-2': Easy
        '-1': Normal
      raw:
        DisplayName: Server Difficulty
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the difficulty level of the server
        Keywords: difficulty
        FieldName: Difficulty
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: difficulty
        IncludeInCommandLine: true
        DefaultValue: '0'
        EnumValues:
          '0': Veteran (default)
          '1': Expert
          '2': Hardcore
          '3': Insane
          '-3': Beginner
          '-2': Easy
          '-1': Normal
    - key: Admin
      label: Server Administrators
      category: Avorion
      subcategory: Server
      description: Comma-separated list of [Steam64 IDs](https://steamid.io/) of the server administrators
      keywords: admin,user
      input_type: text
      param_field_name: admin
      default: ''
      placeholder: 76561198146705130,57683990857481248
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Administrators
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: Comma-separated list of [Steam64 IDs](https://steamid.io/) of the server administrators
        Keywords: admin,user
        FieldName: Admin
        InputType: text
        IsFlagArgument: false
        ParamFieldName: admin
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: 76561198146705130,57683990857481248
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Avorion
      subcategory: Server
      description: Maximum number of players that can connect to the server at any given time
      keywords: maximum,players,limit
      input_type: number
      param_field_name: max-players
      default: '10'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: Maximum number of players that can connect to the server at any given time
        Keywords: maximum,players,limit
        FieldName: $MaxUsers
        InputType: number
        IsFlagArgument: false
        ParamFieldName: max-players
        IncludeInCommandLine: true
        DefaultValue: '10'
        Suffix: players
        EnumValues: {}
        MinValue: '1'
    - key: SaveInterval
      label: Save Interval
      category: Avorion
      subcategory: Server
      description: Sets the time interval between auto saves
      keywords: save,interval
      input_type: number
      param_field_name: save-interval
      default: '300'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: Save Interval
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the time interval between auto saves
        Keywords: save,interval
        FieldName: SaveInterval
        InputType: number
        IsFlagArgument: false
        ParamFieldName: save-interval
        IncludeInCommandLine: true
        DefaultValue: '300'
        Suffix: seconds
        EnumValues: {}
    - key: SameStartSector
      label: Same Sector Start
      category: Avorion
      subcategory: Server
      description: If enabled, all players will start in the same sector
      keywords: same,sector,start
      input_type: checkbox
      param_field_name: same-start-sector
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'True': 'true'
        'False': 'false'
      raw:
        DisplayName: Same Sector Start
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: If enabled, all players will start in the same sector
        Keywords: same,sector,start
        FieldName: SameStartSector
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: same-start-sector
        IncludeInCommandLine: true
        DefaultValue: 'true'
        EnumValues:
          'True': 'true'
          'False': 'false'
    - key: CollisionDamage
      label: Collision Damage Level
      category: Avorion
      subcategory: Server
      description: Sets the level of damage to an object on collison. 0 = no damage, 1 = full damage
      keywords: collision,damage
      input_type: number
      param_field_name: collision-damage
      default: '1'
      placeholder: 0 - 1
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Collision Damage Level
        Category: Avorion:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the level of damage to an object on collison. 0 = no damage, 1 = full damage
        Keywords: collision,damage
        FieldName: CollisionDamage
        InputType: number
        IsFlagArgument: false
        ParamFieldName: collision-damage
        IncludeInCommandLine: true
        DefaultValue: '1'
        Placeholder: 0 - 1
        EnumValues: {}
    - key: ServerBranch
      label: Server Branch
      category: Updates
      subcategory: Steam Downloads
      description: 'Sets the server branch to install. NOTE: Update the server after switching branches!'
      keywords: server,branch
      input_type: enum
      param_field_name: ServerBranch
      default: public
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        public: Public (default)
        beta: Beta
      raw:
        DisplayName: Server Branch
        Category: Updates
        Subcategory: Steam Downloads:download
        Description: 'Sets the server branch to install. NOTE: Update the server after switching branches!'
        Keywords: server,branch
        FieldName: ServerBranch
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: ServerBranch
        IncludeInCommandLine: false
        DefaultValue: public
        EnumValues:
          public: Public (default)
          beta: Beta
  files:
    - path: galaxies/{{GalaxyName}}/server.ini
      type: ini
      subsections: []
      raw:
        ConfigFile: galaxies/{{GalaxyName}}/server.ini
        AutoMap: true
        ConfigType: ini
        ConfigFormatRegex: ^(?<key>.+?)=(?<value>.*?)$
environment: {}
startup_variables:
  - key: ServerName
    label: Server Name
    default: Avorion Server - Hosted by AetherNode
    customer_editable: true
    required: false
    sensitive: false
  - key: Description
    label: Server Description
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: Password
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: Listed
    label: List Server
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: UseSteamNetworking
    label: Connection Mode
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: GalaxyName
    label: Galaxy Name
    default: avorion_galaxy
    customer_editable: true
    required: false
    sensitive: false
  - key: Seed
    label: Galaxy Seed
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: Scenario
    label: Galaxy Scenario
    default: normal
    customer_editable: true
    required: false
    sensitive: false
  - key: Difficulty
    label: Server Difficulty
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: Admin
    label: Server Administrators
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: SaveInterval
    label: Save Interval
    default: '300'
    customer_editable: true
    required: false
    sensitive: false
  - key: SameStartSector
    label: Same Sector Start
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: CollisionDamage
    label: Collision Damage Level
    default: '1'
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerBranch
    label: Server Branch
    default: public
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '445220'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

