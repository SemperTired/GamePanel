      subcategory: Server
      description: >-
        Sets the server's active event, if any. Some events may only work partially or not at all. Most special event
        assets are removed after the event. Use Custom and set Custom Event Name for an event not listed
      keywords: active,event,activeevent
      input_type: enum
      param_field_name: ActiveEvent
      default: None
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        None: None
        birthday: 'ARK: 5th Anniversary'
        ark7th: 'ARK: 7th Anniversary'
        FearEvolved: 'ARK: Fear Evolved'
        TurkeyTrial: 'ARK: Turkey Trial'
        Arkaeology: 'ARK: ARKaeology'
        Easter: 'ARK: Eggcellent Adventure (Easter)'
        ExtinctionChronicles: Extinction Chronicles
        vday: 'ARK: Love Evolved (vday)'
        PAX: 'ARK: PAX Party'
        Summer: 'ARK: Summer Bash (Summer)'
        WinterWonderland: 'ARK: Winter Wonderland'
