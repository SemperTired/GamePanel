schema: aetherpanel.template/v1
id: ark-seminapi
name: 'ARK: Survival Evolved (Minimal with Server API)'
category: Imported
summary: 'ARK: Survival Evolved Dedicated Server with minimal settings (for Beacon use) plus Server API plugin'
install:
  method: steamcmd
  app_id: '376030'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs}
    {Map}?listen?Port={GamePort}?QueryPort={QueryPort}?RCONEnabled=True?RCONServerGameLogBuffer=600?RCONPort={RCONPort}?MultiHome={ApplicationIPBinding}?{FormattedArgs}{CustomOptions}?ServerAdminPassword={RemoteAdminPassword}
    {automanagedmods}{exclusivejoin}{BattlEye}{crossplay}{epiconly}{UseVivox}{UseDynamicConfig}{insecure}{EnableIdlePlayerKick}{NoHangDetection}{NoTransferFromFiltering}{AllowFlyerSpeedLeveling}{ForceAllowCaveFlyers}{nodinos}{PreventHibernation}{ForceRespawnDinos}{DisableRailgunPVP}{UseStructureStasisGrid}{AutoDestroyStructures}
    -ActiveEvent={ActiveEvent} -PublicIPForEpic={PublicIPForEpic} -culture={culture} {EnableCluster}{CustomFlags}
    -servergamelog
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: peerport
    name: Peer Port
    default: 7778
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 27020
    protocol: tcp
    required: true
config_files:
  - path: ark-seminapiconfig.json
    type: json
    editable: true
  - path: ark-seminapimetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: Map
      label: Map
      category: ARK SE
      subcategory: Server
      description: Sets the map for the server. If Custom is selected, Custom Map Name must also be set
      keywords: map
      input_type: enum
      param_field_name: Map
      default: TheIsland
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        Aberration_P: Aberration
        CrystalIsles: Crystal Isles
        Extinction: Extinction
        Fjordur: Fjordur
        Genesis: 'Genesis: Part 1'
        Gen2: 'Genesis: Part 2'
        LostIsland: Lost Island
        Ragnarok: Ragnarok
        ScorchedEarth_P: Scorched Earth
        TheCenter: The Center
        TheIsland: The Island (default)
        Valguero_P: Valguero
        Aquatica: Aquatica
        '{{CustomMap}}': Custom
      raw:
        DisplayName: Map
        Category: ARK SE:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map for the server. If Custom is selected, Custom Map Name must also be set
        Keywords: map
        FieldName: Map
        InputType: enum
        ParamFieldName: Map
        DefaultValue: TheIsland
        EnumValues:
          Aberration_P: Aberration
          CrystalIsles: Crystal Isles
          Extinction: Extinction
          Fjordur: Fjordur
          Genesis: 'Genesis: Part 1'
          Gen2: 'Genesis: Part 2'
          LostIsland: Lost Island
          Ragnarok: Ragnarok
          ScorchedEarth_P: Scorched Earth
          TheCenter: The Center
          TheIsland: The Island (default)
          Valguero_P: Valguero
          Aquatica: Aquatica
          '{{CustomMap}}': Custom
    - key: CustomMap
      label: Custom Map Name
      category: ARK SE
      subcategory: Server
      description: >-
        Sets a custom map for the server. "Custom" type must be selected under Map, and the map files included in
        ShooterGame/Content/Mods. Mod Management Mode can be used for this purpose
      keywords: custom,map
      input_type: text
      param_field_name: CustomMap
      default: ''
      placeholder: Caballus_P
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Map Name
        Category: ARK SE:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a custom map for the server. "Custom" type must be selected under Map, and the map files included in
          ShooterGame/Content/Mods. Mod Management Mode can be used for this purpose
        Keywords: custom,map
        FieldName: CustomMap
        InputType: text
        ParamFieldName: CustomMap
        DefaultValue: ''
        Placeholder: Caballus_P
        EnumValues: {}
    - key: automanagedmods
      label: Mod Management Mode
      category: ARK SE
      subcategory: Server
      description: >-
        Sets whether and how mods specifed under Mods List are downloaded, updated and installed. AetherPanel manages = AetherPanel
        manages mods when the server is updated (required for Linux; can also overcome failures with ARK's system on
        Windows, but may be slower). ARK manages = the ARK server manages mods when the server is started (Windows only)
      keywords: auto,managed,mods,management,mode,automanagedmods
      input_type: enum
      param_field_name: automanagedmods
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '': Manual
        ' ': AetherPanel manages
        '-automanagedmods ': ARK manages (Windows only)
      raw:
        DisplayName: Mod Management Mode
        Category: ARK SE:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether and how mods specifed under Mods List are downloaded, updated and installed. AetherPanel manages = AetherPanel
          manages mods when the server is updated (required for Linux; can also overcome failures with ARK's system on
          Windows, but may be slower). ARK manages = the ARK server manages mods when the server is started (Windows
          only)
        Keywords: auto,managed,mods,management,mode,automanagedmods
        FieldName: automanagedmods
        InputType: enum
        ParamFieldName: automanagedmods
        DefaultValue: ''
        EnumValues:
          '': Manual
          ' ': AetherPanel manages
          '-automanagedmods ': ARK manages (Windows only)
    - key: GameModIds
      label: Mods List
      category: ARK SE
      subcategory: Server
      description: >-
        Comma-separated and ordered list of IDs of mods to load (map mods will not load unless named as a "Custom" map
        under Custom Map Name). ONE LINE ONLY! Mod files must be in ShooterGame/Content/Mods (either manually or via Mod
        Management Mode)
      keywords: load,mods,gamemodids,activemods
      input_type: Textarea
      param_field_name: GameModIds
      default: ''
      placeholder: 1984936918,1785880078
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Mods List
        Category: ARK SE:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Comma-separated and ordered list of IDs of mods to load (map mods will not load unless named as a "Custom" map
          under Custom Map Name). ONE LINE ONLY! Mod files must be in ShooterGame/Content/Mods (either manually or via
          Mod Management Mode)
        Keywords: load,mods,gamemodids,activemods
        FieldName: GameModIds
        InputType: Textarea
        ParamFieldName: GameModIds
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        Placeholder: 1984936918,1785880078
        EnumValues: {}
    - key: ActiveEvent
      label: Active Event
