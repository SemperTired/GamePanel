    - key: enableCrashDumps
      label: Enable Crash Dumps
      category: Cubic Odyssey
      subcategory: Server
      description: If set, crash dumps will be enabled for debugging
      keywords: crash,dumps,enableCrashDumps
      input_type: checkbox
      param_field_name: enableCrashDumps
      default: 'TRUE'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': 'TRUE'
        'False': 'FALSE'
      raw:
        DisplayName: Enable Crash Dumps
        Category: Cubic Odyssey:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, crash dumps will be enabled for debugging
        Keywords: crash,dumps,enableCrashDumps
        FieldName: enableCrashDumps
        InputType: checkbox
        ParamFieldName: enableCrashDumps
        DefaultValue: 'TRUE'
        EnumValues:
          'True': 'TRUE'
          'False': 'FALSE'
    - key: allowRelaying
      label: Allow Relaying
      category: Cubic Odyssey
      subcategory: Server
      description: If set, EOS relay of connections will be allowed
