  files:
    - path: config/server_config.txt
      type: kvp
      format: "\t\t{0} \"{1}\""
      subsections: []
      raw:
        ConfigFile: config/server_config.txt
        ConfigType: kvp
        AutoMap: true
        Importable: true
        ConfigFormat: "\t\t{0} \"{1}\""
        ConfigFormatRegex: ^\s+(?<key>.+?)\s+"(?<value>.*?)"$
    - path: config/server_config.txt
      type: kvp
      format: "\t\t{0} {1}"
      subsections: []
      raw:
        ConfigFile: config/server_config.txt
        ConfigType: kvp
        AutoMap: true
        Importable: true
        ConfigFormat: "\t\t{0} {1}"
        ConfigFormatRegex: ^\s+(?<key>.+?)\s+(?<value>[^"]*?)$
environment: {}
startup_variables:
