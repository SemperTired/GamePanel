    label: Server Port
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: endingPort
    label: Max Port
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: serverName
    label: Server Name
    default: AetherNode Cubic Odyssey Server
    customer_editable: true
    required: false
    sensitive: false
  - key: galaxySeed
    label: Galaxy Seed
    default: '0'
    customer_editable: true
    required: false
    sensitive: false
  - key: Gamemode
    label: Game Mode
    default: adventure
    customer_editable: true
    required: false
    sensitive: false
  - key: privateServer
    label: Make Server Private
    default: 'FALSE'
    customer_editable: true
    required: false
    sensitive: false
  - key: serverPassword
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: serverPassword
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: enableCrashDumps
    label: Enable Crash Dumps
    default: 'TRUE'
    customer_editable: true
    required: false
    sensitive: false
  - key: allowRelaying
    label: Allow Relaying
    default: 'TRUE'
    customer_editable: true
    required: false
    sensitive: false
  - key: enableLogging
    label: Enable Logging
    default: 'TRUE'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '3400000'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

