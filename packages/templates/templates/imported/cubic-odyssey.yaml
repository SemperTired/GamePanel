      keywords: ''
      input_type: text
      param_field_name: Password
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: Cubic Odyssey:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: serverPassword
        InputType: text
        Hidden: true
        ParamFieldName: Password
        IncludeInCommandLine: true
        SkipIfEmpty: true
