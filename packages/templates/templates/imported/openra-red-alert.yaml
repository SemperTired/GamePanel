schema: aetherpanel.template/v1
id: openra-red-alert
name: OpenRA - Red Alert
category: Imported
summary: 'OpenRA Dedicated Server for Command & Conquer: Red Alert'
install:
  method: custom
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/OpenRA.Server {PlatformArgs} Engine.EngineDir="." Engine.SupportDir="{FullBaseDir}Support"
    Server.ListenPort="{ServerPort}" Game.Mod="ra" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 1234
    protocol: tcp
    required: true
config_files:
  - path: Support/motd.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: Server.Name
      label: Server Name
      category: OpenRA
      subcategory: Server
      description: Sets the name of the server as shown publicly
      keywords: server,name,Server.Name
      input_type: text
      param_field_name: Server.Name
      default: AMP Powered OpenRA Server
      placeholder: AMP Powered OpenRA Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: OpenRA:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server as shown publicly
        Keywords: server,name,Server.Name
        FieldName: Server.Name
        InputType: text
        ParamFieldName: Server.Name
        IncludeInCommandLine: true
        DefaultValue: AMP Powered OpenRA Server
        Placeholder: AMP Powered OpenRA Server
        EnumValues: {}
    - key: motd
      label: MOTD
      category: OpenRA
      subcategory: Server
      description: Sets the player welcome message (MOTD)
      keywords: motd,welcome,message,motd
      input_type: Textarea
      param_field_name: motd
      default: Welcome to my server!
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: MOTD
