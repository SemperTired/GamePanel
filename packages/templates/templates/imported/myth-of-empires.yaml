schema: aetherpanel.template/v1
id: myth-of-empires
name: Myth of Empires
category: Imported
summary: Myth of Empires Dedicated Server
install:
  method: steamcmd
  app_id: '1794810'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    .proton/proton {PlatformArgs} MOE {Map} -game -server -DataLocalFile -NotCheckServerSteamAuth -stdout
    -FullStdOutLogOutput log={ServerListId}.log -LOCALLOGTIMES -PrivateServer -Port={GamePort} -QueryPort={QueryPort}
    -ShutDownServicePort={RCONPort} -bStartShutDownServiceInPrivateServer=true -MultiHome={ApplicationIPBinding}
    -ShutDownServiceIP={ApplicationIPBinding} -OutAddress={OutAddress} -SessionName="{SessionName}"
    -SteamServerName="{SessionName}" -ShutDownServiceKey="{RemoteAdminPassword}"
    -pakdir="{FullBaseDir}MOE/{ServerListId}Mods" {UseACE}{ForceSteamNet}{FormattedArgs} {CustomArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 7778
    protocol: udp
    required: true
  - key: rconport
    name: Remote Management Port
    default: 7779
    protocol: tcp
    required: true
config_files:
  - path: myth-of-empiresconfig.json
    type: json
    editable: true
  - path: myth-of-empiresmetaconfig.json
    type: json
    editable: true
