schema: aetherpanel.template/v1
id: mxbikes
name: MX Bikes
category: Imported
summary: MX Bikes Dedicated Server
install:
  method: steamcmd
  app_id: '655500'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/wine {PlatformArgs} -dedicated {GamePort} -set params dedicated.ini {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 54210
    protocol: udp
    required: true
  - key: liveport
    name: Live Port
    default: 54211
    protocol: udp
    required: true
  - key: remoteadminport
    name: Remote Admin Port
    default: 54212
    protocol: udp
    required: true
config_files:
  - path: dedicated.ini
    type: ini
    editable: true
  - path: core.ini
    type: ini
    editable: true
