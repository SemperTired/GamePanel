schema: aetherpanel.template/v1
id: satisfactory
name: Satisfactory
category: Imported
summary: Satisfactory Dedicated Server
install:
  method: steamcmd
  app_id: '1690800'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    1690800/Engine/Binaries/Linux/FactoryServer-Linux-Shipping {PlatformArgs} FactoryGame -Port={ApplicationPort1}
    -ReliablePort={ApplicationPort2} -MultiHome={ApplicationIPBinding}
    -ini:Engine:[HTTPServer.Listeners]:DefaultBindAddress={ApplicationIPBinding}{DisableSeasonalEvents} {FormattedArgs}
    {CustomArgs} -stdout -FullStdOutLogOutput -unattended
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Game Port
    default: 7777
    protocol: both
    required: true
  - key: applicationport2
    name: Reliable Port
    default: 8888
    protocol: tcp
    required: true
config_files:
  - path: satisfactoryconfig.json
    type: json
    editable: true
  - path: satisfactorymetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $MaxUsers
      label: Player Limit
      category: Satisfactory
      subcategory: Server
      description: Sets the maximum number of players that may connect to the server at one time
      keywords: maximum,players,limit,maxplayers
      input_type: number
      param_field_name: ini:Game:[/Script/Engine.GameSession]:MaxPlayers
      default: '4'
      placeholder: '4'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Satisfactory:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players that may connect to the server at one time
        Keywords: maximum,players,limit,maxplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: ini:Game:[/Script/Engine.GameSession]:MaxPlayers
        IncludeInCommandLine: true
        DefaultValue: '4'
        Placeholder: '4'
        Suffix: players
        EnumValues: {}
    - key: DisableSeasonalEvents
      label: Disable Seasonal Events
      category: Satisfactory
      subcategory: Server
      description: If set, seasonal events will be disabled on the server
      keywords: disable,seasonal,events,disableseasonalevents
      input_type: checkbox
      param_field_name: DisableSeasonalEvents
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': ' -DisableSeasonalEvents'
      raw:
        DisplayName: Disable Seasonal Events
        Category: Satisfactory:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, seasonal events will be disabled on the server
        Keywords: disable,seasonal,events,disableseasonalevents
        FieldName: DisableSeasonalEvents
        InputType: checkbox
        ParamFieldName: DisableSeasonalEvents
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': ' -DisableSeasonalEvents'
    - key: MultiHome
      label: MultiHome IP Binding
      category: Satisfactory
      subcategory: Server
      description: >-
        If required, you can change the binding of the server by changing the Application IP Binding for this instance.
        Binding to :: will make the server accessible on all IPv4 and IPv6 interfaces
      keywords: ip,binding,address,multihome
      input_type: hidden
      param_field_name: MultiHome
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: MultiHome IP Binding
        Category: Satisfactory:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If required, you can change the binding of the server by changing the Application IP Binding for this
          instance. Binding to :: will make the server accessible on all IPv4 and IPv6 interfaces
        Keywords: ip,binding,address,multihome
        FieldName: MultiHome
        InputType: hidden
        ParamFieldName: MultiHome
        EnumValues: {}
    - key: InitialConnectTimeout
      label: Initial Connection Timeout
      category: Satisfactory
      subcategory: Server
      description: >-
        Sets the amount of time to wait for a new network connection to be established before destroying the connection.
        May assist with connection issues for client systems with older hardware or slower networks
      keywords: initial,connect,connection,timeout,initialconnecttimeout
      input_type: number
      param_field_name: ini:Engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:InitialConnectTimeout
      default: '30'
      placeholder: '30'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: Initial Connection Timeout
        Category: Satisfactory:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the amount of time to wait for a new network connection to be established before destroying the
          connection. May assist with connection issues for client systems with older hardware or slower networks
        Keywords: initial,connect,connection,timeout,initialconnecttimeout
        FieldName: InitialConnectTimeout
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: ini:Engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:InitialConnectTimeout
        IncludeInCommandLine: true
        DefaultValue: '30'
        Placeholder: '30'
        Suffix: seconds
        EnumValues: {}
    - key: ConnectionTimeout
      label: Established Connection Timeout
      category: Satisfactory
      subcategory: Server
      description: >-
        Sets the amount of time to wait before considering an established connection timed out. Typically shorter than
        the Initial Connection Timeout. May assist with connection issues for client systems with older hardware or
        slower networks
      keywords: established,connection,timeout,connectiontimeout
      input_type: number
      param_field_name: ini:Engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:ConnectionTimeout
      default: '20'
      placeholder: '20'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: seconds
      enum_values: {}
      raw:
        DisplayName: Established Connection Timeout
        Category: Satisfactory:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the amount of time to wait before considering an established connection timed out. Typically shorter than
          the Initial Connection Timeout. May assist with connection issues for client systems with older hardware or
          slower networks
        Keywords: established,connection,timeout,connectiontimeout
        FieldName: ConnectionTimeout
        InputType: number
        MinValue: '1'
        IsFlagArgument: false
        ParamFieldName: ini:Engine:[/Script/OnlineSubsystemUtils.IpNetDriver]:ConnectionTimeout
        IncludeInCommandLine: true
        DefaultValue: '20'
        Placeholder: '20'
        Suffix: seconds
        EnumValues: {}
    - key: MaxTickRate
      label: Maximum Tick Rate
      category: Satisfactory
      subcategory: Server
