schema: aetherpanel.template/v1
id: dont-starve-together
name: Don't Starve Together
category: Imported
summary: Don't Starve Together Dedicated Server
install:
  method: steamcmd
  app_id: '343050'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    343050/bin{ServerExecutable}/dontstarve_dedicated_server_nullrenderer -persistent_storage_root "../dstserver"
    -conf_dir "dstserver_config" -shard shard {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Server Port
    default: 10999
    protocol: udp
    required: true
  - key: applicationport2
    name: Auth Port
    default: 8766
    protocol: udp
    required: true
  - key: applicationport3
    name: Query Port
    default: 27016
    protocol: udp
    required: true
  - key: remoteadminport
    name: Master Port
    default: 10889
    protocol: udp
    required: true
config_files:
  - path: dstserver/dstserver_config/Cluster_1/shard/server.ini
    type: ini
    editable: true
  - path: dstserver/dstserver_config/Cluster_1/cluster.ini
    type: ini
    editable: true
  - path: dstserver/dstserver_config/Cluster_1/cluster_token.txt
    type: text
    editable: true
config_schema:
  fields:
    - key: $MaxUsers
      label: Max Players
      category: Don't Starve Together
      subcategory: Clusters
      description: Maximum number of players in the server
      keywords: max players
      input_type: number
      param_field_name: max_players
      default: '64'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      enum_values: {}
      raw:
        DisplayName: Max Players
        Category: Don't Starve Together:stadia_controller
        Subcategory: Clusters:share:2
        Description: Maximum number of players in the server
        Keywords: max players
        FieldName: $MaxUsers
        InputType: number
        IsFlagArgument: false
        ParamFieldName: max_players
        IncludeInCommandLine: false
        DefaultValue: '64'
        EnumValues: {}
        MinValue: '1'
    - key: tickrate
      label: Tick Rate
      category: Don't Starve Together
      subcategory: Server
      description: Force the server to run at a specific tick rate, higher is better performing but requires more bandwidth and CPU
      keywords: tick rate
      input_type: enum
      param_field_name: tickrate
      default: '60'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        '10': '10'
        '15': '15'
        '30': '30'
        '60': '60'
      raw:
        DisplayName: Tick Rate
