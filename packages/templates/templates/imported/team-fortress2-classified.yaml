      label: Server Name
      category: Team Fortress 2 Classified
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AMP Powered Team Fortress 2 Classified Server
      required: false
