schema: aetherpanel.template/v1
id: team-fortress2-classified
name: Team Fortress 2 Classified
category: Imported
summary: Team Fortress 2 Classified Dedicated Server
install:
  method: steamcmd
  app_id: '232250'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    3557020/srcds_linux64 {PlatformArgs} -game tf2classified -tf_path "{FullRootDir}232250" -console -usercon
    -nobreakpad -port {ServerPort} -ip {ApplicationIPBinding} -maxplayers {MaxUsers}
    {insecure}{nohltv}{CustomParameters} {CustomConVars} +tv_port {SourceTVPort} +clientport {ClientPort} +sv_logfile 1
    {FormattedArgs} +exec server.cfg +map {map} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
  - key: sourcetvport
    name: SourceTV Port
    default: 27020
    protocol: udp
    required: true
  - key: clientport
    name: Client Port
    default: 27005
    protocol: udp
    required: true
config_files:
  - path: tf2classified/cfg/server.cfg
    type: text
    editable: true
  - path: tf2classified/cfg/mapcycle.txt
    type: text
    editable: true
config_schema:
