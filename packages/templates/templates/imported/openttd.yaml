schema: aetherpanel.template/v1
id: openttd
name: OpenTTD
category: Imported
summary: OpenTTD Dedicated Server
install:
  method: steamcmd
  app_id: '1536610'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 1536610/openttd -D {ApplicationIPBinding}:{ServerPort} -c config/openttd.cfg {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 3979
    protocol: both
    required: true
  - key: serveradminport
    name: Server Admin Port
    default: 3977
    protocol: tcp
    required: true
config_files:
  - path: config/openttd.cfg
    type: ini
    editable: true
  - path: config/private.cfg
    type: ini
    editable: true
  - path: config/secrets.cfg
    type: ini
    editable: true
config_schema:
