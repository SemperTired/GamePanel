schema: aetherpanel.template/v1
id: hytale
name: Hytale
category: Imported
summary: Hytale Dedicated Server
install:
  method: direct_archive
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: https://downloader.hytale.com/hytale-downloader.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    {JavaVersion} -Xms{MinMemory}M -Xmx{MaxMemory}M {EnableAOTCache}{JavaArgs} -Dterminal.jline=false
    -Dterminal.ansi=true -jar {StartupJar} --assets ../Assets.zip --bind {ApplicationIPBinding}:{ServerPort}
    --backup-dir "{{backup-dir}}" {{accept-early-plugins}}{{allow-op}}{backup}{{disable-sentry}}{FormattedArgs}
    {CustomArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 5520
    protocol: udp
    required: true
config_files:
  - path: Server/config.json
    type: json
    editable: true
config_schema:
  fields:
    - key: session-token
      label: GSP Server Session Token
      category: Hytale
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: session-token
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: GSP Server Session Token
        Category: Hytale:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: session-token
        InputType: text
        Hidden: true
        ParamFieldName: session-token
        ExcludeFromImport: true
        DefaultValue: ''
        EnumValues: {}
    - key: identity-token
      label: GSP Server Identity Token
      category: Hytale
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: identity-token
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: GSP Server Identity Token
        Category: Hytale:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: identity-token
        InputType: text
