    sensitive: false
  - key: showPlayerNameTagsOnlyWhenVisible
    label: Show Player Tags When Visible
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: useUPNP
    label: Use UPnP
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: false
  providers: []
  collection_support: false
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

