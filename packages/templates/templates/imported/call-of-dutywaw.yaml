    - key: GameMode
      label: Game Mode
      category: Call of Duty World at War
      subcategory: Server
      description: >-
        Sets the game mode. Configure the relevant config file accordingly - 'T4/main/server.cfg' for Multiplayer,
        'T4/main/server_zm.cfg' for Zombies
      keywords: game,mode,gamemode
      input_type: enum
      param_field_name: GameMode
      default: t4mp "{{$FullBaseDir}}T4" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec server.cfg
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        t4mp "{{$FullBaseDir}}T4" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec server.cfg: Multiplayer (default)
        t4sp "{{$FullBaseDir}}T4" -dedicated +set zombiemode 1 +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec server_zm.cfg: Zombies
      raw:
        DisplayName: Game Mode
        Category: Call of Duty World at War:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the game mode. Configure the relevant config file accordingly - 'T4/main/server.cfg' for Multiplayer,
          'T4/main/server_zm.cfg' for Zombies
        Keywords: game,mode,gamemode
        FieldName: GameMode
        InputType: enum
        ParamFieldName: GameMode
        DefaultValue: t4mp "{{$FullBaseDir}}T4" -dedicated +set key {{ServerKey}} +set fs_game "{{Mod}}" +exec server.cfg
        EnumValues:
