    - key: MapMode
      label: Map Mode
      category: Call of Duty World at War
      subcategory: Server
      description: >-
        Sets whether to enable map rotation (the Map Rotation List must then also be set) or to load a specific initial
        map (the Initial Game Type and Initial Map must then also be set, as applicable)
      keywords: map,mode,map_rotate
      input_type: enum
      param_field_name: MapMode
      default: +map_rotate
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        +map_rotate: Map rotation (default)
        +set gametype {{gametype}} +map "{{map_name}}": Specific initial map (Multiplayer)
        +map "{{map_name}}": Specific initial map (Zombies)
      raw:
        DisplayName: Map Mode
        Category: Call of Duty World at War:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
