schema: aetherpanel.template/v1
id: barotrauma
name: Barotrauma
category: Imported
summary: Barotrauma Dedicated Server
install:
  method: steamcmd
  app_id: '1026340'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 1026340/DedicatedServer {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 27015
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27016
    protocol: udp
    required: true
config_files:
  - path: serversettings.xml
    type: xml
    editable: true
config_schema:
  fields:
