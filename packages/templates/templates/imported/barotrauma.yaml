      label: Game Port
      category: Barotrauma
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: /serversettings/@port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Barotrauma:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: /serversettings/@port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: $QueryPort
      label: Query Port
