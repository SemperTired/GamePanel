schema: aetherpanel.template/v1
id: factorio
name: Factorio
category: Imported
summary: Factorio Dedicated Server
install:
  method: steamcmd
  app_id: '427520'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/bin/x64/factorio {PlatformArgs} {CustomArgs} {StartMode} --bind {ApplicationIPBinding}:{ServerPort}
    --rcon-port {RCONPort} --rcon-password {RemoteAdminPassword} --server-settings data/server-settings.json
    --mod-directory mods --server-whitelist data/server-whitelist.json --server-banlist data/server-banlist.json
    --server-adminlist server-adminlist.json --console-log log.out {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 34197
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 7777
    protocol: tcp
    required: true
config_files:
  - path: data/server-settings.json
    type: json
    editable: true
  - path: data/map-gen-settings.json
    type: json
    editable: true
  - path: data/map-settings.json
    type: json
    editable: true
  - path: config-path.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: use-system-read-write-data-directories
      label: Force Local Data Directories
      category: Factorio
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: use-system-read-write-data-directories
      default: 'false'
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Force Local Data Directories
        Category: Factorio:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: use-system-read-write-data-directories
        InputType: text
        Hidden: true
        ParamFieldName: use-system-read-write-data-directories
        DefaultValue: 'false'
        EnumValues: {}
    - key: StartMode
      label: Server Start Mode
      category: Factorio
      subcategory: Server
      description: >-
        Sets the server start mode: Start the server with the specified Save File; or Start the server with the latest
        save file; or Start the server with a new save with the specified Save File name
      keywords: server,start,mode,start-server,start-server-load-latest,create
      input_type: enum
      param_field_name: StartMode
      default: '--start-server saves/{{SaveFile}}'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '--start-server saves/{{SaveFile}}': Start server (default)
        '--start-server-load-latest': Start server with latest save
        '--start-server saves/{{SaveFile}} ': Create and start server
      raw:
        DisplayName: Server Start Mode
        Category: Factorio:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the server start mode: Start the server with the specified Save File; or Start the server with the latest
          save file; or Start the server with a new save with the specified Save File name
        Keywords: server,start,mode,start-server,start-server-load-latest,create
        FieldName: StartMode
        InputType: enum
        ParamFieldName: StartMode
        DefaultValue: '--start-server saves/{{SaveFile}}'
        EnumValues:
          '--start-server saves/{{SaveFile}}': Start server (default)
          '--start-server-load-latest': Start server with latest save
          '--start-server saves/{{SaveFile}} ': Create and start server
    - key: SaveFile
      label: Save File
      category: Factorio
      subcategory: Server
      description: >-
        Sets the name of the save file in the 'saves' directory to load on server start, if applicable to the Server
        Start Mode. If the file does not exist, it will be created. It will be overwritten if 'Create and start server'
        is the Server Start Mode
      keywords: save,file
      input_type: text
      param_field_name: SaveFile
      default: default.zip
      placeholder: default.zip
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Save File
