schema: aetherpanel.template/v1
id: openrct2
name: OpenRCT2
category: Imported
summary: OpenRCT2 Dedicated Server
install:
  method: steamcmd
  app_id: '285330'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/squashfs-root/usr/bin/openrct2-cli {PlatformArgs} {HostMode} --headless --port={GamePort}
    --user-data-path=./user-data --rct2-data-path=./rct2game --rct1-data-path=./rct1game {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 11753
    protocol: tcp
    required: true
  - key: lanport
    name: LAN Port
    default: 11754
    protocol: udp
    required: true
config_files:
  - path: user-data/config.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Game Port
      category: OpenRCT2
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: network.default_port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: OpenRCT2:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        Hidden: true
        ParamFieldName: network.default_port
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Server IP Binding
      category: OpenRCT2
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: network.listen_address
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server IP Binding
        Category: OpenRCT2:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationIPBinding
        InputType: text
        Hidden: true
        ParamFieldName: network.listen_address
        IncludeInCommandLine: false
        EnumValues: {}
    - key: player_name
      label: Player Name
      category: OpenRCT2
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: network.player_name
      default: Server
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Player Name
        Category: OpenRCT2:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: player_name
        InputType: text
        Hidden: true
        ParamFieldName: network.player_name
        DefaultValue: Server
        EnumValues: {}
    - key: HostMode
      label: Host Mode
      category: OpenRCT2
      subcategory: Server
      description: >-
        Sets whether the server will load an official or custom scenario (essentially creating a new game) or load an
        existing savegame instead. Specify "Official Scenario", "Custom Scenario" or "Savegame" accordingly
      keywords: host,mode,scenario,savegame
      input_type: enum
      param_field_name: HostMode
      default: host "{{Scenario}}"
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        host "{{Scenario}}": Load Official Scenario
        host "./user-data/scenario/{{CustomScenario}}": Load Custom Scenario
        host "./user-data/save/{{Savegame}}": Load Savegame
      raw:
        DisplayName: Host Mode
        Category: OpenRCT2:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether the server will load an official or custom scenario (essentially creating a new game) or load an
          existing savegame instead. Specify "Official Scenario", "Custom Scenario" or "Savegame" accordingly
        Keywords: host,mode,scenario,savegame
        FieldName: HostMode
        InputType: enum
        ParamFieldName: HostMode
        DefaultValue: host "{{Scenario}}"
        EnumValues:
          host "{{Scenario}}": Load Official Scenario
          host "./user-data/scenario/{{CustomScenario}}": Load Custom Scenario
          host "./user-data/save/{{Savegame}}": Load Savegame
    - key: Scenario
      label: Official Scenario
      category: OpenRCT2
      subcategory: Server
      description: >-
        Set the official scenario to load from rct2game or rct1game. "Load Official Scenario" must also be selected
        under Host Mode. You can then stop the server and load the relevant savegame by switching Host Mode
