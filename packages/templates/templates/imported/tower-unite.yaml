schema: aetherpanel.template/v1
id: tower-unite
name: Tower Unite
category: Imported
summary: Tower Unite Community Condo Dedicated Server
install:
  method: steamcmd
  app_id: '439660'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    439660/Tower/Binaries/Linux/TowerServer-Linux-Shipping Tower {Map} -Port={GamePort} -QueryPort={QueryPort}
    -MultiHome={ApplicationIPBinding} {FormattedArgs} -nosteamclient {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27016
    protocol: both
    required: true
config_files:
  - path: Tower/Saved/Config/WindowsServer/TowerServer.ini
    type: ini
    editable: true
  - path: Tower/Saved/Config/LinuxServer/TowerServer.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerTitle
      label: Server Title
      category: Tower Unite
      subcategory: Server
      description: Sets the title of the server
      keywords: server,title,name,ServerTitle
      input_type: text
      param_field_name: /Script/TowerNetworking.DedicatedServerOptions.ServerTitle
      default: AetherNode Tower Unite Server
      placeholder: AetherNode Tower Unite Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Title
        Category: Tower Unite:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the title of the server
        Keywords: server,title,name,ServerTitle
        FieldName: ServerTitle
        InputType: text
        ParamFieldName: /Script/TowerNetworking.DedicatedServerOptions.ServerTitle
        DefaultValue: AetherNode Tower Unite Server
        Placeholder: AetherNode Tower Unite Server
        EnumValues: {}
    - key: SteamLoginToken
      label: Steam Game Server Login Token (GSLT)
      category: Tower Unite
      subcategory: Server
      description: >-
        Sets a [Steam Game Server Login Token](https://steamcommunity.com/dev/managegameservers) for the server, to
        register the server to your Steam account and allow it to appear in the Tower Unite Condo list
      keywords: steam,server,login,token,gslt,logintoken,SteamLoginToken
      input_type: password
      param_field_name: /Script/TowerNetworking.DedicatedServerOptions.SteamLoginToken
      default: ''
      placeholder: 6544F7E034119F113526E96474F559AH
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Steam Game Server Login Token (GSLT)
        Category: Tower Unite:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a [Steam Game Server Login Token](https://steamcommunity.com/dev/managegameservers) for the server, to
          register the server to your Steam account and allow it to appear in the Tower Unite Condo list
        Keywords: steam,server,login,token,gslt,logintoken,SteamLoginToken
        FieldName: SteamLoginToken
        InputType: password
        ParamFieldName: /Script/TowerNetworking.DedicatedServerOptions.SteamLoginToken
        DefaultValue: ''
        Placeholder: 6544F7E034119F113526E96474F559AH
        EnumValues: {}
    - key: TowerLoginToken
      label: Tower Login Token
      category: Tower Unite
      subcategory: Server
      description: >-
        Sets a [Tower Login Token](https://moderation.towerunite.com/manage_game_servers.php) for the server, to allow
        the server to connect to the Tower Unite Condo list. The server must comply with the [Condo
        Rules](https://forums.pixeltailgames.com/t/how-to-report-condos/41126)
      keywords: tower,login,token,logintoken,TowerLoginToken
      input_type: password
      param_field_name: /Script/TowerNetworking.DedicatedServerOptions.TowerLoginToken
      default: ''
      placeholder: TU258C2407C39E21FDDAB9BCF640DCLT
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Tower Login Token
        Category: Tower Unite:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets a [Tower Login Token](https://moderation.towerunite.com/manage_game_servers.php) for the server, to allow
          the server to connect to the Tower Unite Condo list. The server must comply with the [Condo
          Rules](https://forums.pixeltailgames.com/t/how-to-report-condos/41126)
        Keywords: tower,login,token,logintoken,TowerLoginToken
        FieldName: TowerLoginToken
        InputType: password
        ParamFieldName: /Script/TowerNetworking.DedicatedServerOptions.TowerLoginToken
        DefaultValue: ''
        Placeholder: TU258C2407C39E21FDDAB9BCF640DCLT
        EnumValues: {}
    - key: Map
      label: Condo Map
      category: Tower Unite
      subcategory: Server
      description: >-
        Sets the condo map to start the server with. By default the server loads the condo file matching the condo map
        title (such as 'C_Condo/C_Condo.map'), unless a custom condo file is specified in TowerServer.ini in the
        relevant subdirectory in 'Tower/Saved/Config'. The condo file must be exported from the client to the server
      keywords: map
      input_type: enum
      param_field_name: Map
      default: /Game/Maps/C_Condo
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        /Game/Maps/C_Condo: Condo (C_Condo)
        /Game/Maps/C_House: House (C_House)
        /Game/Maps/C_SmoothDirt: Smooth Dirt (C_SmoothDirt)
        /Game/Maps/C_lobbyOne: Suite (C_lobbyOne)
        /Game/Maps/C_Lobby1: Resort (C_Lobby1)
        /Game/Maps/C_SmoothAutumn: Smooth Autumn (C_SmoothAutumn)
        /Game/Maps/C_Underwater: Underwater (C_Underwater)
        /Game/Maps/C_Highrise: Highrise (C_Highrise)
        /Game/Maps/C_Studio: Art Studio (C_Studio)
        /Game/Maps/C_Theatre: Theatre (C_Theatre)
        /Game/Maps/C_Courtyard: Courtyard (C_Courtyard)
        /Game/Maps/C_IcePlanet: Ice Moon (C_IcePlanet)
      raw:
        DisplayName: Condo Map
        Category: Tower Unite:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the condo map to start the server with. By default the server loads the condo file matching the condo map
          title (such as 'C_Condo/C_Condo.map'), unless a custom condo file is specified in TowerServer.ini in the
          relevant subdirectory in 'Tower/Saved/Config'. The condo file must be exported from the client to the server
        Keywords: map
        FieldName: Map
        InputType: enum
        ParamFieldName: Map
        DefaultValue: /Game/Maps/C_Condo
        EnumValues:
          /Game/Maps/C_Condo: Condo (C_Condo)
          /Game/Maps/C_House: House (C_House)
          /Game/Maps/C_SmoothDirt: Smooth Dirt (C_SmoothDirt)
          /Game/Maps/C_lobbyOne: Suite (C_lobbyOne)
          /Game/Maps/C_Lobby1: Resort (C_Lobby1)
          /Game/Maps/C_SmoothAutumn: Smooth Autumn (C_SmoothAutumn)
          /Game/Maps/C_Underwater: Underwater (C_Underwater)
          /Game/Maps/C_Highrise: Highrise (C_Highrise)
          /Game/Maps/C_Studio: Art Studio (C_Studio)
          /Game/Maps/C_Theatre: Theatre (C_Theatre)
          /Game/Maps/C_Courtyard: Courtyard (C_Courtyard)
          /Game/Maps/C_IcePlanet: Ice Moon (C_IcePlanet)
    - key: AdminSteamID
      label: Server Admins
      category: Tower Unite
      subcategory: Server
      description: >-
        Server admins can be specified by their [Steam64 IDs](https://steamid.io/) in TowerServer.ini in the relevant
        subdirectory in 'Tower/Saved/Config'. Format is "AdminSteamID=12345678909876543" (don't include quotes). One
        admin per line
      keywords: server,admins,AdminSteamID
      input_type: hidden
      param_field_name: AdminSteamID
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Admins
        Category: Tower Unite:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Server admins can be specified by their [Steam64 IDs](https://steamid.io/) in TowerServer.ini in the relevant
          subdirectory in 'Tower/Saved/Config'. Format is "AdminSteamID=12345678909876543" (don't include quotes). One
          admin per line
        Keywords: server,admins,AdminSteamID
        FieldName: AdminSteamID
        InputType: hidden
        ParamFieldName: AdminSteamID
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: Tower Unite
      subcategory: Server
      description: Sets the maximum number of players allowed on the server at one time
      keywords: max,maximum,players,limit,MaxPlayers
      input_type: number
      param_field_name: /Script/TowerNetworking.DedicatedServerOptions.MaxPlayers
      default: '32'
      placeholder: '32'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 2
      max: 64
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: Tower Unite:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players allowed on the server at one time
        Keywords: max,maximum,players,limit,MaxPlayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '2'
        MaxValue: '64'
        ParamFieldName: /Script/TowerNetworking.DedicatedServerOptions.MaxPlayers
        DefaultValue: '32'
        Placeholder: '32'
        Suffix: players
        EnumValues: {}
    - key: CondoAutoSave
      label: Enable Auto Save
      category: Tower Unite
      subcategory: Server
      description: If set, enables the auto save system, which periodically saves the condo data after changes have been made
      keywords: condo,auto,save,CondoAutoSave
      input_type: checkbox
      param_field_name: /Script/TowerNetworking.DedicatedServerOptions.CondoAutoSave
      default: 'True'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'False'
        'True': 'True'
      raw:
        DisplayName: Enable Auto Save
        Category: Tower Unite:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, enables the auto save system, which periodically saves the condo data after changes have been made
        Keywords: condo,auto,save,CondoAutoSave
        FieldName: CondoAutoSave
        InputType: checkbox
        ParamFieldName: /Script/TowerNetworking.DedicatedServerOptions.CondoAutoSave
        DefaultValue: 'True'
        EnumValues:
          'False': 'False'
          'True': 'True'
    - key: CondoBackupsEnabled
      label: Enable Backups
      category: Tower Unite
      subcategory: Server
      description: If set, enables the backup save system, which creates a backup every time the condo is saved
      keywords: condo,backups,enabled,CondoBackupsEnabled
      input_type: checkbox
      param_field_name: /Script/TowerNetworking.DedicatedServerOptions.CondoBackupsEnabled
      default: 'True'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'False'
        'True': 'True'
      raw:
        DisplayName: Enable Backups
        Category: Tower Unite:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, enables the backup save system, which creates a backup every time the condo is saved
        Keywords: condo,backups,enabled,CondoBackupsEnabled
        FieldName: CondoBackupsEnabled
        InputType: checkbox
        ParamFieldName: /Script/TowerNetworking.DedicatedServerOptions.CondoBackupsEnabled
        DefaultValue: 'True'
        EnumValues:
          'False': 'False'
          'True': 'True'
  files:
    - path: Tower/Saved/Config/WindowsServer/TowerServer.ini
      type: ini
      format: '{0}="{1}"'
      subsections: []
      raw:
        ConfigFile: Tower/Saved/Config/WindowsServer/TowerServer.ini
        AutoMap: true
        ConfigType: ini
        ConfigFormat: '{0}="{1}"'
        ConfigFormatRegex: ^(?<key>.+?)\s*=\s*"(?<value>.*?)"$
    - path: Tower/Saved/Config/WindowsServer/TowerServer.ini
      type: ini
      format: '{0}={1}'
      subsections: []
      raw:
        ConfigFile: Tower/Saved/Config/WindowsServer/TowerServer.ini
        AutoMap: true
        ConfigType: ini
        ConfigFormat: '{0}={1}'
        ConfigFormatRegex: ^(?<key>.+?)\s*=\s*(?<value>[^"]*?)$
    - path: Tower/Saved/Config/LinuxServer/TowerServer.ini
      type: ini
      format: '{0}="{1}"'
      subsections: []
      raw:
        ConfigFile: Tower/Saved/Config/LinuxServer/TowerServer.ini
        AutoMap: true
        ConfigType: ini
        ConfigFormat: '{0}="{1}"'
        ConfigFormatRegex: ^(?<key>.+?)\s*=\s*"(?<value>.*?)"$
    - path: Tower/Saved/Config/LinuxServer/TowerServer.ini
      type: ini
      format: '{0}={1}'
      subsections: []
      raw:
        ConfigFile: Tower/Saved/Config/LinuxServer/TowerServer.ini
        AutoMap: true
        ConfigType: ini
        ConfigFormat: '{0}={1}'
        ConfigFormatRegex: ^(?<key>.+?)\s*=\s*(?<value>[^"]*?)$
environment: {}
startup_variables:
  - key: ServerTitle
    label: Server Title
    default: AetherNode Tower Unite Server
    customer_editable: true
    required: false
    sensitive: false
  - key: SteamLoginToken
    label: Steam Game Server Login Token (GSLT)
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: TowerLoginToken
    label: Tower Login Token
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: Map
    label: Condo Map
    default: /Game/Maps/C_Condo
    customer_editable: true
    required: false
    sensitive: false
  - key: CondoAutoSave
    label: Enable Auto Save
    default: 'True'
    customer_editable: true
    required: false
    sensitive: false
  - key: CondoBackupsEnabled
    label: Enable Backups
    default: 'True'
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '394690'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

