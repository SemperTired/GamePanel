schema: aetherpanel.template/v1
id: pixark
name: PixARK
category: Imported
summary: PixARK Dedicated Server
install:
  method: steamcmd
  app_id: '824360'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    .proton/proton {PlatformArgs}
    {Map}?listen?DelayRegisterServer=True?bRawSockets=True?Port={GamePort}?QueryPort={QueryPort}?RCONEnabled=True?RCONPort={RCONPort}?SessionName="{SessionName}"?MultiHome={ApplicationIPBinding}?{FormattedArgs}?ServerAdminPassword={RemoteAdminPassword}{CustomOptions}
    -Seed={Seed} -CULTUREFORCOOKING=en -NoBattlEye -CubePort={CubePort} -cubeworld={cubeworld} -nosteamclient
    -NoHangDetection {NoTransferFromFiltering}-ClusterDirOverride="{ClusterDirOverride}" -clusterid={clusterid} -server
    {CustomFlags} -gameplaylogging -log
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 27020
    protocol: tcp
    required: true
  - key: cubeport
    name: Cube Port
    default: 14999
    protocol: tcp
    required: true
config_files:
  - path: pixarkconfig.json
    type: json
    editable: true
  - path: pixarkmetaconfig.json
    type: json
    editable: true
config_schema:
  fields:
    - key: Map
      label: Server Map
      category: PixARK
      subcategory: Server
      description: Sets the map for the server
      keywords: map,cubeworld,skyward
      input_type: enum
      param_field_name: Map
      default: CubeWorld_Light
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        CubeWorld_Light: PixARK
        Skypiea_light: Skyward
      raw:
        DisplayName: Server Map
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the map for the server
        Keywords: map,cubeworld,skyward
        FieldName: Map
        InputType: enum
        ParamFieldName: Map
        DefaultValue: CubeWorld_Light
        EnumValues:
          CubeWorld_Light: PixARK
          Skypiea_light: Skyward
    - key: SessionName
      label: Server Name
      category: PixARK
      subcategory: Server
      description: Set the name of the server as it appears publicly. Don't include a question mark
      keywords: server,name,sessionname
      input_type: text
      param_field_name: SessionName
      default: AetherNode PixARK Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: Set the name of the server as it appears publicly. Don't include a question mark
        Keywords: server,name,sessionname
        FieldName: SessionName
        InputType: text
        ParamFieldName: SessionName
        DefaultValue: AetherNode PixARK Server
        EnumValues: {}
    - key: Seed
      label: Server Seed
      category: PixARK
      subcategory: Server
      description: Sets the seed for randomisation of the map. Default = random seed
      keywords: seed,map
      input_type: number
      param_field_name: Seed
      default: '{{randomdigits(5)}}'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Seed
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the seed for randomisation of the map. Default = random seed
        Keywords: seed,map
        FieldName: Seed
        InputType: number
        ParamFieldName: Seed
        DefaultValue: '{{randomdigits(5)}}'
        EnumValues: {}
    - key: cubeworld
      label: World Save Name
      category: PixARK
      subcategory: Server
      description: Sets the name of the world save to load, or to create if it does not exist
      keywords: world,save,name,cubeworld
      input_type: text
      param_field_name: cubeworld
      default: world
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Save Name
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the world save to load, or to create if it does not exist
        Keywords: world,save,name,cubeworld
        FieldName: cubeworld
        InputType: text
        ParamFieldName: cubeworld
        DefaultValue: world
        Required: true
        EnumValues: {}
    - key: ServerPassword
      label: Server Password
      category: PixARK
      subcategory: Server
      description: Sets the password for players to join the server. Don't include a question mark
      keywords: server,password,serverpassword
      input_type: password
      param_field_name: ServerPassword
      default: ''
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Password
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the password for players to join the server. Don't include a question mark
        Keywords: server,password,serverpassword
        FieldName: ServerPassword
        InputType: password
        ParamFieldName: ServerPassword
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues: {}
    - key: RCONPassword
      label: RCON/Server Admin Password
      category: PixARK
      subcategory: Server
      description: >-
        See the Security and Privacy menu for configurable options for the server's RCON password. The RCON password is
        also used in the in-game console for players to access administrator commands
      keywords: rcon,password,serveradminpassword
      input_type: hidden
      param_field_name: RCONPassword
      default: ''
      required: false
      sensitive: true
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: RCON/Server Admin Password
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          See the Security and Privacy menu for configurable options for the server's RCON password. The RCON password
          is also used in the in-game console for players to access administrator commands
        Keywords: rcon,password,serveradminpassword
        FieldName: RCONPassword
        InputType: hidden
        ParamFieldName: RCONPassword
        EnumValues: {}
    - key: $MaxUsers
      label: Player Limit
      category: PixARK
      subcategory: Server
      description: Sets the maximum number of players allowed on the server
      keywords: max,players,limit,maxplayers
      input_type: number
      param_field_name: MaxPlayers
      default: '20'
      placeholder: '20'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      min: 1
      suffix: players
      enum_values: {}
      raw:
        DisplayName: Player Limit
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the maximum number of players allowed on the server
        Keywords: max,players,limit,maxplayers
        FieldName: $MaxUsers
        InputType: number
        MinValue: '1'
        ParamFieldName: MaxPlayers
        IncludeInCommandLine: true
        DefaultValue: '20'
        Placeholder: '20'
        Suffix: players
        EnumValues: {}
    - key: MultiHome
      label: MultiHome IP Binding
      category: PixARK
      subcategory: Server
      description: >-
        If required, you can change the binding of the server and RCON by changing the Application IP Binding for this
        instance. NOTE: The IP must be reachable by AetherPanel, otherwise AetherPanel's console won't work
      keywords: ip,binding,address,multihome
      input_type: hidden
      param_field_name: MultiHome
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: false
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: MultiHome IP Binding
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If required, you can change the binding of the server and RCON by changing the Application IP Binding for this
          instance. NOTE: The IP must be reachable by AetherPanel, otherwise AetherPanel's console won't work
        Keywords: ip,binding,address,multihome
        FieldName: MultiHome
        InputType: hidden
        ParamFieldName: MultiHome
        EnumValues: {}
    - key: CustomFlags
      label: Custom Command Line Flags
      category: PixARK
      subcategory: Server
      description: >-
        Sets custom command line flags for the server (those that start with a - (dash)). Include the dash and separate
        with a space. Don't use flags already in AetherPanel's settings!
      keywords: custom,command,line,flags
      input_type: text
      param_field_name: CustomFlags
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Command Line Flags
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets custom command line flags for the server (those that start with a - (dash)). Include the dash and
          separate with a space. Don't use flags already in AetherPanel's settings!
        Keywords: custom,command,line,flags
        FieldName: CustomFlags
        InputType: text
        ParamFieldName: CustomFlags
        DefaultValue: ''
        Placeholder: ''
        EnumValues: {}
    - key: CustomOptions
      label: Custom Command Line Options
      category: PixARK
      subcategory: Server
      description: >-
        Sets custom command line options for the server (those that start with a ? (question mark)). Include the
        question mark but do not separate with a space. Don't use options already in AetherPanel's settings!
      keywords: custom,command,line,options
      input_type: text
      param_field_name: CustomOptions
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Custom Command Line Options
        Category: PixARK:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets custom command line options for the server (those that start with a ? (question mark)). Include the
          question mark but do not separate with a space. Don't use options already in AetherPanel's settings!
        Keywords: custom,command,line,options
        FieldName: CustomOptions
        InputType: text
        ParamFieldName: CustomOptions
        DefaultValue: ''
        Placeholder: ''
        EnumValues: {}
    - key: ClusterDirOverride
      label: Cluster Directory Override
      category: PixARK
      subcategory: Clusters
      description: >-
        Sets the path to a shared cluster directory for a server cluster. The cluster directory must be accessible to
        all cluster servers. If the server is in Docker, the directory must be mounted in the container
      keywords: cluster,directory,override,clusterdiroverride
      input_type: text
      param_field_name: ClusterDirOverride
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Cluster Directory Override
        Category: PixARK:stadia_controller
        Subcategory: Clusters:share:3
        Description: >-
          Sets the path to a shared cluster directory for a server cluster. The cluster directory must be accessible to
          all cluster servers. If the server is in Docker, the directory must be mounted in the container
        Keywords: cluster,directory,override,clusterdiroverride
        FieldName: ClusterDirOverride
        InputType: text
        ParamFieldName: ClusterDirOverride
        DefaultValue: ''
        EnumValues: {}
    - key: clusterid
      label: Cluster ID
      category: PixARK
      subcategory: Clusters
      description: Sets the cluster ID for a server cluster. The cluster ID must be the same on all servers in the cluster
      keywords: cluster,id,clusterid
      input_type: text
      param_field_name: clusterid
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Cluster ID
        Category: PixARK:stadia_controller
        Subcategory: Clusters:share:3
        Description: Sets the cluster ID for a server cluster. The cluster ID must be the same on all servers in the cluster
        Keywords: cluster,id,clusterid
        FieldName: clusterid
        InputType: text
        ParamFieldName: clusterid
        DefaultValue: ''
        EnumValues: {}
    - key: NoTransferFromFiltering
      label: Filter Transfers
      category: PixARK
      subcategory: Clusters
      description: >-
        If set, prevents ARK data usage between single player and servers that do not have a Cluster ID set. Even with a
        Cluster ID set, it is suggested to enable this option
      keywords: filter,data,transfer,notransferfromfiltering
      input_type: checkbox
      param_field_name: NoTransferFromFiltering
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': ''
        'True': '-NoTransferFromFiltering '
      raw:
        DisplayName: Filter Transfers
        Category: PixARK:stadia_controller
        Subcategory: Clusters:share:3
        Description: >-
          If set, prevents ARK data usage between single player and servers that do not have a Cluster ID set. Even with
          a Cluster ID set, it is suggested to enable this option
        Keywords: filter,data,transfer,notransferfromfiltering
        FieldName: NoTransferFromFiltering
        InputType: checkbox
        ParamFieldName: NoTransferFromFiltering
        DefaultValue: ''
        EnumValues:
          'False': ''
          'True': '-NoTransferFromFiltering '
    - key: SpecificReleaseVersion
      label: Proton GE Release Version (Linux)
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        Sets the Proton GE [release version](https://github.com/GloriousEggroll/proton-ge-custom/releases) to install.
        Empty = latest. Example: GE-Proton9-1
      keywords: proton,release,version
      input_type: text
      param_field_name: SpecificReleaseVersion
      default: ''
      placeholder: GE-Proton9-1
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Proton GE Release Version (Linux)
        Category: Updates
        Subcategory: Runtime Configuration:build:3
        Description: >-
          Sets the Proton GE [release version](https://github.com/GloriousEggroll/proton-ge-custom/releases) to install.
          Empty = latest. Example: GE-Proton9-1
        Keywords: proton,release,version
        FieldName: SpecificReleaseVersion
        InputType: text
        ParamFieldName: SpecificReleaseVersion
        DefaultValue: ''
        Placeholder: GE-Proton9-1
        EnumValues: {}
  files: []
environment: {}
startup_variables:
  - key: Map
    label: Server Map
    default: CubeWorld_Light
    customer_editable: true
    required: false
    sensitive: false
  - key: SessionName
    label: Server Name
    default: AetherNode PixARK Server
    customer_editable: true
    required: false
    sensitive: false
  - key: Seed
    label: Server Seed
    default: '{{randomdigits(5)}}'
    customer_editable: true
    required: false
    sensitive: false
  - key: cubeworld
    label: World Save Name
    default: world
    customer_editable: true
    required: true
    sensitive: false
  - key: ServerPassword
    label: Server Password
    default: ''
    customer_editable: true
    required: false
    sensitive: true
  - key: CustomFlags
    label: Custom Command Line Flags
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: CustomOptions
    label: Custom Command Line Options
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: ClusterDirOverride
    label: Cluster Directory Override
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: clusterid
    label: Cluster ID
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: NoTransferFromFiltering
    label: Filter Transfers
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: SpecificReleaseVersion
    label: Proton GE Release Version (Linux)
    default: ''
    customer_editable: true
    required: false
    sensitive: false
workshop:
  enabled: true
  providers:
    - steam
  app_id: '593600'
  collection_support: true
backup:
  include:
    - /data
  exclude:
    - /data/steamapps/downloading
supported_os:
  - linux
  - windows
source:
  type: external_import
  url: public-game-template-source
  needs_review: true

