schema: aetherpanel.template/v1
id: subsistence
name: Subsistence
category: Imported
summary: Subsistence Dedicated Server
install:
  method: steamcmd
  app_id: '1362640'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} server coldmap1?steamsockets -Port={GamePort}
    -ini:UDKEngine:OnlineSubsystemSteamworks.OnlineSubsystemSteamworks.QueryPort={QueryPort} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 27015
    protocol: udp
    required: true
  - key: webapiport
    name: Web API Port
    default: 8000
    protocol: tcp
    required: true
config_files:
  - path: UDKGame/Config/UDKDedServerSettings.ini
    type: ini
    editable: true
  - path: UDKGame/Config/UDKEngine.ini
    type: ini
    editable: true
  - path: UDKGame/Config/UDKWeb.ini
    type: ini
    editable: true
