      label: Game Port
      category: Unreal Tournament 2004
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: URL.Port
      default: '7777'
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Unreal Tournament 2004:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: URL.Port
        IncludeInCommandLine: false
        DefaultValue: '7777'
        EnumValues: {}
