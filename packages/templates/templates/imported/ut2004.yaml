    - key: DoUplink
      label: Make Server Public
      category: Unreal Tournament 2004
      subcategory: Server
      description: If enabled, the server will be registered to the master server and be publicly visible in the in-game browser
      keywords: public,master
      input_type: checkbox
      param_field_name: IpDrv.MasterServerUplink.DoUplink
      default: 'True'
      required: false
      sensitive: false
