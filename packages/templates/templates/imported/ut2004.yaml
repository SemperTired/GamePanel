schema: aetherpanel.template/v1
id: ut2004
name: Unreal Tournament 2004
category: Imported
summary: Unreal Tournament 2004 Dedicated Server. Based on v3369.3 and added bonus packs, with OldUnreal Patches
install:
  method: custom
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: System/UCC server {MapName}?{FormattedArgs} ini=UT2004.ini log=server.log port={GamePort} {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 7778
    protocol: udp
    required: true
  - key: webserverport
    name: Webserver Port
    default: 8888
    protocol: tcp
    required: true
config_files:
  - path: System/UT2004.ini
    type: ini
    editable: true
config_schema:
  fields:
