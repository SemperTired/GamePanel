      category: Longvinter
      subcategory: Server
      description: Sets a single tag that allows for easier search for the server. Don't use OFFICIAL
      keywords: server,tag
      input_type: text
      param_field_name: /Game/Blueprints/Server/GI_AdvancedSessions.GI_AdvancedSessions_C.Tag
