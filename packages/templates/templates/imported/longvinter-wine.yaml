        DefaultValue: ''
        EnumValues: {}
    - key: ServerName
      label: Server Name
      category: Longvinter
      subcategory: Server
      description: Sets the name shown in the server browser. Don't use OFFICIAL in the name
      keywords: server,name
      input_type: text
      param_field_name: /Game/Blueprints/Server/GI_AdvancedSessions.GI_AdvancedSessions_C.ServerName
      default: AetherNode Longvinter Server
