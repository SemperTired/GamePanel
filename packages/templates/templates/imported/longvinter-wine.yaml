        Keywords: server,name
        FieldName: ServerName
        InputType: text
        ParamFieldName: /Game/Blueprints/Server/GI_AdvancedSessions.GI_AdvancedSessions_C.ServerName
        DefaultValue: AetherNode Longvinter Server
        EnumValues: {}
    - key: serverTag
