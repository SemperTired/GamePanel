schema: aetherpanel.template/v1
id: longvinter-wine
name: Longvinter (Linux Wine)
category: Imported
summary: Longvinter Dedicated Server (for Linux using Wine)
install:
  method: steamcmd
  app_id: '1639880'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/wine {PlatformArgs} -Port={GamePort} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 7777
    protocol: udp
    required: true
config_files:
  - path: Longvinter/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: RestartTime24h
      label: Disable Restart
      category: Longvinter
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: /Game/Blueprints/Server/GM_Longvinter.GM_Longvinter_C.RestartTime24h
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Disable Restart
        Category: Longvinter:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: RestartTime24h
