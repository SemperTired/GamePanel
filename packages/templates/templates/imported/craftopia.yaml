schema: aetherpanel.template/v1
id: craftopia
name: Craftopia
category: Imported
summary: Craftopia Dedicated Server
install:
  method: steamcmd
  app_id: '1670340'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: 1670340/Craftopia.x86_64 -batchmode -showlogs
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Game Port
    default: 6587
    protocol: udp
    required: true
config_files:
  - path: ServerSetting.ini
    type: ini
    editable: true
config_schema:
  fields:
    - key: name
      label: World Name
      category: Craftopia
      subcategory: Server
      description: World name
      keywords: world name
      input_type: text
      param_field_name: GameWorld.name
      default: AMP World
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Name
        Description: World name
        Category: Craftopia:stadia_controller
        Subcategory: Server:dns:1
        Keywords: world name
        FieldName: name
        InputType: text
        IsFlagArgument: false
        ParamFieldName: GameWorld.name
        IncludeInCommandLine: false
        DefaultValue: AMP World
        EnumValues: {}
    - key: difficulty
      label: Difficulty
      category: Craftopia
      subcategory: Server
      description: Difficulty
      keywords: Difficulty
      input_type: enum
      param_field_name: GameWorld.difficulty
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Easy
        '1': Normal
        '2': Hard
        '3': Very Hard
      raw:
        DisplayName: Difficulty
        Category: Craftopia:stadia_controller
        Subcategory: Server:dns:1
        Description: Difficulty
        Keywords: Difficulty
        FieldName: difficulty
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: GameWorld.difficulty
        IncludeInCommandLine: false
        DefaultValue: '1'
        EnumValues:
          '0': Easy
          '1': Normal
          '2': Hard
          '3': Very Hard
    - key: gameMode
