schema: aetherpanel.template/v1
id: hurtworld
name: Hurtworld
category: Imported
summary: Hurtworld Dedicated Server
install:
  method: steamcmd
  app_id: '405100'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    405100/Hurtworld.x86_64 {PlatformArgs} -batchmode -nographics -exec "host {GamePort} {map};queryport
    {QueryPort};{FormattedArgs};{CustomConVars}" -logfile -
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 12871
    protocol: both
    required: true
  - key: queryport
    name: Query Port
    default: 12881
    protocol: both
    required: true
config_files:
  - path: autoexec.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: $GamePort
      label: Game Port
      category: Hurtworld
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: host
      default: '12871'
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game Port
        Category: Hurtworld:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $GamePort
        InputType: number
        IsFlagArgument: false
        Hidden: true
        ParamFieldName: host
        IncludeInCommandLine: false
        DefaultValue: '12871'
        EnumValues: {}
    - key: $QueryPort
      label: Query Port
