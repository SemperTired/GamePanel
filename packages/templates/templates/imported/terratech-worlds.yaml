schema: aetherpanel.template/v1
id: terratech-worlds
name: TerraTech Worlds
category: Imported
summary: TerraTech Worlds Dedicated Server
install:
  method: steamcmd
  app_id: '2533070'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} TT2 -stdout -FullStdOutLogOutput
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 7777
    protocol: udp
    required: true
config_files:
  - path: dedicated_server_config.json
    type: json
    editable: true
config_schema:
