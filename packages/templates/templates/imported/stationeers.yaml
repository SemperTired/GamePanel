schema: aetherpanel.template/v1
id: stationeers
name: Stationeers
category: Imported
summary: Stationeers Dedicated Server
install:
  method: steamcmd
  app_id: '600760'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    600760/rocketstation_DedicatedServer.x86_64 {LoadingMode} -noclear -settings StartLocalHost true GamePort {GamePort}
    UpdatePort {UpdatePort} LocalIpAddress "{ApplicationIPBinding}" {PlatformArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 27016
    protocol: udp
    required: true
  - key: updateport
    name: Update Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: setting.xml
    type: xml
    editable: true
