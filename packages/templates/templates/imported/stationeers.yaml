    - key: LoadingMode
      label: Load Mode
      category: Stationeers
      subcategory: Server
      description: >-
        Sets the mode for loading world saves based on the Save Name. 'Load latest save (new terrain)' should be used if
        running a new terrain server. 'Load manual save (legacy)' or 'Load latest save (legacy)' are for legacy servers
        only. In any case, if there is no save with the name specified, a new world is created
      keywords: load,latest,file,start,loading,mode
      input_type: enum
      param_field_name: LoadingMode
      default: '-file start "{{SaveName}}" {{WorldType}}{{Difficulty}}{{StartCondition}}{{StartLocation}}'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '-file start "{{SaveName}}" {{WorldType}}{{Difficulty}}{{StartCondition}}{{StartLocation}}': Load latest save (new terrain) (default)
        '-load "{{SaveName}}" {{WorldType}}': Load manual save (legacy)
        '-loadlatest "{{SaveName}}" {{WorldType}}': Load latest save (legacy)
      raw:
        DisplayName: Load Mode
        Category: Stationeers:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the mode for loading world saves based on the Save Name. 'Load latest save (new terrain)' should be used
          if running a new terrain server. 'Load manual save (legacy)' or 'Load latest save (legacy)' are for legacy
          servers only. In any case, if there is no save with the name specified, a new world is created
        Keywords: load,latest,file,start,loading,mode
        FieldName: LoadingMode
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: LoadingMode
        IncludeInCommandLine: false
        DefaultValue: '-file start "{{SaveName}}" {{WorldType}}{{Difficulty}}{{StartCondition}}{{StartLocation}}'
        EnumValues:
          '-file start "{{SaveName}}" {{WorldType}}{{Difficulty}}{{StartCondition}}{{StartLocation}}': Load latest save (new terrain) (default)
          '-load "{{SaveName}}" {{WorldType}}': Load manual save (legacy)
          '-loadlatest "{{SaveName}}" {{WorldType}}': Load latest save (legacy)
    - key: SaveName
      label: Save Name
      category: Stationeers
      subcategory: Server
      description: Sets the name of the world directory to load, or to create if it does not already exist
      keywords: save,name,SaveName
