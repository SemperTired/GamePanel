schema: aetherpanel.template/v1
id: theisle-legacy
name: The Isle (Legacy)
category: Imported
summary: The Isle (Legacy) Dedicated Server
install:
  method: steamcmd
  app_id: '412680'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} TheIsle {Map}?game={GameMode} -Port={ApplicationPort1} -QueryPort={ApplicationPort2}
    {FormattedArgs} -stdout -FullStdOutLogOutput
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Game Port
    default: 7777
    protocol: both
    required: true
  - key: applicationport2
    name: Query Port
    default: 7778
    protocol: both
    required: true
config_files:
  - path: TheIsle/Saved/Config/WindowsServer/Game.ini
    type: ini
    editable: true
  - path: TheIsle/Saved/Config/WindowsServer/GameUserSettings.ini
    type: ini
    editable: true
  - path: TheIsle/Saved/Config/WindowsServer/Engine.ini
    type: ini
    editable: true
  - path: TheIsle/Saved/MOTD.txt
    type: text
    editable: true
config_schema:
