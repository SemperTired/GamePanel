      label: Server Port
      category: The Isle
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: url.Port
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Port
        Category: The Isle:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationPort1
        InputType: number
        Hidden: true
        IsFlagArgument: false
        ParamFieldName: url.Port
        IncludeInCommandLine: false
        EnumValues: {}
    - key: $ApplicationPort2
      label: Query Port
      category: The Isle
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: url.PeerPort
      default: ''
      required: false
