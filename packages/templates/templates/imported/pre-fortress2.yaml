schema: aetherpanel.template/v1
id: pre-fortress2
name: Pre-Fortress 2
category: Imported
summary: Pre-Fortress 2 Dedicated Server
install:
  method: steamcmd
  app_id: '244310'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    server/srcds_linux {PlatformArgs} -game pf2 -console -usercon -nobreakpad -port {ServerPort} -ip
    {ApplicationIPBinding} {insecure}{nohltv}{CustomParameters} {CustomConVars} +tv_port {SourceTVPort} +clientport
    {ClientPort} +sv_logfile 1 {FormattedArgs} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
  - key: sourcetvport
    name: SourceTV Port
    default: 27020
    protocol: udp
    required: true
  - key: clientport
    name: Client Port
    default: 27005
    protocol: udp
    required: true
config_files:
  - path: pf2/cfg/server.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: hostname
      label: Server Name
      category: Pre-Fortress 2
      subcategory: Server
      description: Sets the name of the server that appears in the server list
      keywords: server,name,hostname
      input_type: text
      param_field_name: hostname
      default: AetherNode Pre-Fortress 2 Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Pre-Fortress 2:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server that appears in the server list
        Keywords: server,name,hostname
        FieldName: hostname
        InputType: text
        ParamFieldName: hostname
        DefaultValue: AetherNode Pre-Fortress 2 Server
        EnumValues: {}
    - key: sv_lan
      label: LAN Server
      category: Pre-Fortress 2
