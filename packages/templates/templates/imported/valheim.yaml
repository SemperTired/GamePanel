    - key: Stream
      label: Server Branch
      category: Updates
      subcategory: Steam Downloads
      description: 'Sets the server branch to install. NOTE: Update the server after switching branches.'
      keywords: server,branch,beta,public,default_old,default_preml,default_precta,default_prebw,default_preal
      input_type: enum
      param_field_name: Stream
      default: public
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        public: Public (default)
        default_old: Previous stable
        default_preml: Last stable build before Mistlands
        default_precta: Last stable build before Call to Arms
        default_prebw: Last stable build before Bog Witch
        default_preal: Last stable build before Ashlands
      raw:
