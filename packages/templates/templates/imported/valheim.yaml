schema: aetherpanel.template/v1
id: valheim
name: Valheim
category: Imported
summary: Includes optional support for ValheimPlus and BepinEx
install:
  method: docker_image
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    896660/valheim_server.x86_64 -name "{ServerName}" -port {ApplicationPort1} -world "{WorldName}" -password
    "{ServerPassword}" {FormattedArgs} -savedir "Saves" {crossplay}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: applicationport1
    name: Game Port
    default: 2456
    protocol: udp
    required: true
  - key: applicationport2
    name: Steam Query Port
    default: 2457
    protocol: udp
    required: true
config_files:
  - path: ./BepInEx/config/valheim_plus.cfg
    type: ini
    editable: true
config_schema:
  fields:
    - key: ServerName
      label: Server Name
      category: Valheim
      subcategory: General
      description: Server name as it appears in the server list
      keywords: ''
      input_type: text
      param_field_name: name
      default: My Valheim Server - Powered by AMP
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Description: Server name as it appears in the server list
        FieldName: ServerName
        InputType: text
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        ParamFieldName: name
        IncludeInCommandLine: false
        Required: true
        DefaultValue: My Valheim Server - Powered by AMP
    - key: WorldName
      label: World Name
      category: Valheim
      subcategory: General
      description: Name of the world .db file to load. Also used as the random seed used for terrain random generation
      keywords: world,seed,db
      input_type: text
      param_field_name: world
      default: PoweredByAMP
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: World Name
        Description: Name of the world .db file to load. Also used as the random seed used for terrain random generation
        FieldName: WorldName
        Keywords: world,seed,db
        InputType: text
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        ParamFieldName: world
        IncludeInCommandLine: false
        Required: true
        DefaultValue: PoweredByAMP
    - key: ServerPassword
      label: Server Password
      category: Valheim
      subcategory: General
      description: >-
        Password that clients must supply in order to connect. NOTE: Unless a mod is used to remove the need for a
        password, the server requires a password that is at least 5 characters long and that is not included in the
        server name. Default: 12345.
      keywords: ''
      input_type: password
      param_field_name: password
      default: '12345'
      placeholder: '12345'
      required: false
      sensitive: true
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Password
        Description: >-
          Password that clients must supply in order to connect. NOTE: Unless a mod is used to remove the need for a
          password, the server requires a password that is at least 5 characters long and that is not included in the
          server name. Default: 12345.
        FieldName: ServerPassword
        InputType: password
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        ParamFieldName: password
        IncludeInCommandLine: false
        DefaultValue: '12345'
        Placeholder: '12345'
    - key: ServerPublic
      label: Server is Public
      category: Valheim
      subcategory: General
      description: Whether or not the server appears on the server list. Disable for a LAN-only server.
      keywords: ''
      input_type: checkbox
      param_field_name: public
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        'True': '1'
        'False': '0'
      raw:
        DisplayName: Server is Public
        Description: Whether or not the server appears on the server list. Disable for a LAN-only server.
        FieldName: ServerPublic
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        ParamFieldName: public
        IncludeInCommandLine: true
        InputType: checkbox
        DefaultValue: '1'
        EnumValues:
          'True': '1'
          'False': '0'
    - key: crossplay
      label: Enable Crossplay
      category: Valheim
      subcategory: General
      description: >-
        When enabled, the backend will be running Playfab instead of Steamworks. A "Join code" will appear when you join
        a Dedicated server supporting crossplay. Players can use this code to join the server. This Join code is
        regenerated whenever the server is restarted.
      keywords: ''
      input_type: checkbox
      param_field_name: crossplay
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'True': '-crossplay'
        'False': ''
      raw:
        DisplayName: Enable Crossplay
        Description: >-
          When enabled, the backend will be running Playfab instead of Steamworks. A "Join code" will appear when you
          join a Dedicated server supporting crossplay. Players can use this code to join the server. This Join code is
          regenerated whenever the server is restarted.
        FieldName: crossplay
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        ParamFieldName: crossplay
        IncludeInCommandLine: false
        InputType: checkbox
        EnumValues:
          'True': '-crossplay'
          'False': ''
        DefaultValue: ''
    - key: AdminPlayers
      label: Admin Players
      category: Valheim
      subcategory: General
      description: A list of Steam64 IDs for players that are in-game admins. [Find your Steam64 ID](https://steamid.io/)
      keywords: ''
      input_type: list
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      special: listfile:./Valheim/896660/Saves/adminlist.txt
      raw:
        DisplayName: Admin Players
        Description: A list of Steam64 IDs for players that are in-game admins. [Find your Steam64 ID](https://steamid.io/)
        FieldName: AdminPlayers
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        InputType: list
        Special: listfile:./Valheim/896660/Saves/adminlist.txt
    - key: PermittedPlayers
      label: Permitted Players
      category: Valheim
      subcategory: General
      description: A list of Steam64 IDs for players that are permitted in-game. [Find your Steam64 ID](https://steamid.io/)
      keywords: ''
      input_type: list
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      special: listfile:./Valheim/896660/Saves/permittedlist.txt
      raw:
        DisplayName: Permitted Players
        Description: A list of Steam64 IDs for players that are permitted in-game. [Find your Steam64 ID](https://steamid.io/)
        FieldName: PermittedPlayers
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        InputType: list
        Special: listfile:./Valheim/896660/Saves/permittedlist.txt
    - key: preset
      label: World Preset
      category: Valheim
      subcategory: General
      description: >-
        Sets the world modifiers preset, which applies each modifier according to preconfigured levels. The preset can
        be overriden by custom modifier settings.
      keywords: preset,modifier
      input_type: enum
      param_field_name: preset
      default: normal
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: false
      enum_values:
        normal: Normal (default)
        casual: Casual
        easy: Easy
        hard: Hard
        hardcore: Hardcore
        immersive: Immersive
        hammer: Hammer
      raw:
        DisplayName: World Preset
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        Description: >-
          Sets the world modifiers preset, which applies each modifier according to preconfigured levels. The preset can
          be overriden by custom modifier settings.
        Keywords: preset,modifier
        FieldName: preset
        InputType: enum
        ParamFieldName: preset
        IncludeInCommandLine: true
        DefaultValue: normal
        EnumValues:
          normal: Normal (default)
          casual: Casual
          easy: Easy
          hard: Hard
          hardcore: Hardcore
          immersive: Immersive
          hammer: Hammer
    - key: combatModifier
      label: Custom Combat Modifier
      category: Valheim
      subcategory: General
      description: >-
        Governs how much damage you give and take. Also governs how likely you are to encounter higher leveled enemies,
        and how dangerous they are.
      keywords: preset,combat,modifier
      input_type: enum
      param_field_name: modifier
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values:
        '': No custom combat modifier (default)
        combat veryeasy: Very easy
        combat easy: Easy
        combat hard: Hard
        combat veryhard: Very hard
      raw:
        DisplayName: Custom Combat Modifier
        Category: Valheim:stadia_controller
        Subcategory: General:dns:1
        Description: >-
          Governs how much damage you give and take. Also governs how likely you are to encounter higher leveled
          enemies, and how dangerous they are.
        Keywords: preset,combat,modifier
        FieldName: combatModifier
        InputType: enum
        ParamFieldName: modifier
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: ''
        EnumValues:
          '': No custom combat modifier (default)
          combat veryeasy: Very easy
          combat easy: Easy
          combat hard: Hard
          combat veryhard: Very hard
    - key: deathpenaltyModifier
      label: Custom Death Penalty Modifier
      category: Valheim
      subcategory: General
      description: >-
        Governs what happens when you die. From not dropping equipment and items, and heavily reduced skill loss, to
