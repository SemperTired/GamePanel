          default_old: Previous stable
          default_preml: Last stable build before Mistlands
          default_precta: Last stable build before Call to Arms
          default_prebw: Last stable build before Bog Witch
          default_preal: Last stable build before Ashlands
    - key: bepinex_install
      label: Install BepInEx
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        If set, BepInEx will be installed when the server is updated. Configure "BepInEx Version" accordingly.
        Standalone - DO NOT use with the Install Valheim Plus option. NOTE: Update the server after enabling this
        option.
      keywords: Install,BepInEx
      input_type: checkbox
      param_field_name: bepinex_install
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
