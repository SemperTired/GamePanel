schema: aetherpanel.template/v1
id: call-of-dutymw2
name: 'Call of Duty: Modern Warfare 2 (2009)'
category: Imported
summary: 'Call of Duty: Modern Warfare 2 (2009) Dedicated Server'
install:
  method: steamcmd
  app_id: '10190'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} -console -dedicated -stdout +set fs_game "{fs_game}" +set net_port "{GamePort}" +set
    net_ip "{ApplicationIPBinding}" +set rcon_password "{RemoteAdminPassword}" +exec "server.cfg" +set party_enable "0"
    {FormattedArgs} +map_rotate
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 28960
    protocol: both
    required: true
config_files:
  - path: userraw/server.cfg
    type: text
    editable: true
config_schema:
  fields:
