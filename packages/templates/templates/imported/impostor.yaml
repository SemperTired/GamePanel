schema: aetherpanel.template/v1
id: impostor
name: Impostor - Among Us Server
category: Imported
summary: Impostor Dedicated Server - an open source private server implementation for Among Us
install:
  method: direct_archive
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  installer_url: >-
    https://github.com/Impostor/Impostor/releases/download/v%7B%7BServerVersion%7D%7D/Impostor-Server_%7B%7BServerVersion%7D%7D_win-x64.zip
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: Impostor.Server {PlatformArgs} {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and HTTP Port
    default: 22023
    protocol: both
    required: true
config_files:
  - path: config.json
    type: json
    editable: true
  - path: config_http.json
    type: json
    editable: true
config_schema:
  fields:
    - key: $ServerPort
      label: Public Port
      category: Impostor
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.Server.PublicPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Public Port
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        IsFlagArgument: false
        Hidden: true
        ParamFieldName: $.Server.PublicPort
        IncludeInCommandLine: false
        EnumValues: {}
    - key: $ServerPort
      label: Listen Port
      category: Impostor
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.Server.ListenPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Listen Port
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        IsFlagArgument: false
        Hidden: true
        ParamFieldName: $.Server.ListenPort
        IncludeInCommandLine: false
        EnumValues: {}
    - key: $ServerPort
      label: HTTP Matchmaking Port
      category: Impostor
      subcategory: Server
      description: ''
      keywords: ''
      input_type: number
      param_field_name: $.HttpServer.ListenPort
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: HTTP Matchmaking Port
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ServerPort
        InputType: number
        IsFlagArgument: false
        Hidden: true
        ParamFieldName: $.HttpServer.ListenPort
        IncludeInCommandLine: false
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: IP Binding
      category: Impostor
      subcategory: Server
      description: ''
      keywords: ''
      input_type: text
      param_field_name: $.Server.ListenIp
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: IP Binding
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: ''
        Keywords: ''
        FieldName: $ApplicationIPBinding
        InputType: text
        IsFlagArgument: false
        Hidden: true
        ParamFieldName: $.Server.ListenIp
        IncludeInCommandLine: false
        EnumValues: {}
    - key: BuildStream
      label: Build Stream
      category: Impostor
      subcategory: Server
      description: >-
        Sets the build stream for the server - either the mainline release stream, or the nightly (CI) stream. The
        Server Version also needs to be set. Back up configuration and update the server!
      keywords: build,stream
      input_type: enum
      param_field_name: BuildStream
      default: Release
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        Release: Mainline (Default)
        Nightly: Nightly
      raw:
        DisplayName: Build Stream
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the build stream for the server - either the mainline release stream, or the nightly (CI) stream. The
          Server Version also needs to be set. Back up configuration and update the server!
        Keywords: build,stream
        FieldName: BuildStream
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: BuildStream
        IncludeInCommandLine: false
        DefaultValue: Release
        EnumValues:
          Release: Mainline (Default)
          Nightly: Nightly
    - key: ServerVersion
      label: Server Version
      category: Impostor
      subcategory: Server
      description: >-
        Sets the server version (either a [release](https://github.com/Impostor/Impostor/releases) version or a
        [nightly](https://nightly.link/Impostor/Impostor/workflows/ci/master) version) to install. For nightly, you must
        include the build number, such as "1.9.1-ci.814". Update the server after changing this setting
      keywords: server,version
      input_type: text
      param_field_name: ServerVersion
      default: 1.9.1
      placeholder: 1.9.1 | 1.9.1-ci.814
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Version
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the server version (either a [release](https://github.com/Impostor/Impostor/releases) version or a
          [nightly](https://nightly.link/Impostor/Impostor/workflows/ci/master) version) to install. For nightly, you
          must include the build number, such as "1.9.1-ci.814". Update the server after changing this setting
        Keywords: server,version
        FieldName: ServerVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: ServerVersion
        IncludeInCommandLine: false
        DefaultValue: 1.9.1
        Placeholder: 1.9.1 | 1.9.1-ci.814
        Required: true
        EnumValues: {}
    - key: DotnetRelease
      label: Dotnet Release Stream
      category: Impostor
      subcategory: Server
      description: >-
        Sets the .NET release stream from which to install the latest ASP.NET Core Runtime version, unless a specific
        version is specified under Dotnet Version. Use 8.0 for Impostor v1.9.0+. Update the server after changing this
        setting
      keywords: dotnet,release,stream
      input_type: enum
      param_field_name: DotnetRelease
      default: '8.0'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '8.0': 8.0 (default)
        '7.0': '7.0'
      raw:
        DisplayName: Dotnet Release Stream
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the .NET release stream from which to install the latest ASP.NET Core Runtime version, unless a specific
          version is specified under Dotnet Version. Use 8.0 for Impostor v1.9.0+. Update the server after changing this
          setting
        Keywords: dotnet,release,stream
        FieldName: DotnetRelease
        InputType: enum
        ParamFieldName: DotnetRelease
        IncludeInCommandLine: false
        DefaultValue: '8.0'
        EnumValues:
          '8.0': 8.0 (default)
          '7.0': '7.0'
    - key: DotnetVersion
      label: Dotnet Version
      category: Impostor
      subcategory: Server
      description: >-
        Sets the ASP.NET Core Runtime [8.0](https://dotnet.microsoft.com/en-us/download/dotnet/8.0) or
        [7.0](https://dotnet.microsoft.com/en-us/download/dotnet/7.0) version to install. Empty = latest version for the
        release stream specified under Dotnet Release Stream. Use an 8.0 version for Impostor v1.9.0+. Update the server
        after changing this setting
      keywords: dotnet,version
      input_type: text
      param_field_name: DotnetVersion
      default: ''
      placeholder: 8.0.4
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Dotnet Version
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the ASP.NET Core Runtime [8.0](https://dotnet.microsoft.com/en-us/download/dotnet/8.0) or
          [7.0](https://dotnet.microsoft.com/en-us/download/dotnet/7.0) version to install. Empty = latest version for
          the release stream specified under Dotnet Release Stream. Use an 8.0 version for Impostor v1.9.0+. Update the
          server after changing this setting
        Keywords: dotnet,version
        FieldName: DotnetVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: DotnetVersion
        IncludeInCommandLine: false
        DefaultValue: ''
        Placeholder: 8.0.4
        EnumValues: {}
    - key: HttpServerListenIp
      label: HTTP Matchmaking Server Binding
      category: Impostor
      subcategory: Server
      description: >-
        Sets the binding of the HTTP matchmaking server. Use 0.0.0.0 if clients will connect to the HTTP server
        directly. Otherwise you can use 127.0.0.1 or a local IP on the host, as appropriate, if using a reverse proxy
        for the plugin server traffic (preferred)
      keywords: http,matchmaking,server,binding,listenip
      input_type: text
      param_field_name: $.HttpServer.ListenIp
      default: 0.0.0.0
      placeholder: 0.0.0.0
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: HTTP Matchmaking Server Binding
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the binding of the HTTP matchmaking server. Use 0.0.0.0 if clients will connect to the HTTP server
          directly. Otherwise you can use 127.0.0.1 or a local IP on the host, as appropriate, if using a reverse proxy
          for the plugin server traffic (preferred)
        Keywords: http,matchmaking,server,binding,listenip
        FieldName: HttpServerListenIp
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.HttpServer.ListenIp
        IncludeInCommandLine: false
        DefaultValue: 0.0.0.0
        Placeholder: 0.0.0.0
        EnumValues: {}
    - key: InstallHttpPlugin
      label: Install HTTP Plugin
      category: Impostor
      subcategory: Server
      description: >-
        If enabled, the [HTTP Plugin](https://github.com/Impostor/Impostor.Http#impostorhttp) will be installed when the
        server is updated. DO NOT enable this if using Impostor v1.9.0+
      keywords: http,matchmaking,plugin,install
      input_type: checkbox
      param_field_name: InstallHttpPlugin
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Install HTTP Plugin
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, the [HTTP Plugin](https://github.com/Impostor/Impostor.Http#impostorhttp) will be installed when
          the server is updated. DO NOT enable this if using Impostor v1.9.0+
        Keywords: http,matchmaking,plugin,install
        FieldName: InstallHttpPlugin
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: InstallHttpPlugin
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: HttpPluginVersion
      label: HTTP Plugin Version
      category: Impostor
      subcategory: Server
      description: >-
        Sets the [Impostor.HTTP plugin version](https://github.com/Impostor/Impostor.Http/releases) to install, if
        Install HTTP Plugin is enabled
      keywords: http,matchmaking,plugin,version
      input_type: text
      param_field_name: HttpPluginVersion
      default: 0.5.0
      placeholder: 0.5.0
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: HTTP Plugin Version
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the [Impostor.HTTP plugin version](https://github.com/Impostor/Impostor.Http/releases) to install, if
          Install HTTP Plugin is enabled
        Keywords: http,matchmaking,plugin,version
        FieldName: HttpPluginVersion
        InputType: text
        IsFlagArgument: false
        ParamFieldName: HttpPluginVersion
        IncludeInCommandLine: false
        DefaultValue: 0.5.0
        Placeholder: 0.5.0
        Required: true
        EnumValues: {}
    - key: HttpServerUseHttps
      label: Enable HTTPS For HTTP Matchmaking Plugin
      category: Impostor
      subcategory: Server
      description: >-
        If set, the Impostor.Http plugin server (if used) will use its own HTTPS (encrypted HTTP) rather than plain
        HTTP. Requires the HTTP Matchmaking Plugin Certificate Path to be set. Using a reverse proxy to provide HTTPS is
        preferred instead of using this setting. Note: HTTPS is required for mobile devices to connect
      keywords: http,matchmaking,plugin,https,secure,usehttps
      input_type: checkbox
      param_field_name: $.HttpServer.UseHttps
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable HTTPS For HTTP Matchmaking Plugin
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If set, the Impostor.Http plugin server (if used) will use its own HTTPS (encrypted HTTP) rather than plain
          HTTP. Requires the HTTP Matchmaking Plugin Certificate Path to be set. Using a reverse proxy to provide HTTPS
          is preferred instead of using this setting. Note: HTTPS is required for mobile devices to connect
        Keywords: http,matchmaking,plugin,https,secure,usehttps
        FieldName: HttpServerUseHttps
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.HttpServer.UseHttps
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: HttpServerCertificatePath
      label: HTTP Matchmaking Plugin Certificate Path
      category: Impostor
      subcategory: Server
      description: >-
        Sets the path to an SSL certificate (in PFX format) to enable the Impostor.Http plugin server (if used) to use
        its own HTTPS
      keywords: http,matchmaking,plugin,https,secure,certificate,path,certificatepath
      input_type: text
      param_field_name: $.HttpServer.CertificatePath
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: HTTP Matchmaking Plugin Certificate Path
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the path to an SSL certificate (in PFX format) to enable the Impostor.Http plugin server (if used) to use
          its own HTTPS
        Keywords: http,matchmaking,plugin,https,secure,certificate,path,certificatepath
        FieldName: HttpServerCertificatePath
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.HttpServer.CertificatePath
        IncludeInCommandLine: false
        DefaultValue: ''
        EnumValues: {}
    - key: AntiCheat_Enabled
      label: Enable Anticheat
      category: Impostor
      subcategory: Server
      description: If set, anticheat will be enabled
      keywords: anti,cheat
      input_type: checkbox
      param_field_name: $.AntiCheat.Enabled
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Enable Anticheat
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: If set, anticheat will be enabled
        Keywords: anti,cheat
        FieldName: AntiCheat_Enabled
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.AntiCheat.Enabled
        IncludeInCommandLine: false
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: AntiCheat_BanIpFromGame
      label: Ban IP
      category: Impostor
      subcategory: Server
      description: >-
        If enabled, anticheat will ban a hacking player from the server rather than just kicking them. The banned player
        will not be able to rejoin that game
      keywords: anti,cheat,ban
      input_type: checkbox
      param_field_name: $.AntiCheat.BanIpFromGame
      default: 'true'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Ban IP
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          If enabled, anticheat will ban a hacking player from the server rather than just kicking them. The banned
          player will not be able to rejoin that game
        Keywords: anti,cheat,ban
        FieldName: AntiCheat_BanIpFromGame
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: $.AntiCheat.BanIpFromGame
        IncludeInCommandLine: false
        DefaultValue: 'true'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: PublicIp
      label: Public IP Selection Mode
      category: Impostor
      subcategory: Server
      description: >-
        Sets whether AetherPanel should automatically select the public IP advertised for the server, or whether it should use
        the IP set under Server Public IP
      keywords: public,ip,publicip
      input_type: enum
      param_field_name: $.Server.PublicIp
      default: '{{$ExternalIP}}'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '{{$ExternalIP}}': Automatic (default)
        '{{ManualPublicIP}}': Manual
      raw:
        DisplayName: Public IP Selection Mode
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets whether AetherPanel should automatically select the public IP advertised for the server, or whether it should use
          the IP set under Server Public IP
        Keywords: public,ip,publicip
        FieldName: PublicIp
        InputType: enum
        ParamFieldName: $.Server.PublicIp
        DefaultValue: '{{$ExternalIP}}'
        EnumValues:
          '{{$ExternalIP}}': Automatic (default)
          '{{ManualPublicIP}}': Manual
    - key: ManualPublicIP
      label: Server Public IP
      category: Impostor
      subcategory: Server
      description: >-
        Sets the public IP advertised for the server, if "Manual" is selected as the Public IP Selection Mode. Useful if
        the host network has multiple public IPs, or the server is behind a public proxy
      keywords: manual,public,ip,publicip
      input_type: text
      param_field_name: ManualPublicIP
      default: ''
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Public IP
        Category: Impostor:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          Sets the public IP advertised for the server, if "Manual" is selected as the Public IP Selection Mode. Useful
          if the host network has multiple public IPs, or the server is behind a public proxy
        Keywords: manual,public,ip,publicip
        FieldName: ManualPublicIP
        InputType: text
        ParamFieldName: ManualPublicIP
        DefaultValue: ''
        EnumValues: {}
  files:
    - path: config.json
      type: json
      subsections: []
      raw:
        ConfigFile: config.json
        AutoMap: true
        ConfigType: json
    - path: config_http.json
      type: json
      subsections: []
      raw:
        ConfigFile: config_http.json
        AutoMap: true
        ConfigType: json
environment: {}
