    label: Build Stream
    default: Release
    customer_editable: true
    required: false
    sensitive: false
  - key: ServerVersion
    label: Server Version
    default: 1.9.1
    customer_editable: true
    required: true
    sensitive: false
  - key: DotnetRelease
    label: Dotnet Release Stream
    default: '8.0'
    customer_editable: true
    required: false
    sensitive: false
  - key: DotnetVersion
    label: Dotnet Version
    default: ''
    customer_editable: true
    required: false
    sensitive: false
  - key: HttpServerListenIp
    label: HTTP Matchmaking Server Binding
    default: 0.0.0.0
    customer_editable: true
    required: false
    sensitive: false
  - key: InstallHttpPlugin
    label: Install HTTP Plugin
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: HttpPluginVersion
    label: HTTP Plugin Version
    default: 0.5.0
    customer_editable: true
    required: true
    sensitive: false
  - key: HttpServerUseHttps
    label: Enable HTTPS For HTTP Matchmaking Plugin
    default: 'false'
    customer_editable: true
    required: false
    sensitive: false
  - key: HttpServerCertificatePath
    label: HTTP Matchmaking Plugin Certificate Path
    default: ''
    customer_editable: true
