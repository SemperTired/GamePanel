    sensitive: false
  - key: AntiCheat_BanIpFromGame
    label: Ban IP
    default: 'true'
    customer_editable: true
    required: false
    sensitive: false
  - key: PublicIp
    label: Public IP Selection Mode
    default: '{{$ExternalIP}}'
    customer_editable: true
    required: false
    sensitive: false
  - key: ManualPublicIP
