schema: aetherpanel.template/v1
id: miscreated
name: Miscreated
category: Imported
summary: Miscreated Dedicated Server
install:
  method: steamcmd
  app_id: '302200'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} -sv_port {GamePort} -sv_bind {ApplicationIPBinding} -mis_gameserverid
    {mis_gameserverid} {http_startserver}{mis_whitelist}{FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 64090
    protocol: udp
    required: true
  - key: steamport
    name: Steam Port
    default: 64091
    protocol: udp
    required: true
  - key: queryport
    name: Query Port
    default: 64092
    protocol: udp
    required: true
  - key: voipport
    name: VOIP Port
    default: 64093
    protocol: udp
    required: true
  - key: rconport
    name: RCON Port
    default: 64094
    protocol: tcp
    required: true
config_files:
  - path: hosting.cfg
    type: text
    editable: true
config_schema:
  fields:
    - key: sv_servername
      label: Server Name
      category: Miscreated
      subcategory: Server
      description: Sets the name of the server to be displayed on the server list
      keywords: server,name,sv_servername
      input_type: text
      param_field_name: sv_servername
      default: AetherNode Miscreated Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: true
      skip_if_empty: true
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Miscreated:stadia_controller
        Subcategory: Server:dns:1
        Description: Sets the name of the server to be displayed on the server list
        Keywords: server,name,sv_servername
        FieldName: sv_servername
        InputType: text
        ParamFieldName: sv_servername
        IncludeInCommandLine: true
        SkipIfEmpty: true
        DefaultValue: AetherNode Miscreated Server
        EnumValues: {}
    - key: mis_gameserverid
      label: Server ID
      category: Miscreated
      subcategory: Server
      description: Sets a unique numeric identifier for the server
      keywords: server,id,identifier,mis_gameserverid
      input_type: number
      param_field_name: mis_gameserverid
      default: '100'
      placeholder: '100'
      required: true
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      min: 1
      max: 65535
      enum_values: {}
      raw:
        DisplayName: Server ID
