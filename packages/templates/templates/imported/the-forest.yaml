schema: aetherpanel.template/v1
id: the-forest
name: The Forest
category: Imported
summary: The Forest Dedicated Server
install:
  method: steamcmd
  app_id: '556450'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} -showlogs -batchmode -configfilepath the-forestserver.cfg -savefolderpath saves
    {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Main Port
    default: 27015
    protocol: both
    required: true
  - key: steamport
    name: Steam Main Port
    default: 8766
    protocol: both
    required: true
  - key: queryport
    name: Steam Query Port
    default: 27016
    protocol: both
    required: true
config_files:
  - path: the-forestserver.cfg
    type: text
    editable: true
config_schema:
