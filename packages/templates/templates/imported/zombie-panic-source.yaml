schema: aetherpanel.template/v1
id: zombie-panic-source
name: Zombie Panic! Source
category: Imported
summary: Zombie Panic! Source Dedicated Server
install:
  method: steamcmd
  app_id: '17505'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    17505/srcds_linux {PlatformArgs} -game zps -console -usercon -nobreakpad -port {ServerPort} -ip
    {ApplicationIPBinding} -maxplayers {MaxUsers} -tickrate {tickrate} {insecure}{nohltv}{CustomParameters}
    {CustomConVars} +tv_port {SourceTVPort} +clientport {ClientPort} +sv_logfile 1 {FormattedArgs} +exec server.cfg +map
    {map} +log on
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Game and RCON Port
    default: 27015
    protocol: both
    required: true
  - key: sourcetvport
    name: SourceTV Port
    default: 27020
    protocol: udp
    required: true
  - key: clientport
    name: Client Port
    default: 27005
    protocol: udp
    required: true
config_files:
  - path: zps/cfg/server.cfg
    type: text
    editable: true
