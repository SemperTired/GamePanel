schema: aetherpanel.template/v1
id: wolfenstein-et
name: 'Wolfenstein: Enemy Territory'
category: Imported
summary: 'Wolfenstein: Enemy Territory Dedicated Server'
install:
  method: steamcmd
  app_id: '1873030'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/wine {PlatformArgs} +set fs_homepath "{FullBaseDir}" +set net_port {ServerPort} +set net_ip
    {ApplicationIPBinding} +set rconpassword "{RemoteAdminPassword}" {FormattedArgs} +exec server.cfg
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 27960
    protocol: udp
    required: true
config_files:
  - path: etmain/server.cfg
    type: text
    editable: true
config_schema:
  fields:
