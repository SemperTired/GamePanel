schema: aetherpanel.template/v1
id: quake-live
name: Quake Live
category: Imported
summary: Quake Live Dedicated Server
install:
  method: steamcmd
  app_id: '349090'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    349090/qzeroded.x64 {PlatformArgs} +set net_strict 1 +set fs_homepath "{FullBaseDir}" +set sv_master {sv_master}
    +set net_port {ServerPort} +set zmq_stats_port {ServerPort} +set zmq_rcon_port {RCONPort} +set net_ip
    {ApplicationIPBinding} +set zmq_stats_ip {ApplicationIPBinding} +set zmq_rcon_ip {ApplicationIPBinding} +set
    zmq_stats_enable {zmq_stats_enable} +set zmq_stats_password "{zmq_stats_password}" +set zmq_rcon_enable
    {zmq_rcon_enable} +set zmq_rcon_password "{zmq_rcon_password}" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: serverport
    name: Server Port
    default: 27960
    protocol: both
    required: true
  - key: rconport
    name: RCON Port
    default: 28960
    protocol: tcp
    required: true
config_files:
  - path: baseq3/server.cfg
    type: text
    editable: true
