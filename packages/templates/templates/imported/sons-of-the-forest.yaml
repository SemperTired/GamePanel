schema: aetherpanel.template/v1
id: sons-of-the-forest
name: Sons Of The Forest
category: Imported
summary: Sons Of The Forest Dedicated Server
install:
  method: steamcmd
  app_id: '2465200'
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: >-
    /usr/bin/xvfb-run {PlatformArgs} -dedicatedserver.IpAddress "{ApplicationIPBinding}" -dedicatedserver.GamePort
    "{GamePort}" -dedicatedserver.QueryPort "{SteamQueryPort}" -dedicatedserver.BlobSyncPort "{BlobSyncPort}"
    -userdatapath "{FullBaseDir}saves" {FormattedArgs}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 8766
    protocol: udp
    required: true
  - key: steamqueryport
    name: Steam Query Port
    default: 27016
    protocol: udp
    required: true
  - key: blobsyncport
    name: Blob Sync Port
    default: 9700
    protocol: udp
    required: true
config_files:
  - path: saves/dedicatedserver.cfg
    type: json
    editable: true
config_schema:
  fields:
