schema: aetherpanel.template/v1
id: portal-knights
name: Portal Knights
category: Imported
summary: Portal Knights Dedicated Server
install:
  method: steamcmd
  app_id: '374040'
  anonymous: false
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} -config "{FullBaseDir}server_config.json" -log Server.log
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: gameport
    name: Game Port
    default: 28001
    protocol: udp
    required: true
config_files:
  - path: server_config.json
    type: json
    editable: true
config_schema:
  fields:
    - key: name
      label: Server Name
      category: Portal Knights
      subcategory: Server
      description: The name that your dedicated server will display.
      keywords: server,name
      input_type: text
      param_field_name: $.basicServerData.name
      default: AetherNode Portal Knights Server
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Server Name
        Category: Portal Knights:stadia_controller
        Subcategory: Server:dns:1
        Description: The name that your dedicated server will display.
        Keywords: server,name
        FieldName: name
        InputType: text
        IsFlagArgument: false
        ParamFieldName: $.basicServerData.name
        IncludeInCommandLine: false
        DefaultValue: AetherNode Portal Knights Server
        EnumValues: {}
    - key: $ApplicationIPBinding
      label: Game IP
      category: Portal Knights
      subcategory: Server
      description: >-
        The local network IP address of your dedicated server. The address 0.0.0.0 allows the host computer to listen to
        all local network traffic. You probably won't need to change this unless you're setting up your server to work
        on a specific network card or interface.
      keywords: ''
      input_type: text
      param_field_name: $.basicServerData.ipv4
      default: ''
      required: false
      sensitive: false
      hidden: true
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values: {}
      raw:
        DisplayName: Game IP
        Category: Portal Knights:stadia_controller
        Subcategory: Server:dns:1
        Description: >-
          The local network IP address of your dedicated server. The address 0.0.0.0 allows the host computer to listen
          to all local network traffic. You probably won't need to change this unless you're setting up your server to
          work on a specific network card or interface.
        Keywords: ''
        FieldName: $ApplicationIPBinding
        InputType: text
        IsFlagArgument: false
        Hidden: true
        ParamFieldName: $.basicServerData.ipv4
        IncludeInCommandLine: false
    - key: $GamePort
      label: Game Port
      category: Portal Knights
      subcategory: Server
