schema: aetherpanel.template/v1
id: v-rising
name: V Rising
category: Imported
summary: V Rising Dedicated Server with BepInEx Option
install:
  method: docker_image
  anonymous: true
  install_dir: /data
  image: ghcr.io/aetherpanel/steamcmd:latest
  copy_strategy: copy
  preinstall: []
  postinstall: []
runtime:
  working_dir: /data
  startup: /usr/bin/xvfb-run {PlatformArgs} -persistentDataPath "{FullBaseDir}save-data" -lanMode {lanMode}
  console: true
resources:
  min_ram_mb: 2048
  recommended_ram_mb: 4096
  min_disk_gb: 20
  cpu: 2 shared vCPU
ports:
  - key: game
    name: Game Port
    default: 27015
    protocol: udp
    required: true
config_files:
  - path: save-data/Settings/ServerHostSettings.json
    type: json
    editable: true
  - path: save-data/Settings/ServerGameSettings.json
    type: json
    editable: true
  - path: doorstop_config.ini
    type: ini
    editable: true
  - path: BepInEx/config/BepInEx.cfg
    type: ini
    editable: true
config_schema:
  fields:
    - key: GameDifficulty
      label: Game Difficulty
      category: V Rising
      subcategory: Gameplay
      description: Set Game Difficulty
      keywords: Game, Mode, Type
      input_type: enum
      param_field_name: GameDifficulty
      default: '1'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        '0': Relaxed - Bosses will in general not use too complex mechanics
        '1': Normal - Bosses will use the default mechanics
        '2': Brutal - Bosses will use some more advanced mechanics and behaviours
      raw:
        DisplayName: Game Difficulty
        Category: V Rising:stadia_controller
        Subcategory: Gameplay:joystick:1
        Description: Set Game Difficulty
        Keywords: Game, Mode, Type
        FieldName: GameDifficulty
        InputType: enum
        IsFlagArgument: false
        ParamFieldName: GameDifficulty
        IncludeInCommandLine: false
        DefaultValue: '1'
        EnumValues:
          '0': Relaxed - Bosses will in general not use too complex mechanics
          '1': Normal - Bosses will use the default mechanics
          '2': Brutal - Bosses will use some more advanced mechanics and behaviours
    - key: GameModeType
      label: Game Mode Type
      category: V Rising
      subcategory: Gameplay
      description: Set Game Mode Type as PVE or PVP
      keywords: Game, Mode, Type
      input_type: enum
