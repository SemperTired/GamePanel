    - key: BepInExEnabled
      label: Activate BepInEx
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        If set, BepInEx will be installed when the server is updated and enabled when the server is run, allowing the
        server to be modded. Configure "BepInEx Version" accordingly. Mods must be installed in the BepInEx/plugins
        directory, which is created after BepInEx is first run. Requires Wine 8 staging build on Linux (and Xvfb and
        cabextract)
      keywords: install,enable,bepinex,modded,mods
      input_type: checkbox
      param_field_name: General.enabled
      default: 'false'
      required: false
      sensitive: false
      hidden: false
      customer_editable: true
      include_in_command_line: false
      skip_if_empty: false
      enum_values:
        'False': 'false'
        'True': 'true'
      raw:
        DisplayName: Activate BepInEx
        Category: Updates
        Subcategory: Runtime Configuration:build:3
        Description: >-
          If set, BepInEx will be installed when the server is updated and enabled when the server is run, allowing the
          server to be modded. Configure "BepInEx Version" accordingly. Mods must be installed in the BepInEx/plugins
          directory, which is created after BepInEx is first run. Requires Wine 8 staging build on Linux (and Xvfb and
          cabextract)
        Keywords: install,enable,bepinex,modded,mods
        FieldName: BepInExEnabled
        InputType: checkbox
        IsFlagArgument: false
        ParamFieldName: General.enabled
        IncludeInCommandLine: false
        DefaultValue: 'false'
        EnumValues:
          'False': 'false'
          'True': 'true'
    - key: BepInExVersion
      label: BepInEx Version
      category: Updates
      subcategory: Runtime Configuration
      description: >-
        Sets the [BepInEx version](https://thunderstore.io/c/v-rising/p/BepInEx/BepInExPack_V_Rising/versions/) to
        install. Empty = latest. NOTE: Update the server after switching versions!
