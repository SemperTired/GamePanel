schema: aetherpanel.template/v1
id: garrysmod
name: Garry's Mod
category: Sandbox
summary: Source dedicated server with Workshop collection support.
install: { method: steamcmd, app_id: "4020", install_dir: /data, image: ghcr.io/aetherpanel/steamcmd:latest, anonymous: true }
runtime:
  working_dir: /data
  startup: './srcds_run -game garrysmod +maxplayers {max_players} +map {map} +host_workshop_collection {collection_id}'
  stop_command: quit
  console: true
resources: { min_ram_mb: 2048, recommended_ram_mb: 4096, min_disk_gb: 20, cpu: 2 shared vCPU }
ports:
  - { key: game, name: Game Port, default: 27015, protocol: udp, required: true }
config_files:
  - { path: garrysmod/cfg/server.cfg, type: text, editable: true }
startup_variables:
  - { key: map, label: Default Map, default: gm_construct, customer_editable: true }
  - { key: max_players, label: Max Players, default: "32", customer_editable: true }
  - { key: collection_id, label: Workshop Collection ID, default: "", customer_editable: true }
workshop:
  enabled: true
  providers: [steam]
  app_id: "4000"
  collection_support: true
backup: { include: [garrysmod/cfg, garrysmod/data], exclude: [steamapps/downloading] }
supported_os: [linux]
source: { type: curated, needs_review: false }
